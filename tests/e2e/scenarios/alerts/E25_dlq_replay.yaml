# E25: DLQ Replay - pending_alerts_dlq -> replay -> delivered
# DoD: pending_alerts_dlq item -> replay -> delivered

name: E25_dlq_replay
description: |
  Проверяет механизм replay алерта из DLQ:
  - Создается запись в pending_alerts_dlq
  - Выполняется replay через API
  - запись удаляется из pending_alerts_dlq
  - алерт создается в alerts со статусом ACTIVE

setup:
  prerequisites:
    - database: pending_alerts table exists
    - database: pending_alerts_dlq table exists
    - database: alerts table exists
    - database: zones table exists with zone_id for zn-test-1
    - backend: Laravel is running

actions:
  - step: wait_laravel_health
    type: api_get
    endpoint: /api/system/health
    expected_status: 200
    retries: 30
    retry_delay_seconds: 1

  - step: settle_after_laravel_recovery
    type: wait
    seconds: 3

  - step: fetch_zone_id
    type: database_query
    query: |
      SELECT id AS zone_id
      FROM zones
      WHERE uid = 'zn-test-1'
      LIMIT 1
    save: zone_row

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.zone_id}

  - step: cleanup_alerts
    type: db.execute
    query: |
      DELETE FROM alerts
      WHERE zone_id = :zone_id
      AND code = :code
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure

  - step: cleanup_pending_alerts
    type: db.execute
    query: |
      DELETE FROM pending_alerts
      WHERE zone_id = :zone_id
      AND code = :code
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure

  - step: cleanup_pending_alerts_dlq
    type: db.execute
    query: |
      DELETE FROM pending_alerts_dlq
      WHERE zone_id = :zone_id
      AND code = :code
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure

  - step: create_dlq_item
    type: database_query
    query: |
      INSERT INTO pending_alerts_dlq
        (zone_id, source, code, type, status, details, attempts, max_attempts, last_error, failed_at, moved_to_dlq_at, created_at, original_id)
      VALUES
        (:zone_id, 'infra', :code, 'error', 'dlq', :details::jsonb, 3, 3, 'Simulated delivery failure', NOW(), NOW(), NOW(), NULL)
      RETURNING id
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure
      details: '{"reason":"simulated_dlq"}'
    save: dlq_row

  - step: set_dlq_id
    type: set
    dlq_id: ${dlq_row.0.id}

  - step: replay_dlq_item
    type: api_post
    endpoint: /api/alerts/dlq/${dlq_id}/replay
    expected_status: 200
    retries: 10
    retry_delay_seconds: 1
    wait_seconds: 1

assertions:
  - name: dlq_item_removed
    type: db.wait
    query: |
      SELECT id
      FROM pending_alerts_dlq
      WHERE id = :dlq_id
    params:
      dlq_id: ${dlq_id}
    timeout: 15.0
    expected_rows: 0

  - name: alert_delivered_active
    type: db.wait
    query: |
      SELECT id
      FROM alerts
      WHERE zone_id = :zone_id
      AND code = :code
      AND status = 'ACTIVE'
      LIMIT 1
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure
    timeout: 15.0
    expected_rows: 1

cleanup:
  - step: cleanup_alerts
    type: db.execute
    query: |
      DELETE FROM alerts
      WHERE zone_id = :zone_id
      AND code = :code
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure

  - step: cleanup_pending_alerts
    type: db.execute
    query: |
      DELETE FROM pending_alerts
      WHERE zone_id = :zone_id
      AND code = :code
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure

  - step: cleanup_pending_alerts_dlq
    type: db.execute
    query: |
      DELETE FROM pending_alerts_dlq
      WHERE zone_id = :zone_id
      AND code = :code
    params:
      zone_id: ${zone_id}
      code: infra_sensor_failure
