# E81: Scheduler Task Lifecycle (st-* task id)
# DoD: scheduler-tasks show корректно отображает lifecycle для ae_scheduler_task_st-*

name: E81_water_change_schedule
description: |
  Проверяет lifecycle scheduler-task для формата task_id `st-*`:
  - создаются accepted/running/failed записи в scheduler_logs
  - detail endpoint возвращает агрегированный статус failed
  - lifecycle содержит accepted, running и failed

actions:
  - step: fetch_zone_id
    type: database_query
    query: |
      SELECT id AS zone_id
      FROM zones
      WHERE uid = 'zn-test-1'
      LIMIT 1
    expected_rows: 1
    save: zone_row

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.zone_id}

  - step: set_task_context
    type: set
    task_id: st-e81-${TIMESTAMP_S}
    task_name: ae_scheduler_task_st-e81-${TIMESTAMP_S}

  - step: insert_scheduler_log_accepted
    type: database_execute
    query: |
      INSERT INTO scheduler_logs (task_name, status, details, created_at)
      VALUES (
        :task_name,
        'accepted',
        jsonb_build_object(
          'task_id', CAST(:task_id AS text),
          'zone_id', CAST(:zone_id AS bigint),
          'task_type', 'water_change',
          'status', 'accepted'
        ),
        NOW() - INTERVAL '30 seconds'
      )
    params:
      task_name: ${task_name}
      task_id: ${task_id}
      zone_id: ${zone_id}

  - step: insert_scheduler_log_running
    type: database_execute
    query: |
      INSERT INTO scheduler_logs (task_name, status, details, created_at)
      VALUES (
        :task_name,
        'running',
        jsonb_build_object(
          'task_id', CAST(:task_id AS text),
          'zone_id', CAST(:zone_id AS bigint),
          'task_type', 'water_change',
          'status', 'running'
        ),
        NOW() - INTERVAL '20 seconds'
      )
    params:
      task_name: ${task_name}
      task_id: ${task_id}
      zone_id: ${zone_id}

  - step: insert_scheduler_log_failed
    type: database_execute
    query: |
      INSERT INTO scheduler_logs (task_name, status, details, created_at)
      VALUES (
        :task_name,
        'failed',
        jsonb_build_object(
          'task_id', CAST(:task_id AS text),
          'zone_id', CAST(:zone_id AS bigint),
          'task_type', 'water_change',
          'status', 'failed',
          'error', 'e2e_forced_failure',
          'error_code', 'e2e_water_change_failed'
        ),
        NOW() - INTERVAL '10 seconds'
      )
    params:
      task_name: ${task_name}
      task_id: ${task_id}
      zone_id: ${zone_id}

  - step: get_scheduler_task_detail
    type: api_get
    endpoint: /api/zones/${zone_id}/scheduler-tasks/${task_id}
    save: task_detail

assertions:
  - name: detail_returns_expected_task
    type: json_assertion
    source: task_detail
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.task_id
        operator: equals
        value: ${task_id}
      - field: data.status
        operator: equals
        value: failed
      - field: data.source
        operator: equals
        value: scheduler_logs

  - name: lifecycle_contains_all_statuses
    type: custom_assert
    condition: "{'accepted', 'running', 'failed'}.issubset({str(s.get('status')) for s in context.get('task_detail', {}).get('data', {}).get('lifecycle', [])})"

  - name: failure_code_is_mapped
    type: json_assertion
    source: task_detail
    expected:
      - field: data.error_code
        operator: equals
        value: e2e_water_change_failed

cleanup:
  - step: delete_task_logs
    type: database_execute
    query: |
      DELETE FROM scheduler_logs
      WHERE task_name = :task_name
        AND details->>'task_id' = :task_id
    params:
      task_name: ${task_name}
      task_id: ${task_id}
    optional: true
