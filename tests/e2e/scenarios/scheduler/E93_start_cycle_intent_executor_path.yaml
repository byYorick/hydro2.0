# E93: Scheduler -> start-cycle -> intent -> scheduler task -> executor
# DoD:
# - scheduler-подобный intent вставлен в zone_automation_intents
# - /zones/{id}/start-cycle успешно принят automation-engine
# - intent перешел в terminal
# - scheduler task прошел running -> terminal в scheduler_logs
# - Laravel scheduler-task detail читает terminal snapshot из scheduler_logs

name: E93_start_cycle_intent_executor_path
description: |
  Проверяет полный runtime путь запуска task из scheduler ingress:
  1) симулируем шаг scheduler (insert pending intent),
  2) вызываем AE endpoint /zones/{id}/start-cycle с scheduler security headers,
  3) проверяем lifecycle intent и scheduler-task,
  4) убеждаемся, что task прошел running -> terminal в snapshot scheduler_logs,
  5) проверяем детализацию через /api/zones/{zone}/scheduler-tasks/{task_id}.

actions:
  - step: set_test_context
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    idempotency_key: e93-start-cycle-${TIMESTAMP_MS}
    scheduler_source: laravel_scheduler
    scheduler_trace_id: e93-trace-${TIMESTAMP_MS}

  - step: get_zone_row
    type: database_query
    query: |
      SELECT id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_row
    expected_rows: 1

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}

  - step: capture_baseline
    type: database_query
    query: |
      SELECT
        NOW() AS started_at,
        COALESCE((
          SELECT MAX(id)
          FROM scheduler_logs
          WHERE position('ae_scheduler_task_st-' IN task_name) = 1
        ), 0) AS baseline_scheduler_log_id
    save: baseline_row
    expected_rows: 1

  - step: insert_scheduler_like_intent
    type: database_execute
    query: |
      INSERT INTO zone_automation_intents (
        zone_id,
        intent_type,
        payload,
        idempotency_key,
        status,
        not_before,
        retry_count,
        max_retries,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'IRRIGATE_ONCE',
        jsonb_build_object(
          'source', CAST(:source AS text),
          'task_type', 'diagnostics',
          'workflow', 'cycle_start',
          'topology', 'two_tank_drip_substrate_trays'
        ),
        :idempotency_key,
        'pending',
        NOW() - INTERVAL '1 second',
        0,
        3,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
      source: ${scheduler_source}

  - step: start_cycle_http
    type: http_request
    method: POST
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
    headers:
      Accept: application/json
      Content-Type: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    body:
      source: ${scheduler_source}
      idempotency_key: ${idempotency_key}
    retries: 2
    retry_delay_seconds: 1
    capture_response: start_cycle_response

  - step: wait_intent_terminal
    type: db.wait
    query: |
      SELECT
        id,
        status,
        retry_count,
        error_code,
        completed_at
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
        AND status IN ('completed', 'failed', 'cancelled')
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
    timeout: 120.0
    expected_rows: 1
    save: intent_terminal

  - step: wait_scheduler_task_running
    type: db.wait
    query: |
      SELECT
        id,
        task_name,
        status,
        details->>'task_id' AS task_id,
        details->>'correlation_id' AS correlation_id
      FROM scheduler_logs
      WHERE id > :baseline_scheduler_log_id
        AND position('ae_scheduler_task_st-' IN task_name) = 1
        AND status = 'running'
        AND COALESCE(details->>'zone_id', '') = CAST(:zone_id AS text)
        AND COALESCE(details->>'task_type', '') = 'diagnostics'
        AND position('start-cycle-intent:' IN COALESCE(details->>'correlation_id', '')) = 1
      ORDER BY id DESC
      LIMIT 1
    params:
      baseline_scheduler_log_id: ${baseline_row.0.baseline_scheduler_log_id}
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1
    save: scheduler_task_running

  - step: wait_scheduler_task_terminal
    type: db.wait
    query: |
      SELECT
        id,
        task_name,
        status,
        details->>'task_id' AS task_id,
        details->>'correlation_id' AS correlation_id
      FROM scheduler_logs
      WHERE id > :baseline_scheduler_log_id
        AND position('ae_scheduler_task_st-' IN task_name) = 1
        AND status IN ('completed', 'failed')
        AND COALESCE(details->>'zone_id', '') = CAST(:zone_id AS text)
        AND COALESCE(details->>'task_type', '') = 'diagnostics'
        AND position('start-cycle-intent:' IN COALESCE(details->>'correlation_id', '')) = 1
      ORDER BY id DESC
      LIMIT 1
    params:
      baseline_scheduler_log_id: ${baseline_row.0.baseline_scheduler_log_id}
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1
    save: scheduler_task_terminal

  - step: set_scheduler_task_id
    type: set
    scheduler_task_id: ${scheduler_task_terminal.0.task_id}

  - step: get_scheduler_task_detail
    type: api_get
    endpoint: /api/zones/${zone_id}/scheduler-tasks/${scheduler_task_id}
    save: scheduler_task_detail

assertions:
  - name: start_cycle_http_200
    type: custom_assert
    condition: "int(context.get('start_cycle_response', {}).get('status_code', 0)) == 200"

  - name: start_cycle_response_status_ok
    type: json_assertion
    source: start_cycle_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.accepted
        operator: equals
        value: true
      - field: data.runner_state
        operator: equals
        value: active

  - name: start_cycle_returns_intent_task_id
    type: custom_assert
    condition: "str(context.get('start_cycle_response', {}).get('json', {}).get('data', {}).get('task_id', '')).startswith('intent-')"

  - name: intent_terminal_status_valid
    type: custom_assert
    condition: "str(context.get('intent_terminal', [{}])[0].get('status', '')).lower() in {'completed', 'failed', 'cancelled'}"

  - name: scheduler_task_id_has_st_prefix
    type: custom_assert
    condition: "str(context.get('scheduler_task_id', '')).startswith('st-')"

  - name: scheduler_task_terminal_status_valid
    type: custom_assert
    condition: "str(context.get('scheduler_task_terminal', [{}])[0].get('status', '')).lower() in {'completed', 'failed'}"

  - name: scheduler_task_detail_terminal
    type: json_assertion
    source: scheduler_task_detail
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.task_id
        operator: equals
        value: ${scheduler_task_id}
      - field: data.status
        operator: in
        value: [completed, failed]
      - field: data.source
        operator: equals
        value: scheduler_logs

  - name: intent_not_left_in_non_terminal
    type: database_query
    query: |
      SELECT COUNT(*)::int AS pending_cnt
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
        AND status IN ('pending', 'claimed', 'running')
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
    expected_rows: 1
    expected:
      - field: pending_cnt
        operator: equals
        value: 0

cleanup:
  - step: delete_test_intent
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
    optional: true

  - step: delete_test_scheduler_logs
    type: database_execute
    query: |
      DELETE FROM scheduler_logs
      WHERE task_name = :task_name
    params:
      task_name: ae_scheduler_task_${scheduler_task_id}
    optional: true
    condition: ${scheduler_task_id is not None and scheduler_task_id != ''}
