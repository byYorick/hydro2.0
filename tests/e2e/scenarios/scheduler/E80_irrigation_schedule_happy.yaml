# E80: Scheduler Diagnostics (irrigation intent)
# DoD: scheduler-diagnostics корректно отражает lifecycle по scheduler_logs

name: E80_irrigation_schedule_happy
auth_role: admin
description: |
  Проверяет актуальный контракт scheduler-diagnostics:
  - создаются фикстурные scheduler_logs для irrigation intent-task
  - /api/zones/{zone}/scheduler-diagnostics возвращает recent_logs для зоны
  - lifecycle задачи восстанавливается по scheduler_logs без legacy scheduler-tasks API

actions:
  - step: fetch_zone_id
    type: database_query
    query: |
      SELECT id AS zone_id
      FROM zones
      WHERE uid = 'zn-test-1'
      LIMIT 1
    expected_rows: 1
    save: zone_row

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.zone_id}

  - step: set_task_context
    type: set
    task_id: st-e80-${TIMESTAMP_S}
    task_name: ae_scheduler_task_st-e80-${TIMESTAMP_S}

  - step: insert_scheduler_log_accepted
    type: database_execute
    query: |
      INSERT INTO scheduler_logs (task_name, status, details, created_at)
      VALUES (
        :task_name,
        'accepted',
        jsonb_build_object(
          'task_id', CAST(:task_id AS text),
          'zone_id', CAST(:zone_id AS bigint),
          'task_type', 'irrigation',
          'status', 'accepted'
        ),
        NOW() + INTERVAL '2 minutes'
      )
    params:
      task_name: ${task_name}
      task_id: ${task_id}
      zone_id: ${zone_id}

  - step: insert_scheduler_log_completed
    type: database_execute
    query: |
      INSERT INTO scheduler_logs (task_name, status, details, created_at)
      VALUES (
        :task_name,
        'completed',
        jsonb_build_object(
          'task_id', CAST(:task_id AS text),
          'zone_id', CAST(:zone_id AS bigint),
          'task_type', 'irrigation',
          'status', 'completed',
          'result', jsonb_build_object(
            'command_submitted', true,
            'command_effect_confirmed', true,
            'commands_total', 1,
            'commands_effect_confirmed', 1,
            'commands_failed', 0
          )
        ),
        NOW() + INTERVAL '3 minutes'
      )
    params:
      task_name: ${task_name}
      task_id: ${task_id}
      zone_id: ${zone_id}

  - step: get_scheduler_diagnostics
    type: api_get
    endpoint: /api/zones/${zone_id}/scheduler-diagnostics
    save: scheduler_diagnostics

assertions:
  - name: diagnostics_returns_ok
    type: json_assertion
    source: scheduler_diagnostics
    expected:
      - field: status
        operator: equals
        value: ok

  - name: diagnostics_contains_task_logs
    type: custom_assert
    condition: "(lambda logs: len([log for log in logs if str(log.get('task_name')) == str(context.get('task_name')) and str((log.get('details') or {}).get('task_id')) == str(context.get('task_id'))]) >= 2)(context.get('scheduler_diagnostics', {}).get('data', {}).get('recent_logs', []))"

  - name: diagnostics_exposes_completed_status
    type: custom_assert
    condition: "(lambda logs: 'completed' in {str(log.get('status')) for log in logs if str(log.get('task_name')) == str(context.get('task_name')) and str((log.get('details') or {}).get('task_id')) == str(context.get('task_id'))})(context.get('scheduler_diagnostics', {}).get('data', {}).get('recent_logs', []))"

cleanup:
  - step: delete_task_logs
    type: database_execute
    query: |
      DELETE FROM scheduler_logs
      WHERE task_name = :task_name
        AND details->>'task_id' = :task_id
    params:
      task_name: ${task_name}
      task_id: ${task_id}
    optional: true
