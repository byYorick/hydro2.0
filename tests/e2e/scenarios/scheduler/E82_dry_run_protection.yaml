# E82: Scheduler Intent Task Compatibility
# DoD: detail endpoint поддерживает intent-* task_id и возвращает lifecycle

name: E82_dry_run_protection
description: |
  Проверяет совместимость scheduler-task detail для `intent-*`:
  - создаются accepted/completed логи с intent task_id
  - detail endpoint возвращает completed задачу
  - lifecycle содержит минимум два статуса

actions:
  - step: fetch_zone_id
    type: database_query
    query: |
      SELECT id AS zone_id
      FROM zones
      WHERE uid = 'zn-test-1'
      LIMIT 1
    expected_rows: 1
    save: zone_row

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.zone_id}

  - step: set_task_context
    type: set
    task_id: intent-${TIMESTAMP_MS}
    task_name: laravel_scheduler_task_irrigation_zone_${zone_id}

  - step: insert_scheduler_log_accepted
    type: database_execute
    query: |
      INSERT INTO scheduler_logs (task_name, status, details, created_at)
      VALUES (
        :task_name,
        'accepted',
        jsonb_build_object(
          'task_id', CAST(:task_id AS text),
          'zone_id', CAST(:zone_id AS bigint),
          'task_type', 'irrigation',
          'status', 'pending',
          'correlation_id', CAST(:correlation_id AS text)
        ),
        NOW() + INTERVAL '2 minutes'
      )
    params:
      task_name: ${task_name}
      task_id: ${task_id}
      zone_id: ${zone_id}
      correlation_id: "sch:z${zone_id}:irrigation:${task_id}"

  - step: insert_scheduler_log_completed
    type: database_execute
    query: |
      INSERT INTO scheduler_logs (task_name, status, details, created_at)
      VALUES (
        :task_name,
        'completed',
        jsonb_build_object(
          'task_id', CAST(:task_id AS text),
          'zone_id', CAST(:zone_id AS bigint),
          'task_type', 'irrigation',
          'status', 'completed',
          'correlation_id', CAST(:correlation_id AS text)
        ),
        NOW() + INTERVAL '3 minutes'
      )
    params:
      task_name: ${task_name}
      task_id: ${task_id}
      zone_id: ${zone_id}
      correlation_id: "sch:z${zone_id}:irrigation:${task_id}"

  - step: get_scheduler_tasks_index
    type: api_get
    endpoint: /api/zones/${zone_id}/scheduler-tasks
    save: tasks_index

  - step: get_scheduler_task_detail
    type: api_get
    endpoint: /api/zones/${zone_id}/scheduler-tasks/${task_id}
    save: task_detail

assertions:
  - name: detail_returns_completed_intent_task
    type: json_assertion
    source: task_detail
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.task_id
        operator: equals
        value: ${task_id}
      - field: data.status
        operator: equals
        value: completed
      - field: data.source
        operator: equals
        value: scheduler_logs

  - name: lifecycle_has_two_states
    type: custom_assert
    condition: "len(context.get('task_detail', {}).get('data', {}).get('lifecycle', [])) >= 2"

cleanup:
  - step: delete_task_logs
    type: database_execute
    query: |
      DELETE FROM scheduler_logs
      WHERE task_name = :task_name
        AND details->>'task_id' = :task_id
    params:
      task_name: ${task_name}
      task_id: ${task_id}
    optional: true
