# E51: Start Cycle Running - start cycle → RUNNING
# DoD: start cycle → RUNNING

name: E51_start_cycle_running
description: |
  Проверяет запуск grow-cycle:
  - Рецепт привязан к зоне (status = PLANNED)
  - Запускается цикл (start)
  - Статус цикла = RUNNING
  - Стадия ACTIVE

actions:
  - step: set_zone_id_from_uid
    type: database_query
    query: |
      SELECT id
      FROM zones
      WHERE uid = 'zn-test-1'
      LIMIT 1
    save: zone_row

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}

  - step: cleanup_blocking_ae_alerts
    type: database_execute
    query: |
      DELETE FROM alerts
      WHERE zone_id = :zone_id
        AND code = 'biz_ae3_task_failed'
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_scheduler_snapshots
    type: database_execute
    query: |
      DELETE FROM laravel_scheduler_active_tasks
      WHERE zone_id = :zone_id
        AND (
          task_id ~ '^\d+$'
          OR (
            details->>'intent_id' IS NOT NULL
            AND (details->>'intent_id')::bigint IN (
              SELECT id
              FROM zone_automation_intents
              WHERE zone_id = :zone_id
                AND intent_type = 'DIAGNOSTICS_TICK'
                AND payload->>'source' = 'laravel_grow_cycle_start'
            )
          )
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND intent_source = 'laravel_grow_cycle_start'
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
        AND intent_source = 'laravel_grow_cycle_start'
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND intent_type = 'DIAGNOSTICS_TICK'
        AND payload->>'source' = 'laravel_grow_cycle_start'
    params:
      zone_id: ${zone_id}

  - step: cleanup_old_cycles
    type: database_execute
    query: |
      DELETE FROM grow_cycles
      WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: test-plant-e51-${TIMESTAMP_S}
      scientific_name: Test Plant
    save: plant_response

  - step: create_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: test-recipe-e51-${TIMESTAMP_S}
      description: Test recipe for E51
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: Test revision
    save: revision_response

  - step: add_phase_0
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Planting
      duration_hours: 24
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.5
      ec_min: 1.3
      ec_max: 1.7
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}

  - step: create_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: false
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  - step: start_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/start
    payload: {}
    save: start_response

assertions:
  # Проверка 1: Статус цикла = RUNNING (или остался PLANNED если нет bindings)
  - name: cycle_status_running
    type: database_query
    query: |
      SELECT status, current_phase_id
      FROM grow_cycles
      WHERE zone_id = :zone_id
      AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
    params:
      zone_id: ${zone_id}
    expected:
      - field: status
        operator: is_not_null
      - field: current_phase_id
        operator: is_not_null

  # Проверка 2: Grow cycle существует
  - name: cycle_exists
    type: database_query
    query: |
      SELECT id, recipe_revision_id, status
      FROM grow_cycles
      WHERE zone_id = :zone_id
      AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
    params:
      zone_id: ${zone_id}
    expected_rows: 1

  # Проверка 3: Текущая фаза активна (current_phase_id установлен)
  - name: phase_is_active
    type: database_query
    query: |
      SELECT current_phase_id
      FROM grow_cycles
      WHERE zone_id = :zone_id
      AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
    params:
      zone_id: ${zone_id}
    expected:
      - field: current_phase_id
        operator: is_not_null

cleanup:
  - step: abort_cycle_before_cleanup
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/abort
    payload:
      notes: E51 cleanup abort
    optional: true

  - step: wait_after_abort_before_cleanup
    type: sleep
    seconds: 1
    optional: true

  - step: cleanup_grow_cycle_start_scheduler_snapshots_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM laravel_scheduler_active_tasks
      WHERE zone_id = :zone_id
        AND (
          task_id ~ '^\d+$'
          OR (
            details->>'intent_id' IS NOT NULL
            AND (details->>'intent_id')::bigint IN (
              SELECT id
              FROM zone_automation_intents
              WHERE zone_id = :zone_id
                AND intent_type = 'DIAGNOSTICS_TICK'
                AND payload->>'source' = 'laravel_grow_cycle_start'
            )
          )
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_terminal_grow_cycle_start_ae_commands_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND intent_source = 'laravel_grow_cycle_start'
          AND status IN ('completed', 'failed', 'cancelled')
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_terminal_grow_cycle_start_ae_tasks_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
        AND intent_source = 'laravel_grow_cycle_start'
        AND status IN ('completed', 'failed', 'cancelled')
    params:
      zone_id: ${zone_id}

  - step: cleanup_terminal_grow_cycle_start_intents_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND intent_type = 'DIAGNOSTICS_TICK'
        AND payload->>'source' = 'laravel_grow_cycle_start'
        AND status IN ('completed', 'failed', 'cancelled')
    params:
      zone_id: ${zone_id}

  - step: cleanup_blocking_ae_alerts_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM alerts
      WHERE zone_id = :zone_id
        AND code = 'biz_ae3_task_failed'
    params:
      zone_id: ${zone_id}

  - step: delete_grow_cycle
    type: database_execute
    query: |
      DELETE FROM grow_cycles
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}
    optional: true

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
