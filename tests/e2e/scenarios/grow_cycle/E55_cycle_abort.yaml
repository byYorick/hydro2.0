# E55: Cycle Abort - abort running cycle → ABORTED
# DoD: abort running cycle → ABORTED

name: E55_cycle_abort
description: |
  Проверяет прерывание grow-cycle:
  - Цикл в статусе RUNNING
  - Вызывается abort
  - Статус цикла = ABORTED

actions:
  - step: set_zone_id_from_uid
    type: database_query
    query: |
      SELECT id
      FROM zones
      WHERE uid = 'zn-test-1'
      LIMIT 1
    save: zone_row

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}

  - step: cleanup_blocking_ae_alerts
    type: database_execute
    query: |
      DELETE FROM alerts
      WHERE zone_id = :zone_id
        AND code = 'biz_ae3_task_failed'
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_scheduler_snapshots
    type: database_execute
    query: |
      DELETE FROM laravel_scheduler_active_tasks
      WHERE zone_id = :zone_id
        AND (
          task_id ~ '^\d+$'
          OR (
            details->>'intent_id' IS NOT NULL
            AND (details->>'intent_id')::bigint IN (
              SELECT id
              FROM zone_automation_intents
              WHERE zone_id = :zone_id
                AND intent_type = 'DIAGNOSTICS_TICK'
                AND payload->>'source' = 'laravel_grow_cycle_start'
            )
          )
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND intent_source = 'laravel_grow_cycle_start'
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
        AND intent_source = 'laravel_grow_cycle_start'
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycle_start_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND intent_type = 'DIAGNOSTICS_TICK'
        AND payload->>'source' = 'laravel_grow_cycle_start'
    params:
      zone_id: ${zone_id}

  - step: cleanup_active_zone_intents
    type: database_execute
    query: |
      UPDATE zone_automation_intents
      SET status = 'failed',
          error_code = 'e2e_cleanup',
          error_message = 'cleaned before E55 grow cycle scenario',
          completed_at = NOW(),
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running')
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_runtime_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_runtime_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_runtime_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_runtime_workflow
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: test-plant-e55-${TIMESTAMP_S}
      scientific_name: Test Plant
    save: plant_response

  - step: create_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: test-recipe-e55-${TIMESTAMP_S}
      description: Test recipe
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: Test revision
    save: revision_response

  - step: add_phase
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Test Phase
      duration_hours: 1
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.5
      ec_min: 1.3
      ec_max: 1.7
      irrigation_mode: SUBSTRATE

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish

  - step: create_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: false
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  - step: start_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/start
    payload: {}

  - step: abort_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/abort
    payload: {}
    save: abort_response

  - step: wait_after_abort
    type: sleep
    seconds: 1

assertions:
  # Проверка 1: Цикл прерван со статусом ABORTED
  - name: cycle_status_aborted
    type: database_query
    query: |
      SELECT status
      FROM grow_cycles
      WHERE id = :cycle_id
    params:
      cycle_id: ${cycle_id}
    expected:
      - field: status
        operator: equals
        value: ABORTED

cleanup:
  - step: wait_after_terminal_transition_before_cleanup
    type: sleep
    seconds: 1
    optional: true

  - step: cleanup_grow_cycle_start_scheduler_snapshots_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM laravel_scheduler_active_tasks
      WHERE zone_id = :zone_id
        AND (
          task_id ~ '^\d+$'
          OR (
            details->>'intent_id' IS NOT NULL
            AND (details->>'intent_id')::bigint IN (
              SELECT id
              FROM zone_automation_intents
              WHERE zone_id = :zone_id
                AND intent_type = 'DIAGNOSTICS_TICK'
                AND payload->>'source' = 'laravel_grow_cycle_start'
            )
          )
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_terminal_grow_cycle_start_ae_commands_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND intent_source = 'laravel_grow_cycle_start'
          AND status IN ('completed', 'failed', 'cancelled')
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_terminal_grow_cycle_start_ae_tasks_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
        AND intent_source = 'laravel_grow_cycle_start'
        AND status IN ('completed', 'failed', 'cancelled')
    params:
      zone_id: ${zone_id}

  - step: delete_test_cycle
    type: database_execute
    query: |
      DELETE FROM grow_cycles
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}
    optional: true

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
