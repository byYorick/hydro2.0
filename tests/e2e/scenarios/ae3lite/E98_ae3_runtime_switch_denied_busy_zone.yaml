# E98: AE3-Lite runtime switch request to legacy rejected while zone busy
# DoD:
# - AE3 zone имеет active task в waiting_command
# - PATCH /api/zones/{id} с non-ae3 runtime возвращает 422 validation error
# - runtime зоны не меняется во время busy window

name: E98_ae3_runtime_switch_denied_busy_zone
description: |
  Проверяет актуальный контракт runtime update для busy AE3 зоны:
  1) поднимаем минимальную AE3 fixture-зону,
  2) запускаем start-cycle и дожидаемся waiting_command,
  3) получаем Sanctum token через e2e auth endpoint,
  4) вызываем PATCH /api/zones/{id} -> automation_runtime=legacy,
  5) убеждаемся, что Laravel режет unsupported runtime на validation-слое и не меняет runtime зоны.

actions:
  - step: set_test_context
    type: set
    greenhouse_uid: gh-ae3e98-${TIMESTAMP_S}
    greenhouse_name: ae3-e98-gh-${TIMESTAMP_MS}
    greenhouse_token: pt-ae3e98-${TIMESTAMP_S}
    zone_uid: zn-ae3e98-${TIMESTAMP_S}
    zone_name: ae3-e98-zone-${TIMESTAMP_MS}
    recipe_name: ae3-e98-recipe-${TIMESTAMP_MS}
    node_uid: nd-ae3e98-${TIMESTAMP_S}
    idempotency_key: ae3-e98-start-cycle-${TIMESTAMP_MS}
    scheduler_source: laravel_scheduler
    scheduler_trace_id: ae3-e98-trace-${TIMESTAMP_MS}

  - step: create_greenhouse
    type: database_execute
    query: |
      INSERT INTO greenhouses (uid, name, timezone, provisioning_token, created_at, updated_at)
      VALUES (:greenhouse_uid, :greenhouse_name, 'UTC', :greenhouse_token, NOW(), NOW())
    params:
      greenhouse_uid: ${greenhouse_uid}
      greenhouse_name: ${greenhouse_name}
      greenhouse_token: ${greenhouse_token}

  - step: create_zone
    type: database_execute
    query: |
      INSERT INTO zones (greenhouse_id, name, uid, status, automation_runtime, created_at, updated_at)
      VALUES (
        (SELECT id FROM greenhouses WHERE uid = :greenhouse_uid LIMIT 1),
        :zone_name,
        :zone_uid,
        'online',
        'ae3',
        NOW(),
        NOW()
      )
    params:
      greenhouse_uid: ${greenhouse_uid}
      zone_name: ${zone_name}
      zone_uid: ${zone_uid}

  - step: load_zone_fixture_ids
    type: database_query
    query: |
      SELECT
        (SELECT id FROM greenhouses WHERE uid = :greenhouse_uid LIMIT 1) AS greenhouse_id,
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1) AS zone_id
    params:
      greenhouse_uid: ${greenhouse_uid}
      zone_uid: ${zone_uid}
    expected_rows: 1
    save: zone_fixture_ids

  - step: set_zone_fixture_ids
    type: set
    greenhouse_id: ${zone_fixture_ids.0.greenhouse_id}
    zone_id: ${zone_fixture_ids.0.zone_id}

  - step: grant_e2e_greenhouse_acl
    type: database_execute
    query: |
      INSERT INTO user_greenhouses (user_id, greenhouse_id, created_at, updated_at)
      SELECT id, :greenhouse_id, NOW(), NOW()
      FROM users
      WHERE email = 'e2e@test.local'
      ON CONFLICT (user_id, greenhouse_id) DO NOTHING
    params:
      greenhouse_id: ${greenhouse_id}

  - step: grant_e2e_zone_acl
    type: database_execute
    query: |
      INSERT INTO user_zones (user_id, zone_id, created_at, updated_at)
      SELECT id, :zone_id, NOW(), NOW()
      FROM users
      WHERE email = 'e2e@test.local'
      ON CONFLICT (user_id, zone_id) DO NOTHING
    params:
      zone_id: ${zone_id}

  - step: create_recipe
    type: database_execute
    query: |
      INSERT INTO recipes (name, metadata, created_at, updated_at)
      VALUES (:recipe_name, '{}'::jsonb, NOW(), NOW())
    params:
      recipe_name: ${recipe_name}

  - step: create_recipe_revision
    type: database_execute
    query: |
      INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)
      VALUES (
        (SELECT id FROM recipes WHERE name = :recipe_name LIMIT 1),
        1,
        'PUBLISHED',
        NOW(),
        NOW()
      )
    params:
      recipe_name: ${recipe_name}

  - step: create_grow_cycle
    type: database_execute
    query: |
      INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status, created_at, updated_at)
      VALUES (
        (SELECT id FROM greenhouses WHERE uid = :greenhouse_uid LIMIT 1),
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1),
        (
          SELECT rr.id
          FROM recipe_revisions rr
          JOIN recipes r ON r.id = rr.recipe_id
          WHERE r.name = :recipe_name
          ORDER BY rr.id DESC
          LIMIT 1
        ),
        'RUNNING',
        NOW(),
        NOW()
      )
    params:
      greenhouse_uid: ${greenhouse_uid}
      zone_uid: ${zone_uid}
      recipe_name: ${recipe_name}

  - step: load_grow_cycle
    type: database_query
    query: |
      SELECT id
      FROM grow_cycles
      WHERE zone_id = :zone_id
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: grow_cycle_row

  - step: set_grow_cycle_id
    type: set
    grow_cycle_id: ${grow_cycle_row.0.id}

  - step: create_phase
    type: database_execute
    query: |
      INSERT INTO grow_cycle_phases (
        grow_cycle_id,
        phase_index,
        name,
        ph_target,
        ph_min,
        ph_max,
        ec_target,
        ec_min,
        ec_max,
        irrigation_mode,
        irrigation_interval_sec,
        irrigation_duration_sec,
        extensions,
        created_at,
        updated_at
      )
      VALUES (
        (
          SELECT id
          FROM grow_cycles
          WHERE zone_id = (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1)
          ORDER BY id DESC
          LIMIT 1
        ),
        0,
        'VEG',
        5.80,
        5.50,
        6.10,
        1.40,
        1.20,
        1.60,
        'SUBSTRATE',
        600,
        45,
        jsonb_build_object(
          'targets', jsonb_build_object(
            'diagnostics', jsonb_build_object(
              'execution', jsonb_build_object(
                'workflow', 'cycle_start',
                'startup', jsonb_build_object('clean_fill_timeout_sec', 30)
              )
            )
          )
        ),
        NOW(),
        NOW()
      )
    params:
      zone_uid: ${zone_uid}

  - step: activate_grow_cycle
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET current_phase_id = (
            SELECT gp.id
            FROM grow_cycle_phases gp
            WHERE gp.grow_cycle_id = grow_cycles.id
            ORDER BY gp.id DESC
            LIMIT 1
          ),
          started_at = NOW(),
          recipe_started_at = NOW(),
          updated_at = NOW()
      WHERE zone_id = (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1)
    params:
      zone_uid: ${zone_uid}

  - step: load_test_node_correction_preset
    type: database_query
    query: |
      SELECT id
      FROM zone_correction_presets
      WHERE slug = 'test-node'
      LIMIT 1
    expected_rows: 1
    save: test_node_correction_preset_row

  - step: apply_test_node_correction_preset
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.correction
    payload:
      payload:
        preset_id: ${test_node_correction_preset_row.0.id}
        base_config: {}
        phase_overrides: {}

  - step: apply_zone_pid_ph
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.pid.ph
    payload:
      payload:
        dead_zone: 0.04
        close_zone: 0.18
        far_zone: 0.65
        zone_coeffs:
          close:
            kp: 0.18
            ki: 0.01
            kd: 0.0
          far:
            kp: 0.28
            ki: 0.015
            kd: 0.0
        max_integral: 12.0

  - step: apply_zone_pid_ec
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.pid.ec
    payload:
      payload:
        dead_zone: 0.06
        close_zone: 0.25
        far_zone: 0.9
        zone_coeffs:
          close:
            kp: 0.35
            ki: 0.02
            kd: 0.0
          far:
            kp: 0.55
            ki: 0.03
            kd: 0.0
        max_integral: 20.0

  - step: apply_cycle_start_snapshot
    type: api_put
    endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id}/cycle.start_snapshot
    payload:
      payload:
        cycle_id: ${grow_cycle_id}
        zone_id: ${zone_id}

  - step: apply_cycle_phase_overrides
    type: api_put
    endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id}/cycle.phase_overrides
    payload:
      payload: {}

  - step: wait_grow_cycle_bundle_ready
    type: db.wait
    query: |
      SELECT scope_type, scope_id, status, bundle_revision
      FROM automation_effective_bundles
      WHERE scope_type = 'grow_cycle'
        AND scope_id = CAST(:grow_cycle_id AS bigint)
        AND status = 'valid'
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    timeout: 20.0
    expected_rows: 1
    save: grow_cycle_bundle_row

  - step: create_profile
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
    payload:
      payload:
        active_mode: working
        profiles:
          working:
            mode: working
            is_active: true
            subsystems:
              diagnostics:
                execution:
                  workflow: cycle_start
                  topology: generic_cycle_start
                  required_node_types:
                    - irrig
                  startup:
                    level_poll_interval_sec: 11
                  steps:
                    - name: pump_start
                      channel: irrigation_pump
                      cmd: set_relay
                      params:
                        state: true
                      timeout_sec: 20
            command_plans:
              schema_version: 1
              plan_version: 1
              plans:
                diagnostics:
                  execution:
                    workflow: cycle_start
                    topology: generic_cycle_start
                    required_node_types:
                      - irrig
                    startup:
                      level_poll_interval_sec: 11
                  steps:
                    - name: pump_start
                      channel: irrigation_pump
                      cmd: set_relay
                      params:
                        state: true
                      timeout_sec: 20

  - step: create_workflow_state
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES ((SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1), 'idle', 0, NOW(), '{}'::jsonb)
    params:
      zone_uid: ${zone_uid}

  - step: create_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, type, status, created_at, updated_at)
      VALUES ((SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1), :node_uid, 'irrig', 'online', NOW(), NOW())
    params:
      zone_uid: ${zone_uid}
      node_uid: ${node_uid}

  - step: create_node_channel
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, config, created_at, updated_at)
      VALUES (
        (SELECT id FROM nodes WHERE uid = :node_uid LIMIT 1),
        'pump_main',
        'ACTUATOR',
        '{}'::jsonb,
        NOW(),
        NOW()
      )
    params:
      node_uid: ${node_uid}

  - step: create_infrastructure_instance
    type: database_execute
    query: |
      INSERT INTO infrastructure_instances (
        owner_type,
        owner_id,
        asset_type,
        label,
        required,
        created_at,
        updated_at
      )
      VALUES (
        'zone',
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1),
        'PUMP',
        'Main Pump',
        TRUE,
        NOW(),
        NOW()
      )
    params:
      zone_uid: ${zone_uid}

  - step: create_channel_binding
    type: database_execute
    query: |
      INSERT INTO channel_bindings (
        infrastructure_instance_id,
        node_channel_id,
        direction,
        role,
        created_at,
        updated_at
      )
      VALUES (
        (
          SELECT id
          FROM infrastructure_instances
          WHERE owner_type = 'zone'
            AND owner_id = (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1)
          ORDER BY id DESC
          LIMIT 1
        ),
        (
          SELECT nc.id
          FROM node_channels nc
          JOIN nodes n ON n.id = nc.node_id
          WHERE n.uid = :node_uid
            AND nc.channel = 'pump_main'
          ORDER BY nc.id DESC
          LIMIT 1
        ),
        'actuator',
        'irrigation_pump',
        NOW(),
        NOW()
      )
    params:
      zone_uid: ${zone_uid}
      node_uid: ${node_uid}

  - step: load_fixture_ids
    type: database_query
    query: |
      SELECT
        (SELECT id FROM greenhouses WHERE uid = :greenhouse_uid LIMIT 1) AS greenhouse_id,
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1) AS zone_id,
        (SELECT id FROM recipes WHERE name = :recipe_name LIMIT 1) AS recipe_id,
        (
          SELECT rr.id
          FROM recipe_revisions rr
          JOIN recipes r ON r.id = rr.recipe_id
          WHERE r.name = :recipe_name
          ORDER BY rr.id DESC
          LIMIT 1
        ) AS recipe_revision_id
    params:
      greenhouse_uid: ${greenhouse_uid}
      zone_uid: ${zone_uid}
      recipe_name: ${recipe_name}
    expected_rows: 1
    save: fixture_ids

  - step: set_fixture_ids
    type: set
    greenhouse_id: ${fixture_ids.0.greenhouse_id}
    zone_id: ${fixture_ids.0.zone_id}
    recipe_id: ${fixture_ids.0.recipe_id}
    recipe_revision_id: ${fixture_ids.0.recipe_revision_id}

  - step: insert_scheduler_like_intent
    type: database_execute
    query: |
      INSERT INTO zone_automation_intents (
        zone_id,
        intent_type,
        payload,
        idempotency_key,
        status,
        not_before,
        retry_count,
        max_retries,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'IRRIGATE_ONCE',
        jsonb_build_object(
          'source', CAST(:source AS text),
          'task_type', 'diagnostics',
          'workflow', 'cycle_start',
          'topology', 'generic_cycle_start'
        ),
        :idempotency_key,
        'pending',
        NOW() - INTERVAL '1 second',
        0,
        3,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
      source: ${scheduler_source}

  - step: start_cycle_http
    type: http_request
    method: POST
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
    headers:
      Accept: application/json
      Content-Type: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    body:
      source: ${scheduler_source}
      idempotency_key: ${idempotency_key}
    retries: 2
    retry_delay_seconds: 1
    capture_response: start_cycle_response

  - step: set_task_id
    type: set
    task_id: ${start_cycle_response.json.data.task_id}

  - step: wait_ae_command_published
    type: db.wait
    query: |
      SELECT id, external_id, publish_status
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND publish_status = 'accepted'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: ae_command_row

  - step: wait_task_waiting_command
    type: db.wait
    query: |
      SELECT id, status, claimed_by
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'waiting_command'
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: waiting_task_row

  - step: patch_zone_runtime_to_ae2
    type: http_request
    method: PATCH
    url: ${LARAVEL_URL}/api/zones/${zone_id}
    headers:
      Accept: application/json
      Content-Type: application/json
      Authorization: Bearer ${E2E_AUTH_TOKEN}
    body:
      automation_runtime: legacy
    capture_response: runtime_switch_response

  - step: load_zone_runtime_after_denial
    type: database_query
    query: |
      SELECT automation_runtime
      FROM zones
      WHERE id = :zone_id
      LIMIT 1
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: zone_runtime_row

assertions:
  - name: start_cycle_http_200
    type: custom_assert
    condition: "int(context.get('start_cycle_response', {}).get('status_code', 0)) == 200"

  - name: task_is_busy_waiting_command
    type: custom_assert
    condition: "str(context.get('waiting_task_row', [{}])[0].get('status', '')).lower() == 'waiting_command'"

  - name: runtime_switch_validation_http_422
    type: custom_assert
    condition: "int(context.get('runtime_switch_response', {}).get('status_code', 0)) == 422"

  - name: runtime_switch_validation_payload
    type: json_assertion
    source: runtime_switch_response
    path: json
    expected:
      - field: status
        operator: equals
        value: error
      - field: code
        operator: equals
        value: VALIDATION_ERROR
      - field: errors.automation_runtime
        operator: is_not_null

  - name: runtime_not_changed_while_busy
    type: custom_assert
    condition: "str(context.get('zone_runtime_row', [{}])[0].get('automation_runtime', '')).lower() == 'ae3'"

cleanup:
  - step: cleanup_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM commands
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id)
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_leases
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_tasks
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_intents
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_channel_bindings
    type: database_execute
    optional: true
    query: |
      DELETE FROM channel_bindings
      WHERE infrastructure_instance_id IN (
        SELECT id
        FROM infrastructure_instances
        WHERE owner_type = 'zone'
          AND owner_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_infrastructure_instances
    type: database_execute
    optional: true
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_node_channels
    type: database_execute
    optional: true
    query: |
      DELETE FROM node_channels
      WHERE node_id IN (
        SELECT id
        FROM nodes
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_nodes
    type: database_execute
    optional: true
    query: |
      DELETE FROM nodes
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_profiles
    type: database_execute
    optional: true
    query: |
      DELETE FROM automation_config_documents
      WHERE namespace = 'zone.logic_profile'
        AND scope_type = 'zone'
        AND scope_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_overrides
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_overrides
      WHERE grow_cycle_id IN (
        SELECT id
        FROM grow_cycles
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_phases
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_phases
      WHERE grow_cycle_id IN (
        SELECT id
        FROM grow_cycles
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycles
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycles
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_workflow_state
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone
    type: database_execute
    optional: true
    query: |
      DELETE FROM zones
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_recipe_revision
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipe_revisions
      WHERE id = :recipe_revision_id
    params:
      recipe_revision_id: ${recipe_revision_id}

  - step: cleanup_recipe
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipes
      WHERE id = :recipe_id
    params:
      recipe_id: ${recipe_id}

  - step: cleanup_greenhouse
    type: database_execute
    optional: true
    query: |
      DELETE FROM greenhouses
      WHERE id = :greenhouse_id
    params:
      greenhouse_id: ${greenhouse_id}
