# E109: AE3-Lite irrigation inline correction on hardware-backed test_node
name: E109_ae3_irrigation_inline_correction_test_node
auth_role: admin
description: |
  Проверяет inline-коррекцию во время полива (без остановки основной помпы):
  - подготавливает AE3 runtime в фазе ready на `test_node`;
  - включает correction_during_irrigation=true;
  - засеивает pH/EC вне окна;
  - стартует полив и проверяет, что:
    - pump_main включен;
    - runtime видит одновременно EC и pH отклонения и выбирает первый EC-dose;
    - EC dosing происходит при активной основной помпе.

actions:
  - step: set_test_context
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: ${TEST_NODE_UID}
    test_ph_node_uid: ${TEST_PH_NODE_UID}
    test_ec_node_uid: ${TEST_EC_NODE_UID}
    recipe_name: ae3-irrig-inline-corr-${TIMESTAMP_MS}
    idem_inline: e109-inline-${TIMESTAMP_MS}

  - step: load_zone_context
    type: database_query
    query: |
      SELECT id AS zone_id, greenhouse_id, automation_runtime
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_ctx

  - step: set_zone_context
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}
    previous_automation_runtime: ${zone_ctx.0.automation_runtime}

  - step: set_runtime_api_url
    type: api_put
    endpoint: /api/automation-configs/system/0/system.runtime
    payload:
      payload:
        automation_engine.api_url: http://automation-engine:9505

  - step: load_irrig_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: irrig_node_row

  - step: load_ph_node
    type: database_query
    query: |
      SELECT n.id AS node_id, n.uid AS node_uid
      FROM nodes n
      WHERE n.zone_id = :zone_id
        AND LOWER(COALESCE(n.type, '')) = 'ph'
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel IN ('pump_acid', 'pump_base')
        )
      ORDER BY CASE WHEN n.uid = :node_uid THEN 0 ELSE 1 END, n.id ASC
      LIMIT 1
    params:
      node_uid: ${test_ph_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ph_node_row

  - step: load_ec_node
    type: database_query
    query: |
      SELECT n.id AS node_id, n.uid AS node_uid
      FROM nodes n
      WHERE n.zone_id = :zone_id
        AND LOWER(COALESCE(n.type, '')) = 'ec'
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel = 'pump_a'
        )
      ORDER BY CASE WHEN n.uid = :node_uid THEN 0 ELSE 1 END, n.id ASC
      LIMIT 1
    params:
      node_uid: ${test_ec_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ec_node_row

  - step: set_node_ids
    type: set
    irrig_node_id: ${irrig_node_row.0.node_id}
    ph_node_id: ${ph_node_row.0.node_id}
    ec_node_id: ${ec_node_row.0.node_id}

  - step: load_ec_pump_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_a'
      LIMIT 1
    params:
      node_id: ${ec_node_id}
    expected_rows: 1
    save: ec_pump_channel_row

  - step: load_ph_up_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_base'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_up_channel_row

  - step: load_ph_down_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_acid'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_down_channel_row

  - step: set_correction_channel_ids
    type: set
    ec_pump_channel_id: ${ec_pump_channel_row.0.node_channel_id}
    ph_up_channel_id: ${ph_up_channel_row.0.node_channel_id}
    ph_down_channel_id: ${ph_down_channel_row.0.node_channel_id}

  - step: publish_irrig_node_config
    type: api_post
    endpoint: /api/nodes/${irrig_node_id}/config/publish
    payload: {}

  - step: publish_ph_node_config
    type: api_post
    endpoint: /api/nodes/${ph_node_id}/config/publish
    payload: {}

  - step: publish_ec_node_config
    type: api_post
    endpoint: /api/nodes/${ec_node_id}/config/publish
    payload: {}

  - step: wait_zone_ae_runtime_idle_before_cleanup
    type: db.wait
    query: |
      SELECT 1 AS ready
      WHERE NOT EXISTS (
        SELECT 1
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running', 'waiting_command')
      )
        AND NOT EXISTS (
        SELECT 1
        FROM ae_zone_leases
        WHERE zone_id = :zone_id
      )
        AND NOT EXISTS (
        SELECT 1
        FROM zone_automation_intents
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running')
      )
    params:
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1

  - step: cleanup_zone_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: complete_existing_cycles
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET status = 'COMPLETED',
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
    params:
      zone_id: ${zone_id}

  - step: switch_zone_to_ae3
    type: database_execute
    query: |
      UPDATE zones
      SET automation_runtime = 'ae3',
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: load_test_node_correction_preset
    type: database_query
    query: |
      SELECT id
      FROM zone_correction_presets
      WHERE slug = 'test-node'
      LIMIT 1
    expected_rows: 1
    save: test_node_correction_preset_row

  - step: apply_test_node_correction_preset
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.correction
    payload:
      payload:
        preset_id: ${test_node_correction_preset_row.0.id}
        base_config: {}
        phase_overrides:
          irrigation:
            runtime:
              required_node_type: irrig
              clean_fill_timeout_sec: 600
              solution_fill_timeout_sec: 900
              clean_fill_retry_cycles: 1
              level_switch_on_threshold: 0.5
              clean_max_sensor_label: level_clean_max
              clean_min_sensor_label: level_clean_min
              solution_max_sensor_label: level_solution_max
              solution_min_sensor_label: level_solution_min
            retry:
              max_ec_correction_attempts: 6
              max_ph_correction_attempts: 6
              prepare_recirculation_timeout_sec: 600
              prepare_recirculation_max_attempts: 3
              prepare_recirculation_max_correction_attempts: 20
              telemetry_stale_retry_sec: 30
              decision_window_retry_sec: 10
              low_water_retry_sec: 60
            timing:
              sensor_mode_stabilization_time_sec: 20
              stabilization_sec: 20
              telemetry_max_age_sec: 180
              irr_state_max_age_sec: 15
              level_poll_interval_sec: 20
            tolerance:
              prepare_tolerance:
                ph_pct: 10.0
                ec_pct: 16.0
            safety:
              safe_mode_on_no_effect: true
              block_on_active_no_effect_alert: true
            controllers:
              ec:
                mode: supervisory_allocator
                kp: 8.0
                ki: 0.08
                kd: 0.0
                derivative_filter_alpha: 0.35
                deadband: 0.08
                max_dose_ml: 14.0
                min_interval_sec: 12
                max_integral: 16.0
                anti_windup:
                  enabled: true
                overshoot_guard:
                  enabled: true
                  hard_min: 0.0
                  hard_max: 4.0
                no_effect:
                  enabled: true
                  max_count: 2
                observe:
                  telemetry_period_sec: 2
                  window_min_samples: 3
                  decision_window_sec: 6
                  observe_poll_sec: 2
                  min_effect_fraction: 0.15
                  stability_max_slope: 0.08
                  no_effect_consecutive_limit: 4
              ph:
                mode: cross_coupled_pi_d
                kp: 2.4
                ki: 0.02
                kd: 0.0
                derivative_filter_alpha: 0.35
                deadband: 0.05
                max_dose_ml: 10.0
                min_interval_sec: 12
                max_integral: 8.0
                anti_windup:
                  enabled: true
                overshoot_guard:
                  enabled: true
                  hard_min: 4.0
                  hard_max: 8.5
                no_effect:
                  enabled: true
                  max_count: 2
                observe:
                  telemetry_period_sec: 2
                  window_min_samples: 3
                  decision_window_sec: 6
                  observe_poll_sec: 2
                  min_effect_fraction: 0.15
                  stability_max_slope: 0.04
                  no_effect_consecutive_limit: 4
            dosing:
              solution_volume_l: 20.0
              dose_ec_channel: dose_ec_a
              dose_ph_up_channel: dose_ph_up
              dose_ph_down_channel: dose_ph_down
              max_ec_dose_ml: 14.0
              max_ph_dose_ml: 10.0

  - step: cleanup_existing_correction_bindings
    type: database_execute
    query: |
      DELETE FROM channel_bindings
      WHERE role IN ('dose_ec_a', 'dose_ph_up', 'dose_ph_down')
        AND node_channel_id IN (
          SELECT nc.id
          FROM node_channels nc
          JOIN nodes n ON n.id = nc.node_id
          WHERE n.zone_id = :zone_id
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_correction_infra
    type: database_execute
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
        AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH Down')
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_e2e_calibrations
    type: database_execute
    query: |
      DELETE FROM pump_calibrations
      WHERE source = 'e2e_inline_correction'
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_infrastructure
    type: database_execute
    query: |
      INSERT INTO infrastructure_instances (
        owner_type,
        owner_id,
        asset_type,
        label,
        required,
        created_at,
        updated_at
      )
      VALUES
        ('zone', :zone_id, 'PUMP', 'AE3 E2E EC Dose', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Up', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Down', TRUE, NOW(), NOW())
    params:
      zone_id: ${zone_id}

  - step: insert_correction_bindings
    type: database_execute
    query: |
      INSERT INTO channel_bindings (
        infrastructure_instance_id,
        node_channel_id,
        direction,
        role,
        created_at,
        updated_at
      )
      SELECT ii.id, mapping.node_channel_id, 'actuator', mapping.role, NOW(), NOW()
      FROM (
        VALUES
          ('AE3 E2E EC Dose', CAST(:ec_pump_channel_id AS bigint), 'dose_ec_a'),
          ('AE3 E2E PH Up', CAST(:ph_up_channel_id AS bigint), 'dose_ph_up'),
          ('AE3 E2E PH Down', CAST(:ph_down_channel_id AS bigint), 'dose_ph_down')
      ) AS mapping(label, node_channel_id, role)
      JOIN infrastructure_instances ii
        ON ii.owner_type = 'zone'
       AND ii.owner_id = :zone_id
       AND ii.label = mapping.label
    params:
      zone_id: ${zone_id}
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_calibrations
    type: database_execute
    query: |
      INSERT INTO pump_calibrations (
        node_channel_id,
        ml_per_sec,
        k_ms_per_ml_l,
        source,
        quality_score,
        sample_count,
        valid_from,
        is_active,
        created_at,
        updated_at
      )
      VALUES
        (CAST(:ec_pump_channel_id AS bigint), 1.0, 1.0, 'e2e_inline_correction', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_up_channel_id AS bigint), 1.0, 1.0, 'e2e_inline_correction', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_down_channel_id AS bigint), 1.0, 1.0, 'e2e_inline_correction', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW())
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: wait_runtime_level_sensors_registered
    type: db.wait
    query: |
      SELECT 1 AS ready
      WHERE EXISTS (
        SELECT 1
        FROM sensors
        WHERE zone_id = :zone_id
          AND node_id = CAST(:irrig_node_id AS bigint)
          AND type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
          AND label = 'level_clean_max'
      )
        AND EXISTS (
        SELECT 1
        FROM sensors
        WHERE zone_id = :zone_id
          AND node_id = CAST(:irrig_node_id AS bigint)
          AND type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
          AND label = 'level_clean_min'
      )
        AND EXISTS (
        SELECT 1
        FROM sensors
        WHERE zone_id = :zone_id
          AND node_id = CAST(:irrig_node_id AS bigint)
          AND type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
          AND label = 'level_solution_max'
      )
        AND EXISTS (
        SELECT 1
        FROM sensors
        WHERE zone_id = :zone_id
          AND node_id = CAST(:irrig_node_id AS bigint)
          AND type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
          AND label = 'level_solution_min'
      )
    params:
      zone_id: ${zone_id}
      irrig_node_id: ${irrig_node_id}
    timeout: 60.0
    expected_rows: 1

  - step: activate_ph_sensor_mode
    type: hardware_activate_sensor_mode
    zone_id: ${zone_id}
    node_uid: ${test_ph_node_uid}
    save: activate_ph_sensor_mode_response

  - step: wait_activate_ph_sensor_mode_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${activate_ph_sensor_mode_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: activate_ec_sensor_mode
    type: hardware_activate_sensor_mode
    zone_id: ${zone_id}
    node_uid: ${test_ec_node_uid}
    save: activate_ec_sensor_mode_response

  - step: wait_activate_ec_sensor_mode_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${activate_ec_sensor_mode_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_runtime_ph_ec_telemetry_available
    type: db.wait
    query: |
      SELECT COUNT(*)::int AS live_sensor_count
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.zone_id = :zone_id
        AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
        AND (
          (s.node_id = CAST(:ph_node_id AS bigint) AND s.type = 'PH' AND s.label = 'ph_sensor')
          OR
          (s.node_id = CAST(:ec_node_id AS bigint) AND s.type = 'EC' AND s.label = 'ec_sensor')
        )
      HAVING COUNT(*) = 2
    params:
      zone_id: ${zone_id}
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}
    timeout: 60.0
    expected_rows: 1

  - step: cleanup_runtime_telemetry
    type: database_execute
    query: |
      DELETE FROM telemetry_samples
      WHERE sensor_id IN (SELECT id FROM sensors WHERE zone_id = :zone_id);
    params:
      zone_id: ${zone_id}

  - step: cleanup_runtime_telemetry_last
    type: database_execute
    query: |
      DELETE FROM telemetry_last
      WHERE sensor_id IN (SELECT id FROM sensors WHERE zone_id = :zone_id);
    params:
      zone_id: ${zone_id}

  - step: apply_task_logic_profile
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
    payload:
      payload:
        active_mode: working
        profiles:
          working:
            mode: working
            is_active: true
            subsystems:
              diagnostics:
                execution:
                  workflow: cycle_start
                  topology: two_tank_drip_substrate_trays
                  required_node_types:
                    - irrig
              irrigation:
                decision:
                  strategy: task
                  config:
                    lookback_sec: 300
                    min_samples: 2
                    stale_after_sec: 120
                    hysteresis_pct: 2.0
                    spread_alert_threshold_pct: 12.0
                recovery:
                  max_continue_attempts: 2
                  timeout_sec: 90
                  auto_replay_after_setup: false
                  max_setup_replays: 0
                safety:
                  stop_on_solution_min: false

  - step: create_recipe
    type: database_execute
    query: |
      INSERT INTO recipes (name, metadata, created_at, updated_at)
      VALUES (:recipe_name, '{}'::jsonb, NOW(), NOW())
    params:
      recipe_name: ${recipe_name}

  - step: load_recipe
    type: database_query
    query: |
      SELECT id
      FROM recipes
      WHERE name = :recipe_name
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_name: ${recipe_name}
    expected_rows: 1
    save: recipe_row

  - step: set_recipe_id
    type: set
    recipe_id: ${recipe_row.0.id}

  - step: create_recipe_revision
    type: database_execute
    query: |
      INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)
      VALUES (:recipe_id, 1, 'PUBLISHED', NOW(), NOW())
    params:
      recipe_id: ${recipe_id}

  - step: load_recipe_revision
    type: database_query
    query: |
      SELECT id
      FROM recipe_revisions
      WHERE recipe_id = :recipe_id
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_id: ${recipe_id}
    expected_rows: 1
    save: recipe_revision_row

  - step: set_recipe_revision_id
    type: set
    recipe_revision_id: ${recipe_revision_row.0.id}

  - step: create_grow_cycle
    type: database_execute
    query: |
      INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status, created_at, updated_at)
      VALUES (:greenhouse_id, :zone_id, :recipe_revision_id, 'RUNNING', NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}

  - step: load_grow_cycle
    type: database_query
    query: |
      SELECT id
      FROM grow_cycles
      WHERE zone_id = :zone_id
        AND recipe_revision_id = :recipe_revision_id
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}
    expected_rows: 1
    save: grow_cycle_row

  - step: set_grow_cycle_id
    type: set
    grow_cycle_id: ${grow_cycle_row.0.id}

  - step: create_phase
    type: database_execute
    query: |
      INSERT INTO grow_cycle_phases (
        grow_cycle_id,
        phase_index,
        name,
        ph_target,
        ph_min,
        ph_max,
        ec_target,
        ec_min,
        ec_max,
        irrigation_mode,
        irrigation_interval_sec,
        irrigation_duration_sec,
        extensions,
        created_at,
        updated_at
      )
      VALUES (
        :grow_cycle_id,
        0,
        'VEG',
        5.80,
        5.60,
        6.00,
        1.40,
        1.20,
        1.60,
        'SUBSTRATE',
        600,
        10,
        '{
          "targets": {
            "irrigation": {
              "correction_during_irrigation": true,
              "correction_slack_sec": 300
            }
          }
        }'::jsonb,
        NOW(),
        NOW()
      )
    params:
      grow_cycle_id: ${grow_cycle_id}

  - step: load_phase
    type: database_query
    query: |
      SELECT id
      FROM grow_cycle_phases
      WHERE grow_cycle_id = :grow_cycle_id
      ORDER BY id DESC
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    expected_rows: 1
    save: phase_row

  - step: set_phase_id
    type: set
    phase_id: ${phase_row.0.id}

  - step: activate_grow_cycle
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET current_phase_id = :phase_id,
          started_at = NOW(),
          recipe_started_at = NOW(),
          updated_at = NOW()
      WHERE id = :grow_cycle_id
    params:
      phase_id: ${phase_id}
      grow_cycle_id: ${grow_cycle_id}

  - step: apply_cycle_start_snapshot
    type: api_put
    endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id}/cycle.start_snapshot
    payload:
      payload:
        cycle_id: ${grow_cycle_id}
        zone_id: ${zone_id}

  - step: apply_cycle_phase_overrides
    type: api_put
    endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id}/cycle.phase_overrides
    payload:
      payload: {}

  - step: wait_grow_cycle_bundle_ready
    type: db.wait
    query: |
      SELECT scope_type, scope_id, status
      FROM automation_effective_bundles
      WHERE scope_type = 'grow_cycle'
        AND scope_id = CAST(:grow_cycle_id AS bigint)
        AND status = 'valid'
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    timeout: 30.0
    expected_rows: 1

  # Подготовка к ready: корректные уровни + около-target, чтобы setup дошёл до ready быстро
  - step: set_ready_levels_and_targets
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      level_clean_min_override: false
      level_clean_max_override: true
      level_solution_min_override: false
      level_solution_max_override: true
      ph_value: 5.8
      ec_value: 1.4
    save: ready_levels_response

  - step: wait_ready_levels_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${ready_levels_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: wait_ready_seed_telemetry
    type: db.wait
    query: |
      WITH level_rows AS (
        SELECT COUNT(*)::int AS cnt
        FROM sensors s
        JOIN telemetry_last tl ON tl.sensor_id = s.id
        WHERE s.zone_id = :zone_id
          AND s.type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
          AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
          AND (
            (s.label IN ('level_clean_max', 'level_solution_max') AND COALESCE(tl.last_value, 0) >= 1)
            OR
            (s.label IN ('level_clean_min', 'level_solution_min') AND COALESCE(tl.last_value, 1) <= 0)
          )
      ),
      chem_rows AS (
        SELECT COUNT(*)::int AS cnt
        FROM sensors s
        JOIN telemetry_last tl ON tl.sensor_id = s.id
        WHERE s.zone_id = :zone_id
          AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
          AND (
            (s.node_id = CAST(:ph_node_id AS bigint) AND s.type = 'PH' AND s.label = 'ph_sensor' AND COALESCE(tl.last_value, 0) BETWEEN 5.6 AND 6.0)
            OR
            (s.node_id = CAST(:ec_node_id AS bigint) AND s.type = 'EC' AND s.label = 'ec_sensor' AND COALESCE(tl.last_value, 0) BETWEEN 1.2 AND 1.6)
          )
      )
      SELECT 1 AS ready
      FROM level_rows, chem_rows
      WHERE level_rows.cnt = 4
        AND chem_rows.cnt = 2
    params:
      zone_id: ${zone_id}
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}
    timeout: 40.0
    expected_rows: 1

  # Для test_node-контракта здесь достаточно подготовить runtime в phase-ready,
  # не прогоняя полный setup-flow как в E101/E106.
  - step: cleanup_zone_workflow_state
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: insert_ready_workflow_state
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES (:zone_id, 'ready', 1, NOW(), '{}'::jsonb)
    params:
      zone_id: ${zone_id}

  - step: wait_ready_workflow_state
    type: db.wait
    query: |
      SELECT zone_id, workflow_phase
      FROM zone_workflow_state
      WHERE zone_id = :zone_id
        AND workflow_phase = 'ready'
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 20.0
    expected_rows: 1

  # Включаем коррекцию во время полива (inline) через phase extensions
  - step: enable_inline_correction_during_irrigation
    type: database_execute
    query: |
      UPDATE grow_cycle_phases
      SET extensions = COALESCE(extensions, '{}'::jsonb) || '{
        "targets": {
          "irrigation": {
            "correction_during_irrigation": true
          }
        }
      }'::jsonb,
      updated_at = NOW()
      WHERE id = (
        SELECT current_phase_id
        FROM grow_cycles
        WHERE zone_id = :zone_id
          AND status = 'RUNNING'
        ORDER BY id DESC
        LIMIT 1
      )
    params:
      zone_id: ${zone_id}

  - step: seed_off_target_for_irrigation_check
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      ph_value: 7.2
      ec_value: 0.45
      level_clean_min_override: false
      level_clean_max_override: true
      level_solution_min_override: true
      level_solution_max_override: true
    save: seed_off_target_response

  - step: wait_seed_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${seed_off_target_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: start_irrigation_inline
    type: api_post
    endpoint: /api/zones/${zone_id}/start-irrigation
    payload:
      mode: normal
      requested_duration_sec: 10
      idempotency_key: ${idem_inline}
    save: irrigation_response

  - step: set_irrig_task_id
    type: set
    task_id: ${irrigation_response.data.task_id}

  - step: wait_irrigation_started_commands
    type: db.wait
    query: |
      SELECT 1
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND publish_status = 'accepted'
        AND channel = 'pump_main'
        AND payload->>'cmd' = 'set_relay'
        AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_correction_decision_for_dual_gap
    type: db.wait
    query: |
      SELECT
        id,
        type,
        COALESCE(details, payload_json)->>'selected_action' AS selected_action,
        COALESCE(details, payload_json)->>'decision_reason' AS decision_reason,
        COALESCE(details, payload_json)->>'needs_ec' AS needs_ec,
        COALESCE(details, payload_json)->>'needs_ph_down' AS needs_ph_down,
        COALESCE(details, payload_json)->>'workflow_phase' AS workflow_phase,
        created_at
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'CORRECTION_DECISION_MADE'
        AND COALESCE(details, payload_json)->>'task_id' = CAST(:task_id AS text)
        AND COALESCE(details, payload_json)->>'selected_action' = 'ec'
        AND COALESCE(details, payload_json)->>'needs_ec' = 'true'
        AND COALESCE(details, payload_json)->>'needs_ph_down' = 'true'
        AND COALESCE(details, payload_json)->>'workflow_phase' IN ('irrigating', 'irrig_recirc')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: correction_decision_row

  - step: wait_ec_dose_command_during_irrigation
    type: db.wait
    query: |
      SELECT id, created_at
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'EC_DOSING'
        AND COALESCE(details, payload_json)->>'task_id' = CAST(:task_id AS text)
        AND COALESCE(details, payload_json)->>'workflow_phase' IN ('irrigating', 'irrig_recirc')
        AND COALESCE(details, payload_json)->>'channel' = 'pump_a'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: ec_dose_event_row

  - step: wait_main_pump_snapshot_before_ec_dose
    type: db.wait
    query: |
      SELECT snap.id, snap.created_at
      FROM zone_events snap
      WHERE snap.zone_id = :zone_id
        AND snap.type = 'IRR_STATE_SNAPSHOT'
        AND COALESCE(snap.details->'snapshot'->>'pump_main', 'false') = 'true'
        AND snap.created_at <= CAST(:ec_dose_created_at AS timestamptz)
      ORDER BY snap.created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      ec_dose_created_at: ${ec_dose_event_row.0.created_at}
    timeout: 60.0
    expected_rows: 1
    save: pump_main_snapshot_row

assertions:
  - name: inline_correction_decision_keeps_dual_gap_and_ec_first
    type: database_query
    query: |
      SELECT
        COALESCE(details, payload_json)->>'selected_action' AS selected_action,
        COALESCE(details, payload_json)->>'decision_reason' AS decision_reason,
        COALESCE((COALESCE(details, payload_json)->>'needs_ec')::boolean, false) AS needs_ec,
        COALESCE((COALESCE(details, payload_json)->>'needs_ph_down')::boolean, false) AS needs_ph_down,
        COALESCE(details, payload_json)->>'workflow_phase' AS workflow_phase
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'CORRECTION_DECISION_MADE'
        AND COALESCE(details, payload_json)->>'task_id' = CAST(:task_id AS text)
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      task_id: ${task_id}
    expected_rows: 1
    expected:
      - field: selected_action
        operator: equals
        value: ec
      - field: decision_reason
        operator: equals
        value: ec_first_in_window
      - field: needs_ec
        operator: equals
        value: true
      - field: needs_ph_down
        operator: equals
        value: true

  - name: inline_correction_keeps_main_pump_active_at_ec_dose
    type: database_query
    query: |
      SELECT COUNT(*)::int AS cnt
      FROM zone_events snap
      WHERE snap.zone_id = :zone_id
        AND snap.type = 'IRR_STATE_SNAPSHOT'
        AND COALESCE(snap.details->'snapshot'->>'pump_main', 'false') = 'true'
        AND snap.created_at <= CAST(:ec_dose_created_at AS timestamptz)
    params:
      zone_id: ${zone_id}
      ec_dose_created_at: ${ec_dose_event_row.0.created_at}
    expected_rows: 1
    expected:
      - field: cnt
        operator: greater_than_or_equal
        value: 1

cleanup:
  - step: cleanup_runtime_ae_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}

  - step: cleanup_runtime_ae_task
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}

  - step: cleanup_zone_intents
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_created_profile
    type: database_execute
    optional: true
    query: |
      DELETE FROM automation_config_documents
      WHERE namespace = 'zone.logic_profile'
        AND scope_type = 'zone'
        AND scope_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: restore_previous_zone_runtime
    type: database_execute
    optional: true
    query: |
      UPDATE zones
      SET automation_runtime = :automation_runtime,
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}
      automation_runtime: ${previous_automation_runtime}
