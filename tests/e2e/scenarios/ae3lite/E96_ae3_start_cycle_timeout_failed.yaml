# E96: AE3-Lite start-cycle -> TIMEOUT -> failed
# DoD:
# - canonical AE3 task создаётся через POST /zones/{id}/start-cycle
# - команда публикуется через history-logger и фиксируется в ae_commands/commands
# - terminal TIMEOUT переводит ae_tasks в failed
# - legacy intent финализируется в failed
# - canonical GET /internal/tasks/{task_id} возвращает failed + command_timeout

name: E96_ae3_start_cycle_timeout_failed
description: |
  Изолированный AE3-Lite e2e smoke на временной зоне:
  1) поднимаем минимальную runtime fixture в БД,
  2) создаём scheduler-like intent,
  3) вызываем POST /zones/{id}/start-cycle,
  4) дожидаемся publish и вручную завершаем legacy command статусом TIMEOUT,
  5) проверяем terminal failed через ae_tasks, intent lifecycle и canonical internal API.

actions:
  - step: set_test_context
    type: set
    fixture_prefix: ae3-e96-${TIMESTAMP_MS}
    greenhouse_uid: gh-ae3e96-${TIMESTAMP_S}
    greenhouse_name: ae3-e96-gh-${TIMESTAMP_MS}
    greenhouse_token: pt-ae3e96-${TIMESTAMP_S}
    zone_uid: zn-ae3e96-${TIMESTAMP_S}
    zone_name: ae3-e96-zone-${TIMESTAMP_MS}
    recipe_name: ae3-e96-recipe-${TIMESTAMP_MS}
    node_uid: nd-ae3e96-${TIMESTAMP_S}
    idempotency_key: ae3-e96-start-cycle-${TIMESTAMP_MS}
    scheduler_source: laravel_scheduler
    scheduler_trace_id: ae3-e96-trace-${TIMESTAMP_MS}

  - step: create_greenhouse
    type: database_execute
    query: |
      INSERT INTO greenhouses (uid, name, timezone, provisioning_token, created_at, updated_at)
      VALUES (:greenhouse_uid, :greenhouse_name, 'UTC', :greenhouse_token, NOW(), NOW())
    params:
      greenhouse_uid: ${greenhouse_uid}
      greenhouse_name: ${greenhouse_name}
      greenhouse_token: ${greenhouse_token}

  - step: load_greenhouse
    type: database_query
    query: |
      SELECT id
      FROM greenhouses
      WHERE uid = :greenhouse_uid
      LIMIT 1
    params:
      greenhouse_uid: ${greenhouse_uid}
    expected_rows: 1
    save: greenhouse_row

  - step: set_greenhouse_id
    type: set
    greenhouse_id: ${greenhouse_row.0.id}

  - step: create_zone
    type: database_execute
    query: |
      INSERT INTO zones (greenhouse_id, name, uid, status, automation_runtime, created_at, updated_at)
      VALUES (:greenhouse_id, :zone_name, :zone_uid, 'online', 'ae3', NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_name: ${zone_name}
      zone_uid: ${zone_uid}

  - step: load_zone
    type: database_query
    query: |
      SELECT id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${zone_uid}
    expected_rows: 1
    save: zone_row

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}

  - step: create_recipe
    type: database_execute
    query: |
      INSERT INTO recipes (name, metadata, created_at, updated_at)
      VALUES (:recipe_name, '{}'::jsonb, NOW(), NOW())
    params:
      recipe_name: ${recipe_name}

  - step: load_recipe
    type: database_query
    query: |
      SELECT id
      FROM recipes
      WHERE name = :recipe_name
      LIMIT 1
    params:
      recipe_name: ${recipe_name}
    expected_rows: 1
    save: recipe_row

  - step: set_recipe_id
    type: set
    recipe_id: ${recipe_row.0.id}

  - step: create_recipe_revision
    type: database_execute
    query: |
      INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)
      VALUES (:recipe_id, 1, 'PUBLISHED', NOW(), NOW())
    params:
      recipe_id: ${recipe_id}

  - step: load_recipe_revision
    type: database_query
    query: |
      SELECT id
      FROM recipe_revisions
      WHERE recipe_id = :recipe_id
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_id: ${recipe_id}
    expected_rows: 1
    save: recipe_revision_row

  - step: set_recipe_revision_id
    type: set
    recipe_revision_id: ${recipe_revision_row.0.id}

  - step: create_grow_cycle
    type: database_execute
    query: |
      INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status, created_at, updated_at)
      VALUES (:greenhouse_id, :zone_id, :recipe_revision_id, 'RUNNING', NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}

  - step: load_grow_cycle
    type: database_query
    query: |
      SELECT id
      FROM grow_cycles
      WHERE zone_id = :zone_id
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: grow_cycle_row

  - step: set_grow_cycle_id
    type: set
    grow_cycle_id: ${grow_cycle_row.0.id}

  - step: create_phase
    type: database_execute
    query: |
      INSERT INTO grow_cycle_phases (
        grow_cycle_id,
        phase_index,
        name,
        ph_target,
        ph_min,
        ph_max,
        ec_target,
        ec_min,
        ec_max,
        irrigation_mode,
        irrigation_interval_sec,
        irrigation_duration_sec,
        extensions,
        created_at,
        updated_at
      )
      VALUES (
        :grow_cycle_id,
        0,
        'VEG',
        5.80,
        5.50,
        6.10,
        1.40,
        1.20,
        1.60,
        'SUBSTRATE',
        600,
        45,
        jsonb_build_object(
          'targets', jsonb_build_object(
            'diagnostics', jsonb_build_object(
              'execution', jsonb_build_object(
                'workflow', 'cycle_start',
                'startup', jsonb_build_object('clean_fill_timeout_sec', 30)
              )
            )
          )
        ),
        NOW(),
        NOW()
      )
    params:
      grow_cycle_id: ${grow_cycle_id}

  - step: load_phase
    type: database_query
    query: |
      SELECT id
      FROM grow_cycle_phases
      WHERE grow_cycle_id = :grow_cycle_id
      ORDER BY id DESC
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    expected_rows: 1
    save: phase_row

  - step: set_phase_id
    type: set
    phase_id: ${phase_row.0.id}

  - step: activate_grow_cycle
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET current_phase_id = :phase_id,
          started_at = NOW(),
          recipe_started_at = NOW(),
          updated_at = NOW()
      WHERE id = :grow_cycle_id
    params:
      phase_id: ${phase_id}
      grow_cycle_id: ${grow_cycle_id}

  - step: create_profile
    type: database_execute
    query: |
      INSERT INTO zone_automation_logic_profiles (
        zone_id,
        mode,
        subsystems,
        command_plans,
        is_active,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'working',
        jsonb_build_object(
          'diagnostics', jsonb_build_object(
            'execution', jsonb_build_object(
              'workflow', 'cycle_start',
              'topology', 'two_tank_drip_substrate_trays',
              'required_node_types', jsonb_build_array('irrig'),
              'startup', jsonb_build_object('level_poll_interval_sec', 11)
            )
          )
        ),
        jsonb_build_object(
          'schema_version', 1,
          'plan_version', 1,
          'plans', jsonb_build_object(
            'diagnostics', jsonb_build_object(
              'execution', jsonb_build_object(
                'workflow', 'cycle_start',
                'topology', 'two_tank_drip_substrate_trays',
                'required_node_types', jsonb_build_array('irrig'),
                'startup', jsonb_build_object('level_poll_interval_sec', 11)
              ),
              'steps', jsonb_build_array(
                jsonb_build_object(
                  'name', 'pump_start',
                  'channel', 'irrigation_pump',
                  'cmd', 'set_relay',
                  'params', jsonb_build_object('state', true),
                  'timeout_sec', 20
                )
              )
            )
          )
        ),
        TRUE,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}

  - step: create_workflow_state
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES (:zone_id, 'idle', 0, NOW(), '{}'::jsonb)
    params:
      zone_id: ${zone_id}

  - step: create_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, type, status, created_at, updated_at)
      VALUES (:zone_id, :node_uid, 'irrig', 'online', NOW(), NOW())
    params:
      zone_id: ${zone_id}
      node_uid: ${node_uid}

  - step: load_node
    type: database_query
    query: |
      SELECT id
      FROM nodes
      WHERE uid = :node_uid
      LIMIT 1
    params:
      node_uid: ${node_uid}
    expected_rows: 1
    save: node_row

  - step: set_node_id
    type: set
    node_id: ${node_row.0.id}

  - step: create_node_channel
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, config, created_at, updated_at)
      VALUES (:node_id, 'pump_main', 'ACTUATOR', '{}'::jsonb, NOW(), NOW())
    params:
      node_id: ${node_id}

  - step: load_node_channel
    type: database_query
    query: |
      SELECT id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_main'
      ORDER BY id DESC
      LIMIT 1
    params:
      node_id: ${node_id}
    expected_rows: 1
    save: node_channel_row

  - step: set_node_channel_id
    type: set
    node_channel_id: ${node_channel_row.0.id}

  - step: create_infrastructure_instance
    type: database_execute
    query: |
      INSERT INTO infrastructure_instances (
        owner_type,
        owner_id,
        asset_type,
        label,
        required,
        created_at,
        updated_at
      )
      VALUES ('zone', :zone_id, 'PUMP', 'Main Pump', TRUE, NOW(), NOW())
    params:
      zone_id: ${zone_id}

  - step: load_infrastructure_instance
    type: database_query
    query: |
      SELECT id
      FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: infrastructure_row

  - step: set_infrastructure_id
    type: set
    infrastructure_id: ${infrastructure_row.0.id}

  - step: create_channel_binding
    type: database_execute
    query: |
      INSERT INTO channel_bindings (
        infrastructure_instance_id,
        node_channel_id,
        direction,
        role,
        created_at,
        updated_at
      )
      VALUES (:infrastructure_id, :node_channel_id, 'actuator', 'irrigation_pump', NOW(), NOW())
    params:
      infrastructure_id: ${infrastructure_id}
      node_channel_id: ${node_channel_id}

  - step: insert_scheduler_like_intent
    type: database_execute
    query: |
      INSERT INTO zone_automation_intents (
        zone_id,
        intent_type,
        payload,
        idempotency_key,
        status,
        not_before,
        retry_count,
        max_retries,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'IRRIGATE_ONCE',
        jsonb_build_object(
          'source', CAST(:source AS text),
          'task_type', 'diagnostics',
          'workflow', 'cycle_start',
          'topology', 'two_tank_drip_substrate_trays'
        ),
        :idempotency_key,
        'pending',
        NOW() - INTERVAL '1 second',
        0,
        3,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
      source: ${scheduler_source}

  - step: start_cycle_http
    type: http_request
    method: POST
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
    headers:
      Accept: application/json
      Content-Type: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    body:
      source: ${scheduler_source}
      idempotency_key: ${idempotency_key}
    retries: 2
    retry_delay_seconds: 1
    capture_response: start_cycle_response

  - step: set_task_id
    type: set
    task_id: ${start_cycle_response.json.data.task_id}

  - step: wait_ae_command_published
    type: db.wait
    query: |
      SELECT
        id,
        task_id,
        external_id,
        payload->>'cmd_id' AS cmd_id,
        publish_status
      FROM ae_commands
      WHERE task_id = :task_id
        AND publish_status = 'accepted'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: ae_command_row

  - step: set_legacy_command_id
    type: set
    legacy_command_id: ${ae_command_row.0.external_id}

  - step: mark_legacy_command_timeout
    type: database_execute
    query: |
      UPDATE commands
      SET status = 'TIMEOUT',
          ack_at = COALESCE(ack_at, NOW()),
          sent_at = COALESCE(sent_at, NOW()),
          failed_at = NOW(),
          error_message = 'e2e_timeout',
          updated_at = NOW()
      WHERE id = CAST(:legacy_command_id AS bigint)
    params:
      legacy_command_id: ${legacy_command_id}

  - step: wait_task_failed
    type: db.wait
    query: |
      SELECT id, status, completed_at, error_code, error_message
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'failed'
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: failed_task_row

  - step: wait_ae_command_terminal_timeout
    type: db.wait
    query: |
      SELECT id, terminal_status, terminal_at, last_error
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND terminal_status = 'TIMEOUT'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: terminal_command_row

  - step: wait_intent_failed
    type: db.wait
    query: |
      SELECT id, status, completed_at, error_code, error_message
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
        AND status = 'failed'
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
    timeout: 60.0
    expected_rows: 1
    save: failed_intent_row

  - step: get_internal_task_status
    type: http_request
    method: GET
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/internal/tasks/${task_id}
    headers:
      Accept: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    capture_response: internal_task_response

assertions:
  - name: start_cycle_http_200
    type: custom_assert
    condition: "int(context.get('start_cycle_response', {}).get('status_code', 0)) == 200"

  - name: start_cycle_returns_numeric_task_id
    type: custom_assert
    condition: "str(context.get('task_id', '')).isdigit()"

  - name: start_cycle_response_active
    type: json_assertion
    source: start_cycle_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.accepted
        operator: equals
        value: true
      - field: data.runner_state
        operator: equals
        value: active

  - name: ae_task_failed
    type: custom_assert
    condition: "str(context.get('failed_task_row', [{}])[0].get('status', '')).lower() == 'failed'"

  - name: ae_task_failed_with_timeout_reason
    type: custom_assert
    condition: "str(context.get('failed_task_row', [{}])[0].get('error_code', '')).lower() == 'command_timeout' and 'e2e_timeout' in str(context.get('failed_task_row', [{}])[0].get('error_message', ''))"

  - name: ae_command_terminal_timeout
    type: custom_assert
    condition: "str(context.get('terminal_command_row', [{}])[0].get('terminal_status', '')).upper() == 'TIMEOUT'"

  - name: intent_failed
    type: custom_assert
    condition: "str(context.get('failed_intent_row', [{}])[0].get('status', '')).lower() == 'failed'"

  - name: internal_task_failed
    type: json_assertion
    source: internal_task_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.task_id
        operator: equals
        value: ${task_id}
      - field: data.status
        operator: equals
        value: failed
      - field: data.error_code
        operator: equals
        value: command_timeout

cleanup:
  - step: cleanup_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM commands
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id)
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_leases
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_tasks
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_intents
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_channel_bindings
    type: database_execute
    optional: true
    query: |
      DELETE FROM channel_bindings
      WHERE infrastructure_instance_id IN (
        SELECT id
        FROM infrastructure_instances
        WHERE owner_type = 'zone'
          AND owner_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_infrastructure_instances
    type: database_execute
    optional: true
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_node_channels
    type: database_execute
    optional: true
    query: |
      DELETE FROM node_channels
      WHERE node_id IN (
        SELECT id
        FROM nodes
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_nodes
    type: database_execute
    optional: true
    query: |
      DELETE FROM nodes
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_profiles
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_logic_profiles
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_overrides
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_overrides
      WHERE grow_cycle_id IN (
        SELECT id
        FROM grow_cycles
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_phases
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_phases
      WHERE grow_cycle_id IN (
        SELECT id
        FROM grow_cycles
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycles
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycles
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_workflow_state
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone
    type: database_execute
    optional: true
    query: |
      DELETE FROM zones
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_recipe_revision
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipe_revisions
      WHERE id = :recipe_revision_id
    params:
      recipe_revision_id: ${recipe_revision_id}

  - step: cleanup_recipe
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipes
      WHERE id = :recipe_id
    params:
      recipe_id: ${recipe_id}

  - step: cleanup_greenhouse
    type: database_execute
    optional: true
    query: |
      DELETE FROM greenhouses
      WHERE id = :greenhouse_id
    params:
      greenhouse_id: ${greenhouse_id}
