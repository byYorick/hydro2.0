# E107: AE3-Lite irrigation end-to-end on node-sim
name: E107_ae3_irrigation_runtime_node_sim
auth_role: admin
description: |
  Полноценный e2e сценарий полива на `node-sim`:
  - подготавливает AE3 runtime в фазе `ready`;
  - проверяет запуск полива по времени (`task`);
  - переключает decision-controller на `smart_soil_v1`;
  - проверяет `skip` при высокой влажности почвы;
  - проверяет `run` при низкой влажности почвы.

actions:
  - step: set_test_context
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: nd-test-irrig-1
    test_ph_node_uid: nd-test-ph-1
    test_ec_node_uid: nd-test-ec-1
    test_soil_node_uid: nd-test-soil-1
    recipe_name: ae3-irrig-runtime-${TIMESTAMP_MS}
    idem_task: e107-task-${TIMESTAMP_MS}
    idem_skip: e107-skip-${TIMESTAMP_MS}
    idem_smart_run: e107-smart-run-${TIMESTAMP_MS}

  - step: load_zone_context
    type: database_query
    query: |
      SELECT id AS zone_id, greenhouse_id, automation_runtime
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_ctx

  - step: set_zone_context
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}

  - step: set_runtime_api_url
    type: api_put
    endpoint: /api/automation-configs/system/0/system.runtime
    payload:
      payload:
        automation_engine.api_url: http://automation-engine:9505

  - step: load_irrig_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: irrig_node_row

  - step: load_ph_node
    type: database_query
    query: |
      SELECT n.id AS node_id, n.uid AS node_uid
      FROM nodes n
      WHERE n.zone_id = :zone_id
        AND LOWER(COALESCE(n.type, '')) = 'ph'
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel IN ('pump_acid', 'pump_base')
        )
      ORDER BY CASE WHEN n.uid = :node_uid THEN 0 ELSE 1 END, n.id ASC
      LIMIT 1
    params:
      node_uid: ${test_ph_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ph_node_row

  - step: load_ec_node
    type: database_query
    query: |
      SELECT n.id AS node_id, n.uid AS node_uid
      FROM nodes n
      WHERE n.zone_id = :zone_id
        AND LOWER(COALESCE(n.type, '')) = 'ec'
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel = 'pump_a'
        )
      ORDER BY CASE WHEN n.uid = :node_uid THEN 0 ELSE 1 END, n.id ASC
      LIMIT 1
    params:
      node_uid: ${test_ec_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ec_node_row

  - step: set_node_ids
    type: set
    irrig_node_id: ${irrig_node_row.0.node_id}
    ph_node_id: ${ph_node_row.0.node_id}
    ec_node_id: ${ec_node_row.0.node_id}

  - step: wait_zone_ae_runtime_idle_before_cleanup
    type: db.wait
    query: |
      SELECT 1 AS ready
      WHERE NOT EXISTS (
        SELECT 1
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running', 'waiting_command')
      )
        AND NOT EXISTS (
        SELECT 1
        FROM ae_zone_leases
        WHERE zone_id = :zone_id
      )
        AND NOT EXISTS (
        SELECT 1
        FROM zone_automation_intents
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running')
      )
    params:
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1

  - step: upsert_soil_node
    type: database_execute
    query: |
      INSERT INTO nodes (
        zone_id,
        uid,
        name,
        type,
        fw_version,
        status,
        last_seen_at,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        :node_uid,
        'AE3 E2E Soil Moisture',
        'water_sensor',
        'node-sim-test-node-profile',
        'online',
        NOW(),
        NOW(),
        NOW()
      )
      ON CONFLICT (uid) DO UPDATE
      SET zone_id = EXCLUDED.zone_id,
          name = EXCLUDED.name,
          type = EXCLUDED.type,
          fw_version = EXCLUDED.fw_version,
          status = 'online',
          last_seen_at = NOW(),
          updated_at = NOW()
    params:
      zone_id: ${zone_id}
      node_uid: ${test_soil_node_uid}

  - step: load_soil_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_soil_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: soil_node_row

  - step: set_soil_node_id
    type: set
    soil_node_id: ${soil_node_row.0.node_id}

  - step: load_ec_pump_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_a'
      LIMIT 1
    params:
      node_id: ${ec_node_id}
    expected_rows: 1
    save: ec_pump_channel_row

  - step: load_ph_up_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_base'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_up_channel_row

  - step: load_ph_down_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_acid'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_down_channel_row

  - step: set_correction_channel_ids
    type: set
    ec_pump_channel_id: ${ec_pump_channel_row.0.node_channel_id}
    ph_up_channel_id: ${ph_up_channel_row.0.node_channel_id}
    ph_down_channel_id: ${ph_down_channel_row.0.node_channel_id}

  - step: cleanup_zone_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_workflow_state
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_pid_state
    type: database_execute
    query: |
      DELETE FROM pid_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: complete_existing_cycles
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET status = 'COMPLETED',
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
    params:
      zone_id: ${zone_id}

  - step: switch_zone_to_ae3
    type: database_execute
    query: |
      UPDATE zones
      SET automation_runtime = 'ae3',
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: load_test_node_correction_preset
    type: database_query
    query: |
      SELECT id
      FROM zone_correction_presets
      WHERE slug = 'test-node'
      LIMIT 1
    expected_rows: 1
    save: test_node_correction_preset_row

  - step: apply_test_node_correction_preset
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.correction
    payload:
      payload:
        preset_id: ${test_node_correction_preset_row.0.id}
        base_config: {}
        phase_overrides: {}

  - step: upsert_irrig_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT :node_id, channel_name, channel_type, NOW(), NOW()
      FROM (VALUES
        ('pump_main', 'ACTUATOR'),
        ('valve_clean_fill', 'ACTUATOR'),
        ('valve_clean_supply', 'ACTUATOR'),
        ('valve_solution_fill', 'ACTUATOR'),
        ('valve_solution_supply', 'ACTUATOR'),
        ('valve_irrigation', 'ACTUATOR')
      ) AS items(channel_name, channel_type)
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = EXCLUDED.type,
          updated_at = NOW()
    params:
      node_id: ${irrig_node_id}

  - step: upsert_sensor_mode_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT node_id, 'system', 'SERVICE', NOW(), NOW()
      FROM (
        VALUES
          (CAST(:ph_node_id AS bigint)),
          (CAST(:ec_node_id AS bigint)),
          (CAST(:soil_node_id AS bigint))
      ) AS nodes(node_id)
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = 'SERVICE',
          updated_at = NOW()
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}
      soil_node_id: ${soil_node_id}

  - step: upsert_soil_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      VALUES
        (CAST(:node_id AS bigint), 'soil_moisture', 'SENSOR', NOW(), NOW()),
        (CAST(:node_id AS bigint), 'system', 'SERVICE', NOW(), NOW())
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = EXCLUDED.type,
          updated_at = NOW()
    params:
      node_id: ${soil_node_id}

  - step: cleanup_old_runtime_telemetry_samples
    type: database_execute
    query: |
      DELETE FROM telemetry_samples
      WHERE sensor_id IN (
        SELECT id
        FROM sensors
        WHERE zone_id = :zone_id
          AND (
            (type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH') AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min'))
            OR (type = 'PH' AND label = 'ph_sensor')
            OR (type = 'EC' AND label = 'ec_sensor')
            OR (type = 'SOIL_MOISTURE' AND label = 'soil_moisture')
          )
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_old_runtime_telemetry_last
    type: database_execute
    query: |
      DELETE FROM telemetry_last
      WHERE sensor_id IN (
        SELECT id
        FROM sensors
        WHERE zone_id = :zone_id
          AND (
            (type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH') AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min'))
            OR (type = 'PH' AND label = 'ph_sensor')
            OR (type = 'EC' AND label = 'ec_sensor')
            OR (type = 'SOIL_MOISTURE' AND label = 'soil_moisture')
          )
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_old_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zone_id
        AND (
          (type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH') AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min'))
          OR (type = 'PH' AND label = 'ph_sensor')
          OR (type = 'EC' AND label = 'ec_sensor')
          OR (type = 'SOIL_MOISTURE' AND label = 'soil_moisture')
        )
    params:
      zone_id: ${zone_id}

  - step: insert_level_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      SELECT :greenhouse_id, :zone_id, :node_id, 'inside', 'WATER_LEVEL', label, TRUE, NOW(), NOW()
      FROM (VALUES
        ('level_clean_max'),
        ('level_clean_min'),
        ('level_solution_max'),
        ('level_solution_min')
      ) AS items(label)
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      node_id: ${irrig_node_id}

  - step: insert_ph_ec_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      VALUES
        (:greenhouse_id, :zone_id, :ph_node_id, 'inside', 'PH', 'ph_sensor', TRUE, NOW(), NOW()),
        (:greenhouse_id, :zone_id, :ec_node_id, 'inside', 'EC', 'ec_sensor', TRUE, NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}

  - step: insert_soil_sensor
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      VALUES
        (:greenhouse_id, :zone_id, :soil_node_id, 'inside', 'SOIL_MOISTURE', 'soil_moisture', TRUE, NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      soil_node_id: ${soil_node_id}

  - step: cleanup_existing_correction_bindings
    type: database_execute
    query: |
      DELETE FROM channel_bindings
      WHERE role IN ('dose_ec_a', 'dose_ph_up', 'dose_ph_down')
        AND node_channel_id IN (
          SELECT nc.id
          FROM node_channels nc
          JOIN nodes n ON n.id = nc.node_id
          WHERE n.zone_id = :zone_id
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_correction_infra
    type: database_execute
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
        AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH Down')
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_e2e_calibrations
    type: database_execute
    query: |
      DELETE FROM pump_calibrations
      WHERE source = 'e2e_irrigation_runtime'
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_infrastructure
    type: database_execute
    query: |
      INSERT INTO infrastructure_instances (
        owner_type,
        owner_id,
        asset_type,
        label,
        required,
        created_at,
        updated_at
      )
      VALUES
        ('zone', :zone_id, 'PUMP', 'AE3 E2E EC Dose', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Up', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Down', TRUE, NOW(), NOW())
    params:
      zone_id: ${zone_id}

  - step: insert_correction_bindings
    type: database_execute
    query: |
      INSERT INTO channel_bindings (
        infrastructure_instance_id,
        node_channel_id,
        direction,
        role,
        created_at,
        updated_at
      )
      SELECT ii.id, mapping.node_channel_id, 'actuator', mapping.role, NOW(), NOW()
      FROM (
        VALUES
          ('AE3 E2E EC Dose', CAST(:ec_pump_channel_id AS bigint), 'dose_ec_a'),
          ('AE3 E2E PH Up', CAST(:ph_up_channel_id AS bigint), 'dose_ph_up'),
          ('AE3 E2E PH Down', CAST(:ph_down_channel_id AS bigint), 'dose_ph_down')
      ) AS mapping(label, node_channel_id, role)
      JOIN infrastructure_instances ii
        ON ii.owner_type = 'zone'
       AND ii.owner_id = :zone_id
       AND ii.label = mapping.label
    params:
      zone_id: ${zone_id}
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_calibrations
    type: database_execute
    query: |
      INSERT INTO pump_calibrations (
        node_channel_id,
        ml_per_sec,
        k_ms_per_ml_l,
        source,
        quality_score,
        sample_count,
        valid_from,
        is_active,
        created_at,
        updated_at
      )
      VALUES
        (CAST(:ec_pump_channel_id AS bigint), 1.0, 1.0, 'e2e_irrigation_runtime', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_up_channel_id AS bigint), 1.0, 1.0, 'e2e_irrigation_runtime', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_down_channel_id AS bigint), 1.0, 1.0, 'e2e_irrigation_runtime', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW())
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: apply_task_logic_profile
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
    payload:
      payload:
        active_mode: working
        profiles:
          working:
            mode: working
            is_active: true
            subsystems:
              diagnostics:
                execution:
                  workflow: cycle_start
                  topology: two_tank_drip_substrate_trays
                  required_node_types:
                    - irrig
              irrigation:
                decision:
                  strategy: task
                  config:
                    lookback_sec: 300
                    min_samples: 2
                    stale_after_sec: 120
                    hysteresis_pct: 2.0
                    spread_alert_threshold_pct: 12.0
                recovery:
                  max_continue_attempts: 2
                  timeout_sec: 90
                  auto_replay_after_setup: false
                  max_setup_replays: 0
                safety:
                  stop_on_solution_min: true

  - step: create_recipe
    type: database_execute
    query: |
      INSERT INTO recipes (name, metadata, created_at, updated_at)
      VALUES (:recipe_name, '{}'::jsonb, NOW(), NOW())
    params:
      recipe_name: ${recipe_name}

  - step: load_recipe
    type: database_query
    query: |
      SELECT id
      FROM recipes
      WHERE name = :recipe_name
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_name: ${recipe_name}
    expected_rows: 1
    save: recipe_row

  - step: set_recipe_id
    type: set
    recipe_id: ${recipe_row.0.id}

  - step: create_recipe_revision
    type: database_execute
    query: |
      INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)
      VALUES (:recipe_id, 1, 'PUBLISHED', NOW(), NOW())
    params:
      recipe_id: ${recipe_id}

  - step: load_recipe_revision
    type: database_query
    query: |
      SELECT id
      FROM recipe_revisions
      WHERE recipe_id = :recipe_id
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_id: ${recipe_id}
    expected_rows: 1
    save: recipe_revision_row

  - step: set_recipe_revision_id
    type: set
    recipe_revision_id: ${recipe_revision_row.0.id}

  - step: create_grow_cycle
    type: database_execute
    query: |
      INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status, created_at, updated_at)
      VALUES (:greenhouse_id, :zone_id, :recipe_revision_id, 'RUNNING', NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}

  - step: load_grow_cycle
    type: database_query
    query: |
      SELECT id
      FROM grow_cycles
      WHERE zone_id = :zone_id
        AND recipe_revision_id = :recipe_revision_id
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}
    expected_rows: 1
    save: grow_cycle_row

  - step: set_grow_cycle_id
    type: set
    grow_cycle_id: ${grow_cycle_row.0.id}

  - step: create_phase
    type: database_execute
    query: |
      INSERT INTO grow_cycle_phases (
        grow_cycle_id,
        phase_index,
        name,
        ph_target,
        ph_min,
        ph_max,
        ec_target,
        ec_min,
        ec_max,
        irrigation_mode,
        irrigation_interval_sec,
        irrigation_duration_sec,
        extensions,
        created_at,
        updated_at
      )
      VALUES (
        :grow_cycle_id,
        0,
        'VEG',
        5.80,
        5.60,
        6.00,
        1.40,
        1.20,
        1.60,
        'SUBSTRATE',
        600,
        8,
        '{
          "targets": {
            "irrigation": {
              "correction_during_irrigation": true
            }
          },
          "subsystems": {
            "irrigation": {
              "targets": {
                "soil_moisture": {
                  "unit": "pct",
                  "min": 38.0,
                  "max": 48.0,
                  "target": 43.0
                }
              }
            }
          }
        }'::jsonb,
        NOW(),
        NOW()
      )
    params:
      grow_cycle_id: ${grow_cycle_id}

  - step: load_phase
    type: database_query
    query: |
      SELECT id
      FROM grow_cycle_phases
      WHERE grow_cycle_id = :grow_cycle_id
      ORDER BY id DESC
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    expected_rows: 1
    save: phase_row

  - step: set_phase_id
    type: set
    phase_id: ${phase_row.0.id}

  - step: activate_grow_cycle
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET current_phase_id = :phase_id,
          started_at = NOW(),
          recipe_started_at = NOW(),
          updated_at = NOW()
      WHERE id = :grow_cycle_id
    params:
      phase_id: ${phase_id}
      grow_cycle_id: ${grow_cycle_id}

