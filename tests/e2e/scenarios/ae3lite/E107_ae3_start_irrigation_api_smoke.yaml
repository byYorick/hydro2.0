        WHEN type IN ('PH', 'EC', 'WATER_LEVEL', 'WATER_LEVEL_SWITCH', 'SOIL_MOISTURE') THEN FALSE
        ELSE is_active
      END,
      updated_at = NOW()
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}
      irrig_node_id: ${irrig_node_id}
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}
      soil_node_id: ${soil_node_id}

  - step: start_irrigation_smart_run
    type: api_post
    endpoint: /api/zones/${zone_id}/start-irrigation
    payload:
      mode: normal
      requested_duration_sec: 8
      idempotency_key: ${idem_smart_run}
    save: smart_run_response

  - step: set_smart_run_task_id
    type: set
    smart_run_task_id: ${smart_run_response.data.task_id}

  - step: wait_smart_run_commands_started
    type: db.wait
    query: |
      SELECT CAST(:task_id AS bigint) AS task_id
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
      GROUP BY task_id
      HAVING COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_solution_supply'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_irrigation'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'pump_main'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
    params:
      task_id: ${smart_run_task_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_smart_run_completed
    type: db.wait
    query: |
      SELECT
        id,
        status,
        current_stage,
        workflow_phase,
        irrigation_decision_strategy,
        irrigation_decision_outcome,
        irrigation_decision_reason_code
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'completed'
        AND current_stage = 'completed_run'
      LIMIT 1
    params:
      task_id: ${smart_run_task_id}
    timeout: 60.0
    expected_rows: 1
    save: smart_run_task_row

  - step: wait_smart_run_commands_stopped
    type: db.wait
    query: |
      SELECT CAST(:task_id AS bigint) AS task_id
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
      GROUP BY task_id
      HAVING COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'pump_main'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'true') = 'false'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_irrigation'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'true') = 'false'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_solution_supply'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'true') = 'false'
      ) >= 1
    params:
      task_id: ${smart_run_task_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_ready_after_smart_run
    type: db.wait
    query: |
      SELECT zone_id, workflow_phase
      FROM zone_workflow_state
      WHERE zone_id = :zone_id
        AND workflow_phase = 'ready'
      ORDER BY updated_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 20.0
    expected_rows: 1

assertions:
  - name: task_strategy_task_created
    type: database_query
    query: |
      SELECT
        irrigation_decision_strategy,
        irrigation_decision_outcome
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_run_id}
    expected_rows: 1
    expected:
      - field: irrigation_decision_strategy
        operator: equals
        value: task

  - name: smart_soil_high_skips_irrigation
    type: database_query
    query: |
      SELECT
        irrigation_decision_strategy,
        irrigation_decision_outcome,
        irrigation_decision_reason_code
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
    params:
      task_id: ${skip_task_id}
    expected_rows: 1
    expected:
      - field: irrigation_decision_strategy
        operator: equals
        value: smart_soil_v1
      - field: irrigation_decision_outcome
        operator: equals
        value: skip
      - field: irrigation_decision_reason_code
        operator: equals
        value: smart_soil_above_max

  - name: smart_soil_skip_publishes_no_irrigation_commands
    type: database_query
    query: |
      SELECT COUNT(*)::int AS command_count
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND channel IN ('valve_solution_supply', 'valve_irrigation', 'pump_main')
        AND publish_status = 'accepted'
    params:
      task_id: ${skip_task_id}
    expected_rows: 1
    expected:
      - field: command_count
        operator: equals
        value: 0

  - name: smart_soil_low_runs_irrigation
    type: database_query
    query: |
      SELECT
        irrigation_decision_strategy,
        irrigation_decision_outcome,
        irrigation_decision_reason_code
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
    params:
      task_id: ${smart_run_task_id}
    expected_rows: 1
    expected:
      - field: irrigation_decision_strategy
        operator: equals
        value: smart_soil_v1
      - field: irrigation_decision_outcome
        operator: equals
        value: run
      - field: irrigation_decision_reason_code
        operator: equals
        value: smart_soil_below_min
