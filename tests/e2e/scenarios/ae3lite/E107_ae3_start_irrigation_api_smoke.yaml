  - step: wait_inline_any_dose_command
    type: db.wait
    query: |
      WITH pump_on AS (
        SELECT MIN(created_at) AS pump_on_at
        FROM ae_commands
        WHERE task_id = CAST(:task_id AS bigint)
          AND publish_status = 'accepted'
          AND channel = 'pump_main'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      )
      SELECT 1
      FROM commands c, pump_on
      WHERE c.zone_id = CAST(:zone_id AS bigint)
        AND c.channel IN ('pump_a', 'pump_acid', 'pump_base')
        AND c.cmd = 'dose'
        AND c.status IN ('DONE', 'ACK', 'SENT', 'QUEUED', 'RUNNING')
        AND pump_on.pump_on_at IS NOT NULL
        AND c.created_at >= pump_on.pump_on_at
      ORDER BY c.created_at ASC
      LIMIT 1
