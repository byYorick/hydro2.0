# E100: AE3-Lite two-tank startup smoke on real test_node
# DoD:
# - test_node переводится в deterministic empty-state через history-logger/reset_state
# - AE3 start-cycle публикует state probe и clean_fill command
# - canonical task возвращается в pending stage=clean_fill_check без fail-closed
# - GET /internal/tasks/{task_id} отражает pending status

name: E100_ae3_two_tank_realhw_smoke
description: |
  Реальный smoke для native AE3-Lite на `firmware/test_node`.
  Сценарий готовит test-zone под AE3 two-tank topology, делает reset через protected
  command pipeline и проверяет первый staged переход:
  startup -> state probe -> clean_fill_start -> pending(clean_fill_check).
  Сценарий рассчитан на выделенную test-zone реального test_node и временно
  подменяет active grow-cycle/profile внутри этой зоны.

actions:
  - step: set_test_context
    type: set
    fixture_prefix: ae3-realhw-${TIMESTAMP_MS}
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: ${TEST_NODE_UID}
    test_ph_node_uid: ${TEST_PH_NODE_UID}
    test_ec_node_uid: ${TEST_EC_NODE_UID}
    recipe_name: ae3-realhw-recipe-${TIMESTAMP_MS}
    idempotency_key: ae3-realhw-start-cycle-${TIMESTAMP_MS}
    scheduler_source: laravel_scheduler
    scheduler_trace_id: ae3-realhw-trace-${TIMESTAMP_MS}

  - step: capture_scenario_window
    type: database_query
    query: |
      SELECT NOW() AS started_at
    expected_rows: 1
    save: scenario_window

  - step: load_zone_context
    type: database_query
    query: |
      SELECT id AS zone_id, greenhouse_id, automation_runtime
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_ctx

  - step: set_zone_context
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}
    previous_automation_runtime: ${zone_ctx.0.automation_runtime}

  - step: resolve_irrig_node
    type: database_query
    query: |
      SELECT id AS node_id, uid AS node_uid
      FROM nodes
      WHERE LOWER(COALESCE(type, '')) = 'irrig'
      ORDER BY
        CASE
          WHEN uid = :preferred_uid AND zone_id = :zone_id THEN 0
          WHEN uid = 'nd-test-irrig-1' THEN 1
          WHEN uid = :preferred_uid THEN 2
          WHEN zone_id = :zone_id THEN 3
          ELSE 4
        END,
        id
      LIMIT 1
    params:
      preferred_uid: ${test_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: irrig_node_row

  - step: attach_irrig_node_to_zone
    type: database_execute
    query: |
      UPDATE nodes
      SET zone_id = :zone_id,
          updated_at = NOW()
      WHERE id = :node_id
        AND (zone_id IS DISTINCT FROM :zone_id)
    params:
      zone_id: ${zone_id}
      node_id: ${irrig_node_row.0.node_id}

  - step: resolve_ph_node
    type: database_query
    query: |
      SELECT id AS node_id, uid AS node_uid
      FROM nodes
      WHERE LOWER(COALESCE(type, '')) = 'ph'
      ORDER BY
        CASE
          WHEN uid = :preferred_uid AND zone_id = :zone_id THEN 0
          WHEN uid = 'nd-test-ph-1' THEN 1
          WHEN uid = :preferred_uid THEN 2
          WHEN zone_id = :zone_id THEN 3
          ELSE 4
        END,
        id
      LIMIT 1
    params:
      preferred_uid: ${test_ph_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ph_node_row

  - step: attach_ph_node_to_zone
    type: database_execute
    query: |
      UPDATE nodes
      SET zone_id = :zone_id,
          updated_at = NOW()
      WHERE id = :node_id
        AND (zone_id IS DISTINCT FROM :zone_id)
    params:
      zone_id: ${zone_id}
      node_id: ${ph_node_row.0.node_id}

  - step: resolve_ec_node
    type: database_query
    query: |
      SELECT id AS node_id, uid AS node_uid
      FROM nodes
      WHERE LOWER(COALESCE(type, '')) = 'ec'
      ORDER BY
        CASE
          WHEN uid = :preferred_uid AND zone_id = :zone_id THEN 0
          WHEN uid = 'nd-test-ec-1' THEN 1
          WHEN uid = :preferred_uid THEN 2
          WHEN zone_id = :zone_id THEN 3
          ELSE 4
        END,
        id
      LIMIT 1
    params:
      preferred_uid: ${test_ec_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ec_node_row

  - step: attach_ec_node_to_zone
    type: database_execute
    query: |
      UPDATE nodes
      SET zone_id = :zone_id,
          updated_at = NOW()
      WHERE id = :node_id
        AND (zone_id IS DISTINCT FROM :zone_id)
    params:
      zone_id: ${zone_id}
      node_id: ${ec_node_row.0.node_id}

  - step: set_node_ids
    type: set
    test_node_uid: ${irrig_node_row.0.node_uid}
    test_ph_node_uid: ${ph_node_row.0.node_uid}
    test_ec_node_uid: ${ec_node_row.0.node_uid}
    irrig_node_id: ${irrig_node_row.0.node_id}
    ph_node_id: ${ph_node_row.0.node_id}
    ec_node_id: ${ec_node_row.0.node_id}

  - step: load_ec_pump_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_a'
      LIMIT 1
    params:
      node_id: ${ec_node_id}
    expected_rows: 1
    save: ec_pump_channel_row

  - step: load_ph_up_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_base'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_up_channel_row

  - step: load_ph_down_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_acid'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_down_channel_row

  - step: set_correction_channel_ids
    type: set
    ec_pump_channel_id: ${ec_pump_channel_row.0.node_channel_id}
    ph_up_channel_id: ${ph_up_channel_row.0.node_channel_id}
    ph_down_channel_id: ${ph_down_channel_row.0.node_channel_id}

  - step: cleanup_zone_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_workflow_state
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: complete_existing_cycles
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET status = 'COMPLETED',
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
    params:
      zone_id: ${zone_id}

  - step: switch_zone_to_ae3
    type: database_execute
    query: |
      UPDATE zones
      SET automation_runtime = 'ae3',
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: upsert_irrig_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT :node_id, channel_name, channel_type, NOW(), NOW()
      FROM (VALUES
        ('pump_main', 'ACTUATOR'),
        ('valve_clean_fill', 'ACTUATOR'),
        ('valve_clean_supply', 'ACTUATOR'),
        ('valve_solution_fill', 'ACTUATOR'),
        ('valve_solution_supply', 'ACTUATOR'),
        ('valve_irrigation', 'ACTUATOR')
      ) AS items(channel_name, channel_type)
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = EXCLUDED.type,
          updated_at = NOW()
    params:
      node_id: ${irrig_node_id}

  - step: delete_old_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zone_id
        AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zone_id: ${zone_id}

  - step: insert_level_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      SELECT :greenhouse_id, :zone_id, :node_id, 'inside', 'WATER_LEVEL', label, TRUE, NOW(), NOW()
      FROM (VALUES
        ('level_clean_max'),
        ('level_clean_min'),
        ('level_solution_max'),
        ('level_solution_min')
      ) AS items(label)
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      node_id: ${irrig_node_id}

  - step: upsert_sensor_mode_channels
    type: database_execute
    query: |
      WITH sensor_nodes AS (
        SELECT DISTINCT node_id
        FROM (VALUES (CAST(:ph_node_id AS bigint)), (CAST(:ec_node_id AS bigint))) AS nodes(node_id)
      )
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT node_id, 'system', 'SERVICE', NOW(), NOW()
      FROM sensor_nodes
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = 'SERVICE',
          updated_at = NOW()
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}

  - step: cleanup_existing_correction_bindings
    type: database_execute
    query: |
      DELETE FROM channel_bindings
      WHERE role IN ('dose_ec_a', 'dose_ph_up', 'dose_ph_down')
        AND node_channel_id IN (
          SELECT nc.id
          FROM node_channels nc
          JOIN nodes n ON n.id = nc.node_id
          WHERE n.zone_id = :zone_id
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_correction_infra
    type: database_execute
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
        AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH Down')
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_e2e_calibrations
    type: database_execute
    query: |
      DELETE FROM pump_calibrations
      WHERE source = 'e2e_realhw_setup_ready'
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_infrastructure
    type: database_execute
    query: |
      INSERT INTO infrastructure_instances (
        owner_type,
        owner_id,
        asset_type,
        label,
        required,
        created_at,
        updated_at
      )
      VALUES
        ('zone', :zone_id, 'PUMP', 'AE3 E2E EC Dose', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Up', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Down', TRUE, NOW(), NOW())
    params:
      zone_id: ${zone_id}

  - step: insert_correction_bindings
    type: database_execute
    query: |
      INSERT INTO channel_bindings (
        infrastructure_instance_id,
        node_channel_id,
        direction,
        role,
        created_at,
        updated_at
      )
      SELECT ii.id, mapping.node_channel_id, 'actuator', mapping.role, NOW(), NOW()
      FROM (
        VALUES
          ('AE3 E2E EC Dose', CAST(:ec_pump_channel_id AS bigint), 'dose_ec_a'),
          ('AE3 E2E PH Up', CAST(:ph_up_channel_id AS bigint), 'dose_ph_up'),
          ('AE3 E2E PH Down', CAST(:ph_down_channel_id AS bigint), 'dose_ph_down')
      ) AS mapping(label, node_channel_id, role)
      JOIN infrastructure_instances ii
        ON ii.owner_type = 'zone'
       AND ii.owner_id = :zone_id
       AND ii.label = mapping.label
    params:
      zone_id: ${zone_id}
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_calibrations
    type: database_execute
    query: |
      INSERT INTO pump_calibrations (
        node_channel_id,
        ml_per_sec,
        k_ms_per_ml_l,
        source,
        quality_score,
        sample_count,
        valid_from,
        is_active,
        created_at,
        updated_at
      )
      VALUES
        (CAST(:ec_pump_channel_id AS bigint), 1.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_up_channel_id AS bigint), 1.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_down_channel_id AS bigint), 1.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW())
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: deactivate_active_profiles
    type: database_execute
    query: |
      UPDATE zone_automation_logic_profiles
      SET is_active = FALSE,
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND is_active = TRUE
    params:
      zone_id: ${zone_id}

  - step: insert_ae3_profile
    type: database_execute
    query: |
      INSERT INTO zone_automation_logic_profiles (
        zone_id,
        mode,
        subsystems,
        command_plans,
        is_active,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'working',
        jsonb_build_object(
          'diagnostics', jsonb_build_object(
            'execution', jsonb_build_object(
              'workflow', 'cycle_start',
              'topology', 'two_tank_drip_substrate_trays',
              'required_node_types', jsonb_build_array('irrig'),
              'startup', jsonb_build_object(
                'level_poll_interval_sec', 5,
                'clean_fill_timeout_sec', 120,
                'solution_fill_timeout_sec', 180,
                'prepare_recirculation_timeout_sec', 180,
                'telemetry_max_age_sec', 10,
                'irr_state_max_age_sec', 30
              ),
              'target_ph', 5.8,
              'target_ec', 1.4,
              'prepare_tolerance', jsonb_build_object(
                'ph_pct', 15,
                'ec_pct', 25
              ),
              'two_tank_commands', jsonb_build_object(
                'clean_fill_start', jsonb_build_array(
                  jsonb_build_object(
                    'channel', 'valve_clean_fill',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', true)
                  )
                ),
                'clean_fill_stop', jsonb_build_array(
                  jsonb_build_object(
                    'channel', 'valve_clean_fill',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', false)
                  )
                ),
                'solution_fill_start', jsonb_build_array(
                  jsonb_build_object(
                    'channel', 'valve_clean_supply',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', true)
                  ),
                  jsonb_build_object(
                    'channel', 'valve_solution_fill',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', true)
                  ),
                  jsonb_build_object(
                    'channel', 'pump_main',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', true)
                  )
                ),
                'solution_fill_stop', jsonb_build_array(
                  jsonb_build_object(
                    'channel', 'pump_main',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', false)
                  ),
                  jsonb_build_object(
                    'channel', 'valve_solution_fill',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', false)
                  ),
                  jsonb_build_object(
                    'channel', 'valve_clean_supply',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', false)
                  )
                ),
                'prepare_recirculation_start', jsonb_build_array(
                  jsonb_build_object(
                    'channel', 'valve_solution_supply',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', true)
                  ),
                  jsonb_build_object(
                    'channel', 'valve_solution_fill',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', true)
                  ),
                  jsonb_build_object(
                    'channel', 'pump_main',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', true)
                  )
                ),
                'prepare_recirculation_stop', jsonb_build_array(
                  jsonb_build_object(
                    'channel', 'pump_main',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', false)
                  ),
                  jsonb_build_object(
                    'channel', 'valve_solution_fill',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', false)
                  ),
                  jsonb_build_object(
                    'channel', 'valve_solution_supply',
                    'cmd', 'set_relay',
                    'params', jsonb_build_object('state', false)
                  )
                )
              )
            )
          )
        ),
        jsonb_build_object(
          'schema_version', 1,
          'plan_version', 1,
          'plans', jsonb_build_object(
            'diagnostics', jsonb_build_object(
              'steps', jsonb_build_array(
                jsonb_build_object(
                  'name', 'pump_start',
                  'channel', 'irrigation_pump',
                  'cmd', 'set_relay',
                  'params', jsonb_build_object('state', true),
                  'timeout_sec', 20
                )
              )
            )
          )
        ),
        TRUE,
        NOW(),
        NOW()
      )
      ON CONFLICT (zone_id, mode) DO UPDATE
      SET subsystems = EXCLUDED.subsystems,
          command_plans = EXCLUDED.command_plans,
          is_active = TRUE,
          updated_at = NOW()
    params:
      zone_id: ${zone_id}

  - step: create_recipe
    type: database_execute
    query: |
      INSERT INTO recipes (name, metadata, created_at, updated_at)
      VALUES (:recipe_name, '{}'::jsonb, NOW(), NOW())
    params:
      recipe_name: ${recipe_name}

  - step: load_recipe
    type: database_query
    query: |
      SELECT id
      FROM recipes
      WHERE name = :recipe_name
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_name: ${recipe_name}
    expected_rows: 1
    save: recipe_row

  - step: set_recipe_id
    type: set
    recipe_id: ${recipe_row.0.id}

  - step: create_recipe_revision
    type: database_execute
    query: |
      INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)
      VALUES (:recipe_id, 1, 'PUBLISHED', NOW(), NOW())
    params:
      recipe_id: ${recipe_id}

  - step: load_recipe_revision
    type: database_query
    query: |
      SELECT id
      FROM recipe_revisions
      WHERE recipe_id = :recipe_id
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_id: ${recipe_id}
    expected_rows: 1
    save: recipe_revision_row

  - step: set_recipe_revision_id
    type: set
    recipe_revision_id: ${recipe_revision_row.0.id}

  - step: create_grow_cycle
    type: database_execute
    query: |
      INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status, created_at, updated_at)
      VALUES (:greenhouse_id, :zone_id, :recipe_revision_id, 'RUNNING', NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}

  - step: load_grow_cycle
    type: database_query
    query: |
      SELECT id
      FROM grow_cycles
      WHERE zone_id = :zone_id
        AND recipe_revision_id = :recipe_revision_id
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}
    expected_rows: 1
    save: grow_cycle_row

  - step: set_grow_cycle_id
    type: set
    grow_cycle_id: ${grow_cycle_row.0.id}

  - step: create_phase
    type: database_execute
    query: |
      INSERT INTO grow_cycle_phases (
        grow_cycle_id,
        phase_index,
        name,
        ph_target,
        ph_min,
        ph_max,
        ec_target,
        ec_min,
        ec_max,
        irrigation_mode,
        irrigation_interval_sec,
        irrigation_duration_sec,
        created_at,
        updated_at
      )
      VALUES (
        :grow_cycle_id,
        0,
        'VEG',
        5.80,
        5.50,
        6.10,
        1.40,
        1.20,
        1.60,
        'SUBSTRATE',
        600,
        45,
        NOW(),
        NOW()
      )
    params:
      grow_cycle_id: ${grow_cycle_id}

  - step: load_phase
    type: database_query
    query: |
      SELECT id
      FROM grow_cycle_phases
      WHERE grow_cycle_id = :grow_cycle_id
      ORDER BY id DESC
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    expected_rows: 1
    save: phase_row

  - step: set_phase_id
    type: set
    phase_id: ${phase_row.0.id}

  - step: activate_grow_cycle
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET current_phase_id = :phase_id,
          started_at = NOW(),
          recipe_started_at = NOW(),
          updated_at = NOW()
      WHERE id = :grow_cycle_id
    params:
      phase_id: ${phase_id}
      grow_cycle_id: ${grow_cycle_id}

  - step: reset_test_node_state
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: reset_state
      params: {}
    save: reset_state_response

  - step: wait_reset_state_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_state_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_zero_level_telemetry
    type: db.wait
    query: |
      SELECT COUNT(*)::int AS zero_levels
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.zone_id = :zone_id
        AND LOWER(TRIM(COALESCE(s.label, ''))) IN (
          'level_clean_min',
          'level_clean_max',
          'level_solution_min',
          'level_solution_max'
        )
        AND s.type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
        AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '5 minutes'
        AND COALESCE(tl.last_value, -1) <= 0.1
      HAVING COUNT(*) = 4
    params:
      zone_id: ${zone_id}
    timeout: 60.0
    expected_rows: 1
    save: zero_levels_row

  - step: insert_scheduler_like_intent
    type: database_execute
    query: |
      INSERT INTO zone_automation_intents (
        zone_id,
        intent_type,
        payload,
        idempotency_key,
        status,
        not_before,
        retry_count,
        max_retries,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'IRRIGATE_ONCE',
        jsonb_build_object(
          'source', CAST(:source AS text),
          'task_type', 'diagnostics',
          'workflow', 'cycle_start',
          'topology', 'two_tank_drip_substrate_trays'
        ),
        :idempotency_key,
        'pending',
        NOW() - INTERVAL '1 second',
        0,
        3,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
      source: ${scheduler_source}

  - step: start_cycle_http
    type: http_request
    method: POST
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
    headers:
      Accept: application/json
      Content-Type: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    body:
      source: ${scheduler_source}
      idempotency_key: ${idempotency_key}
    retries: 2
    retry_delay_seconds: 1
    capture_response: start_cycle_response

  - step: set_task_id
    type: set
    task_id: ${start_cycle_response.json.data.task_id}

  - step: wait_ae_command_accepted
    type: db.wait
    query: |
      SELECT id, task_id, external_id, payload->>'cmd_id' AS cmd_id, publish_status
      FROM ae_commands
      WHERE task_id = :task_id
        AND publish_status = 'accepted'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 30.0
    expected_rows: 1
    save: ae_command_row

  - step: wait_expected_ae_commands_published
    type: db.wait
    query: |
      SELECT CAST(:task_id AS bigint) AS task_id
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
      GROUP BY task_id
      HAVING COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'storage_state'
          AND payload->>'cmd' = 'state'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_clean_fill'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
    params:
      task_id: ${task_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_runtime_irr_state_snapshot
    type: db.wait
    query: |
      SELECT id, type, created_at
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'IRR_STATE_SNAPSHOT'
        AND created_at >= :started_at
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}
    timeout: 30.0
    expected_rows: 1
    save: irr_state_event_row

  - step: wait_task_requeued_clean_fill_check
    type: db.wait
    query: |
      SELECT
        id,
        status,
        topology AS mode,
        current_stage AS stage,
        error_code,
        error_message
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status IN ('pending', 'completed', 'failed')
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 20.0
    expected_rows: 1
    save: task_progress_row

  - step: wait_workflow_tank_filling
    type: db.wait
    query: |
      SELECT zone_id, workflow_phase, updated_at
      FROM zone_workflow_state
      WHERE zone_id = :zone_id
        AND workflow_phase IN ('tank_filling', 'ready')
      ORDER BY updated_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 20.0
    expected_rows: 1
    save: workflow_row

  - step: count_task_commands
    type: database_query
    query: |
      SELECT COUNT(*)::int AS cnt
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}
    expected_rows: 1
    save: task_command_count_row

  - step: load_expected_ae_command_counts
    type: database_query
    query: |
      SELECT
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel = 'storage_state'
            AND payload->>'cmd' = 'state'
        )::int AS irr_state_probe_cnt,
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel = 'valve_clean_fill'
            AND payload->>'cmd' = 'set_relay'
            AND COALESCE(payload->'params'->>'state', 'false') = 'true'
        )::int AS clean_fill_start_cnt
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}
    expected_rows: 1
    save: expected_ae_command_counts_row

  - step: get_internal_task_status
    type: http_request
    method: GET
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/internal/tasks/${task_id}
    headers:
      Accept: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    capture_response: internal_task_response

assertions:
  - name: reset_zero_level_telemetry_ready
    type: custom_assert
    condition: "int(context.get('zero_levels_row', [{}])[0].get('zero_levels', 0)) == 4"

  - name: start_cycle_http_200
    type: custom_assert
    condition: "int(context.get('start_cycle_response', {}).get('status_code', 0)) == 200"

  - name: start_cycle_response_active
    type: json_assertion
    source: start_cycle_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.accepted
        operator: equals
        value: true
      - field: data.runner_state
        operator: equals
        value: active

  - name: runtime_task_not_failed
    type: custom_assert
    condition: "str(context.get('task_progress_row', [{}])[0].get('status', '')).lower() != 'failed'"

  - name: runtime_task_pending_clean_fill_check
    type: custom_assert
    condition: "str(context.get('task_progress_row', [{}])[0].get('status', '')).lower() == 'pending' and str(context.get('task_progress_row', [{}])[0].get('mode', '')).lower() == 'two_tank_drip_substrate_trays' and str(context.get('task_progress_row', [{}])[0].get('stage', '')).lower() == 'clean_fill_check'"

  - name: workflow_phase_tank_filling
    type: custom_assert
    condition: "str(context.get('workflow_row', [{}])[0].get('workflow_phase', '')).lower() == 'tank_filling'"

  - name: at_least_two_ae_commands_logged
    type: custom_assert
    condition: "int(context.get('task_command_count_row', [{}])[0].get('cnt', 0)) >= 2"

  - name: irr_state_probe_logged
    type: custom_assert
    condition: "int(context.get('expected_ae_command_counts_row', [{}])[0].get('irr_state_probe_cnt', 0)) >= 1"

  - name: clean_fill_start_logged
    type: custom_assert
    condition: "int(context.get('expected_ae_command_counts_row', [{}])[0].get('clean_fill_start_cnt', 0)) >= 1"

  - name: internal_task_pending
    type: json_assertion
    source: internal_task_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.task_id
        operator: equals
        value: ${task_id}
      - field: data.status
        operator: equals
        value: pending

cleanup:
  - step: reset_test_node_after_run
    type: ae_test_hook
    optional: true
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: reset_state
      params: {}

  - step: cleanup_runtime_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM commands
      WHERE zone_id = :zone_id
        AND created_at >= :started_at
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}

  - step: cleanup_runtime_events
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_events
      WHERE zone_id = :zone_id
        AND created_at >= :started_at
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}

  - step: cleanup_runtime_ae_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}

  - step: cleanup_runtime_ae_task
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}

  - step: cleanup_runtime_ae_leases
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_workflow_state_after_run
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_runtime_intent
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}

  - step: cleanup_created_phase
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_phases
      WHERE id = CAST(:phase_id AS bigint)
    params:
      phase_id: ${phase_id}

  - step: cleanup_created_cycle
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycles
      WHERE id = CAST(:grow_cycle_id AS bigint)
    params:
      grow_cycle_id: ${grow_cycle_id}

  - step: cleanup_created_recipe_revision
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipe_revisions
      WHERE id = CAST(:recipe_revision_id AS bigint)
    params:
      recipe_revision_id: ${recipe_revision_id}

  - step: cleanup_created_recipe
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipes
      WHERE id = CAST(:recipe_id AS bigint)
    params:
      recipe_id: ${recipe_id}

  - step: cleanup_e2e_calibrations
    type: database_execute
    optional: true
    query: |
      DELETE FROM pump_calibrations
      WHERE source = 'e2e_realhw_setup_ready'
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: cleanup_e2e_correction_bindings
    type: database_execute
    optional: true
    query: |
      DELETE FROM channel_bindings
      WHERE role IN ('dose_ec_a', 'dose_ph_up', 'dose_ph_down')
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: cleanup_e2e_correction_infra
    type: database_execute
    optional: true
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
        AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH Down')
    params:
      zone_id: ${zone_id}

  - step: cleanup_created_profile
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_logic_profiles
      WHERE zone_id = :zone_id
        AND created_at >= :started_at
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}

  - step: restore_previous_profile_state
    type: database_execute
    optional: true
    query: |
      UPDATE zone_automation_logic_profiles
      SET is_active = CASE
        WHEN id = (
          SELECT id
          FROM zone_automation_logic_profiles
          WHERE zone_id = :zone_id
            AND created_at < :started_at
          ORDER BY id DESC
          LIMIT 1
        ) THEN TRUE
        ELSE FALSE
      END,
      updated_at = NOW()
      WHERE zone_id = :zone_id
        AND created_at < :started_at
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}

  - step: restore_previous_zone_runtime
    type: database_execute
    optional: true
    query: |
      UPDATE zones
      SET automation_runtime = :automation_runtime,
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}
      automation_runtime: ${previous_automation_runtime}
