# E118: stub — water baseline capture + calcium-only solution_fill (test_node)
# Status: stub (contract-only; NOT in realhw suite). Live Ca fill fragments: E106.
# Canon: water_ec/water_ph → nutrient_budget → T_*; fill doses only pump_b (calcium), no pH.
# Full dedicated realhw short-run remains live-only / TBD.

name: E118_ae3_water_baseline_and_ca_fill_test_node
status: stub
description: |
  Contract stub for water-baseline capture and calcium-only solution_fill.
  Pins expected events, actuators, and forbidden prepare owners without requiring
  a dedicated multi-step realhw run. Live Ca dose waits live in E106.

actions:
  - step: set_stub_context
    type: set
    stub: true
    skip_live: true
    scenario: water_baseline_and_ca_fill
    status: stub
    expected_fill_channel: pump_b
    expected_active_component: calcium
    calcium_actuator: pump_b
    expected_events:
      - WATER_BASELINE_CAPTURED
      - PIPELINE_STEP_CHANGED
      - CORRECTION
    expected_phases:
      - solution_fill
    forbidden_phases:
      - irrig_recirc
      - irrigation_recovery
    forbidden_prepare_owners:
      - npk_ec_share
      - target_ec_prepare
    forbidden_irrigation_ec_dose: true
    notes: |
      Fill chemistry = calcium only (pump_b). pH/EC nutrient mix is prepare-owned.
      WATER_BASELINE_CAPTURED must precede nutrient_budget / T_* application.

assertions:
  - name: stub_documents_canon
    type: custom_assert
    condition: >
      context.get('stub') is True
      and context.get('status') == 'stub'
      and context.get('expected_fill_channel') == 'pump_b'
      and context.get('expected_active_component') == 'calcium'
      and context.get('calcium_actuator') == 'pump_b'

  - name: stub_expects_water_baseline_event
    type: custom_assert
    condition: >
      'WATER_BASELINE_CAPTURED' in (context.get('expected_events') or [])
      and 'PIPELINE_STEP_CHANGED' in (context.get('expected_events') or [])
      and 'CORRECTION' in (context.get('expected_events') or [])

  - name: stub_forbids_irrig_recirc_and_npk_prepare_owner
    type: custom_assert
    condition: >
      'irrig_recirc' in (context.get('forbidden_phases') or [])
      and 'irrigation_recovery' in (context.get('forbidden_phases') or [])
      and 'npk_ec_share' in (context.get('forbidden_prepare_owners') or [])
      and 'target_ec_prepare' in (context.get('forbidden_prepare_owners') or [])
      and context.get('forbidden_irrigation_ec_dose') is True
