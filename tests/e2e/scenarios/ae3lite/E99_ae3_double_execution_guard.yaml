# E99: AE3-Lite double execution guard on one zone
# DoD:
# - первый start-cycle создаёт ровно одну active AE3 task и один ae_command
# - второй start-cycle на той же busy zone получает 409 start_cycle_zone_busy
# - второй intent завершается fail-closed, но второй canonical task не создаётся
# - single-writer lease остаётся единственной

name: E99_ae3_double_execution_guard
description: |
  Проверяет защиту от double execution на одной зоне:
  1) поднимаем минимальную AE3 fixture-зону,
  2) запускаем первый start-cycle и дожидаемся waiting_command,
  3) создаём второй scheduler-like intent и повторно вызываем start-cycle,
  4) убеждаемся, что второй запуск блокируется без второго task/command/lease.

actions:
  - step: set_test_context
    type: set
    greenhouse_uid: gh-ae3e99-${TIMESTAMP_S}
    greenhouse_name: ae3-e99-gh-${TIMESTAMP_MS}
    greenhouse_token: pt-ae3e99-${TIMESTAMP_S}
    zone_uid: zn-ae3e99-${TIMESTAMP_S}
    zone_name: ae3-e99-zone-${TIMESTAMP_MS}
    recipe_name: ae3-e99-recipe-${TIMESTAMP_MS}
    node_uid: nd-ae3e99-${TIMESTAMP_S}
    first_idempotency_key: ae3-e99-start-cycle-a-${TIMESTAMP_MS}
    second_idempotency_key: ae3-e99-start-cycle-b-${TIMESTAMP_MS}
    scheduler_source: laravel_scheduler
    first_trace_id: ae3-e99-trace-a-${TIMESTAMP_MS}
    second_trace_id: ae3-e99-trace-b-${TIMESTAMP_MS}

  - step: create_greenhouse
    type: database_execute
    query: |
      INSERT INTO greenhouses (uid, name, timezone, provisioning_token, created_at, updated_at)
      VALUES (:greenhouse_uid, :greenhouse_name, 'UTC', :greenhouse_token, NOW(), NOW())
    params:
      greenhouse_uid: ${greenhouse_uid}
      greenhouse_name: ${greenhouse_name}
      greenhouse_token: ${greenhouse_token}

  - step: create_zone
    type: database_execute
    query: |
      INSERT INTO zones (greenhouse_id, name, uid, status, automation_runtime, created_at, updated_at)
      VALUES (
        (SELECT id FROM greenhouses WHERE uid = :greenhouse_uid LIMIT 1),
        :zone_name,
        :zone_uid,
        'online',
        'ae3',
        NOW(),
        NOW()
      )
    params:
      greenhouse_uid: ${greenhouse_uid}
      zone_name: ${zone_name}
      zone_uid: ${zone_uid}

  - step: create_recipe
    type: database_execute
    query: |
      INSERT INTO recipes (name, metadata, created_at, updated_at)
      VALUES (:recipe_name, '{}'::jsonb, NOW(), NOW())
    params:
      recipe_name: ${recipe_name}

  - step: create_recipe_revision
    type: database_execute
    query: |
      INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)
      VALUES (
        (SELECT id FROM recipes WHERE name = :recipe_name LIMIT 1),
        1,
        'PUBLISHED',
        NOW(),
        NOW()
      )
    params:
      recipe_name: ${recipe_name}

  - step: create_grow_cycle
    type: database_execute
    query: |
      INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status, created_at, updated_at)
      VALUES (
        (SELECT id FROM greenhouses WHERE uid = :greenhouse_uid LIMIT 1),
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1),
        (
          SELECT rr.id
          FROM recipe_revisions rr
          JOIN recipes r ON r.id = rr.recipe_id
          WHERE r.name = :recipe_name
          ORDER BY rr.id DESC
          LIMIT 1
        ),
        'RUNNING',
        NOW(),
        NOW()
      )
    params:
      greenhouse_uid: ${greenhouse_uid}
      zone_uid: ${zone_uid}
      recipe_name: ${recipe_name}

  - step: create_phase
    type: database_execute
    query: |
      INSERT INTO grow_cycle_phases (
        grow_cycle_id,
        phase_index,
        name,
        ph_target,
        ph_min,
        ph_max,
        ec_target,
        ec_min,
        ec_max,
        irrigation_mode,
        irrigation_interval_sec,
        irrigation_duration_sec,
        extensions,
        created_at,
        updated_at
      )
      VALUES (
        (
          SELECT id
          FROM grow_cycles
          WHERE zone_id = (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1)
          ORDER BY id DESC
          LIMIT 1
        ),
        0,
        'VEG',
        5.80,
        5.50,
        6.10,
        1.40,
        1.20,
        1.60,
        'SUBSTRATE',
        600,
        45,
        jsonb_build_object(
          'targets', jsonb_build_object(
            'diagnostics', jsonb_build_object(
              'execution', jsonb_build_object(
                'workflow', 'cycle_start',
                'startup', jsonb_build_object('clean_fill_timeout_sec', 30)
              )
            )
          )
        ),
        NOW(),
        NOW()
      )
    params:
      zone_uid: ${zone_uid}

  - step: activate_grow_cycle
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET current_phase_id = (
            SELECT gp.id
            FROM grow_cycle_phases gp
            WHERE gp.grow_cycle_id = grow_cycles.id
            ORDER BY gp.id DESC
            LIMIT 1
          ),
          started_at = NOW(),
          recipe_started_at = NOW(),
          updated_at = NOW()
      WHERE zone_id = (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1)
    params:
      zone_uid: ${zone_uid}

  - step: create_profile
    type: database_execute
    query: |
      INSERT INTO zone_automation_logic_profiles (
        zone_id,
        mode,
        subsystems,
        command_plans,
        is_active,
        created_at,
        updated_at
      )
      VALUES (
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1),
        'working',
        jsonb_build_object(
          'diagnostics', jsonb_build_object(
            'execution', jsonb_build_object(
              'workflow', 'cycle_start',
              'topology', 'two_tank_drip_substrate_trays',
              'required_node_types', jsonb_build_array('irrig'),
              'startup', jsonb_build_object('level_poll_interval_sec', 11)
            )
          )
        ),
        jsonb_build_object(
          'schema_version', 1,
          'plan_version', 1,
          'plans', jsonb_build_object(
            'diagnostics', jsonb_build_object(
              'execution', jsonb_build_object(
                'workflow', 'cycle_start',
                'topology', 'two_tank_drip_substrate_trays',
                'required_node_types', jsonb_build_array('irrig'),
                'startup', jsonb_build_object('level_poll_interval_sec', 11)
              ),
              'steps', jsonb_build_array(
                jsonb_build_object(
                  'name', 'pump_start',
                  'channel', 'irrigation_pump',
                  'cmd', 'set_relay',
                  'params', jsonb_build_object('state', true),
                  'timeout_sec', 20
                )
              )
            )
          )
        ),
        TRUE,
        NOW(),
        NOW()
      )
    params:
      zone_uid: ${zone_uid}

  - step: create_workflow_state
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES ((SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1), 'idle', 0, NOW(), '{}'::jsonb)
    params:
      zone_uid: ${zone_uid}

  - step: create_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, type, status, created_at, updated_at)
      VALUES ((SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1), :node_uid, 'irrig', 'online', NOW(), NOW())
    params:
      zone_uid: ${zone_uid}
      node_uid: ${node_uid}

  - step: create_node_channel
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, config, created_at, updated_at)
      VALUES (
        (SELECT id FROM nodes WHERE uid = :node_uid LIMIT 1),
        'pump_main',
        'ACTUATOR',
        '{}'::jsonb,
        NOW(),
        NOW()
      )
    params:
      node_uid: ${node_uid}

  - step: create_infrastructure_instance
    type: database_execute
    query: |
      INSERT INTO infrastructure_instances (
        owner_type,
        owner_id,
        asset_type,
        label,
        required,
        created_at,
        updated_at
      )
      VALUES (
        'zone',
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1),
        'PUMP',
        'Main Pump',
        TRUE,
        NOW(),
        NOW()
      )
    params:
      zone_uid: ${zone_uid}

  - step: create_channel_binding
    type: database_execute
    query: |
      INSERT INTO channel_bindings (
        infrastructure_instance_id,
        node_channel_id,
        direction,
        role,
        created_at,
        updated_at
      )
      VALUES (
        (
          SELECT id
          FROM infrastructure_instances
          WHERE owner_type = 'zone'
            AND owner_id = (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1)
          ORDER BY id DESC
          LIMIT 1
        ),
        (
          SELECT nc.id
          FROM node_channels nc
          JOIN nodes n ON n.id = nc.node_id
          WHERE n.uid = :node_uid
            AND nc.channel = 'pump_main'
          ORDER BY nc.id DESC
          LIMIT 1
        ),
        'actuator',
        'irrigation_pump',
        NOW(),
        NOW()
      )
    params:
      zone_uid: ${zone_uid}
      node_uid: ${node_uid}

  - step: load_fixture_ids
    type: database_query
    query: |
      SELECT
        (SELECT id FROM greenhouses WHERE uid = :greenhouse_uid LIMIT 1) AS greenhouse_id,
        (SELECT id FROM zones WHERE uid = :zone_uid LIMIT 1) AS zone_id,
        (SELECT id FROM recipes WHERE name = :recipe_name LIMIT 1) AS recipe_id,
        (
          SELECT rr.id
          FROM recipe_revisions rr
          JOIN recipes r ON r.id = rr.recipe_id
          WHERE r.name = :recipe_name
          ORDER BY rr.id DESC
          LIMIT 1
        ) AS recipe_revision_id
    params:
      greenhouse_uid: ${greenhouse_uid}
      zone_uid: ${zone_uid}
      recipe_name: ${recipe_name}
    expected_rows: 1
    save: fixture_ids

  - step: set_fixture_ids
    type: set
    greenhouse_id: ${fixture_ids.0.greenhouse_id}
    zone_id: ${fixture_ids.0.zone_id}
    recipe_id: ${fixture_ids.0.recipe_id}
    recipe_revision_id: ${fixture_ids.0.recipe_revision_id}

  - step: insert_first_scheduler_like_intent
    type: database_execute
    query: |
      INSERT INTO zone_automation_intents (
        zone_id,
        intent_type,
        payload,
        idempotency_key,
        status,
        not_before,
        retry_count,
        max_retries,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'IRRIGATE_ONCE',
        jsonb_build_object(
          'source', CAST(:source AS text),
          'task_type', 'diagnostics',
          'workflow', 'cycle_start',
          'topology', 'two_tank_drip_substrate_trays'
        ),
        :idempotency_key,
        'pending',
        NOW() - INTERVAL '1 second',
        0,
        3,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}
      idempotency_key: ${first_idempotency_key}
      source: ${scheduler_source}

  - step: first_start_cycle_http
    type: http_request
    method: POST
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
    headers:
      Accept: application/json
      Content-Type: application/json
      X-Trace-Id: ${first_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    body:
      source: ${scheduler_source}
      idempotency_key: ${first_idempotency_key}
    retries: 2
    retry_delay_seconds: 1
    capture_response: first_start_cycle_response

  - step: set_task_id
    type: set
    task_id: ${first_start_cycle_response.json.data.task_id}

  - step: wait_first_ae_command_published
    type: db.wait
    query: |
      SELECT id, external_id, publish_status
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND publish_status = 'accepted'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: first_ae_command_row

  - step: set_legacy_command_id
    type: set
    legacy_command_id: ${first_ae_command_row.0.external_id}

  - step: wait_first_task_waiting_command
    type: db.wait
    query: |
      SELECT id, status, claimed_by
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'waiting_command'
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: waiting_task_row

  - step: insert_second_scheduler_like_intent
    type: database_execute
    query: |
      INSERT INTO zone_automation_intents (
        zone_id,
        intent_type,
        payload,
        idempotency_key,
        status,
        not_before,
        retry_count,
        max_retries,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'IRRIGATE_ONCE',
        jsonb_build_object(
          'source', CAST(:source AS text),
          'task_type', 'diagnostics',
          'workflow', 'cycle_start',
          'topology', 'two_tank_drip_substrate_trays'
        ),
        :idempotency_key,
        'pending',
        NOW() - INTERVAL '1 second',
        0,
        3,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}
      idempotency_key: ${second_idempotency_key}
      source: ${scheduler_source}

  - step: second_start_cycle_http
    type: http_request
    method: POST
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
    headers:
      Accept: application/json
      Content-Type: application/json
      X-Trace-Id: ${second_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    body:
      source: ${scheduler_source}
      idempotency_key: ${second_idempotency_key}
    retries: 2
    retry_delay_seconds: 1
    capture_response: second_start_cycle_response

  - step: wait_second_intent_failed
    type: db.wait
    query: |
      SELECT id, status, error_code, error_message
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
        AND status = 'failed'
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      idempotency_key: ${second_idempotency_key}
    timeout: 60.0
    expected_rows: 1
    save: second_failed_intent_row

  - step: count_zone_tasks
    type: database_query
    query: |
      SELECT COUNT(*)::int AS task_count
      FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: zone_task_count_row

  - step: count_active_zone_tasks
    type: database_query
    query: |
      SELECT COUNT(*)::int AS active_task_count
      FROM ae_tasks
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: active_zone_task_count_row

  - step: count_zone_commands
    type: database_query
    query: |
      SELECT COUNT(*)::int AS command_count
      FROM ae_commands
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id)
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: zone_command_count_row

  - step: count_active_zone_leases
    type: database_query
    query: |
      SELECT COUNT(*)::int AS lease_count
      FROM ae_zone_leases
      WHERE zone_id = :zone_id
        AND leased_until > NOW()
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    save: zone_lease_count_row

  - step: mark_first_legacy_command_done
    type: database_execute
    query: |
      UPDATE commands
      SET status = 'DONE',
          ack_at = COALESCE(ack_at, NOW()),
          sent_at = COALESCE(sent_at, NOW()),
          failed_at = NULL,
          error_message = NULL,
          updated_at = NOW()
      WHERE id = CAST(:legacy_command_id AS bigint)
    params:
      legacy_command_id: ${legacy_command_id}

  - step: wait_task_completed
    type: db.wait
    query: |
      SELECT id, status, completed_at
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'completed'
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 60.0
    expected_rows: 1
    save: completed_task_row

  - step: wait_first_intent_completed
    type: db.wait
    query: |
      SELECT id, status, completed_at
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
        AND status = 'completed'
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      idempotency_key: ${first_idempotency_key}
    timeout: 60.0
    expected_rows: 1
    save: first_completed_intent_row

  - step: get_internal_task_status
    type: http_request
    method: GET
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/internal/tasks/${task_id}
    headers:
      Accept: application/json
      X-Trace-Id: ${first_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    capture_response: internal_task_response

assertions:
  - name: first_start_cycle_http_200
    type: custom_assert
    condition: "int(context.get('first_start_cycle_response', {}).get('status_code', 0)) == 200"

  - name: first_task_is_waiting_command
    type: custom_assert
    condition: "str(context.get('waiting_task_row', [{}])[0].get('status', '')).lower() == 'waiting_command'"

  - name: second_start_cycle_http_409
    type: custom_assert
    condition: "int(context.get('second_start_cycle_response', {}).get('status_code', 0)) == 409"

  - name: second_start_cycle_busy_error
    type: json_assertion
    source: second_start_cycle_response
    path: json
    expected:
      - field: detail.error
        operator: equals
        value: start_cycle_zone_busy

  - name: second_intent_failed_fail_closed
    type: custom_assert
    condition: "str(context.get('second_failed_intent_row', [{}])[0].get('status', '')).lower() == 'failed' and str(context.get('second_failed_intent_row', [{}])[0].get('error_code', '')).lower() == 'start_cycle_zone_busy'"

  - name: only_one_task_created_for_zone
    type: custom_assert
    condition: "int(context.get('zone_task_count_row', [{}])[0].get('task_count', 0)) == 1"

  - name: only_one_active_task_during_busy_window
    type: custom_assert
    condition: "int(context.get('active_zone_task_count_row', [{}])[0].get('active_task_count', 0)) == 1"

  - name: only_one_command_published_for_zone
    type: custom_assert
    condition: "int(context.get('zone_command_count_row', [{}])[0].get('command_count', 0)) == 1"

  - name: single_writer_lease_only_once
    type: custom_assert
    condition: "int(context.get('zone_lease_count_row', [{}])[0].get('lease_count', 0)) == 1"

  - name: first_task_completed_normally
    type: custom_assert
    condition: "str(context.get('completed_task_row', [{}])[0].get('status', '')).lower() == 'completed'"

  - name: first_intent_completed_normally
    type: custom_assert
    condition: "str(context.get('first_completed_intent_row', [{}])[0].get('status', '')).lower() == 'completed'"

  - name: internal_task_completed
    type: json_assertion
    source: internal_task_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.task_id
        operator: equals
        value: ${task_id}
      - field: data.status
        operator: equals
        value: completed

cleanup:
  - step: cleanup_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM commands
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id)
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_leases
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_ae_tasks
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_intents
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_channel_bindings
    type: database_execute
    optional: true
    query: |
      DELETE FROM channel_bindings
      WHERE infrastructure_instance_id IN (
        SELECT id
        FROM infrastructure_instances
        WHERE owner_type = 'zone'
          AND owner_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_infrastructure_instances
    type: database_execute
    optional: true
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_node_channels
    type: database_execute
    optional: true
    query: |
      DELETE FROM node_channels
      WHERE node_id IN (
        SELECT id
        FROM nodes
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_nodes
    type: database_execute
    optional: true
    query: |
      DELETE FROM nodes
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_profiles
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_logic_profiles
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_overrides
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_overrides
      WHERE grow_cycle_id IN (
        SELECT id
        FROM grow_cycles
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_phases
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_phases
      WHERE grow_cycle_id IN (
        SELECT id
        FROM grow_cycles
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_grow_cycles
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycles
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_workflow_state
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

