# E108: soil-moisture telemetry contract for smart irrigation
name: E108_ae3_soil_moisture_telemetry_contract
auth_role: admin
description: |
  Проверяет канонический soil-moisture ingest для smart irrigation:
  - сервисный `set_fault_mode` доходит до `history-logger`;
  - привязанная soil-нода публикует telemetry через MQTT/history-logger;
  - `history-logger` сам создает `SOIL_MOISTURE` sensor и пишет `telemetry_last`.

actions:
  - step: set_context
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_soil_node_uid: ${TEST_SOIL_NODE_UID}

  - step: load_zone
    type: database_query
    query: |
      SELECT id AS zone_id, greenhouse_id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_row

  - step: set_zone_context
    type: set
    zone_id: ${zone_row.0.zone_id}
    greenhouse_id: ${zone_row.0.greenhouse_id}

  - step: load_soil_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_soil_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: soil_node_row

  - step: set_soil_node_id
    type: set
    soil_node_id: ${soil_node_row.0.node_id}

  - step: cleanup_old_soil_telemetry_samples
    type: database_execute
    query: |
      DELETE FROM telemetry_samples
      WHERE sensor_id IN (
        SELECT id
        FROM sensors
        WHERE zone_id = :zone_id
          AND node_id = CAST(:node_id AS bigint)
          AND type = 'SOIL_MOISTURE'
          AND label = 'soil_moisture'
      )
    params:
      node_id: ${soil_node_id}
      zone_id: ${zone_id}

  - step: cleanup_old_soil_telemetry_last
    type: database_execute
    query: |
      DELETE FROM telemetry_last
      WHERE sensor_id IN (
        SELECT id
        FROM sensors
        WHERE zone_id = :zone_id
          AND node_id = CAST(:node_id AS bigint)
          AND type = 'SOIL_MOISTURE'
          AND label = 'soil_moisture'
      )
    params:
      node_id: ${soil_node_id}
      zone_id: ${zone_id}

  - step: set_soil_level
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_soil_node_uid}
    params:
      soil_moisture_pct: 52.0
    save: soil_command_response

  - step: wait_soil_command_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${soil_command_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: wait_soil_telemetry
    type: db.wait
    query: |
      SELECT
        s.id AS sensor_id,
        tl.last_value,
        COALESCE(tl.last_ts, tl.updated_at) AS sample_ts
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.zone_id = :zone_id
        AND s.type = 'SOIL_MOISTURE'
        AND s.label = 'soil_moisture'
        AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
        AND COALESCE(tl.last_value, 0) BETWEEN 50.0 AND 54.0
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 30.0
    expected_rows: 1
    save: soil_telemetry_row

assertions:
  - name: soil_node_telemetry_written
    type: database_query
    query: |
      SELECT
        s.label,
        s.type,
        ROUND(COALESCE(tl.last_value, 0)::numeric, 1) AS last_value
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.id = CAST(:sensor_id AS bigint)
    params:
      sensor_id: ${soil_telemetry_row.0.sensor_id}
    expected_rows: 1
    expected:
      - field: label
        operator: equals
        value: soil_moisture
      - field: type
        operator: equals
        value: SOIL_MOISTURE
