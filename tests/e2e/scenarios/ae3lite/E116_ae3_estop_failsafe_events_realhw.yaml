# E116: E-STOP failsafe events на realhw test_node
# Короткий сценарий: estop_pressed → EMERGENCY_STOP_ACTIVATED (не solution_low / E113).
# Запуск:
#   ./tests/e2e/run_automation_engine_real_hardware.sh \
#     scenarios/ae3lite/E116_ae3_estop_failsafe_events_realhw.yaml
# DoD:
# - hardware_reset_state + force workflow ready
# - set_fault_mode estop_pressed: true → zone_events EMERGENCY_STOP_ACTIVATED
# - clear estop_pressed: false + hardware_reset_state в cleanup (без suite pollution)
# Compatible-With: Protocol 2.0, Backend >=3.0, Python >=3.0, Database >=3.0, Frontend >=3.0

name: E116_ae3_estop_failsafe_events_realhw
auth_role: admin
description: |
  Real-hardware smoke для виртуального E-Stop на test_node:
  1) cleanup AE + force workflow_phase=ready,
  2) hardware_reset_state,
  3) hardware_set_fault_mode estop_pressed: true на storage_state,
  4) wait zone_events EMERGENCY_STOP_ACTIVATED,
  5) clear estop + hardware reset в cleanup (required).
  Не дублирует E113 (solution_low в prepare_recirc).

tags:
  - realhw
  - ae3lite

actions:
  - step: set_test_context
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: ${TEST_NODE_UID}
    trace_id: e116-estop-${TIMESTAMP_MS}

  - step: capture_scenario_window
    type: database_query
    query: |
      SELECT NOW() AS started_at
    expected_rows: 1
    save: scenario_window

  - step: load_zone_context
    type: database_query
    query: |
      SELECT id AS zone_id, greenhouse_id, automation_runtime
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_ctx

  - step: set_zone_context
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}
    previous_automation_runtime: ${zone_ctx.0.automation_runtime}

  - step: resolve_irrig_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: irrig_node_row

  - step: set_irrig_node_id
    type: set
    irrig_node_id: ${irrig_node_row.0.node_id}

  - step: wait_zone_ae_runtime_idle_before_cleanup
    type: db.wait
    query: |
      SELECT 1 AS ready
      WHERE NOT EXISTS (
        SELECT 1
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running', 'waiting_command')
      )
        AND NOT EXISTS (
        SELECT 1
        FROM ae_zone_leases
        WHERE zone_id = :zone_id
      )
        AND NOT EXISTS (
        SELECT 1
        FROM zone_automation_intents
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running')
      )
    params:
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1

  - step: cleanup_zone_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id FROM ae_tasks WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_workflow_state
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: switch_zone_to_ae3
    type: database_execute
    query: |
      UPDATE zones
      SET automation_runtime = 'ae3',
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: reset_test_node_state
    type: hardware_reset_state
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    save: reset_state_response

  - step: wait_reset_state_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_state_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: upsert_workflow_ready
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES (:zone_id, 'ready', 1, NOW(), '{}'::jsonb)
      ON CONFLICT (zone_id) DO UPDATE
      SET workflow_phase = 'ready',
          version = GREATEST(zone_workflow_state.version, 1),
          updated_at = NOW(),
          payload = '{}'::jsonb
    params:
      zone_id: ${zone_id}

  - step: wait_workflow_ready
    type: db.wait
    query: |
      SELECT zone_id, workflow_phase
      FROM zone_workflow_state
      WHERE zone_id = :zone_id
        AND workflow_phase = 'ready'
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 10.0
    expected_rows: 1

  - step: press_estop
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      estop_pressed: true
    save: estop_press_response

  - step: wait_estop_press_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${estop_press_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_emergency_stop_activated_event
    type: db.wait
    query: |
      SELECT id, type, created_at
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'EMERGENCY_STOP_ACTIVATED'
        AND created_at >= CAST(:started_at AS timestamptz)
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}
    timeout: 45.0
    expected_rows: 1
    save: estop_event_row

  - step: assert_irrig_actuators_off_optional
    type: database_query
    optional: true
    query: |
      SELECT
        COALESCE((payload_json->'snapshot'->>'pump_main')::boolean, true) AS pump_main,
        COALESCE((payload_json->'snapshot'->>'valve_irrigation')::boolean, true) AS valve_irrigation,
        COALESCE((payload_json->'snapshot'->>'valve_solution_supply')::boolean, true) AS valve_solution_supply,
        COALESCE((payload_json->'snapshot'->>'valve_drain')::boolean, true) AS valve_drain
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'EMERGENCY_STOP_ACTIVATED'
        AND created_at >= CAST(:started_at AS timestamptz)
        AND COALESCE((payload_json->'snapshot'->>'pump_main')::boolean, true) = false
        AND COALESCE((payload_json->'snapshot'->>'valve_irrigation')::boolean, true) = false
        AND COALESCE((payload_json->'snapshot'->>'valve_solution_supply')::boolean, true) = false
        AND COALESCE((payload_json->'snapshot'->>'valve_drain')::boolean, true) = false
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}
    expected_rows: 1
    save: estop_actuators_row

  - step: clear_estop
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      estop_pressed: false
    save: estop_clear_response

  - step: wait_clear_estop_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${estop_clear_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

assertions:
  - name: emergency_stop_event_persisted
    type: custom_assert
    condition: "str((context.get('estop_event_row') or [{}])[0].get('type', '')) == 'EMERGENCY_STOP_ACTIVATED'"

  - name: emergency_stop_event_in_db
    type: database_query
    query: |
      SELECT type
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'EMERGENCY_STOP_ACTIVATED'
        AND created_at >= CAST(:started_at AS timestamptz)
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}
    expected_rows: 1
    expected:
      - field: type
        operator: equals
        value: EMERGENCY_STOP_ACTIVATED

cleanup:
  - step: clear_estop_after_run
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      estop_pressed: false
    save: cleanup_estop_clear_response

  - step: wait_clear_estop_after_run_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${cleanup_estop_clear_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: reset_test_node_state_after_run
    type: hardware_reset_state
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    save: cleanup_reset_state_response

  - step: wait_cleanup_reset_state_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${cleanup_reset_state_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: cancel_zone_active_ae_tasks
    type: database_execute
    query: |
      UPDATE ae_tasks
      SET status = 'cancelled',
          completed_at = COALESCE(completed_at, NOW()),
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
    params:
      zone_id: ${zone_id}

  - step: delete_zone_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: delete_zone_ae_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id)
    params:
      zone_id: ${zone_id}

  - step: delete_zone_ae_tasks
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: delete_zone_intents
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: soft_restore_workflow_idle
    type: database_execute
    optional: true
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES (:zone_id, 'idle', 1, NOW(), '{}'::jsonb)
      ON CONFLICT (zone_id) DO UPDATE
      SET workflow_phase = 'idle',
          version = zone_workflow_state.version + 1,
          updated_at = NOW(),
          payload = '{}'::jsonb
    params:
      zone_id: ${zone_id}

  - step: restore_zone_runtime
    type: database_execute
    optional: true
    query: |
      UPDATE zones
      SET automation_runtime = COALESCE(NULLIF(:previous_runtime, ''), automation_runtime),
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}
      previous_runtime: ${previous_automation_runtime}
