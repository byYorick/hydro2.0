name: E102_ae3_recirculation_retry_limit_alert_reset_realhw
description: 'Real-hardware AE3 recirculation retry-limit flow: after 3 unsuccessful
  recirculation timeout windows task stops with alert; after alert resolve the
  next cycle gets a fresh set of 3 timeout windows.'
actions:
- step: set_test_context
  type: set
  fixture_prefix: ae3-realhw-setup-${TIMESTAMP_MS}
  test_zone_uid: ${TEST_NODE_ZONE_UID}
  test_node_uid: ${TEST_NODE_UID}
  test_ph_node_uid: ${TEST_PH_NODE_UID}
  test_ec_node_uid: ${TEST_EC_NODE_UID}
  recipe_name: ae3-realhw-setup-recipe-${TIMESTAMP_MS}
  idempotency_key: ae3-realhw-setup-start-cycle-${TIMESTAMP_MS}
  scheduler_source: laravel_scheduler
  scheduler_trace_id: ae3-realhw-setup-trace-${TIMESTAMP_MS}
  description: retry-limit realhw context
  idempotency_key_2: ae3-realhw-retry-limit-start-cycle-2-${TIMESTAMP_MS}
  scheduler_trace_id_2: ae3-realhw-retry-limit-trace-2-${TIMESTAMP_MS}
  impossible_ph_target: '3.00'
  impossible_ph_min: '2.90'
  impossible_ph_max: '3.10'
  impossible_ec_target: '5.50'
  impossible_ec_min: '5.40'
  impossible_ec_max: '5.60'
  normal_ph_target: '5.05'
  normal_ph_min: '4.80'
  normal_ph_max: '5.25'
  normal_ec_target: '2.20'
  normal_ec_min: '2.00'
  normal_ec_max: '2.50'
- step: capture_scenario_window
  type: database_query
  query: 'SELECT NOW() AS started_at

    '
  expected_rows: 1
  save: scenario_window
- step: load_zone_context
  type: database_query
  query: 'SELECT id AS zone_id, greenhouse_id, automation_runtime

    FROM zones

    WHERE uid = :zone_uid

    LIMIT 1

    '
  params:
    zone_uid: ${test_zone_uid}
  expected_rows: 1
  save: zone_ctx
- step: set_zone_context
  type: set
  zone_id: ${zone_ctx.0.zone_id}
  greenhouse_id: ${zone_ctx.0.greenhouse_id}
  previous_automation_runtime: ${zone_ctx.0.automation_runtime}
- step: load_irrig_node
  type: database_query
  query: "SELECT id AS node_id\nFROM nodes\nWHERE uid = :node_uid\n  AND zone_id =\
    \ :zone_id\nLIMIT 1\n"
  params:
    node_uid: ${test_node_uid}
    zone_id: ${zone_id}
  expected_rows: 1
  save: irrig_node_row
- step: load_ph_node
  type: database_query
  query: "SELECT n.id AS node_id, n.uid AS node_uid\nFROM nodes n\nWHERE n.zone_id\
    \ = :zone_id\n  AND LOWER(COALESCE(n.type, '')) = 'ph'\n  AND EXISTS (\n    SELECT\
    \ 1\n    FROM node_channels nc\n    WHERE nc.node_id = n.id\n      AND nc.channel\
    \ IN ('pump_acid', 'pump_base')\n  )\nORDER BY CASE WHEN n.uid = :node_uid THEN\
    \ 0 ELSE 1 END, n.id ASC\nLIMIT 1\n"
  params:
    node_uid: ${test_ph_node_uid}
    zone_id: ${zone_id}
  expected_rows: 1
  save: ph_node_row
- step: load_ec_node
  type: database_query
  query: "SELECT n.id AS node_id, n.uid AS node_uid\nFROM nodes n\nWHERE n.zone_id\
    \ = :zone_id\n  AND LOWER(COALESCE(n.type, '')) = 'ec'\n  AND EXISTS (\n    SELECT\
    \ 1\n    FROM node_channels nc\n    WHERE nc.node_id = n.id\n      AND nc.channel\
    \ = 'pump_a'\n  )\nORDER BY CASE WHEN n.uid = :node_uid THEN 0 ELSE 1 END, n.id\
    \ ASC\nLIMIT 1\n"
  params:
    node_uid: ${test_ec_node_uid}
    zone_id: ${zone_id}
  expected_rows: 1
  save: ec_node_row
- step: set_node_ids
  type: set
  irrig_node_id: ${irrig_node_row.0.node_id}
  ph_node_id: ${ph_node_row.0.node_id}
  ec_node_id: ${ec_node_row.0.node_id}
  resolved_ph_node_uid: ${ph_node_row.0.node_uid}
  resolved_ec_node_uid: ${ec_node_row.0.node_uid}
- step: publish_irrig_node_config
  type: api_post
  endpoint: /api/nodes/${irrig_node_id}/config/publish
  payload: {}
- step: publish_ph_node_config
  type: api_post
  endpoint: /api/nodes/${ph_node_id}/config/publish
  payload: {}
- step: publish_ec_node_config
  type: api_post
  endpoint: /api/nodes/${ec_node_id}/config/publish
  payload: {}
- step: wait_irrigation_level_sensors_registered
  type: db.wait
  query: |
    SELECT COUNT(*)::int AS sensor_count
    FROM sensors
    WHERE zone_id = :zone_id
      AND node_id = CAST(:irrig_node_id AS bigint)
      AND type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
      AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    HAVING COUNT(*) = 4
  params:
    zone_id: ${zone_id}
    irrig_node_id: ${irrig_node_id}
  timeout: 60.0
  expected_rows: 1
- step: load_ec_pump_channel
  type: database_query
  query: "SELECT id AS node_channel_id\nFROM node_channels\nWHERE node_id = :node_id\n\
    \  AND channel = 'pump_a'\nLIMIT 1\n"
  params:
    node_id: ${ec_node_id}
  expected_rows: 1
  save: ec_pump_channel_row
- step: load_ph_up_channel
  type: database_query
  query: "SELECT id AS node_channel_id\nFROM node_channels\nWHERE node_id = :node_id\n\
    \  AND channel = 'pump_base'\nLIMIT 1\n"
  params:
    node_id: ${ph_node_id}
  expected_rows: 1
  save: ph_up_channel_row
- step: load_ph_down_channel
  type: database_query
  query: "SELECT id AS node_channel_id\nFROM node_channels\nWHERE node_id = :node_id\n\
    \  AND channel = 'pump_acid'\nLIMIT 1\n"
  params:
    node_id: ${ph_node_id}
  expected_rows: 1
  save: ph_down_channel_row
- step: set_correction_channel_ids
  type: set
  ec_pump_channel_id: ${ec_pump_channel_row.0.node_channel_id}
  ph_up_channel_id: ${ph_up_channel_row.0.node_channel_id}
  ph_down_channel_id: ${ph_down_channel_row.0.node_channel_id}
- step: wait_zone_ae_runtime_idle_before_cleanup
  type: db.wait
  query: |
    SELECT 1 AS ready
    WHERE NOT EXISTS (
      SELECT 1
      FROM ae_tasks
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
    )
      AND NOT EXISTS (
      SELECT 1
      FROM ae_zone_leases
      WHERE zone_id = :zone_id
    )
      AND NOT EXISTS (
      SELECT 1
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running')
    )
  params:
    zone_id: ${zone_id}
  timeout: 120.0
  expected_rows: 1
- step: cleanup_zone_ae_commands
  type: database_execute
  query: "DELETE FROM ae_commands\nWHERE task_id IN (\n  SELECT id\n  FROM ae_tasks\n\
    \  WHERE zone_id = :zone_id\n)\n"
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_ae_tasks
  type: database_execute
  query: 'DELETE FROM ae_tasks

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_ae_leases
  type: database_execute
  query: 'DELETE FROM ae_zone_leases

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_workflow_state
  type: database_execute
  query: 'DELETE FROM zone_workflow_state

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_pid_state
  type: database_execute
  query: 'DELETE FROM pid_state

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_runtime_intents
  type: database_execute
  query: 'DELETE FROM zone_automation_intents

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_retry_limit_alerts
  type: database_execute
  query: "\nDELETE FROM alerts\nWHERE zone_id = :zone_id\n  AND code = 'biz_prepare_recirculation_retry_exhausted'\n"
  params:
    zone_id: ${zone_id}
- step: complete_existing_cycles
  type: database_execute
  query: "UPDATE grow_cycles\nSET status = 'COMPLETED',\n    updated_at = NOW()\n\
    WHERE zone_id = :zone_id\n  AND status IN ('PLANNED', 'RUNNING', 'PAUSED')\n"
  params:
    zone_id: ${zone_id}
- step: switch_zone_to_ae3
  type: database_execute
  query: "UPDATE zones\nSET automation_runtime = 'ae3',\n    updated_at = NOW()\n\
    WHERE id = :zone_id\n"
  params:
    zone_id: ${zone_id}
- step: load_test_node_correction_preset
  type: database_query
  query: "SELECT id\nFROM zone_correction_presets\nWHERE slug = 'test-node'\nLIMIT 1\n"
  expected_rows: 1
  save: test_node_correction_preset_row
- step: apply_test_node_correction_preset
  type: api_put
  endpoint: /api/automation-configs/zone/${zone_id}/zone.correction
  payload:
    payload:
      preset_id: ${test_node_correction_preset_row.0.id}
      base_config: {}
      phase_overrides:
        solution_fill:
          runtime:
            required_node_type: irrig
            clean_fill_timeout_sec: 600
            solution_fill_timeout_sec: 900
            clean_fill_retry_cycles: 1
            level_switch_on_threshold: 0.5
            clean_max_sensor_label: level_clean_max
            clean_min_sensor_label: level_clean_min
            solution_max_sensor_label: level_solution_max
            solution_min_sensor_label: level_solution_min
          retry:
            max_ec_correction_attempts: 3
            max_ph_correction_attempts: 3
            prepare_recirculation_timeout_sec: 120
            prepare_recirculation_max_attempts: 3
            prepare_recirculation_max_correction_attempts: 20
            telemetry_stale_retry_sec: 30
            decision_window_retry_sec: 10
            low_water_retry_sec: 60
          controllers:
            ec:
              mode: supervisory_allocator
              kp: 12.0
              ki: 0.12
              kd: 0.0
              derivative_filter_alpha: 0.35
              deadband: 0.08
              max_dose_ml: 20.0
              max_integral: 24.0
              min_interval_sec: 20
              anti_windup:
                enabled: true
              overshoot_guard:
                enabled: true
                hard_min: 0.0
                hard_max: 4.0
              no_effect:
                enabled: true
                max_count: 2
              observe:
                telemetry_period_sec: 2
                window_min_samples: 3
                decision_window_sec: 8
                observe_poll_sec: 2
                min_effect_fraction: 0.15
                stability_max_slope: 0.08
                no_effect_consecutive_limit: 4
            ph:
              mode: cross_coupled_pi_d
              kp: 4.0
              ki: 0.04
              kd: 0.0
              derivative_filter_alpha: 0.35
              deadband: 0.05
              max_dose_ml: 10.0
              max_integral: 10.0
              min_interval_sec: 20
              anti_windup:
                enabled: true
              overshoot_guard:
                enabled: true
                hard_min: 4.0
                hard_max: 8.5
              no_effect:
                enabled: true
                max_count: 2
              observe:
                telemetry_period_sec: 2
                window_min_samples: 3
                decision_window_sec: 8
                observe_poll_sec: 2
                min_effect_fraction: 0.15
                stability_max_slope: 0.04
                no_effect_consecutive_limit: 4
          dosing:
            solution_volume_l: 20.0
            dose_ec_channel: dose_ec_a
            dose_ph_up_channel: dose_ph_up
            dose_ph_down_channel: dose_ph_down
            max_ec_dose_ml: 20.0
            max_ph_dose_ml: 10.0
          timing:
            sensor_mode_stabilization_time_sec: 20
            stabilization_sec: 10
            telemetry_max_age_sec: 180
            irr_state_max_age_sec: 15
            level_poll_interval_sec: 20
          tolerance:
            prepare_tolerance:
              ph_pct: 10.0
              ec_pct: 16.0
          safety:
            safe_mode_on_no_effect: true
            block_on_active_no_effect_alert: true
        tank_recirc:
          runtime:
            required_node_type: irrig
            clean_fill_timeout_sec: 600
            solution_fill_timeout_sec: 900
            clean_fill_retry_cycles: 1
            level_switch_on_threshold: 0.5
            clean_max_sensor_label: level_clean_max
            clean_min_sensor_label: level_clean_min
            solution_max_sensor_label: level_solution_max
            solution_min_sensor_label: level_solution_min
          retry:
            max_ec_correction_attempts: 1
            max_ph_correction_attempts: 1
            prepare_recirculation_timeout_sec: 45
            # Без нуля AE добавляет +900s к окну (workflow_router) — коррекция успевает достичь таргетов; retry-limit не срабатывает.
            prepare_recirculation_correction_slack_sec: 0
            prepare_recirculation_max_attempts: 3
            prepare_recirculation_max_correction_attempts: 20
            telemetry_stale_retry_sec: 30
            decision_window_retry_sec: 10
            low_water_retry_sec: 60
          controllers:
            ec:
              mode: supervisory_allocator
              kp: 18.0
              ki: 0.18
              kd: 0.0
              derivative_filter_alpha: 0.35
              deadband: 0.05
              max_dose_ml: 30.0
              max_integral: 48.0
              min_interval_sec: 15
              anti_windup:
                enabled: true
              overshoot_guard:
                enabled: true
                hard_min: 0.0
                hard_max: 4.0
              no_effect:
                enabled: true
                max_count: 2
              observe:
                telemetry_period_sec: 2
                window_min_samples: 3
                decision_window_sec: 8
                observe_poll_sec: 2
                min_effect_fraction: 0.15
                stability_max_slope: 0.08
                no_effect_consecutive_limit: 4
            ph:
              mode: cross_coupled_pi_d
              kp: 6.0
              ki: 0.06
              kd: 0.0
              derivative_filter_alpha: 0.35
              deadband: 0.04
              max_dose_ml: 16.0
              max_integral: 16.0
              min_interval_sec: 15
              anti_windup:
                enabled: true
              overshoot_guard:
                enabled: true
                hard_min: 4.0
                hard_max: 8.5
              no_effect:
                enabled: true
                max_count: 2
              observe:
                telemetry_period_sec: 2
                window_min_samples: 3
                decision_window_sec: 8
                observe_poll_sec: 2
                min_effect_fraction: 0.15
                stability_max_slope: 0.04
                no_effect_consecutive_limit: 4
          dosing:
            solution_volume_l: 20.0
            dose_ec_channel: dose_ec_a
            dose_ph_up_channel: dose_ph_up
            dose_ph_down_channel: dose_ph_down
            max_ec_dose_ml: 30.0
            max_ph_dose_ml: 16.0
          timing:
            sensor_mode_stabilization_time_sec: 20
            stabilization_sec: 10
            telemetry_max_age_sec: 180
            irr_state_max_age_sec: 15
            level_poll_interval_sec: 20
          tolerance:
            prepare_tolerance:
              ph_pct: 9.0
              ec_pct: 15.0
          safety:
            safe_mode_on_no_effect: true
            block_on_active_no_effect_alert: true
  save: correction_config_update_response
- step: cleanup_existing_correction_bindings
  type: database_execute
  query: "DELETE FROM channel_bindings\nWHERE role IN ('dose_ec_a', 'dose_ph_up',\
    \ 'dose_ph_down')\n  AND node_channel_id IN (\n    SELECT nc.id\n    FROM node_channels\
    \ nc\n    JOIN nodes n ON n.id = nc.node_id\n    WHERE n.zone_id = :zone_id\n\
    \  )\n"
  params:
    zone_id: ${zone_id}
- step: cleanup_existing_correction_infra
  type: database_execute
  query: "DELETE FROM infrastructure_instances\nWHERE owner_type = 'zone'\n  AND owner_id\
    \ = :zone_id\n  AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH\
    \ Down')\n"
  params:
    zone_id: ${zone_id}
- step: cleanup_existing_e2e_calibrations
  type: database_execute
  query: "DELETE FROM pump_calibrations\nWHERE source = 'e2e_realhw_setup_ready'\n\
    \  AND node_channel_id IN (\n    CAST(:ec_pump_channel_id AS bigint),\n    CAST(:ph_up_channel_id\
    \ AS bigint),\n    CAST(:ph_down_channel_id AS bigint)\n  )\n"
  params:
    ec_pump_channel_id: ${ec_pump_channel_id}
    ph_up_channel_id: ${ph_up_channel_id}
    ph_down_channel_id: ${ph_down_channel_id}
- step: insert_correction_infrastructure
  type: database_execute
  query: "INSERT INTO infrastructure_instances (\n  owner_type,\n  owner_id,\n  asset_type,\n\
    \  label,\n  required,\n  created_at,\n  updated_at\n)\nVALUES\n  ('zone', :zone_id,\
    \ 'PUMP', 'AE3 E2E EC Dose', TRUE, NOW(), NOW()),\n  ('zone', :zone_id, 'PUMP',\
    \ 'AE3 E2E PH Up', TRUE, NOW(), NOW()),\n  ('zone', :zone_id, 'PUMP', 'AE3 E2E\
    \ PH Down', TRUE, NOW(), NOW())\n"
  params:
    zone_id: ${zone_id}
- step: insert_correction_bindings
  type: database_execute
  query: "INSERT INTO channel_bindings (\n  infrastructure_instance_id,\n  node_channel_id,\n\
    \  direction,\n  role,\n  created_at,\n  updated_at\n)\nSELECT ii.id, mapping.node_channel_id,\
    \ 'actuator', mapping.role, NOW(), NOW()\nFROM (\n  VALUES\n    ('AE3 E2E EC Dose',\
    \ CAST(:ec_pump_channel_id AS bigint), 'dose_ec_a'),\n    ('AE3 E2E PH Up', CAST(:ph_up_channel_id\
    \ AS bigint), 'dose_ph_up'),\n    ('AE3 E2E PH Down', CAST(:ph_down_channel_id\
    \ AS bigint), 'dose_ph_down')\n) AS mapping(label, node_channel_id, role)\nJOIN\
    \ infrastructure_instances ii\n  ON ii.owner_type = 'zone'\n AND ii.owner_id =\
    \ :zone_id\n AND ii.label = mapping.label\n"
  params:
    zone_id: ${zone_id}
    ec_pump_channel_id: ${ec_pump_channel_id}
    ph_up_channel_id: ${ph_up_channel_id}
    ph_down_channel_id: ${ph_down_channel_id}
- step: insert_correction_calibrations
  type: database_execute
  query: "INSERT INTO pump_calibrations (\n  node_channel_id,\n  ml_per_sec,\n  k_ms_per_ml_l,\n\
    \  source,\n  quality_score,\n  sample_count,\n  valid_from,\n  is_active,\n \
    \ created_at,\n  updated_at\n)\nVALUES\n  (CAST(:ec_pump_channel_id AS bigint),\
    \ 2.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE,\
    \ NOW(), NOW()),\n  (CAST(:ph_up_channel_id AS bigint), 1.0, 1.0, 'e2e_realhw_setup_ready',\
    \ 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),\n  (CAST(:ph_down_channel_id\
    \ AS bigint), 1.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1\
    \ minute', TRUE, NOW(), NOW())\n"
  params:
    ec_pump_channel_id: ${ec_pump_channel_id}
    ph_up_channel_id: ${ph_up_channel_id}
    ph_down_channel_id: ${ph_down_channel_id}
- step: apply_solution_fill_process_calibration
  type: api_put
  endpoint: /api/automation-configs/zone/${zone_id}/zone.process_calibration.solution_fill
  payload:
    payload:
      mode: solution_fill
      ec_gain_per_ml: 0.0025
      ph_up_gain_per_ml: 0.0100
      ph_down_gain_per_ml: 0.0100
      ph_per_ec_ml: -0.0015
      ec_per_ph_ml: 0.0000
      transport_delay_sec: 4
      settle_sec: 4
      confidence: 0.90
      source: e2e_realhw_process_observe
      is_active: true
      meta:
        observe:
          telemetry_period_sec: 2
          window_min_samples: 3
          decision_window_sec: 6
          observe_poll_sec: 2
          min_effect_fraction: 0.20
          stability_max_slope: 0.08
          no_effect_consecutive_limit: 3
- step: apply_tank_recirc_process_calibration
  type: api_put
  endpoint: /api/automation-configs/zone/${zone_id}/zone.process_calibration.tank_recirc
  payload:
    payload:
      mode: tank_recirc
      ec_gain_per_ml: 0.0080
      ph_up_gain_per_ml: 0.0180
      ph_down_gain_per_ml: 0.0180
      ph_per_ec_ml: -0.0025
      ec_per_ph_ml: 0.0000
      transport_delay_sec: 4
      settle_sec: 4
      confidence: 0.95
      source: e2e_realhw_process_observe
      is_active: true
      meta:
        observe:
          telemetry_period_sec: 2
          window_min_samples: 3
          decision_window_sec: 6
          observe_poll_sec: 2
          min_effect_fraction: 0.20
          stability_max_slope: 0.08
          no_effect_consecutive_limit: 3
- step: apply_irrigation_process_calibration
  type: api_put
  endpoint: /api/automation-configs/zone/${zone_id}/zone.process_calibration.irrigation
  payload:
    payload:
      mode: irrigation
      ec_gain_per_ml: 0.0060
      ph_up_gain_per_ml: 0.0140
      ph_down_gain_per_ml: 0.0140
      ph_per_ec_ml: -0.0020
      ec_per_ph_ml: 0.0000
      transport_delay_sec: 6
      settle_sec: 4
      confidence: 0.85
      source: e2e_realhw_process_observe
      is_active: true
      meta:
        observe:
          telemetry_period_sec: 2
          window_min_samples: 3
          decision_window_sec: 6
          observe_poll_sec: 2
          min_effect_fraction: 0.20
          stability_max_slope: 0.08
          no_effect_consecutive_limit: 3
- step: apply_ae3_logic_profile
  type: api_put
  endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
  payload:
    payload:
      active_mode: working
      profiles:
        working:
          mode: working
          is_active: true
          subsystems:
            diagnostics:
              execution:
                workflow: cycle_start
                topology: two_tank_drip_substrate_trays
                required_node_types:
                  - irrig
                startup:
                  level_poll_interval_sec: 5
                  clean_fill_timeout_sec: 120
                  solution_fill_timeout_sec: 240
                  prepare_recirculation_timeout_sec: 45
                  telemetry_max_age_sec: 10
                  irr_state_max_age_sec: 30
                  sensor_mode_stabilization_time_sec: 0
                prepare_tolerance:
                  ph_pct: 5
                  ec_pct: 10
                correction:
                  dose_ec_channel: dose_ec_a
                  dose_ph_up_channel: dose_ph_up
                  dose_ph_down_channel: dose_ph_down
                  max_ec_dose_ml: 60.0
                  max_ph_dose_ml: 40.0
                  stabilization_sec: 0
                  max_ec_correction_attempts: 8
                  max_ph_correction_attempts: 8
                  solution_volume_l: 20.0
                two_tank_commands:
                  clean_fill_start:
                    - channel: valve_clean_fill
                      cmd: set_relay
                      params:
                        state: true
                  clean_fill_stop:
                    - channel: valve_clean_fill
                      cmd: set_relay
                      params:
                        state: false
                  solution_fill_start:
                    - channel: valve_clean_supply
                      cmd: set_relay
                      params:
                        state: true
                    - channel: valve_solution_fill
                      cmd: set_relay
                      params:
                        state: true
                    - channel: pump_main
                      cmd: set_relay
                      params:
                        state: true
                  solution_fill_stop:
                    - channel: pump_main
                      cmd: set_relay
                      params:
                        state: false
                    - channel: valve_solution_fill
                      cmd: set_relay
                      params:
                        state: false
                    - channel: valve_clean_supply
                      cmd: set_relay
                      params:
                        state: false
                  prepare_recirculation_start:
                    - channel: valve_solution_supply
                      cmd: set_relay
                      params:
                        state: true
                    - channel: valve_solution_fill
                      cmd: set_relay
                      params:
                        state: true
                    - channel: pump_main
                      cmd: set_relay
                      params:
                        state: true
                  prepare_recirculation_stop:
                    - channel: pump_main
                      cmd: set_relay
                      params:
                        state: false
                    - channel: valve_solution_fill
                      cmd: set_relay
                      params:
                        state: false
                    - channel: valve_solution_supply
                      cmd: set_relay
                      params:
                        state: false
