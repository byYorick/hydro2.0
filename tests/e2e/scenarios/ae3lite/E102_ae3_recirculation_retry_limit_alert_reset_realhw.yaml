    \    'level_solution_max'\n  )\n  AND s.type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')\n\
    \  AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '5 minutes'\n \
    \ AND COALESCE(tl.last_value, -1) <= 0.1\nHAVING COUNT(*) = 4\n"
  params:
