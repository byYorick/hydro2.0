- step: wait_force_clean_tank_full_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND\
    \ status = 'DONE'\nORDER BY created_at DESC\nLIMIT 1\n"
  params:
    cmd_id: ${force_clean_tank_full_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: wait_clean_tank_full_telemetry
  type: db.wait
  query: "SELECT COUNT(*)::int AS ready_cnt\nFROM sensors s\nJOIN telemetry_last tl\
    \ ON tl.sensor_id = s.id\nWHERE s.zone_id = :zone_id\n  AND s.label IN ('level_clean_min',\
    \ 'level_clean_max')\n  AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL\
    \ '30 seconds'\n  AND COALESCE(tl.last_value, 0) >= 1\nHAVING COUNT(*) = 2\n"
  params:
    zone_id: ${zone_id}
  timeout: 30.0
  expected_rows: 1
  save: clean_tank_full_row
- step: load_task_after_clean_override
  type: database_query
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step,\n\
    \  error_code,\n  error_message\nFROM ae_tasks\nWHERE id = CAST(:task_id AS bigint)\n\
    LIMIT 1\n"
  params:
    task_id: ${task_id}
  expected_rows: 1
  save: task_after_clean_override_row
- step: wait_solution_fill_stage
  type: db.wait
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step\n\
    FROM ae_tasks\nWHERE id = CAST(:task_id AS bigint)\n  AND status = 'pending'\n\
    \  AND current_stage = 'solution_fill_check'\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 40.0
  expected_rows: 1
  save: solution_fill_stage_row
- step: wait_solution_fill_commands
  type: db.wait
  query: "SELECT CAST(:task_id AS bigint) AS task_id\nFROM ae_commands\nWHERE task_id\
    \ = CAST(:task_id AS bigint)\nGROUP BY task_id\nHAVING COUNT(*) FILTER (\n  WHERE\
    \ publish_status = 'accepted'\n    AND channel = 'valve_clean_supply'\n    AND\
    \ payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status\
    \ = 'accepted'\n    AND channel = 'valve_solution_fill'\n    AND payload->>'cmd'\
    \ = 'set_relay'\n    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n\
    ) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND\
    \ channel = 'pump_main'\n    AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status\
    \ = 'accepted'\n    AND channel = 'system'\n    AND payload->>'cmd' = 'activate_sensor_mode'\n\
    ) >= 2\n"
  params:
    task_id: ${task_id}
  timeout: 40.0
  expected_rows: 1
- step: wait_ph_ec_telemetry_available
