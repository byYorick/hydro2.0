    \ = 2\n"
  params:
    ph_node_id: ${ph_node_id}
    ec_node_id: ${ec_node_id}
  timeout: 30.0
  expected_rows: 1
- step: force_solution_tank_full
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  history_logger_url: http://history-logger:9300
  command:
