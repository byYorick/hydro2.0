  url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
  headers:
    Accept: application/json
    Content-Type: application/json
    X-Trace-Id: ${scheduler_trace_id}
    X-Scheduler-Id: laravel-scheduler
    Authorization: Bearer dev-token-12345
  body:
    source: ${scheduler_source}
    idempotency_key: ${idempotency_key}
  retries: 2
  retry_delay_seconds: 1
  capture_response: start_cycle_response
- step: set_task_id
  type: set
  task_id: ${start_cycle_response.json.data.task_id}
- step: wait_ae_command_accepted
  type: db.wait
  query: "SELECT id, task_id, external_id, payload->>'cmd_id' AS cmd_id, publish_status\n\
    FROM ae_commands\nWHERE task_id = :task_id\n  AND publish_status = 'accepted'\n\
    ORDER BY id DESC\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 30.0
  expected_rows: 1
  save: ae_command_row
- step: wait_startup_commands_published
