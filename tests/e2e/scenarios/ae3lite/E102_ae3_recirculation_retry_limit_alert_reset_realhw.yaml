- step: insert_scheduler_like_intent
  type: database_execute
  query: "INSERT INTO zone_automation_intents (\n  zone_id,\n  intent_type,\n  payload,\n\
    \  idempotency_key,\n  status,\n  not_before,\n  retry_count,\n  max_retries,\n\
    \  created_at,\n  updated_at\n)\nVALUES (\n  :zone_id,\n  'start_cycle',\n \
    \ jsonb_build_object(\n    'source', CAST(:source AS text),\n    'task_type',\
    \ 'diagnostics',\n    'workflow', 'cycle_start',\n    'topology', 'two_tank_drip_substrate_trays'\n\
    \  ),\n  :idempotency_key,\n  'pending',\n  NOW() - INTERVAL '1 second',\n  0,\n\
    \  3,\n  NOW(),\n  NOW()\n)\n"
  params:
    zone_id: ${zone_id}
    idempotency_key: ${idempotency_key}
    source: ${scheduler_source}
- step: start_cycle_http
