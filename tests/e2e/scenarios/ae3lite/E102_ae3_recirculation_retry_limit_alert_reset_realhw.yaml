- step: wait_force_solution_tank_full_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND\
    \ status = 'DONE'\nORDER BY created_at DESC\nLIMIT 1\n"
  params:
    cmd_id: ${force_solution_tank_full_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: wait_fill_ec_correction_command
  type: db.wait
  query: "SELECT id, channel, payload->>'cmd' AS cmd\nFROM ae_commands\nWHERE task_id\
    \ = CAST(:task_id AS bigint)\n  AND publish_status = 'accepted'\n  AND channel\
    \ = 'pump_a'\n  AND payload->>'cmd' = 'dose'\nORDER BY id DESC\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 120.0
  expected_rows: 1
  save: fill_ec_correction_row
- step: load_fill_ph_correction_commands_if_any
  type: database_query
  query: "SELECT id, channel, payload->>'cmd' AS cmd\nFROM ae_commands\nWHERE task_id\
    \ = CAST(:task_id AS bigint)\n  AND publish_status = 'accepted'\n  AND channel\
    \ IN ('pump_acid', 'pump_base')\n  AND payload->>'cmd' = 'dose'\nORDER BY id DESC\n"
  params:
    task_id: ${task_id}
  expected_rows: 0
  save: fill_ph_correction_rows
- step: wait_prepare_recirculation_stage
  type: db.wait
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step\n\
    FROM ae_tasks\nWHERE id = CAST(:task_id AS bigint)\n  AND status = 'pending'\n\
    \  AND current_stage = 'prepare_recirculation_check'\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 240.0
  expected_rows: 1
  save: prepare_recirc_stage_row
- step: wait_prepare_recirculation_commands
  type: db.wait
  query: "SELECT CAST(:task_id AS bigint) AS task_id\nFROM ae_commands\nWHERE task_id\
    \ = CAST(:task_id AS bigint)\nGROUP BY task_id\nHAVING COUNT(*) FILTER (\n  WHERE\
    \ publish_status = 'accepted'\n    AND channel = 'valve_solution_supply'\n   \
    \ AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status\
    \ = 'accepted'\n    AND channel = 'valve_solution_fill'\n    AND payload->>'cmd'\
    \ = 'set_relay'\n    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n\
    ) >= 2\n   AND COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND\
    \ channel = 'pump_main'\n    AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n) >= 2\n"
  params:
    task_id: ${task_id}
  timeout: 40.0
  expected_rows: 1
- step: wait_task_failed_retry_limit_first
  type: db.wait
  query: "\nSELECT id, status, error_code, error_message, stage_retry_count\nFROM\
    \ ae_tasks\nWHERE id = CAST(:task_id AS bigint)\n  AND status = 'failed'\n  AND\
    \ error_code = 'prepare_recirculation_attempt_limit_reached'\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  # Audit (test_node + AE): prepare_recirc_window fails after attempt_limit rollovers; each window is
  # capped by prepare_recirculation_timeout_sec (45–120s in this suite). With max_attempts=3 need
  # up to 4 timeouts (~480s) + correction/MQTT slack — 720s достаточно (ранее 5400s был запас от старых багов).
  timeout: 720.0
  expected_rows: 1
  save: failed_task_first_row
- step: load_retry_limit_alert_first
  type: db.wait
  query: "\nSELECT id, status, code, details, resolved_at\nFROM alerts\nWHERE zone_id\
    \ = :zone_id\n  AND code = 'biz_prepare_recirculation_retry_exhausted'\n  AND\
    \ status = 'ACTIVE'\nORDER BY id DESC\nLIMIT 1\n"
  params:
    zone_id: ${zone_id}
  timeout: 30.0
  expected_rows: 1
  save: retry_limit_alert_first_row
- step: load_recirc_command_counts_first
  type: database_query
  query: "\nSELECT\n  COUNT(*) FILTER (\n    WHERE id > CAST(:after_ec_id AS bigint)\n\
    \      AND publish_status = 'accepted'\n      AND channel = 'pump_a'\n      AND\
    \ payload->>'cmd' = 'dose'\n  )::int AS recirc_ec_cnt,\n  COUNT(*) FILTER\
    \ (\n    WHERE id > CAST(:after_ec_id AS bigint)\n      AND publish_status = 'accepted'\n\
    \      AND channel IN ('pump_acid', 'pump_base')\n      AND payload->>'cmd' = 'dose'\n  )::int\
    \ AS recirc_ph_cnt\nFROM ae_commands\nWHERE task_id = CAST(:task_id AS bigint)\n"
  params:
    task_id: ${task_id}
    after_ec_id: ${fill_ec_correction_row.0.id}
  expected_rows: 1
  save: recirc_command_counts_first_row
- step: restore_normal_targets_after_first_failure
  type: api_put
  endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id}/cycle.phase_overrides
  payload:
    payload: {}
- step: wait_grow_cycle_bundle_restored_after_first_failure
  type: db.wait
  query: "SELECT scope_type, scope_id, status, bundle_revision\nFROM automation_effective_bundles\nWHERE scope_type = 'grow_cycle'\n  AND scope_id = CAST(:grow_cycle_id AS bigint)\n  AND status = 'valid'\nLIMIT 1\n"
  params:
    grow_cycle_id: ${grow_cycle_id}
  timeout: 20.0
  expected_rows: 1
- step: ack_retry_limit_alert_first
  type: http_request
  method: PATCH
  endpoint: /api/alerts/${retry_limit_alert_first_row.0.id}/ack
  headers:
    Accept: application/json
    Content-Type: application/json
    Authorization: Bearer ${E2E_AUTH_TOKEN}
  body: {}
  capture_response: ack_alert_first_response
- step: wait_retry_limit_alert_first_resolved
  type: db.wait
  query: "\nSELECT id, status, resolved_at\nFROM alerts\nWHERE id = CAST(:alert_id\
    \ AS bigint)\n  AND status = 'RESOLVED'\n  AND resolved_at IS NOT NULL\nLIMIT\
    \ 1\n"
  params:
    alert_id: ${retry_limit_alert_first_row.0.id}
  timeout: 30.0
  expected_rows: 1
  save: retry_limit_alert_first_resolved_row
- step: complete_existing_cycles_second_run
  type: database_execute
  query: "\nUPDATE grow_cycles\nSET status = 'COMPLETED',\n    updated_at = NOW()\n\
    WHERE zone_id = :zone_id\n  AND status IN ('PLANNED', 'RUNNING', 'PAUSED')\n"
  params:
    zone_id: ${zone_id}
- step: wait_zone_ae_runtime_idle_before_second_cleanup
  type: db.wait
  query: |
    SELECT 1 AS ready
    WHERE NOT EXISTS (
      SELECT 1
      FROM ae_tasks
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
    )
      AND NOT EXISTS (
      SELECT 1
      FROM ae_zone_leases
      WHERE zone_id = :zone_id
    )
      AND NOT EXISTS (
      SELECT 1
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running')
    )
  params:
    zone_id: ${zone_id}
  timeout: 120.0
  expected_rows: 1
- step: cleanup_zone_ae_commands_second_run
  type: database_execute
  query: "\nDELETE FROM ae_commands\nWHERE task_id IN (\n  SELECT id\n  FROM ae_tasks\n\
    \  WHERE zone_id = :zone_id\n)\n"
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_ae_tasks_second_run
  type: database_execute
  query: '

    DELETE FROM ae_tasks

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_ae_leases_second_run
  type: database_execute
  query: '

    DELETE FROM ae_zone_leases

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_workflow_state_second_run
  type: database_execute
  query: '

    DELETE FROM zone_workflow_state

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_zone_pid_state_second_run
  type: database_execute
  query: '

    DELETE FROM pid_state

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: create_grow_cycle_second
  type: database_execute
  query: 'INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status,
    created_at, updated_at)

    VALUES (:greenhouse_id, :zone_id, :recipe_revision_id, ''RUNNING'', NOW(), NOW())

    '
  params:
    greenhouse_id: ${greenhouse_id}
    zone_id: ${zone_id}
    recipe_revision_id: ${recipe_revision_id}
- step: load_grow_cycle_second
  type: database_query
  query: "SELECT id\nFROM grow_cycles\nWHERE zone_id = :zone_id\n  AND recipe_revision_id\
    \ = :recipe_revision_id\nORDER BY id DESC\nLIMIT 1\n"
  params:
    zone_id: ${zone_id}
    recipe_revision_id: ${recipe_revision_id}
  expected_rows: 1
  save: grow_cycle_second_row
- step: set_grow_cycle_id_second
  type: set
  grow_cycle_id_2: ${grow_cycle_second_row.0.id}
- step: create_phase_second
  type: database_execute
  query: "INSERT INTO grow_cycle_phases (\n  grow_cycle_id,\n  phase_index,\n  name,\n\
    \  ph_target,\n  ph_min,\n  ph_max,\n  ec_target,\n  ec_min,\n  ec_max,\n  irrigation_mode,\n\
    \  irrigation_interval_sec,\n  irrigation_duration_sec,\n  created_at,\n  updated_at\n\
    )\nVALUES (\n  :grow_cycle_id_2,\n  0,\n  'VEG',\n  CAST(:ph_target AS numeric),\n\
    \  CAST(:ph_min AS numeric),\n  CAST(:ph_max AS numeric),\n  CAST(:ec_target AS numeric),\n\
    \  CAST(:ec_min AS numeric),\n  CAST(:ec_max AS numeric),\n  'SUBSTRATE',\n  600,\n\
    \  45,\n  NOW(),\n  NOW()\n)\n"
  params:
    grow_cycle_id_2: ${grow_cycle_id_2}
    ph_target: ${impossible_ph_target}
    ph_min: ${impossible_ph_min}
    ph_max: ${impossible_ph_max}
    ec_target: ${impossible_ec_target}
    ec_min: ${impossible_ec_min}
    ec_max: ${impossible_ec_max}
- step: load_phase_second
  type: database_query
  query: 'SELECT id

    FROM grow_cycle_phases

    WHERE grow_cycle_id = :grow_cycle_id_2

    ORDER BY id DESC

    LIMIT 1

    '
  params:
    grow_cycle_id_2: ${grow_cycle_id_2}
  expected_rows: 1
  save: phase_second_row
- step: set_phase_id_second
  type: set
  phase_id_2: ${phase_second_row.0.id}
- step: activate_grow_cycle_second
  type: database_execute
  query: "UPDATE grow_cycles\nSET current_phase_id = :phase_id_2,\n    started_at\
    \ = NOW(),\n    recipe_started_at = NOW(),\n    updated_at = NOW()\nWHERE id =\
    \ :grow_cycle_id_2\n"
  params:
    phase_id_2: ${phase_id_2}
    grow_cycle_id_2: ${grow_cycle_id_2}
- step: apply_cycle_start_snapshot_second
  type: api_put
  endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id_2}/cycle.start_snapshot
  payload:
    payload:
      cycle_id: ${grow_cycle_id_2}
      zone_id: ${zone_id}
- step: apply_cycle_phase_overrides_second
  type: api_put
  endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id_2}/cycle.phase_overrides
  payload:
    payload:
      ph_target: ${impossible_ph_target}
      ph_min: ${impossible_ph_min}
      ph_max: ${impossible_ph_max}
      ec_target: ${impossible_ec_target}
      ec_min: ${impossible_ec_min}
      ec_max: ${impossible_ec_max}
- step: wait_grow_cycle_bundle_ready_second
  type: db.wait
  query: "SELECT scope_type, scope_id, status, bundle_revision\nFROM automation_effective_bundles\nWHERE scope_type = 'grow_cycle'\n  AND scope_id = CAST(:grow_cycle_id_2 AS bigint)\n  AND status = 'valid'\nLIMIT 1\n"
  params:
    grow_cycle_id_2: ${grow_cycle_id_2}
  timeout: 20.0
  expected_rows: 1
  save: grow_cycle_bundle_row_second
- step: wait_impossible_recirculation_targets_applied_second
  type: sleep
  seconds: 2
- step: reset_test_node_state_second_run
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  history_logger_url: http://history-logger:9300
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: reset_state
    params: {}
  save: reset_state_second_response
- step: wait_reset_state_second_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND\
    \ status = 'DONE'\nORDER BY created_at DESC\nLIMIT 1\n"
  params:
    cmd_id: ${reset_state_second_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: wait_zero_level_telemetry_second_run
  type: db.wait
  query: "SELECT COUNT(*)::int AS zero_levels\nFROM sensors s\nJOIN telemetry_last\
    \ tl ON tl.sensor_id = s.id\nWHERE s.zone_id = :zone_id\n  AND LOWER(TRIM(COALESCE(s.label,\
    \ ''))) IN (\n    'level_clean_min',\n    'level_clean_max',\n    'level_solution_min',\n\
    \    'level_solution_max'\n  )\n  AND s.type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')\n\
    \  AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '5 minutes'\n \
    \ AND COALESCE(tl.last_value, -1) <= 0.1\nHAVING COUNT(*) = 4\n"
  params:
    zone_id: ${zone_id}
  timeout: 60.0
  expected_rows: 1
  save: zero_levels_second_row
- step: probe_state_after_reset_second_run
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  history_logger_url: http://history-logger:9300
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: state
    params: {}
  save: probe_state_second_response
- step: wait_probe_state_after_reset_second_run_done
  type: db.wait
  query: "SELECT id, cmd_id, status, created_at\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\nLIMIT 1\n"
  params:
    cmd_id: ${probe_state_second_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
  save: probe_state_second_row
- step: wait_runtime_irr_state_snapshot_after_reset_second_run
  type: db.wait
  query: "SELECT id, type, created_at\nFROM zone_events\nWHERE zone_id = :zone_id\n  AND type = 'IRR_STATE_SNAPSHOT'\n  AND created_at >= :probe_created_at\n  AND COALESCE((COALESCE(details, payload_json)->'snapshot'->>'pump_main')::boolean, TRUE) = FALSE\n  AND COALESCE((COALESCE(details, payload_json)->'snapshot'->>'valve_clean_fill')::boolean, TRUE) = FALSE\n  AND COALESCE((COALESCE(details, payload_json)->'snapshot'->>'valve_clean_supply')::boolean, TRUE) = FALSE\n  AND COALESCE((COALESCE(details, payload_json)->'snapshot'->>'valve_solution_fill')::boolean, TRUE) = FALSE\n  AND COALESCE((COALESCE(details, payload_json)->'snapshot'->>'valve_solution_supply')::boolean, TRUE) = FALSE\n  AND COALESCE((COALESCE(details, payload_json)->'snapshot'->>'valve_irrigation')::boolean, TRUE) = FALSE\nORDER BY created_at DESC, id DESC\nLIMIT 1\n"
  params:
    zone_id: ${zone_id}
    probe_created_at: ${probe_state_second_row.0.created_at}
  timeout: 30.0
  expected_rows: 1
  save: irr_state_second_run_row
- step: insert_scheduler_like_intent_second
  type: database_execute
  query: "INSERT INTO zone_automation_intents (\n  zone_id,\n  intent_type,\n  payload,\n\
    \  idempotency_key,\n  status,\n  not_before,\n  retry_count,\n  max_retries,\n\
    \  created_at,\n  updated_at\n)\nVALUES (\n  :zone_id,\n  'start_cycle',\n \
    \ jsonb_build_object(\n    'source', CAST(:source AS text),\n    'task_type',\
    \ 'diagnostics',\n    'workflow', 'cycle_start',\n    'topology', 'two_tank_drip_substrate_trays'\n\
    \  ),\n  :idempotency_key,\n  'pending',\n  NOW() - INTERVAL '1 second',\n  0,\n\
    \  3,\n  NOW(),\n  NOW()\n)\n"
  params:
    zone_id: ${zone_id}
    idempotency_key: ${idempotency_key_2}
    source: ${scheduler_source}
- step: start_cycle_http_second
  type: http_request
  method: POST
  url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
  headers:
    Accept: application/json
    Content-Type: application/json
    X-Trace-Id: ${scheduler_trace_id_2}
    X-Scheduler-Id: laravel-scheduler
    Authorization: Bearer dev-token-12345
  body:
    source: ${scheduler_source}
    idempotency_key: ${idempotency_key_2}
  retries: 2
  retry_delay_seconds: 1
  capture_response: start_cycle_response_second
- step: set_task_id_second
  type: set
  task_id_2: ${start_cycle_response_second.json.data.task_id}
- step: wait_solution_fill_stage_second
  type: db.wait
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step\n\
    FROM ae_tasks\nWHERE id = CAST(:task_id_2 AS bigint)\n  AND status = 'pending'\n\
    \  AND current_stage = 'solution_fill_check'\nLIMIT 1\n"
  params:
    task_id_2: ${task_id_2}
  timeout: 60.0
  expected_rows: 1
  save: solution_fill_stage_second_row
- step: force_solution_tank_full_second
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  history_logger_url: http://history-logger:9300
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: set_fault_mode
    params:
      level_clean_min_override: true
      level_clean_max_override: true
      level_solution_min_override: true
      level_solution_max_override: true
  save: force_solution_tank_full_second_response
- step: wait_force_solution_tank_full_second_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND\
    \ status = 'DONE'\nORDER BY created_at DESC\nLIMIT 1\n"
  params:
    cmd_id: ${force_solution_tank_full_second_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: wait_fill_ec_correction_command_second
  type: db.wait
  query: "SELECT id, channel, payload->>'cmd' AS cmd\nFROM ae_commands\nWHERE task_id\
    \ = CAST(:task_id_2 AS bigint)\n  AND publish_status = 'accepted'\n  AND channel\
    \ = 'pump_a'\n  AND payload->>'cmd' = 'dose'\nORDER BY id DESC\nLIMIT 1\n"
  params:
    task_id_2: ${task_id_2}
  timeout: 60.0
  expected_rows: 1
  save: fill_ec_correction_second_row
- step: load_fill_ph_correction_commands_if_any_second
  type: database_query
  query: "SELECT id, channel, payload->>'cmd' AS cmd\nFROM ae_commands\nWHERE task_id\
    \ = CAST(:task_id_2 AS bigint)\n  AND publish_status = 'accepted'\n  AND channel\
    \ IN ('pump_acid', 'pump_base')\n  AND payload->>'cmd' = 'dose'\nORDER BY id DESC\n"
  params:
    task_id_2: ${task_id_2}
  expected_rows: 0
  save: fill_ph_correction_second_rows
- step: wait_prepare_recirculation_stage_second
  type: db.wait
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step\n\
    FROM ae_tasks\nWHERE id = CAST(:task_id_2 AS bigint)\n  AND status = 'pending'\n\
    \  AND current_stage = 'prepare_recirculation_check'\nLIMIT 1\n"
  params:
    task_id_2: ${task_id_2}
  timeout: 240.0
  expected_rows: 1
  save: prepare_recirc_stage_second_row
- step: wait_task_failed_retry_limit_second
  type: db.wait
  query: "\nSELECT id, status, error_code, error_message, stage_retry_count\nFROM\
    \ ae_tasks\nWHERE id = CAST(:task_id AS bigint)\n  AND status = 'failed'\n  AND\
    \ error_code = 'prepare_recirculation_attempt_limit_reached'\nLIMIT 1\n"
  params:
    task_id: ${task_id_2}
  timeout: 720.0
  expected_rows: 1
  save: failed_task_second_row
- step: load_retry_limit_alert_second
  type: db.wait
  query: "\nSELECT id, status, code, details, resolved_at\nFROM alerts\nWHERE zone_id\
    \ = :zone_id\n  AND code = 'biz_prepare_recirculation_retry_exhausted'\n  AND\
    \ status = 'ACTIVE'\nORDER BY id DESC\nLIMIT 1\n"
  params:
    zone_id: ${zone_id}
  timeout: 30.0
  expected_rows: 1
  save: retry_limit_alert_second_row
- step: load_recirc_command_counts_second
  type: database_query
  query: "\nSELECT\n  COUNT(*) FILTER (\n    WHERE id > CAST(:after_ec_id AS bigint)\n\
    \      AND publish_status = 'accepted'\n      AND channel = 'pump_a'\n      AND\
    \ payload->>'cmd' = 'dose'\n  )::int AS recirc_ec_cnt,\n  COUNT(*) FILTER\
    \ (\n    WHERE id > CAST(:after_ec_id AS bigint)\n      AND publish_status = 'accepted'\n\
    \      AND channel IN ('pump_acid', 'pump_base')\n      AND payload->>'cmd' = 'dose'\n  )::int\
    \ AS recirc_ph_cnt\nFROM ae_commands\nWHERE task_id = CAST(:task_id AS bigint)\n"
  params:
    task_id: ${task_id_2}
    after_ec_id: ${fill_ec_correction_second_row.0.id}
  expected_rows: 1
  save: recirc_command_counts_second_row
assertions:
- name: first_task_failed_by_retry_limit
  type: custom_assert
  condition: str(context.get('failed_task_first_row', [{}])[0].get('error_code', ''))
    == 'prepare_recirculation_attempt_limit_reached'
- name: first_alert_active
  type: custom_assert
  condition: str(context.get('retry_limit_alert_first_row', [{}])[0].get('status',
    '')).upper() == 'ACTIVE'
- name: first_alert_retry_count_is_3
  type: custom_assert
  condition: int((context.get('retry_limit_alert_first_row', [{}])[0].get('details')
    or {}).get('retry_count', 0)) == 3 and int((context.get('retry_limit_alert_first_row',
    [{}])[0].get('details') or {}).get('attempt_limit', 0)) == 3
- name: first_recirc_commands_attempted_three_times
  type: custom_assert
  condition: int(context.get('recirc_command_counts_first_row', [{}])[0].get('recirc_ec_cnt',
    0)) + int(context.get('recirc_command_counts_first_row', [{}])[0].get('recirc_ph_cnt',
    0)) >= 1
- name: first_alert_ack_http_200
  type: custom_assert
  condition: int(context.get('ack_alert_first_response', {}).get('status_code', 0))
    == 200
- name: first_alert_resolved
  type: custom_assert
  condition: str(context.get('retry_limit_alert_first_resolved_row', [{}])[0].get('status',
    '')).upper() == 'RESOLVED'
- name: second_start_cycle_http_200
  type: custom_assert
  condition: int(context.get('start_cycle_response_second', {}).get('status_code',
    0)) == 200
- name: second_prepare_recirculation_stage_reached
  type: custom_assert
  condition: str(context.get('prepare_recirc_stage_second_row', [{}])[0].get('current_stage',
    '')).lower() == 'prepare_recirculation_check'
- name: second_task_failed_by_retry_limit
  type: custom_assert
  condition: str(context.get('failed_task_second_row', [{}])[0].get('error_code',
    '')) == 'prepare_recirculation_attempt_limit_reached'
- name: second_alert_active
  type: custom_assert
  condition: str(context.get('retry_limit_alert_second_row', [{}])[0].get('status',
    '')).upper() == 'ACTIVE'
- name: second_alert_retry_count_is_3
  type: custom_assert
  condition: int((context.get('retry_limit_alert_second_row', [{}])[0].get('details')
    or {}).get('retry_count', 0)) == 3 and int((context.get('retry_limit_alert_second_row',
    [{}])[0].get('details') or {}).get('attempt_limit', 0)) == 3
- name: second_recirc_commands_attempted_three_times
  type: custom_assert
  condition: int(context.get('recirc_command_counts_second_row', [{}])[0].get('recirc_ec_cnt',
    0)) + int(context.get('recirc_command_counts_second_row', [{}])[0].get('recirc_ph_cnt',
    0)) >= 1
- name: second_alert_is_new_record
  type: custom_assert
  condition: int(context.get('retry_limit_alert_second_row', [{}])[0].get('id', 0))
    > int(context.get('retry_limit_alert_first_row', [{}])[0].get('id', 0))
cleanup:
- step: cleanup_retry_limit_alerts_final
  type: database_execute
  optional: true
  query: "\nDELETE FROM alerts\nWHERE zone_id = :zone_id\n  AND code = 'biz_prepare_recirculation_retry_exhausted'\n"
  params:
    zone_id: ${zone_id}
# phase_overrides сбрасываются при удалении grow_cycle (cleanup_created_cycle); отдельный api_put
# убираем — при раннем фейле ${grow_cycle_id}/${grow_cycle_id_2} могут быть пустыми → 404 и STRICT log scan.
- step: reset_test_node_after_run
  type: ae_test_hook
  optional: true
  zone_id: ${zone_id}
  action: publish_command
  history_logger_url: http://history-logger:9300
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: reset_state
    params: {}
- step: cleanup_runtime_events
  type: database_execute
  optional: true
  query: "DELETE FROM zone_events\nWHERE zone_id = :zone_id\n  AND created_at >= :started_at\n"
  params:
    zone_id: ${zone_id}
    started_at: ${scenario_window.0.started_at}
- step: cleanup_e2e_calibrations
  type: database_execute
  optional: true
  query: "DELETE FROM pump_calibrations\nWHERE source = 'e2e_realhw_setup_ready'\n\
    \  AND node_channel_id IN (\n    CAST(:ec_pump_channel_id AS bigint),\n    CAST(:ph_up_channel_id\
    \ AS bigint),\n    CAST(:ph_down_channel_id AS bigint)\n  )\n"
  params:
    ec_pump_channel_id: ${ec_pump_channel_id}
    ph_up_channel_id: ${ph_up_channel_id}
    ph_down_channel_id: ${ph_down_channel_id}
- step: cleanup_e2e_process_calibrations
  type: database_execute
  optional: true
  query: 'SELECT 1;'
- step: cleanup_e2e_bindings
  type: database_execute
  optional: true
  query: "DELETE FROM channel_bindings\nWHERE role IN ('dose_ec_a', 'dose_ph_up',\
    \ 'dose_ph_down')\n  AND node_channel_id IN (\n    CAST(:ec_pump_channel_id AS\
    \ bigint),\n    CAST(:ph_up_channel_id AS bigint),\n    CAST(:ph_down_channel_id\
    \ AS bigint)\n  )\n"
  params:
    ec_pump_channel_id: ${ec_pump_channel_id}
    ph_up_channel_id: ${ph_up_channel_id}
    ph_down_channel_id: ${ph_down_channel_id}
- step: cleanup_e2e_infrastructure
  type: database_execute
  optional: true
  query: "DELETE FROM infrastructure_instances\nWHERE owner_type = 'zone'\n  AND owner_id\
    \ = :zone_id\n  AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH\
    \ Down')\n"
  params:
    zone_id: ${zone_id}
- step: cleanup_runtime_ae_commands
  type: database_execute
  optional: true
  query: 'DELETE FROM ae_commands

    WHERE task_id = CAST(:task_id AS bigint)

    '
  params:
    task_id: ${task_id}
- step: cleanup_runtime_ae_task
  type: database_execute
  optional: true
  query: 'DELETE FROM ae_tasks

    WHERE id = CAST(:task_id AS bigint)

    '
  params:
    task_id: ${task_id}
- step: cleanup_runtime_ae_leases
  type: database_execute
  optional: true
  query: 'DELETE FROM ae_zone_leases

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_runtime_intent
  type: database_execute
  optional: true
  query: "DELETE FROM zone_automation_intents\nWHERE zone_id = :zone_id\n  AND idempotency_key\
    \ = :idempotency_key\n"
  params:
    zone_id: ${zone_id}
    idempotency_key: ${idempotency_key}
- step: cleanup_created_phase
  type: database_execute
  optional: true
  query: 'DELETE FROM grow_cycle_phases

    WHERE id = CAST(:phase_id AS bigint)

    '
  params:
    phase_id: ${phase_id}
- step: cleanup_created_cycle
  type: database_execute
  optional: true
  query: 'DELETE FROM grow_cycles

    WHERE id = CAST(:grow_cycle_id AS bigint)

    '
  params:
    grow_cycle_id: ${grow_cycle_id}
- step: cleanup_created_recipe_revision
  type: database_execute
  optional: true
  query: 'DELETE FROM recipe_revisions

    WHERE id = CAST(:recipe_revision_id AS bigint)

    '
  params:
    recipe_revision_id: ${recipe_revision_id}
- step: cleanup_created_recipe
  type: database_execute
  optional: true
  query: 'DELETE FROM recipes

    WHERE id = CAST(:recipe_id AS bigint)

    '
  params:
    recipe_id: ${recipe_id}
- step: cleanup_created_profile
  type: database_execute
  optional: true
  query: |
    DELETE FROM automation_config_documents
    WHERE namespace = 'zone.logic_profile'
      AND scope_type = 'zone'
      AND scope_id = :zone_id
  params:
    zone_id: ${zone_id}
- step: cleanup_e2e_ph_ec_sensors
  type: database_execute
  optional: true
  query: "DELETE FROM sensors\nWHERE (node_id = CAST(:ph_node_id AS bigint) AND type\
    \ = 'PH' AND label = 'ph_sensor')\n   OR (node_id = CAST(:ec_node_id AS bigint)\
    \ AND type = 'EC' AND label = 'ec_sensor')\n"
  params:
    ph_node_id: ${ph_node_id}
    ec_node_id: ${ec_node_id}
- step: restore_previous_profile_state
  type: database_execute
  optional: true
  query: 'SELECT 1;'
- step: restore_previous_zone_runtime
  type: database_execute
  optional: true
  query: "UPDATE zones\nSET automation_runtime = :automation_runtime,\n    updated_at\
    \ = NOW()\nWHERE id = :zone_id\n"
  params:
    zone_id: ${zone_id}
    automation_runtime: ${previous_automation_runtime}
