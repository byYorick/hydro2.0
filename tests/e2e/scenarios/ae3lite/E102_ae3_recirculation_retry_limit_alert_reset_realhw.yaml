  query: "SELECT CAST(:task_id AS bigint) AS task_id\nFROM ae_commands\nWHERE task_id\
    \ = CAST(:task_id AS bigint)\nGROUP BY task_id\nHAVING COUNT(*) FILTER (\n  WHERE\
    \ publish_status = 'accepted'\n    AND channel = 'storage_state'\n    AND payload->>'cmd'\
    \ = 'state'\n) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n\
    \    AND channel = 'valve_clean_fill'\n    AND payload->>'cmd' = 'set_relay'\n\
    \    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n) >= 1\n"
