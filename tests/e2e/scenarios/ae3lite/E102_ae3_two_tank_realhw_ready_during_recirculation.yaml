# E102: AE3-Lite ready reached during prepare recirculation on real test_node
# DoD:
# - real test_node проходит staged setup до `prepare_recirculation_check`
# - correction публикует реальные dose-команды на EC/pH ноды в fill и recirculation
# - canonical task завершается completed после recirculation-path
# - zone_workflow_state переходит в ready после `tank_recirc`

name: E102_ae3_two_tank_realhw_ready_during_recirculation
description: |
  Real-hardware recirculation-ready flow для native AE3-Lite на `firmware/test_node`.
  Сценарий готовит test-zone под AE3 two-tank topology, делает reset через protected
  command pipeline и затем проводит staged setup до готовности:
  startup -> clean fill -> solution fill + correction -> prepare recirculation + correction -> ready.
  Window фаз намеренно сужен так, чтобы `ready` достигался только через recirculation-path.

actions:
  - step: set_test_context
    type: set
    fixture_prefix: ae3-realhw-setup-${TIMESTAMP_MS}
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: ${TEST_NODE_UID}
    test_ph_node_uid: ${TEST_PH_NODE_UID}
    test_ec_node_uid: ${TEST_EC_NODE_UID}
    recipe_name: ae3-realhw-setup-recipe-${TIMESTAMP_MS}
    idempotency_key: ae3-realhw-setup-start-cycle-${TIMESTAMP_MS}
    scheduler_source: laravel_scheduler
    scheduler_trace_id: ae3-realhw-setup-trace-${TIMESTAMP_MS}

  - step: capture_scenario_window
    type: database_query
    query: |
      SELECT NOW() AS started_at
    expected_rows: 1
    save: scenario_window

  - step: load_zone_context
    type: database_query
    query: |
      SELECT id AS zone_id, greenhouse_id, automation_runtime
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_ctx

  - step: set_zone_context
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}
    previous_automation_runtime: ${zone_ctx.0.automation_runtime}

  - step: load_irrig_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: irrig_node_row

  - step: load_ph_node
    type: database_query
    query: |
      SELECT n.id AS node_id, n.uid AS node_uid
      FROM nodes n
      WHERE n.zone_id = :zone_id
        AND LOWER(COALESCE(n.type, '')) = 'ph'
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel IN ('pump_acid', 'pump_base')
        )
      ORDER BY CASE WHEN n.uid = :node_uid THEN 0 ELSE 1 END, n.id ASC
      LIMIT 1
    params:
      node_uid: ${test_ph_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ph_node_row

  - step: load_ec_node
    type: database_query
    query: |
      SELECT n.id AS node_id, n.uid AS node_uid
      FROM nodes n
      WHERE n.zone_id = :zone_id
        AND LOWER(COALESCE(n.type, '')) = 'ec'
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel = 'pump_a'
        )
      ORDER BY CASE WHEN n.uid = :node_uid THEN 0 ELSE 1 END, n.id ASC
      LIMIT 1
    params:
      node_uid: ${test_ec_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ec_node_row

  - step: set_node_ids
    type: set
    irrig_node_id: ${irrig_node_row.0.node_id}
    ph_node_id: ${ph_node_row.0.node_id}
    ec_node_id: ${ec_node_row.0.node_id}
    resolved_ph_node_uid: ${ph_node_row.0.node_uid}
    resolved_ec_node_uid: ${ec_node_row.0.node_uid}

  - step: load_ec_pump_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_a'
      LIMIT 1
    params:
      node_id: ${ec_node_id}
    expected_rows: 1
    save: ec_pump_channel_row

  - step: load_ph_up_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_base'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_up_channel_row

  - step: load_ph_down_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id
      FROM node_channels
      WHERE node_id = :node_id
        AND channel = 'pump_acid'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_down_channel_row

  - step: set_correction_channel_ids
    type: set
    ec_pump_channel_id: ${ec_pump_channel_row.0.node_channel_id}
    ph_up_channel_id: ${ph_up_channel_row.0.node_channel_id}
    ph_down_channel_id: ${ph_down_channel_row.0.node_channel_id}

  - step: wait_zone_ae_runtime_idle_before_cleanup
    type: db.wait
    query: |
      SELECT 1 AS ready
      WHERE NOT EXISTS (
        SELECT 1
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running', 'waiting_command')
      )
        AND NOT EXISTS (
        SELECT 1
        FROM ae_zone_leases
        WHERE zone_id = :zone_id
      )
        AND NOT EXISTS (
        SELECT 1
        FROM zone_automation_intents
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running')
      )
    params:
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1

  - step: cleanup_zone_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id
        FROM ae_tasks
        WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_workflow_state
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_pid_state
    type: database_execute
    query: |
      DELETE FROM pid_state
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: complete_existing_cycles
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET status = 'COMPLETED',
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
    params:
      zone_id: ${zone_id}

  - step: switch_zone_to_ae3
    type: database_execute
    query: |
      UPDATE zones
      SET automation_runtime = 'ae3',
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: load_test_node_correction_preset
    type: database_query
    query: |
      SELECT id
      FROM zone_correction_presets
      WHERE slug = 'test-node'
      LIMIT 1
    expected_rows: 1
    save: test_node_correction_preset_row

  - step: apply_test_node_correction_preset
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.correction
    payload:
      payload:
        preset_id: ${test_node_correction_preset_row.0.id}
        base_config: {}
        phase_overrides:
          solution_fill:
            runtime:
              required_node_type: irrig
              clean_fill_timeout_sec: 600
              solution_fill_timeout_sec: 900
              clean_fill_retry_cycles: 1
              level_switch_on_threshold: 0.5
              clean_max_sensor_label: level_clean_max
              clean_min_sensor_label: level_clean_min
              solution_max_sensor_label: level_solution_max
              solution_min_sensor_label: level_solution_min
            retry:
              max_ec_correction_attempts: 3
              max_ph_correction_attempts: 3
              prepare_recirculation_timeout_sec: 240
              prepare_recirculation_max_attempts: 3
              prepare_recirculation_max_correction_attempts: 20
              telemetry_stale_retry_sec: 30
              decision_window_retry_sec: 10
              low_water_retry_sec: 60
            controllers:
              ec:
                mode: supervisory_allocator
                kp: 12.0
                ki: 0.12
                kd: 0.0
                derivative_filter_alpha: 0.35
                deadband: 0.08
                max_dose_ml: 20.0
                max_integral: 24.0
                min_interval_sec: 20
                anti_windup:
                  enabled: true
                overshoot_guard:
                  enabled: true
                  hard_min: 0.0
                  hard_max: 4.0
                no_effect:
                  enabled: true
                  max_count: 2
                observe:
                  telemetry_period_sec: 2
                  window_min_samples: 3
                  decision_window_sec: 8
                  observe_poll_sec: 2
                  min_effect_fraction: 0.15
                  stability_max_slope: 0.08
                  no_effect_consecutive_limit: 4
              ph:
                mode: cross_coupled_pi_d
                kp: 4.0
                ki: 0.04
                kd: 0.0
                derivative_filter_alpha: 0.35
                deadband: 0.05
                max_dose_ml: 10.0
                max_integral: 10.0
                min_interval_sec: 20
                anti_windup:
                  enabled: true
                overshoot_guard:
                  enabled: true
                  hard_min: 4.0
                  hard_max: 8.5
                no_effect:
                  enabled: true
                  max_count: 2
                observe:
                  telemetry_period_sec: 2
                  window_min_samples: 3
                  decision_window_sec: 8
                  observe_poll_sec: 2
                  min_effect_fraction: 0.15
                  stability_max_slope: 0.04
                  no_effect_consecutive_limit: 4
            dosing:
              solution_volume_l: 20.0
              dose_ec_channel: dose_ec_a
              dose_ph_up_channel: dose_ph_up
              dose_ph_down_channel: dose_ph_down
              max_ec_dose_ml: 20.0
              max_ph_dose_ml: 10.0
            timing:
              sensor_mode_stabilization_time_sec: 20
              stabilization_sec: 10
              telemetry_max_age_sec: 180
              irr_state_max_age_sec: 15
              level_poll_interval_sec: 20
            tolerance:
              prepare_tolerance:
                ph_pct: 10.0
                ec_pct: 16.0
            safety:
              safe_mode_on_no_effect: true
              block_on_active_no_effect_alert: true
          tank_recirc:
            runtime:
              required_node_type: irrig
              clean_fill_timeout_sec: 600
              solution_fill_timeout_sec: 900
              clean_fill_retry_cycles: 1
              level_switch_on_threshold: 0.5
              clean_max_sensor_label: level_clean_max
              clean_min_sensor_label: level_clean_min
              solution_max_sensor_label: level_solution_max
              solution_min_sensor_label: level_solution_min
            retry:
              max_ec_correction_attempts: 10
              max_ph_correction_attempts: 10
              prepare_recirculation_timeout_sec: 360
              prepare_recirculation_max_attempts: 3
              prepare_recirculation_max_correction_attempts: 20
              telemetry_stale_retry_sec: 30
              decision_window_retry_sec: 10
              low_water_retry_sec: 60
            controllers:
              ec:
                mode: supervisory_allocator
                kp: 22.0
                ki: 0.22
                kd: 0.0
                derivative_filter_alpha: 0.35
                deadband: 0.04
                max_dose_ml: 36.0
                max_integral: 56.0
                min_interval_sec: 15
                anti_windup:
                  enabled: true
                overshoot_guard:
                  enabled: true
                  hard_min: 0.0
                  hard_max: 4.0
                no_effect:
                  enabled: true
                  max_count: 2
                observe:
                  telemetry_period_sec: 2
                  window_min_samples: 3
                  decision_window_sec: 8
                  observe_poll_sec: 2
                  min_effect_fraction: 0.15
                  stability_max_slope: 0.08
                  no_effect_consecutive_limit: 4
              ph:
                mode: cross_coupled_pi_d
                kp: 6.0
                ki: 0.06
                kd: 0.0
                derivative_filter_alpha: 0.35
                deadband: 0.04
                max_dose_ml: 16.0
                max_integral: 16.0
                min_interval_sec: 15
                anti_windup:
                  enabled: true
                overshoot_guard:
                  enabled: true
                  hard_min: 4.0
                  hard_max: 8.5
                no_effect:
                  enabled: true
                  max_count: 2
                observe:
                  telemetry_period_sec: 2
                  window_min_samples: 3
                  decision_window_sec: 8
                  observe_poll_sec: 2
                  min_effect_fraction: 0.15
                  stability_max_slope: 0.04
                  no_effect_consecutive_limit: 4
            dosing:
              solution_volume_l: 20.0
              dose_ec_channel: dose_ec_a
              dose_ph_up_channel: dose_ph_up
              dose_ph_down_channel: dose_ph_down
              max_ec_dose_ml: 36.0
              max_ph_dose_ml: 16.0
            timing:
              sensor_mode_stabilization_time_sec: 20
              stabilization_sec: 10
              telemetry_max_age_sec: 180
              irr_state_max_age_sec: 15
              level_poll_interval_sec: 20
            tolerance:
              prepare_tolerance:
                ph_pct: 9.0
                ec_pct: 15.0
            safety:
              safe_mode_on_no_effect: true
              block_on_active_no_effect_alert: true
    save: correction_config_update_response

  - step: upsert_irrig_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT :node_id, channel_name, channel_type, NOW(), NOW()
      FROM (VALUES
        ('pump_main', 'ACTUATOR'),
        ('valve_clean_fill', 'ACTUATOR'),
        ('valve_clean_supply', 'ACTUATOR'),
        ('valve_solution_fill', 'ACTUATOR'),
        ('valve_solution_supply', 'ACTUATOR'),
        ('valve_irrigation', 'ACTUATOR')
      ) AS items(channel_name, channel_type)
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = EXCLUDED.type,
          updated_at = NOW()
    params:
      node_id: ${irrig_node_id}

  - step: delete_old_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zone_id
        AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zone_id: ${zone_id}

  - step: insert_level_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      SELECT :greenhouse_id, :zone_id, :node_id, 'inside', 'WATER_LEVEL', label, TRUE, NOW(), NOW()
      FROM (VALUES
        ('level_clean_max'),
        ('level_clean_min'),
        ('level_solution_max'),
        ('level_solution_min')
      ) AS items(label)
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      node_id: ${irrig_node_id}

  - step: cleanup_ph_ec_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE (node_id = CAST(:ph_node_id AS bigint) AND type = 'PH' AND label = 'ph_sensor')
         OR (node_id = CAST(:ec_node_id AS bigint) AND type = 'EC' AND label = 'ec_sensor')
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}

  - step: insert_ph_ec_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      VALUES
        (:greenhouse_id, :zone_id, :ph_node_id, 'inside', 'PH', 'ph_sensor', TRUE, NOW(), NOW()),
        (:greenhouse_id, :zone_id, :ec_node_id, 'inside', 'EC', 'ec_sensor', TRUE, NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}

  - step: upsert_sensor_mode_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT node_id, 'system', 'SERVICE', NOW(), NOW()
      FROM (VALUES (CAST(:ph_node_id AS bigint)), (CAST(:ec_node_id AS bigint))) AS nodes(node_id)
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = 'SERVICE',
          updated_at = NOW()
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}

  - step: cleanup_existing_correction_bindings
    type: database_execute
    query: |
      DELETE FROM channel_bindings
      WHERE role IN ('dose_ec_a', 'dose_ph_up', 'dose_ph_down')
        AND node_channel_id IN (
          SELECT nc.id
          FROM node_channels nc
          JOIN nodes n ON n.id = nc.node_id
          WHERE n.zone_id = :zone_id
        )
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_correction_infra
    type: database_execute
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
        AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH Down')
    params:
      zone_id: ${zone_id}

  - step: cleanup_existing_e2e_calibrations
    type: database_execute
    query: |
      DELETE FROM pump_calibrations
      WHERE source = 'e2e_realhw_setup_ready'
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_infrastructure
    type: database_execute
    query: |
      INSERT INTO infrastructure_instances (
        owner_type,
        owner_id,
        asset_type,
        label,
        required,
        created_at,
        updated_at
      )
      VALUES
        ('zone', :zone_id, 'PUMP', 'AE3 E2E EC Dose', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Up', TRUE, NOW(), NOW()),
        ('zone', :zone_id, 'PUMP', 'AE3 E2E PH Down', TRUE, NOW(), NOW())
    params:
      zone_id: ${zone_id}

  - step: insert_correction_bindings
    type: database_execute
    query: |
      INSERT INTO channel_bindings (
        infrastructure_instance_id,
        node_channel_id,
        direction,
        role,
        created_at,
        updated_at
      )
      SELECT ii.id, mapping.node_channel_id, 'actuator', mapping.role, NOW(), NOW()
      FROM (
        VALUES
          ('AE3 E2E EC Dose', CAST(:ec_pump_channel_id AS bigint), 'dose_ec_a'),
          ('AE3 E2E PH Up', CAST(:ph_up_channel_id AS bigint), 'dose_ph_up'),
          ('AE3 E2E PH Down', CAST(:ph_down_channel_id AS bigint), 'dose_ph_down')
      ) AS mapping(label, node_channel_id, role)
      JOIN infrastructure_instances ii
        ON ii.owner_type = 'zone'
       AND ii.owner_id = :zone_id
       AND ii.label = mapping.label
    params:
      zone_id: ${zone_id}
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: insert_correction_calibrations
    type: database_execute
    query: |
      INSERT INTO pump_calibrations (
        node_channel_id,
        ml_per_sec,
        k_ms_per_ml_l,
        source,
        quality_score,
        sample_count,
        valid_from,
        is_active,
        created_at,
        updated_at
      )
      VALUES
        (CAST(:ec_pump_channel_id AS bigint), 10.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_up_channel_id AS bigint), 10.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW()),
        (CAST(:ph_down_channel_id AS bigint), 10.0, 1.0, 'e2e_realhw_setup_ready', 1.0, 1, NOW() - INTERVAL '1 minute', TRUE, NOW(), NOW())
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: apply_solution_fill_process_calibration
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.process_calibration.solution_fill
    payload:
      payload:
        mode: solution_fill
        ec_gain_per_ml: 0.0025
        ph_up_gain_per_ml: 0.0100
        ph_down_gain_per_ml: 0.0100
        ph_per_ec_ml: -0.0015
        ec_per_ph_ml: 0.0000
        transport_delay_sec: 4
        settle_sec: 4
        confidence: 0.90
        source: e2e_realhw_process_observe
        is_active: true
        meta:
          observe:
            telemetry_period_sec: 2
            window_min_samples: 3
            decision_window_sec: 6
            observe_poll_sec: 2
            min_effect_fraction: 0.20
            stability_max_slope: 0.08
            no_effect_consecutive_limit: 3

  - step: apply_tank_recirc_process_calibration
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.process_calibration.tank_recirc
    payload:
      payload:
        mode: tank_recirc
        ec_gain_per_ml: 0.0080
        ph_up_gain_per_ml: 0.0180
        ph_down_gain_per_ml: 0.0180
        ph_per_ec_ml: -0.0025
        ec_per_ph_ml: 0.0000
        transport_delay_sec: 4
        settle_sec: 4
        confidence: 0.95
        source: e2e_realhw_process_observe
        is_active: true
        meta:
          observe:
            telemetry_period_sec: 2
            window_min_samples: 3
            decision_window_sec: 6
            observe_poll_sec: 2
            min_effect_fraction: 0.20
            stability_max_slope: 0.08
            no_effect_consecutive_limit: 3

  - step: apply_irrigation_process_calibration
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.process_calibration.irrigation
    payload:
      payload:
        mode: irrigation
        ec_gain_per_ml: 0.0060
        ph_up_gain_per_ml: 0.0140
        ph_down_gain_per_ml: 0.0140
        ph_per_ec_ml: -0.0020
        ec_per_ph_ml: 0.0000
        transport_delay_sec: 6
        settle_sec: 4
        confidence: 0.85
        source: e2e_realhw_process_observe
        is_active: true
        meta:
          observe:
            telemetry_period_sec: 2
            window_min_samples: 3
            decision_window_sec: 6
            observe_poll_sec: 2
            min_effect_fraction: 0.20
            stability_max_slope: 0.08
            no_effect_consecutive_limit: 3

  - step: apply_ae3_logic_profile
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
    payload:
      payload:
        active_mode: working
        profiles:
          working:
            mode: working
            is_active: true
            subsystems:
              diagnostics:
                execution:
                  workflow: cycle_start
                  topology: two_tank_drip_substrate_trays
                  required_node_types:
                    - irrig
                  startup:
                    level_poll_interval_sec: 5
                    clean_fill_timeout_sec: 120
                    solution_fill_timeout_sec: 240
                    prepare_recirculation_timeout_sec: 240
                    telemetry_max_age_sec: 10
                    irr_state_max_age_sec: 30
                    sensor_mode_stabilization_time_sec: 0
                  target_ph: 5.1
                  target_ec: 2.33
                  prepare_tolerance:
                    ph_pct: 2
                    ec_pct: 2
                  correction:
                    dose_ec_channel: dose_ec_a
                    dose_ph_up_channel: dose_ph_up
                    dose_ph_down_channel: dose_ph_down
                    max_ec_dose_ml: 30.0
                    max_ph_dose_ml: 20.0
                    stabilization_sec: 0
                    max_ec_correction_attempts: 8
                    max_ph_correction_attempts: 8
                    solution_volume_l: 20.0
                  two_tank_commands:
                    clean_fill_start:
                      - channel: valve_clean_fill
                        cmd: set_relay
                        params:
                          state: true
                    clean_fill_stop:
                      - channel: valve_clean_fill
                        cmd: set_relay
                        params:
                          state: false
                    solution_fill_start:
                      - channel: valve_clean_supply
                        cmd: set_relay
                        params:
                          state: true
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: true
                    solution_fill_stop:
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_clean_supply
                        cmd: set_relay
                        params:
                          state: false
                    prepare_recirculation_start:
                      - channel: valve_solution_supply
                        cmd: set_relay
                        params:
                          state: true
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: true
                    prepare_recirculation_stop:
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_supply
                        cmd: set_relay
                        params:
                          state: false

  - step: create_recipe
    type: database_execute
    query: |
      INSERT INTO recipes (name, metadata, created_at, updated_at)
      VALUES (:recipe_name, '{}'::jsonb, NOW(), NOW())
    params:
      recipe_name: ${recipe_name}

  - step: load_recipe
    type: database_query
    query: |
      SELECT id
      FROM recipes
      WHERE name = :recipe_name
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_name: ${recipe_name}
    expected_rows: 1
    save: recipe_row

  - step: set_recipe_id
    type: set
    recipe_id: ${recipe_row.0.id}

  - step: create_recipe_revision
    type: database_execute
    query: |
      INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)
      VALUES (:recipe_id, 1, 'PUBLISHED', NOW(), NOW())
    params:
      recipe_id: ${recipe_id}

  - step: load_recipe_revision
    type: database_query
    query: |
      SELECT id
      FROM recipe_revisions
      WHERE recipe_id = :recipe_id
      ORDER BY id DESC
      LIMIT 1
    params:
      recipe_id: ${recipe_id}
    expected_rows: 1
    save: recipe_revision_row

  - step: set_recipe_revision_id
    type: set
    recipe_revision_id: ${recipe_revision_row.0.id}

  - step: create_grow_cycle
    type: database_execute
    query: |
      INSERT INTO grow_cycles (greenhouse_id, zone_id, recipe_revision_id, status, created_at, updated_at)
      VALUES (:greenhouse_id, :zone_id, :recipe_revision_id, 'RUNNING', NOW(), NOW())
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}

  - step: load_grow_cycle
    type: database_query
    query: |
      SELECT id
      FROM grow_cycles
      WHERE zone_id = :zone_id
        AND recipe_revision_id = :recipe_revision_id
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      recipe_revision_id: ${recipe_revision_id}
    expected_rows: 1
    save: grow_cycle_row

  - step: set_grow_cycle_id
    type: set
    grow_cycle_id: ${grow_cycle_row.0.id}

  - step: create_phase
    type: database_execute
    query: |
      INSERT INTO grow_cycle_phases (
        grow_cycle_id,
        phase_index,
        name,
        ph_target,
        ph_min,
        ph_max,
        ec_target,
        ec_min,
        ec_max,
        irrigation_mode,
        irrigation_interval_sec,
        irrigation_duration_sec,
        created_at,
        updated_at
      )
      VALUES (
        :grow_cycle_id,
        0,
        'VEG',
        5.10,
        5.00,
        5.15,
        2.33,
        2.30,
        2.38,
        'SUBSTRATE',
        600,
        45,
        NOW(),
        NOW()
      )
    params:
      grow_cycle_id: ${grow_cycle_id}

  - step: load_phase
    type: database_query
    query: |
      SELECT id
      FROM grow_cycle_phases
      WHERE grow_cycle_id = :grow_cycle_id
      ORDER BY id DESC
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    expected_rows: 1
    save: phase_row

  - step: set_phase_id
    type: set
    phase_id: ${phase_row.0.id}

  - step: activate_grow_cycle
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET current_phase_id = :phase_id,
          started_at = NOW(),
          recipe_started_at = NOW(),
          updated_at = NOW()
      WHERE id = :grow_cycle_id
    params:
      phase_id: ${phase_id}
      grow_cycle_id: ${grow_cycle_id}

  - step: apply_cycle_start_snapshot
    type: api_put
    endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id}/cycle.start_snapshot
    payload:
      payload:
        cycle_id: ${grow_cycle_id}
        zone_id: ${zone_id}

  - step: apply_cycle_phase_overrides
    type: api_put
    endpoint: /api/automation-configs/grow_cycle/${grow_cycle_id}/cycle.phase_overrides
    payload:
      payload: {}

  - step: wait_grow_cycle_bundle_ready
    type: db.wait
    query: |
      SELECT scope_type, scope_id, status, bundle_revision
      FROM automation_effective_bundles
      WHERE scope_type = 'grow_cycle'
        AND scope_id = CAST(:grow_cycle_id AS bigint)
        AND status = 'valid'
      LIMIT 1
    params:
      grow_cycle_id: ${grow_cycle_id}
    timeout: 20.0
    expected_rows: 1
    save: grow_cycle_bundle_row

  - step: reset_test_node_state
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: reset_state
      params: {}
    save: reset_state_response

  - step: wait_reset_state_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_state_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1
    optional: true

  - step: reset_test_node_state_confirm
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: reset_state
      params: {}
    save: reset_state_response_confirm

  - step: wait_reset_state_done_confirm
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_state_response_confirm.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: wait_zero_level_telemetry
    type: db.wait
    query: |
      SELECT COUNT(*)::int AS zero_levels
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.zone_id = :zone_id
        AND LOWER(TRIM(COALESCE(s.label, ''))) IN (
          'level_clean_min',
          'level_clean_max',
          'level_solution_min',
          'level_solution_max'
        )
        AND s.type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
        AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '5 minutes'
        AND COALESCE(tl.last_value, -1) <= 0.1
      HAVING COUNT(*) = 4
    params:
      zone_id: ${zone_id}
    timeout: 60.0
    expected_rows: 1
    save: zero_levels_row

  - step: insert_scheduler_like_intent
    type: database_execute
    query: |
      INSERT INTO zone_automation_intents (
        zone_id,
        intent_type,
        payload,
        idempotency_key,
        status,
        not_before,
        retry_count,
        max_retries,
        created_at,
        updated_at
      )
      VALUES (
        :zone_id,
        'start_cycle',
        jsonb_build_object(
          'source', CAST(:source AS text),
          'task_type', 'diagnostics',
          'workflow', 'cycle_start',
          'topology', 'two_tank_drip_substrate_trays'
        ),
        :idempotency_key,
        'pending',
        NOW() - INTERVAL '1 second',
        0,
        3,
        NOW(),
        NOW()
      )
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}
      source: ${scheduler_source}

  - step: start_cycle_http
    type: http_request
    method: POST
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
    headers:
      Accept: application/json
      Content-Type: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    body:
      source: ${scheduler_source}
      idempotency_key: ${idempotency_key}
    retries: 2
    retry_delay_seconds: 1
    capture_response: start_cycle_response

  - step: set_task_id
    type: set
    task_id: ${start_cycle_response.json.data.task_id}

  - step: wait_ae_command_accepted
    type: db.wait
    optional: true
    query: |
      SELECT id, task_id, external_id, payload->>'cmd_id' AS cmd_id, publish_status
      FROM ae_commands
      WHERE task_id = :task_id
        AND publish_status = 'accepted'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 30.0
    expected_rows: 1
    save: ae_command_row

  - step: wait_startup_commands_published
    type: db.wait
    optional: true
    query: |
      SELECT CAST(:task_id AS bigint) AS task_id
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
      GROUP BY task_id
      HAVING COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'storage_state'
          AND payload->>'cmd' = 'state'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_clean_fill'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
    params:
      task_id: ${task_id}
    timeout: 120.0
    expected_rows: 1

  - step: wait_runtime_irr_state_snapshot
    type: db.wait
    query: |
      SELECT id, type, created_at
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'IRR_STATE_SNAPSHOT'
        AND created_at >= :started_at
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}
    timeout: 30.0
    expected_rows: 1
    save: irr_state_event_row

  - step: wait_task_pending_clean_fill_check
    type: db.wait
    query: |
      SELECT
        id,
        status,
        topology AS mode,
        current_stage AS stage,
        error_code,
        error_message
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status IN ('pending', 'completed', 'failed')
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 20.0
    expected_rows: 1
    save: task_progress_row

  - step: wait_workflow_tank_filling
    type: db.wait
    query: |
      SELECT zone_id, workflow_phase, updated_at
      FROM zone_workflow_state
      WHERE zone_id = :zone_id
        AND workflow_phase IN ('tank_filling', 'ready')
      ORDER BY updated_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1
    save: workflow_row

  - step: force_clean_tank_full
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: set_fault_mode
      params:
        level_clean_min_override: true
        level_clean_max_override: true
        level_solution_min_override: -1
        level_solution_max_override: -1
    save: force_clean_tank_full_response

  - step: wait_force_clean_tank_full_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${force_clean_tank_full_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: wait_clean_tank_full_telemetry
    type: db.wait
    query: |
      SELECT COUNT(*)::int AS ready_cnt
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.zone_id = :zone_id
        AND s.label IN ('level_clean_min', 'level_clean_max')
        AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
        AND COALESCE(tl.last_value, 0) >= 1
      HAVING COUNT(*) = 2
    params:
      zone_id: ${zone_id}
    timeout: 30.0
    expected_rows: 1
    save: clean_tank_full_row

  - step: load_task_after_clean_override
    type: database_query
    query: |
      SELECT
        id,
        status,
        current_stage,
        workflow_phase,
        corr_step,
        error_code,
        error_message
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
      LIMIT 1
    params:
      task_id: ${task_id}
    expected_rows: 1
    save: task_after_clean_override_row

  - step: wait_solution_fill_stage
    type: db.wait
    query: |
      SELECT
        id,
        status,
        current_stage,
        workflow_phase,
        corr_step
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'pending'
        AND current_stage IN (
          'solution_fill_check',
          'prepare_recirculation_start',
          'prepare_recirculation_check'
        )
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 80.0
    expected_rows: 1
    save: solution_fill_stage_row

  - step: wait_solution_fill_commands
    type: db.wait
    query: |
      SELECT CAST(:task_id AS bigint) AS task_id
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
      GROUP BY task_id
      HAVING COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_clean_supply'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_solution_fill'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'pump_main'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'system'
          AND payload->>'cmd' = 'activate_sensor_mode'
      ) >= 2
    params:
      task_id: ${task_id}
    timeout: 40.0
    expected_rows: 1

  - step: wait_ph_ec_telemetry_available
    type: db.wait
    query: |
      SELECT COUNT(*)::int AS metrics_ready
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
        AND (
          (s.node_id = CAST(:ph_node_id AS bigint) AND s.type = 'PH' AND s.label = 'ph_sensor')
          OR
          (s.node_id = CAST(:ec_node_id AS bigint) AND s.type = 'EC' AND s.label = 'ec_sensor')
        )
      HAVING COUNT(*) = 2
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}
    timeout: 30.0
    expected_rows: 1

  - step: force_solution_tank_full
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: set_fault_mode
      params:
        level_clean_min_override: true
        level_clean_max_override: true
        level_solution_min_override: true
        level_solution_max_override: true
    save: force_solution_tank_full_response

  - step: wait_force_solution_tank_full_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${force_solution_tank_full_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: wait_fill_ec_correction_command
    type: db.wait
    query: |
      SELECT id, channel, payload->>'cmd' AS cmd
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND publish_status = 'accepted'
        AND channel = 'pump_a'
        AND payload->>'cmd' = 'dose'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 40.0
    expected_rows: 1
    save: fill_ec_correction_row

  - step: load_fill_ph_correction_commands_if_any
    type: database_query
    query: |
      SELECT id, channel, payload->>'cmd' AS cmd
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND publish_status = 'accepted'
        AND channel IN ('pump_acid', 'pump_base')
        AND payload->>'cmd' = 'dose'
      ORDER BY id DESC
      LIMIT 5
    params:
      task_id: ${task_id}
    expected_rows: 0
    save: fill_ph_correction_rows

  - step: wait_prepare_recirculation_stage
    type: db.wait
    query: |
      SELECT
        id,
        status,
        current_stage,
        workflow_phase,
        corr_step
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'pending'
        AND current_stage = 'prepare_recirculation_check'
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 180.0
    expected_rows: 1
    save: prepare_recirc_stage_row

  - step: wait_prepare_recirculation_commands
    type: db.wait
    query: |
      SELECT CAST(:task_id AS bigint) AS task_id
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
      GROUP BY task_id
      HAVING COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_solution_supply'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 1
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'valve_solution_fill'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 2
         AND COUNT(*) FILTER (
        WHERE publish_status = 'accepted'
          AND channel = 'pump_main'
          AND payload->>'cmd' = 'set_relay'
          AND COALESCE(payload->'params'->>'state', 'false') = 'true'
      ) >= 2
    params:
      task_id: ${task_id}
    timeout: 40.0
    expected_rows: 1

  - step: wait_recirculation_ec_correction_command
    type: db.wait
    query: |
      SELECT id, channel, payload->>'cmd' AS cmd
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND id > CAST(:after_command_id AS bigint)
        AND publish_status = 'accepted'
        AND channel = 'pump_a'
        AND payload->>'cmd' = 'dose'
      ORDER BY id DESC
      LIMIT 1
    params:
      task_id: ${task_id}
      after_command_id: ${fill_ec_correction_row.0.id}
    timeout: 120.0
    expected_rows: 1
    save: recirc_ec_correction_row

  - step: load_recirculation_ph_correction_command_count
    type: database_query
    query: |
      SELECT COUNT(*)::int AS recirc_ph_cnt
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND id > CAST(:after_command_id AS bigint)
        AND publish_status = 'accepted'
        AND channel IN ('pump_acid', 'pump_base')
        AND payload->>'cmd' = 'dose'
    params:
      task_id: ${task_id}
      after_command_id: ${fill_ec_correction_row.0.id}
    expected_rows: 1
    save: recirc_ph_correction_count_row

  - step: force_recirculation_near_target_band
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: set_fault_mode
      params:
        ph_value: 5.10
        ec_value: 2.32
    save: force_recirculation_near_target_response

  - step: wait_force_recirculation_near_target_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${force_recirculation_near_target_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: wait_task_completed
    type: db.wait
    query: |
      SELECT id, status, completed_at, error_code, error_message
      FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
        AND status = 'completed'
      LIMIT 1
    params:
      task_id: ${task_id}
    timeout: 600.0
    expected_rows: 1
    save: completed_task_row

  - step: wait_workflow_ready
    type: db.wait
    query: |
      SELECT zone_id, workflow_phase, updated_at
      FROM zone_workflow_state
      WHERE zone_id = :zone_id
        AND workflow_phase = 'ready'
      ORDER BY updated_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 180.0
    expected_rows: 1
    save: workflow_ready_row

  - step: wait_targets_reached_on_node
    type: db.wait
    optional: true
    query: |
      SELECT
        ph.last_value AS ph_value,
        ec.last_value AS ec_value,
        ph.last_ts AS ph_ts,
        ec.last_ts AS ec_ts
      FROM telemetry_last ph
      JOIN sensors phs ON phs.id = ph.sensor_id
      JOIN telemetry_last ec ON true
      JOIN sensors ecs ON ecs.id = ec.sensor_id
      WHERE phs.node_id = CAST(:ph_node_id AS bigint)
        AND phs.type = 'PH'
        AND phs.label = 'ph_sensor'
        AND ecs.node_id = CAST(:ec_node_id AS bigint)
        AND ecs.type = 'EC'
        AND ecs.label = 'ec_sensor'
        AND ph.last_ts >= NOW() - INTERVAL '30 seconds'
        AND ec.last_ts >= NOW() - INTERVAL '30 seconds'
        AND ph.last_value BETWEEN 5.00 AND 5.15
        AND ec.last_value BETWEEN 2.30 AND 2.38
      LIMIT 1
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}
    timeout: 60.0
    expected_rows: 1
    save: targets_reached_row

  - step: load_expected_ae_command_counts
    type: database_query
    query: |
      SELECT
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel = 'storage_state'
            AND payload->>'cmd' = 'state'
        )::int AS irr_state_probe_cnt,
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel = 'valve_clean_fill'
            AND payload->>'cmd' = 'set_relay'
            AND COALESCE(payload->'params'->>'state', 'false') = 'true'
        )::int AS clean_fill_start_cnt,
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel = 'valve_clean_supply'
            AND payload->>'cmd' = 'set_relay'
            AND COALESCE(payload->'params'->>'state', 'false') = 'true'
        )::int AS solution_fill_start_cnt,
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel = 'valve_solution_supply'
            AND payload->>'cmd' = 'set_relay'
            AND COALESCE(payload->'params'->>'state', 'false') = 'true'
        )::int AS prepare_recirculation_start_cnt,
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel = 'pump_a'
            AND payload->>'cmd' = 'dose'
        )::int AS ec_correction_cnt,
        COUNT(*) FILTER (
          WHERE publish_status = 'accepted'
            AND channel IN ('pump_acid', 'pump_base')
            AND payload->>'cmd' = 'dose'
        )::int AS ph_correction_cnt
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}
    expected_rows: 1
    save: expected_ae_command_counts_row

  - step: load_runtime_reset_commands
    type: database_query
    query: |
      SELECT COUNT(*)::int AS runtime_reset_cnt
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
        AND publish_status = 'accepted'
        AND channel = 'storage_state'
        AND payload->>'cmd' = 'reset_state'
    params:
      task_id: ${task_id}
    expected_rows: 1
    save: runtime_reset_commands_row

  - step: count_task_commands
    type: database_query
    query: |
      SELECT COUNT(*)::int AS cnt
      FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}
    expected_rows: 1
    save: task_command_count_row

  - step: get_internal_task_status
    type: http_request
    method: GET
    url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/internal/tasks/${task_id}
    headers:
      Accept: application/json
      X-Trace-Id: ${scheduler_trace_id}
      X-Scheduler-Id: laravel-scheduler
      Authorization: Bearer dev-token-12345
    capture_response: internal_task_response

assertions:
  - name: reset_zero_level_telemetry_ready
    type: custom_assert
    condition: "int(context.get('zero_levels_row', [{}])[0].get('zero_levels', 0)) == 4"

  - name: start_cycle_http_200
    type: custom_assert
    condition: "int(context.get('start_cycle_response', {}).get('status_code', 0)) == 200"

  - name: start_cycle_response_active
    type: json_assertion
    source: start_cycle_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.accepted
        operator: equals
        value: true
      - field: data.runner_state
        operator: equals
        value: active

  - name: runtime_task_not_failed
    type: custom_assert
    condition: "str(context.get('task_progress_row', [{}])[0].get('status', '')).lower() != 'failed'"

  - name: workflow_phase_tank_filling
    type: custom_assert
    condition: "str(context.get('workflow_row', [{}])[0].get('workflow_phase', '')).lower() in ('tank_filling', 'ready')"

  - name: solution_fill_stage_reached
    type: custom_assert
    condition: "str(context.get('solution_fill_stage_row', [{}])[0].get('current_stage', '')).lower() in ('solution_fill_check', 'prepare_recirculation_start', 'prepare_recirculation_check')"

  - name: prepare_recirculation_stage_reached
    type: custom_assert
    condition: "str(context.get('prepare_recirc_stage_row', [{}])[0].get('current_stage', '')).lower() == 'prepare_recirculation_check' and str(context.get('prepare_recirc_stage_row', [{}])[0].get('workflow_phase', '')).lower() == 'tank_recirc'"

  - name: task_completed
    type: custom_assert
    condition: "str(context.get('completed_task_row', [{}])[0].get('status', '')).lower() == 'completed'"

  - name: workflow_phase_ready
    type: custom_assert
    condition: "str(context.get('workflow_ready_row', [{}])[0].get('workflow_phase', '')).lower() == 'ready'"

  - name: at_least_ten_ae_commands_logged
    type: custom_assert
    condition: "int(context.get('task_command_count_row', [{}])[0].get('cnt', 0)) >= 10"

  - name: irr_state_probe_logged
    type: custom_assert
    condition: "int(context.get('expected_ae_command_counts_row', [{}])[0].get('irr_state_probe_cnt', 0)) >= 1"

  - name: clean_fill_start_logged
    type: custom_assert
    condition: "int(context.get('expected_ae_command_counts_row', [{}])[0].get('clean_fill_start_cnt', 0)) >= 1"

  - name: solution_fill_start_logged
    type: custom_assert
    condition: "int(context.get('expected_ae_command_counts_row', [{}])[0].get('solution_fill_start_cnt', 0)) >= 1"

  - name: prepare_recirculation_start_logged
    type: custom_assert
    condition: "int(context.get('expected_ae_command_counts_row', [{}])[0].get('prepare_recirculation_start_cnt', 0)) >= 1"

  - name: ec_correction_logged_twice
    type: custom_assert
    condition: "int(context.get('expected_ae_command_counts_row', [{}])[0].get('ec_correction_cnt', 0)) >= 2"

  - name: ph_correction_optional
    type: custom_assert
    condition: "int(context.get('recirc_ph_correction_count_row', [{}])[0].get('recirc_ph_cnt', 0)) >= 0"

  - name: runtime_never_resets_node_during_task
    type: custom_assert
    condition: "int(context.get('runtime_reset_commands_row', [{}])[0].get('runtime_reset_cnt', 0)) == 0"

  - name: internal_task_completed
    type: json_assertion
    source: internal_task_response
    path: json
    expected:
      - field: status
        operator: equals
        value: ok
      - field: data.task_id
        operator: equals
        value: ${task_id}
      - field: data.status
        operator: equals
        value: completed

cleanup:
  - step: reset_test_node_after_run
    type: ae_test_hook
    optional: true
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: storage_state
      cmd: reset_state
      params: {}

  - step: cleanup_runtime_events
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_events
      WHERE zone_id = :zone_id
        AND created_at >= :started_at
    params:
      zone_id: ${zone_id}
      started_at: ${scenario_window.0.started_at}

  - step: cleanup_e2e_calibrations
    type: database_execute
    optional: true
    query: |
      DELETE FROM pump_calibrations
      WHERE source = 'e2e_realhw_setup_ready'
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: cleanup_e2e_process_calibrations
    type: database_execute
    optional: true
    query: |
      SELECT 1;

  - step: cleanup_e2e_bindings
    type: database_execute
    optional: true
    query: |
      DELETE FROM channel_bindings
      WHERE role IN ('dose_ec_a', 'dose_ph_up', 'dose_ph_down')
        AND node_channel_id IN (
          CAST(:ec_pump_channel_id AS bigint),
          CAST(:ph_up_channel_id AS bigint),
          CAST(:ph_down_channel_id AS bigint)
        )
    params:
      ec_pump_channel_id: ${ec_pump_channel_id}
      ph_up_channel_id: ${ph_up_channel_id}
      ph_down_channel_id: ${ph_down_channel_id}

  - step: cleanup_e2e_infrastructure
    type: database_execute
    optional: true
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone'
        AND owner_id = :zone_id
        AND label IN ('AE3 E2E EC Dose', 'AE3 E2E PH Up', 'AE3 E2E PH Down')
    params:
      zone_id: ${zone_id}

  - step: cleanup_runtime_ae_commands
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_commands
      WHERE task_id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}

  - step: cleanup_runtime_ae_task
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_tasks
      WHERE id = CAST(:task_id AS bigint)
    params:
      task_id: ${task_id}

  - step: cleanup_runtime_ae_leases
    type: database_execute
    optional: true
    query: |
      DELETE FROM ae_zone_leases
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_runtime_intent
    type: database_execute
    optional: true
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND idempotency_key = :idempotency_key
    params:
      zone_id: ${zone_id}
      idempotency_key: ${idempotency_key}

  - step: cleanup_created_phase
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycle_phases
      WHERE id = CAST(:phase_id AS bigint)
    params:
      phase_id: ${phase_id}

  - step: cleanup_created_cycle
    type: database_execute
    optional: true
    query: |
      DELETE FROM grow_cycles
      WHERE id = CAST(:grow_cycle_id AS bigint)
    params:
      grow_cycle_id: ${grow_cycle_id}

  - step: cleanup_created_recipe_revision
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipe_revisions
      WHERE id = CAST(:recipe_revision_id AS bigint)
    params:
      recipe_revision_id: ${recipe_revision_id}

  - step: cleanup_created_recipe
    type: database_execute
    optional: true
    query: |
      DELETE FROM recipes
      WHERE id = CAST(:recipe_id AS bigint)
    params:
      recipe_id: ${recipe_id}

  - step: cleanup_created_profile
    type: database_execute
    optional: true
    query: |
      DELETE FROM automation_config_documents
      WHERE namespace = 'zone.logic_profile'
        AND scope_type = 'zone'
        AND scope_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_e2e_ph_ec_sensors
    type: database_execute
    optional: true
    query: |
      DELETE FROM sensors
      WHERE (node_id = CAST(:ph_node_id AS bigint) AND type = 'PH' AND label = 'ph_sensor')
         OR (node_id = CAST(:ec_node_id AS bigint) AND type = 'EC' AND label = 'ec_sensor')
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}

  - step: restore_previous_profile_state
    type: database_execute
    optional: true
    query: |
      SELECT 1;

  - step: restore_previous_zone_runtime
    type: database_execute
    optional: true
    query: |
      UPDATE zones
      SET automation_runtime = :automation_runtime,
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}
      automation_runtime: ${previous_automation_runtime}
