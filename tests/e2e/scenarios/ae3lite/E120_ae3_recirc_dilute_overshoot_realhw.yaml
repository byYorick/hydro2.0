      mode: tank_recirc
      ec_gain_per_ml: 0.008
      ph_up_gain_per_ml: 0.018
      ph_down_gain_per_ml: 0.018
      ph_per_ec_ml: -0.0025
      ec_per_ph_ml: 0.0
      transport_delay_sec: 2
      settle_sec: 2
      confidence: 0.95
      source: e2e_realhw_process_observe
      is_active: true
      meta:
        observe:
          telemetry_period_sec: 2
          window_min_samples: 2
          decision_window_sec: 4
          observe_poll_sec: 2
          min_effect_fraction: 0.2
          stability_max_slope: 0.08
          no_effect_consecutive_limit: 3
- step: apply_irrigation_process_calibration
  type: api_put
  endpoint: /api/automation-configs/zone/${zone_id}/zone.process_calibration.irrigation
  payload:
