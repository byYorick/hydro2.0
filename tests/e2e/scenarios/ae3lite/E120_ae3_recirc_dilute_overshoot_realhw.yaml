    INSERT INTO grow_cycle_phases (
      grow_cycle_id,
      phase_index,
      name,
      ph_target,
      ph_min,
      ph_max,
      ec_target,
      ec_min,
      ec_max,
      nutrient_mode,
      nutrient_npk_ratio_pct,
      nutrient_calcium_ratio_pct,
      nutrient_magnesium_ratio_pct,
      nutrient_micro_ratio_pct,
      nutrient_solution_volume_l,
      irrigation_mode,
      irrigation_interval_sec,
      irrigation_duration_sec,
      created_at,
      updated_at
    )
    VALUES (
      :grow_cycle_id,
      0,
      'VEG',
      5.10,
      5.00,
      5.15,
      2.33,
      2.30,
      2.38,
      'ratio_ec_pid',
      44.00,
      36.00,
      12.00,
      8.00,
      20.0,
      'SUBSTRATE',
      600,
      45,
      NOW(),
      NOW()
    )
  params:
    grow_cycle_id: ${grow_cycle_id}
- step: load_phase
  type: database_query
  query: 'SELECT id

