- step: create_recipe_revision
  type: database_execute
  query: 'INSERT INTO recipe_revisions (recipe_id, revision_number, status, created_at, updated_at)

    VALUES (:recipe_id, 1, ''PUBLISHED'', NOW(), NOW())

    '
  params:
    recipe_id: ${recipe_id}
- step: load_recipe_revision
  type: database_query
  query: 'SELECT id

    FROM recipe_revisions

    WHERE recipe_id = :recipe_id

    ORDER BY id DESC

    LIMIT 1

