          observe_poll_sec: 2
          min_effect_fraction: 0.2
          stability_max_slope: 0.08
          no_effect_consecutive_limit: 3
- step: apply_ae3_logic_profile
  type: api_put
  endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
  payload:
    payload:
      active_mode: working
      profiles:
        working:
          mode: working
          is_active: true
          subsystems:
            diagnostics:
              execution:
                workflow: cycle_start
                topology: two_tank_drip_substrate_trays
                required_node_types:
                - irrig
                startup:
                  level_poll_interval_sec: 5
                  clean_fill_timeout_sec: 120
                  solution_fill_timeout_sec: 180
                  prepare_recirculation_timeout_sec: 180
                  telemetry_max_age_sec: 60
                  irr_state_max_age_sec: 30
                  irr_state_wait_timeout_sec: 12
                  sensor_mode_stabilization_time_sec: 0
                target_ph: 5.1
                target_ec: 2.33
                prepare_tolerance:
                  ph_pct: 9
                  ec_pct: 15
                two_tank_commands:
                  clean_fill_start:
                  - channel: valve_clean_fill
                    cmd: set_relay
                    params:
                      state: true
                  clean_fill_stop:
                  - channel: valve_clean_fill
                    cmd: set_relay
                    params:
                      state: false
                  solution_fill_start:
                  - channel: valve_clean_supply
                    cmd: set_relay
                    params:
                      state: true
                  - channel: valve_solution_fill
                    cmd: set_relay
                    params:
                      state: true
                  - channel: pump_main
                    cmd: set_relay
                    params:
                      state: true
                  solution_fill_stop:
                  - channel: pump_main
                    cmd: set_relay
                    params:
                      state: false
                  - channel: valve_solution_fill
                    cmd: set_relay
                    params:
                      state: false
                  - channel: valve_clean_supply
                    cmd: set_relay
                    params:
                      state: false
                  prepare_recirculation_start:
                  - channel: valve_solution_supply
                    cmd: set_relay
                    params:
                      state: true
                  - channel: valve_solution_fill
                    cmd: set_relay
                    params:
                      state: true
                  - channel: pump_main
                    cmd: set_relay
                    params:
                      state: true
                  prepare_recirculation_stop:
                  - channel: pump_main
                    cmd: set_relay
                    params:
                      state: false
                  - channel: valve_solution_fill
                    cmd: set_relay
                    params:
                      state: false
                  - channel: valve_solution_supply
                    cmd: set_relay
                    params:
                      state: false
                  recirc_dilute_start:
                  - channel: valve_clean_supply
                    cmd: set_relay
                    params:
                      state: true
                  recirc_dilute_stop:
                  - channel: valve_clean_supply
                    cmd: set_relay
                    params:
                      state: false
- step: create_recipe
