- step: wait_grow_cycle_bundle_ready
  type: db.wait
  query: "SELECT scope_type, scope_id, status, bundle_revision\nFROM automation_effective_bundles\nWHERE scope_type = 'grow_cycle'\n\
    \  AND scope_id = CAST(:grow_cycle_id AS bigint)\n  AND status = 'valid'\nLIMIT 1\n"
  params:
    grow_cycle_id: ${grow_cycle_id}
  timeout: 20.0
  expected_rows: 1
  save: grow_cycle_bundle_row
- step: reset_test_node_state
  type: hardware_reset_state
  zone_id: ${zone_id}
  node_uid: ${test_node_uid}
  channel: storage_state
  save: reset_state_response
- step: wait_reset_state_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\n\
    LIMIT 1\n"
  params:
    cmd_id: ${reset_state_response.data.cmd_id}
  timeout: 30.0
  expected_rows: 1
  optional: true
- step: reset_test_node_state_confirm
  type: hardware_reset_state
  zone_id: ${zone_id}
  node_uid: ${test_node_uid}
  channel: storage_state
  save: reset_state_response_confirm
- step: wait_reset_state_done_confirm
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\n\
    LIMIT 1\n"
  params:
    cmd_id: ${reset_state_response_confirm.data.cmd_id}
  timeout: 30.0
  expected_rows: 1
- step: wait_zero_level_telemetry
  type: db.wait
  query: "SELECT COUNT(*)::int AS zero_levels\nFROM sensors s\nJOIN telemetry_last tl ON tl.sensor_id = s.id\nWHERE s.zone_id\
    \ = :zone_id\n  AND LOWER(TRIM(COALESCE(s.label, ''))) IN (\n    'level_clean_min',\n    'level_clean_max',\n    'level_solution_min',\n\
    \    'level_solution_max'\n  )\n  AND s.type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')\n  AND COALESCE(tl.last_ts, tl.updated_at)\
    \ >= NOW() - INTERVAL '5 minutes'\n  AND COALESCE(tl.last_value, -1) <= 0.1\nHAVING COUNT(*) = 4\n"
  params:
    zone_id: ${zone_id}
  timeout: 60.0
  expected_rows: 1
  save: zero_levels_row
- step: insert_scheduler_like_intent
  type: database_execute
  query: "INSERT INTO zone_automation_intents (\n  zone_id,\n  intent_type,\n  task_type,\n  topology,\n  intent_source,\n\
    \  idempotency_key,\n  status,\n  not_before,\n  retry_count,\n  max_retries,\n  created_at,\n  updated_at\n)\nVALUES\
    \ (\n  :zone_id,\n  'start_cycle',\n  'cycle_start',\n  'two_tank_drip_substrate_trays',\n  CAST(:source AS text),\n \
    \ :idempotency_key,\n  'pending',\n  NOW() - INTERVAL '1 second',\n  0,\n  3,\n  NOW(),\n  NOW()\n)\n"
  params:
    zone_id: ${zone_id}
    idempotency_key: ${idempotency_key}
    source: ${scheduler_source}
- step: start_cycle_http
  type: http_request
  method: POST
  url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/zones/${zone_id}/start-cycle
  headers:
    Accept: application/json
    Content-Type: application/json
    X-Trace-Id: ${scheduler_trace_id}
    X-Scheduler-Id: laravel-scheduler
    Authorization: Bearer dev-token-12345
  body:
    source: ${scheduler_source}
    idempotency_key: ${idempotency_key}
  retries: 2
  retry_delay_seconds: 1
  capture_response: start_cycle_response
- step: set_task_id
  type: set
  task_id: ${start_cycle_response.json.data.task_id}
- step: wait_ae_command_accepted
  type: db.wait
  query: "SELECT id, task_id, external_id, payload->>'cmd_id' AS cmd_id, publish_status\nFROM ae_commands\nWHERE task_id =\
    \ :task_id\n  AND publish_status = 'accepted'\nORDER BY id DESC\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 30.0
  expected_rows: 1
  save: ae_command_row
- step: wait_startup_commands_published
  type: db.wait
  query: "SELECT CAST(:task_id AS bigint) AS task_id\nFROM ae_commands\nWHERE task_id = CAST(:task_id AS bigint)\nGROUP BY\
    \ task_id\nHAVING COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND channel = 'storage_state'\n    AND payload->>'cmd'\
    \ = 'state'\n) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND channel = 'valve_clean_fill'\n\
    \    AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n) >= 1\n"
  params:
    task_id: ${task_id}
  timeout: 30.0
  expected_rows: 1
- step: wait_runtime_irr_state_snapshot
  type: db.wait
  query: "SELECT id, type, created_at\nFROM zone_events\nWHERE zone_id = :zone_id\n  AND type = 'IRR_STATE_SNAPSHOT'\n  AND\
    \ created_at >= :started_at\nORDER BY created_at DESC\nLIMIT 1\n"
  params:
    zone_id: ${zone_id}
    started_at: ${scenario_window.0.started_at}
  timeout: 30.0
  expected_rows: 1
  save: irr_state_event_row
- step: wait_task_pending_clean_fill_check
  type: db.wait
  query: "SELECT\n  id,\n  status,\n  topology AS mode,\n  current_stage AS stage,\n  error_code,\n  error_message\nFROM ae_tasks\n\
    WHERE id = CAST(:task_id AS bigint)\n  AND status IN ('pending', 'claimed', 'running', 'waiting_command')\n  AND current_stage\
    \ = 'clean_fill_check'\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 20.0
  expected_rows: 1
  save: task_progress_row
- step: wait_workflow_tank_filling
  type: db.wait
  query: "SELECT zone_id, workflow_phase, updated_at\nFROM zone_workflow_state\nWHERE zone_id = :zone_id\n  AND workflow_phase\
    \ IN ('tank_filling', 'ready')\nORDER BY updated_at DESC\nLIMIT 1\n"
  params:
    zone_id: ${zone_id}
  timeout: 20.0
  expected_rows: 1
  save: workflow_row
- step: force_clean_tank_full
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: set_fault_mode
    params:
      level_clean_min_override: true
      level_clean_max_override: true
      level_solution_min_override: -1
      level_solution_max_override: -1
  save: force_clean_tank_full_response
- step: wait_force_clean_tank_full_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\n\
    LIMIT 1\n"
  params:
    cmd_id: ${force_clean_tank_full_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: wait_clean_tank_full_telemetry
  type: db.wait
  query: "SELECT COUNT(*)::int AS ready_cnt\nFROM sensors s\nJOIN telemetry_last tl ON tl.sensor_id = s.id\nWHERE s.zone_id\
    \ = :zone_id\n  AND s.label IN ('level_clean_min', 'level_clean_max')\n  AND COALESCE(tl.last_ts, tl.updated_at) >= NOW()\
    \ - INTERVAL '30 seconds'\n  AND COALESCE(tl.last_value, 0) >= 1\nHAVING COUNT(*) = 2\n"
  params:
    zone_id: ${zone_id}
  timeout: 30.0
  expected_rows: 1
  save: clean_tank_full_row
- step: load_task_after_clean_override
  type: database_query
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step,\n  error_code,\n  error_message\nFROM\
    \ ae_tasks\nWHERE id = CAST(:task_id AS bigint)\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  expected_rows: 1
  save: task_after_clean_override_row
- step: wait_solution_fill_stage
  type: db.wait
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step\nFROM ae_tasks\nWHERE id = CAST(:task_id\
    \ AS bigint)\n  AND status IN ('pending', 'claimed', 'running', 'waiting_command')\n  AND current_stage IN (\n    'solution_fill_check',\n\
    \    'prepare_recirculation_start',\n    'prepare_recirculation_check'\n  )\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 80.0
  expected_rows: 1
  save: solution_fill_stage_row
- step: wait_solution_fill_commands
  type: db.wait
  query: "SELECT CAST(:task_id AS bigint) AS task_id\nFROM ae_commands\nWHERE task_id = CAST(:task_id AS bigint)\nGROUP BY\
    \ task_id\nHAVING COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND channel = 'valve_clean_supply'\n   \
    \ AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n) >= 1\n   AND COUNT(*)\
    \ FILTER (\n  WHERE publish_status = 'accepted'\n    AND channel = 'valve_solution_fill'\n    AND payload->>'cmd' = 'set_relay'\n\
    \    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status\
    \ = 'accepted'\n    AND channel = 'pump_main'\n    AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n) >= 1\n   AND COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND channel = 'system'\n\
    \    AND payload->>'cmd' = 'activate_sensor_mode'\n) >= 2\n"
  params:
    task_id: ${task_id}
  timeout: 40.0
  expected_rows: 1
- step: wait_ph_ec_telemetry_available
  type: db.wait
  query: "SELECT COUNT(*)::int AS metrics_ready\nFROM sensors s\nJOIN telemetry_last tl ON tl.sensor_id = s.id\nWHERE COALESCE(tl.last_ts,\
    \ tl.updated_at) >= NOW() - INTERVAL '30 seconds'\n  AND (\n    (s.node_id = CAST(:ph_node_id AS bigint) AND s.type =\
    \ 'PH' AND s.label = 'ph_sensor')\n    OR\n    (s.node_id = CAST(:ec_node_id AS bigint) AND s.type = 'EC' AND s.label\
    \ = 'ec_sensor')\n  )\nHAVING COUNT(*) = 2\n"
  params:
    ph_node_id: ${ph_node_id}
    ec_node_id: ${ec_node_id}
  timeout: 30.0
  expected_rows: 1
- step: wait_sensor_mode_telemetry_cadence
  type: db.wait
  query: "SELECT\n  ph.last_ts AS ph_ts,\n  ec.last_ts AS ec_ts,\n  EXTRACT(EPOCH FROM (NOW() - ph.last_ts))::numeric(10,3)\
    \ AS ph_age_sec,\n  EXTRACT(EPOCH FROM (NOW() - ec.last_ts))::numeric(10,3) AS ec_age_sec\nFROM telemetry_last ph\nJOIN\
    \ sensors phs ON phs.id = ph.sensor_id\nJOIN telemetry_last ec ON true\nJOIN sensors ecs ON ecs.id = ec.sensor_id\nWHERE\
    \ phs.node_id = CAST(:ph_node_id AS bigint)\n  AND phs.type = 'PH'\n  AND phs.label = 'ph_sensor'\n  AND ecs.node_id =\
    \ CAST(:ec_node_id AS bigint)\n  AND ecs.type = 'EC'\n  AND ecs.label = 'ec_sensor'\n  AND ph.last_ts >= NOW() - INTERVAL\
    \ '6 seconds'\n  AND ec.last_ts >= NOW() - INTERVAL '6 seconds'\nLIMIT 1\n"
  params:
    ph_node_id: ${ph_node_id}
    ec_node_id: ${ec_node_id}
  timeout: 20.0
  expected_rows: 1
  save: sensor_mode_cadence_row
- step: hold_solution_tank_filling_for_ca_dose
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: set_fault_mode
    params:
      level_clean_min_override: true
      level_clean_max_override: true
      level_solution_min_override: true
      level_solution_max_override: false
  save: hold_solution_tank_filling_for_ca_dose_response
- step: wait_hold_solution_tank_filling_for_ca_dose_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\n\
    LIMIT 1\n"
  params:
    cmd_id: ${hold_solution_tank_filling_for_ca_dose_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: seed_solution_fill_sensor_baseline
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: set_fault_mode
    params:
      level_clean_min_override: true
      level_clean_max_override: true
      level_solution_min_override: true
      level_solution_max_override: false
      ph_value: 7.0
      ec_value: 0.45
  save: seed_solution_fill_sensor_baseline_response
- step: wait_seed_solution_fill_sensor_baseline_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\n\
    LIMIT 1\n"
  params:
    cmd_id: ${seed_solution_fill_sensor_baseline_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: wait_fill_ec_correction_command
  type: db.wait
  query: "SELECT id, channel, payload->>'cmd' AS cmd\nFROM ae_commands\nWHERE task_id = CAST(:task_id AS bigint)\n  AND publish_status\
    \ = 'accepted'\n  AND channel = 'pump_b'\n  AND payload->>'cmd' = 'dose'\nORDER BY id DESC\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 120.0
  expected_rows: 1
  save: fill_ec_correction_row
- step: load_fill_ph_correction_commands_if_any
  type: database_query
  query: "SELECT id, channel, payload->>'cmd' AS cmd\nFROM ae_commands\nWHERE task_id = CAST(:task_id AS bigint)\n  AND publish_status\
    \ = 'accepted'\n  AND channel IN ('pump_acid', 'pump_base')\n  AND payload->>'cmd' = 'dose'\nORDER BY id DESC\nLIMIT 5\n"
  params:
    task_id: ${task_id}
  save: fill_ph_correction_rows
- step: complete_solution_fill_after_ec_correction
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: set_fault_mode
    params:
      level_clean_min_override: true
      level_clean_max_override: true
      level_solution_min_override: true
      level_solution_max_override: true
  save: complete_solution_fill_after_ec_correction_response
- step: wait_complete_solution_fill_after_ec_correction_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\n\
    LIMIT 1\n"
  params:
    cmd_id: ${complete_solution_fill_after_ec_correction_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: wait_prepare_recirculation_stage
  type: db.wait
  query: "SELECT\n  id,\n  status,\n  current_stage,\n  workflow_phase,\n  corr_step,\n  updated_at AS stage_started_at\n\
    FROM ae_tasks\nWHERE id = CAST(:task_id AS bigint)\n  AND status IN ('pending', 'claimed', 'running', 'waiting_command')\n\
    \  AND current_stage = 'prepare_recirculation_check'\nLIMIT 1\n"
  params:
    task_id: ${task_id}
  timeout: 180.0
  expected_rows: 1
  save: prepare_recirc_stage_row
- step: wait_prepare_recirculation_commands
  type: db.wait
  query: "SELECT CAST(:task_id AS bigint) AS task_id\nFROM ae_commands\nWHERE task_id = CAST(:task_id AS bigint)\nGROUP BY\
    \ task_id\nHAVING COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND channel = 'valve_solution_supply'\n\
    \    AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n) >= 1\n   AND\
    \ COUNT(*) FILTER (\n  WHERE publish_status = 'accepted'\n    AND channel = 'valve_solution_fill'\n    AND payload->>'cmd'\
    \ = 'set_relay'\n    AND COALESCE(payload->'params'->>'state', 'false') = 'true'\n) >= 2\n   AND COUNT(*) FILTER (\n \
    \ WHERE publish_status = 'accepted'\n    AND channel = 'pump_main'\n    AND payload->>'cmd' = 'set_relay'\n    AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n) >= 2\n"
  params:
    task_id: ${task_id}
  timeout: 40.0
  expected_rows: 1
- step: seed_recirculation_sensor_values
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: set_fault_mode
    params:
      ph_value: 5.68
      ec_value: 2.90
      # Dilute pulse is fail-closed when solution_max is ON (overflow risk).
      level_solution_max_override: false
      level_solution_min_override: true
  save: seed_recirculation_sensor_values_response
- step: wait_seed_recirculation_sensor_values_done
  type: db.wait
  query: "SELECT id, cmd_id, status\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at DESC\n\
    LIMIT 1\n"
  params:
    cmd_id: ${seed_recirculation_sensor_values_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
- step: load_seed_recirculation_command_row
  type: database_query
  query: "SELECT id, cmd_id, created_at\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at\
    \ DESC\nLIMIT 1\n"
  params:
    cmd_id: ${seed_recirculation_sensor_values_response.data.cmd_id}
  expected_rows: 1
  save: seed_recirculation_command_row
- step: wait_seeded_recirculation_telemetry
  type: db.wait
  query: "\n      SELECT\n        ph.last_value AS ph_value,\n        ec.last_value AS ec_value\n      FROM telemetry_last\
    \ ph\n      JOIN sensors phs ON phs.id = ph.sensor_id\n      JOIN telemetry_last ec ON true\n      JOIN sensors ecs ON\
    \ ecs.id = ec.sensor_id\n      WHERE phs.node_id = CAST(:ph_node_id AS bigint)\n        AND phs.type = 'PH'\n        AND\
    \ phs.label = 'ph_sensor'\n        AND ecs.node_id = CAST(:ec_node_id AS bigint)\n        AND ecs.type = 'EC'\n      \
    \  AND ecs.label = 'ec_sensor'\n        AND ph.last_ts >= NOW() - INTERVAL '30 seconds'\n        AND ec.last_ts >= NOW()\
    \ - INTERVAL '30 seconds'\n        AND ph.last_value BETWEEN 5.63 AND 5.73\n        AND ec.last_value BETWEEN 2.85 AND\
    \ 2.95\n      LIMIT 1\n"
  params:
    ph_node_id: ${ph_node_id}
    ec_node_id: ${ec_node_id}
  timeout: 30.0
  expected_rows: 1
  save: seeded_recirculation_telemetry_row
- step: reseed_recirculation_sensor_values_for_stability
  type: ae_test_hook
  zone_id: ${zone_id}
  action: publish_command
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: set_fault_mode
    params:
      ph_value: 5.68
      ec_value: 2.90
      level_solution_max_override: false
      level_solution_min_override: true
  save: reseed_recirculation_sensor_values_response
- step: wait_reseed_recirculation_sensor_values_done
  type: db.wait
  query: "SELECT id, cmd_id, status, created_at\nFROM commands\nWHERE cmd_id = :cmd_id\n  AND status = 'DONE'\nORDER BY created_at\
    \ DESC\nLIMIT 1\n"
  params:
    cmd_id: ${reseed_recirculation_sensor_values_response.data.cmd_id}
  timeout: 20.0
  expected_rows: 1
  save: reseed_recirculation_command_row
- step: wait_recirculation_seed_stable_window
  type: db.wait
  query: "WITH ph_samples AS (\n  SELECT tsamp.ts, tsamp.value\n  FROM telemetry_samples tsamp\n  JOIN sensors s ON s.id =\
    \ tsamp.sensor_id\n  WHERE s.node_id = CAST(:ph_node_id AS bigint)\n    AND s.type = 'PH'\n    AND s.label = 'ph_sensor'\n\
    \    AND tsamp.ts >= CAST(:after_reseed_at AS timestamptz)\n    AND tsamp.value BETWEEN 5.63 AND 5.73\n  ORDER BY tsamp.ts\
    \ DESC\n  LIMIT 8\n),\nec_samples AS (\n  SELECT tsamp.ts, tsamp.value\n  FROM telemetry_samples tsamp\n  JOIN sensors\
    \ s ON s.id = tsamp.sensor_id\n  WHERE s.node_id = CAST(:ec_node_id AS bigint)\n    AND s.type = 'EC'\n    AND s.label\
    \ = 'ec_sensor'\n    AND tsamp.ts >= CAST(:after_reseed_at AS timestamptz)\n    AND tsamp.value BETWEEN 2.85 AND 2.95\n\
    \  ORDER BY tsamp.ts DESC\n  LIMIT 8\n)\nSELECT\n  (SELECT COUNT(*) FROM ph_samples) AS ph_cnt,\n  (SELECT COUNT(*) FROM\
    \ ec_samples) AS ec_cnt,\n  (SELECT MAX(value) - MIN(value) FROM ph_samples) AS ph_span,\n  (SELECT MAX(value) - MIN(value)\
    \ FROM ec_samples) AS ec_span\nWHERE (SELECT COUNT(*) FROM ph_samples) >= 4\n  AND (SELECT COUNT(*) FROM ec_samples) >=\
    \ 4\n  AND (SELECT MAX(value) - MIN(value) FROM ph_samples) <= 0.06\n  AND (SELECT MAX(value) - MIN(value) FROM ec_samples)\
    \ <= 0.06\n"
  params:
    ph_node_id: ${ph_node_id}
    ec_node_id: ${ec_node_id}
    after_reseed_at: ${reseed_recirculation_command_row.0.created_at}
  timeout: 45.0
  expected_rows: 1
  save: recirculation_seed_stable_window_row
- step: wait_recirc_dilute_started_event
  type: db.wait
  query: "\n      SELECT id, type, created_at,\n             COALESCE(details, payload_json) AS payload\n      FROM zone_events\n\
    \      WHERE zone_id = :zone_id\n        AND type = 'RECIRC_DILUTE_STARTED'\n        AND created_at >= CAST(:after_seeded_at\
    \ AS timestamptz)\n      ORDER BY created_at ASC, id ASC\n      LIMIT 1\n    "
  params:
    zone_id: ${zone_id}
    after_seeded_at: ${reseed_recirculation_command_row.0.created_at}
  timeout: 180.0
  expected_rows: 1
  save: recirc_dilute_started_row
- step: wait_dilute_valve_clean_supply_command
  type: db.wait
  query: "\n      SELECT id, channel, payload->>'cmd' AS cmd, created_at,\n             COALESCE(payload->'params'->>'state',\
    \ 'false') AS relay_state\n      FROM ae_commands\n      WHERE task_id = CAST(:task_id AS bigint)\n        AND publish_status\
    \ = 'accepted'\n        AND channel = 'valve_clean_supply'\n        AND payload->>'cmd' = 'set_relay'\n        AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n        AND created_at >= CAST(:after_seeded_at AS timestamptz)\n      ORDER BY id ASC\n      LIMIT\
    \ 1\n    "
  params:
    task_id: ${task_id}
    after_seeded_at: ${reseed_recirculation_command_row.0.created_at}
  timeout: 60.0
  expected_rows: 1
  save: dilute_valve_clean_supply_row
- step: wait_recirc_dilute_completed_event
  type: db.wait
  query: "\n      SELECT id, type, created_at,\n             COALESCE(details, payload_json) AS payload\n      FROM zone_events\n\
    \      WHERE zone_id = :zone_id\n        AND type = 'RECIRC_DILUTE_COMPLETED'\n        AND created_at >= CAST(:after_started_at\
    \ AS timestamptz)\n      ORDER BY created_at ASC, id ASC\n      LIMIT 1\n    "
  params:
    zone_id: ${zone_id}
    after_started_at: ${recirc_dilute_started_row.0.created_at}
  timeout: 90.0
  expected_rows: 1
  save: recirc_dilute_completed_row
- step: wait_pid_ec_reset_after_dilute
  type: db.wait
  query: "\n      SELECT id, type, created_at,\n             COALESCE(details, payload_json) AS payload\n      FROM zone_events\n\
    \      WHERE zone_id = :zone_id\n        AND type = 'PID_EC_RESET'\n        AND created_at >= CAST(:after_started_at AS\
    \ timestamptz)\n        AND COALESCE(details, payload_json)->>'reason' = 'dilute'\n      ORDER BY created_at ASC, id ASC\n\
    \      LIMIT 1\n    "
  params:
    zone_id: ${zone_id}
    after_started_at: ${recirc_dilute_started_row.0.created_at}
  timeout: 60.0
  expected_rows: 1
  save: pid_ec_reset_dilute_row
- step: wait_task_not_failed_after_dilute
  type: db.wait
  query: "\n      SELECT id, status, error_code, error_message, current_stage, workflow_phase\n      FROM ae_tasks\n     \
    \ WHERE id = CAST(:task_id AS bigint)\n        AND status IN ('pending', 'claimed', 'running', 'waiting_command', 'completed')\n\
    \        AND error_code IS NULL\n      LIMIT 1\n    "
  params:
    task_id: ${task_id}
  timeout: 30.0
  expected_rows: 1
  save: task_not_failed_after_dilute_row
- step: load_dilute_ae_command_counts
  type: database_query
  query: "\n      SELECT\n        COUNT(*) FILTER (\n          WHERE publish_status = 'accepted'\n            AND channel\
    \ = 'valve_clean_supply'\n            AND payload->>'cmd' = 'set_relay'\n            AND COALESCE(payload->'params'->>'state',\
    \ 'false') = 'true'\n            AND created_at >= CAST(:after_seeded_at AS timestamptz)\n        )::int AS dilute_open_cnt,\n\
    \        COUNT(*) FILTER (\n          WHERE publish_status = 'accepted'\n            AND channel = 'valve_clean_supply'\n\
    \            AND payload->>'cmd' = 'set_relay'\n            AND COALESCE(payload->'params'->>'state', 'false') = 'false'\n\
    \            AND created_at >= CAST(:after_seeded_at AS timestamptz)\n        )::int AS dilute_close_cnt,\n        COUNT(*)\
    \ FILTER (\n          WHERE publish_status = 'accepted'\n            AND channel = 'pump_b'\n            AND payload->>'cmd'\
    \ = 'dose'\n        )::int AS calcium_correction_cnt\n      FROM ae_commands\n      WHERE task_id = CAST(:task_id AS bigint)\n\
    \    "
  params:
    task_id: ${task_id}
    after_seeded_at: ${reseed_recirculation_command_row.0.created_at}
  expected_rows: 1
  save: dilute_ae_command_counts_row
- step: load_calcium_pump_b_calibration
  type: database_query
  query: "\n      SELECT id, component, node_channel_id\n      FROM pump_calibrations\n      WHERE node_channel_id = CAST(:ec_pump_b_channel_id\
    \ AS bigint)\n        AND component = 'calcium'\n        AND is_active IS TRUE\n      ORDER BY id DESC\n      LIMIT 1\n\
    \    "
  params:
    ec_pump_b_channel_id: ${ec_pump_b_channel_id}
  expected_rows: 1
  save: calcium_pump_b_calibration_row
- step: count_task_commands
  type: database_query
  query: "\n      SELECT COUNT(*)::int AS cnt\n      FROM ae_commands\n      WHERE task_id = CAST(:task_id AS bigint)\n  \
    \  "
  params:
    task_id: ${task_id}
  expected_rows: 1
  save: task_command_count_row
- step: get_internal_task_status
  type: http_request
  method: GET
  url: http://${AUTOMATION_ENGINE_HOST}:${AUTOMATION_ENGINE_API_PORT}/internal/tasks/${task_id}
  headers:
    Accept: application/json
    X-Trace-Id: ${scheduler_trace_id}
    X-Scheduler-Id: laravel-scheduler
    Authorization: Bearer dev-token-12345
  capture_response: internal_task_response
assertions:
- name: reset_zero_level_telemetry_ready
  type: custom_assert
  condition: int(context.get('zero_levels_row', [{}])[0].get('zero_levels', 0)) == 4
- name: start_cycle_http_200
  type: custom_assert
  condition: int(context.get('start_cycle_response', {}).get('status_code', 0)) == 200
- name: start_cycle_response_active
  type: json_assertion
  source: start_cycle_response
  path: json
  expected:
  - field: status
    operator: equals
    value: ok
  - field: data.accepted
    operator: equals
    value: true
  - field: data.runner_state
    operator: equals
    value: active
- name: runtime_task_not_failed
  type: custom_assert
  condition: str(context.get('task_progress_row', [{}])[0].get('status', '')).lower() != 'failed'
- name: runtime_task_pending_clean_fill_check
  type: custom_assert
  condition: str(context.get('task_progress_row', [{}])[0].get('status', '')).lower() in ('pending', 'claimed', 'running',
    'waiting_command', 'completed') and str(context.get('task_progress_row', [{}])[0].get('mode', '')).lower() == 'two_tank_drip_substrate_trays'
- name: workflow_phase_tank_filling
  type: custom_assert
  condition: str(context.get('workflow_row', [{}])[0].get('workflow_phase', '')).lower() == 'tank_filling'
- name: solution_fill_stage_reached
  type: custom_assert
  condition: str(context.get('solution_fill_stage_row', [{}])[0].get('current_stage', '')).lower() in ('solution_fill_check',
    'prepare_recirculation_start', 'prepare_recirculation_check')
- name: prepare_recirculation_stage_reached
  type: custom_assert
  condition: str(context.get('prepare_recirc_stage_row', [{}])[0].get('current_stage', '')).lower() == 'prepare_recirculation_check'
    and str(context.get('prepare_recirc_stage_row', [{}])[0].get('workflow_phase', '')).lower() == 'tank_recirc'
- name: telemetry_cadence_after_sensor_mode
  type: custom_assert
  condition: len(context.get('sensor_mode_cadence_row', [])) == 1 and float(context.get('sensor_mode_cadence_row', [{}])[0].get('ph_age_sec',
    999.0)) <= 6.0 and float(context.get('sensor_mode_cadence_row', [{}])[0].get('ec_age_sec', 999.0)) <= 6.0
- name: internal_task_not_failed
  type: custom_assert
  condition: str(context.get('internal_task_response', {}).get('json', {}).get('status', '')).lower() == 'ok' and str(context.get('internal_task_response',
    {}).get('json', {}).get('data', {}).get('task_id', '')) == str(context.get('task_id', '')) and str(context.get('internal_task_response',
    {}).get('json', {}).get('data', {}).get('status', '')).lower() in ('pending', 'claimed', 'running', 'waiting_command',
    'completed')
- name: recirc_dilute_started
  type: custom_assert
  condition: len(context.get('recirc_dilute_started_row', [])) == 1 and str(context.get('recirc_dilute_started_row', [{}])[0].get('type',
    '')).upper() == 'RECIRC_DILUTE_STARTED'
- name: dilute_uses_valve_clean_supply
  type: custom_assert
  condition: len(context.get('dilute_valve_clean_supply_row', [])) == 1 and str(context.get('dilute_valve_clean_supply_row',
    [{}])[0].get('channel', '')).lower() == 'valve_clean_supply' and str(context.get('dilute_valve_clean_supply_row', [{}])[0].get('relay_state',
    '')).lower() == 'true'
- name: recirc_dilute_completed
  type: custom_assert
  condition: len(context.get('recirc_dilute_completed_row', [])) == 1 and str(context.get('recirc_dilute_completed_row', [{}])[0].get('type',
    '')).upper() == 'RECIRC_DILUTE_COMPLETED'
- name: pid_ec_reset_after_dilute
  type: custom_assert
  condition: len(context.get('pid_ec_reset_dilute_row', [])) == 1
- name: task_not_failed_after_dilute
  type: custom_assert
  condition: str(context.get('task_not_failed_after_dilute_row', [{}])[0].get('status', '')).lower() in ('pending', 'claimed',
    'running', 'waiting_command', 'completed') and not context.get('task_not_failed_after_dilute_row', [{}])[0].get('error_code')
- name: dilute_open_and_close_logged
  type: custom_assert
  condition: int(context.get('dilute_ae_command_counts_row', [{}])[0].get('dilute_open_cnt', 0)) >= 1 and int(context.get('dilute_ae_command_counts_row',
    [{}])[0].get('dilute_close_cnt', 0)) >= 1
- name: pump_b_calibration_is_calcium
  type: custom_assert
  condition: len(context.get('calcium_pump_b_calibration_row', [])) == 1 and str(context.get('calcium_pump_b_calibration_row',
    [{}])[0].get('component', '')).lower() == 'calcium'
- name: at_least_ten_ae_commands_logged
  type: custom_assert
  condition: int(context.get('task_command_count_row', [{}])[0].get('cnt', 0)) >= 10
- name: forbids_irrig_recirc_phase_after_dilute
  type: custom_assert
  condition: str(context.get('task_not_failed_after_dilute_row', [{}])[0].get('workflow_phase', '')).lower() != 'irrig_recirc'
cleanup:
- step: reset_test_node_after_run
  type: ae_test_hook
  optional: true
  zone_id: ${zone_id}
  action: publish_command
  command:
    node_uid: ${test_node_uid}
    channel: storage_state
    cmd: reset_state
    params: {}
- step: cleanup_runtime_events
  type: database_execute
  optional: true
  query: "DELETE FROM zone_events\nWHERE zone_id = :zone_id\n  AND created_at >= :started_at\n"
  params:
    zone_id: ${zone_id}
    started_at: ${scenario_window.0.started_at}
- step: cleanup_e2e_calibrations
  type: database_execute
  optional: true
  query: "DELETE FROM pump_calibrations\nWHERE source = 'e2e_realhw_setup_ready'\n  AND node_channel_id IN (\n    CAST(:ec_pump_a_channel_id\
    \ AS bigint),\n    CAST(:ec_pump_b_channel_id AS bigint),\n    CAST(:ec_pump_c_channel_id AS bigint),\n    CAST(:ec_pump_d_channel_id\
    \ AS bigint),\n    CAST(:ph_up_channel_id AS bigint),\n    CAST(:ph_down_channel_id AS bigint)\n  )\n"
  params:
    ec_pump_a_channel_id: ${ec_pump_a_channel_id}
    ec_pump_b_channel_id: ${ec_pump_b_channel_id}
    ec_pump_c_channel_id: ${ec_pump_c_channel_id}
    ec_pump_d_channel_id: ${ec_pump_d_channel_id}
    ph_up_channel_id: ${ph_up_channel_id}
    ph_down_channel_id: ${ph_down_channel_id}
- step: cleanup_e2e_process_calibrations
  type: database_execute
  optional: true
  query: 'SELECT 1;

    '
- step: cleanup_e2e_bindings
  type: database_execute
  optional: true
  query: "DELETE FROM channel_bindings\nWHERE role IN ('pump_a', 'pump_b', 'pump_c', 'pump_d', 'pump_base', 'pump_acid')\n\
    \  AND node_channel_id IN (\n    CAST(:ec_pump_a_channel_id AS bigint),\n    CAST(:ec_pump_b_channel_id AS bigint),\n\
    \    CAST(:ec_pump_c_channel_id AS bigint),\n    CAST(:ec_pump_d_channel_id AS bigint),\n    CAST(:ph_up_channel_id AS\
    \ bigint),\n    CAST(:ph_down_channel_id AS bigint)\n  )\n"
  params:
    ec_pump_a_channel_id: ${ec_pump_a_channel_id}
    ec_pump_b_channel_id: ${ec_pump_b_channel_id}
    ec_pump_c_channel_id: ${ec_pump_c_channel_id}
    ec_pump_d_channel_id: ${ec_pump_d_channel_id}
    ph_up_channel_id: ${ph_up_channel_id}
    ph_down_channel_id: ${ph_down_channel_id}
- step: cleanup_e2e_infrastructure
  type: database_execute
  optional: true
  query: "DELETE FROM infrastructure_instances\nWHERE owner_type = 'zone'\n  AND owner_id = :zone_id\n  AND label IN (\n \
    \   'AE3 E2E EC NPK',\n    'AE3 E2E EC Calcium',\n    'AE3 E2E EC Magnesium',\n    'AE3 E2E EC Micro',\n    'AE3 E2E EC\
    \ Dose',\n    'AE3 E2E PH Up',\n    'AE3 E2E PH Down'\n  )\n"
  params:
    zone_id: ${zone_id}
- step: cleanup_runtime_ae_commands
  type: database_execute
  optional: true
  query: 'DELETE FROM ae_commands

    WHERE task_id = CAST(:task_id AS bigint)

    '
  params:
    task_id: ${task_id}
- step: cleanup_runtime_ae_task
  type: database_execute
  optional: true
  query: 'DELETE FROM ae_tasks

    WHERE id = CAST(:task_id AS bigint)

    '
  params:
    task_id: ${task_id}
- step: cleanup_runtime_ae_leases
  type: database_execute
  optional: true
  query: 'DELETE FROM ae_zone_leases

    WHERE zone_id = :zone_id

    '
  params:
    zone_id: ${zone_id}
- step: cleanup_runtime_intent
  type: database_execute
  optional: true
