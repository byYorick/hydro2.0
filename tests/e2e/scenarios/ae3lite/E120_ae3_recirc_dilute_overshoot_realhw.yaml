    recipe_name: ${recipe_name}
- step: load_recipe
  type: database_query
  query: 'SELECT id

    FROM recipes

    WHERE name = :recipe_name

    ORDER BY id DESC

    LIMIT 1

    '
  params:
    recipe_name: ${recipe_name}
  expected_rows: 1
  save: recipe_row
- step: set_recipe_id
  type: set
