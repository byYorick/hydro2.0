  query: "UPDATE grow_cycles\nSET current_phase_id = :phase_id,\n    started_at = NOW(),\n    recipe_started_at = NOW(),\n\
    \    updated_at = NOW()\nWHERE id = :grow_cycle_id\n"
  params:
    phase_id: ${phase_id}
    grow_cycle_id: ${grow_cycle_id}
- step: apply_cycle_start_snapshot
