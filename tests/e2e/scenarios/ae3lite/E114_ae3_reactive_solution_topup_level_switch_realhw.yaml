# E114: Реактивный solution_topup по edge level_solution_max 1→0 (realhw test_node)
# Порт workflow/E96 без node_sim — уровни через hardware_set_fault_mode.
# Запуск (через realhw launcher):
#   ./tests/e2e/run_automation_engine_real_hardware.sh \
#     scenarios/ae3lite/E114_ae3_reactive_solution_topup_level_switch_realhw.yaml
# DoD:
# - зона AE3 two-tank в workflow_phase=ready на реальной ${TEST_NODE_UID}
# - edge level_solution_max 1→0 через set_fault_mode
# - zone_events LEVEL_SWITCH_CHANGED + ae_tasks solution_topup
# Compatible-With: Protocol 2.0, Backend >=3.0, Python >=3.0, Database >=3.0, Frontend >=3.0

name: E114_ae3_reactive_solution_topup_level_switch_realhw
auth_role: agronomist
description: |
  Real-hardware порт E96: реактивный автодолив бака раствора (§19.2.1).
  1) resolve irrig ${TEST_NODE_UID} в зоне ${TEST_NODE_ZONE_UID} (без node_sim),
  2) AE3 + logic_profile с solution_topup_enabled + two_tank_commands,
  3) force workflow_phase=ready, hardware_reset_state,
  4) full tank → drop level_solution_max,
  5) LEVEL_SWITCH_CHANGED + solution_topup task/intent.

tags:
  - realhw
  - ae3lite

actions:
  - step: set_test_context
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: ${TEST_NODE_UID}
    idempotency_key: e114-topup-${TIMESTAMP_MS}

  - step: get_zone_row
    type: database_query
    query: |
      SELECT id, greenhouse_id, automation_runtime
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_row
    expected_rows: 1

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}
    greenhouse_id: ${zone_row.0.greenhouse_id}
    previous_automation_runtime: ${zone_row.0.automation_runtime}

  - step: resolve_irrig_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: irrig_node_row

  - step: set_irrig_node_id
    type: set
    irrig_node_id: ${irrig_node_row.0.node_id}

  - step: wait_zone_ae_runtime_idle_before_cleanup
    type: db.wait
    query: |
      SELECT 1 AS ready
      WHERE NOT EXISTS (
        SELECT 1
        FROM ae_tasks
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running', 'waiting_command')
      )
        AND NOT EXISTS (
        SELECT 1
        FROM ae_zone_leases
        WHERE zone_id = :zone_id
      )
        AND NOT EXISTS (
        SELECT 1
        FROM zone_automation_intents
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running')
      )
    params:
      zone_id: ${zone_id}
    timeout: 120.0
    expected_rows: 1

  - step: ensure_zone_automation_runtime_ae3
    type: database_execute
    query: |
      UPDATE zones
      SET automation_runtime = 'ae3',
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id);
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_stage_transitions
    type: database_execute
    query: |
      DELETE FROM ae_stage_transitions
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id);
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_cycles
    type: database_execute
    query: |
      DELETE FROM grow_cycles WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_workflow_state
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: publish_irrig_node_config
    type: api_post
    endpoint: /api/nodes/${irrig_node_id}/config/publish
    payload: {}

  - step: wait_level_sensors_registered
    type: db.wait
    query: |
      SELECT COUNT(*)::int AS sensor_count
      FROM sensors
      WHERE zone_id = :zone_id
        AND node_id = CAST(:irrig_node_id AS bigint)
        AND type IN ('WATER_LEVEL', 'WATER_LEVEL_SWITCH')
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
      HAVING COUNT(*) = 4
    params:
      zone_id: ${zone_id}
      irrig_node_id: ${irrig_node_id}
    timeout: 60.0
    expected_rows: 1

  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: e114-plant-${TIMESTAMP_S}
      scientific_name: Solution Topup Realhw Plant
    save: plant_response

  - step: create_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: e114-recipe-${TIMESTAMP_S}
      description: Reactive solution_topup level switch realhw
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: E114 topup revision
    save: revision_response

  - step: add_phase_0
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Growth
      duration_hours: 24
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.5
      ec_min: 1.3
      ec_max: 1.7
      temp_air_target: 22.0
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}

  - step: create_running_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: false
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  - step: apply_two_tank_logic_profile
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
    payload:
      payload:
        active_mode: working
        profiles:
          working:
            mode: working
            is_active: true
            subsystems:
              diagnostics:
                execution:
                  workflow: cycle_start
                  topology: two_tank_drip_substrate_trays
                  required_node_types:
                    - irrig
                  startup:
                    level_poll_interval_sec: 5
                    clean_fill_timeout_sec: 120
                    solution_fill_timeout_sec: 180
                    prepare_recirculation_timeout_sec: 180
                    solution_topup_enabled: true
                    telemetry_max_age_sec: 120
                    irr_state_max_age_sec: 120
                  target_ph: 5.8
                  target_ec: 1.4
                  prepare_tolerance:
                    ph_pct: 15
                    ec_pct: 25
                  two_tank_commands:
                    clean_fill_start:
                      - channel: valve_clean_fill
                        cmd: set_relay
                        params:
                          state: true
                    clean_fill_stop:
                      - channel: valve_clean_fill
                        cmd: set_relay
                        params:
                          state: false
                    solution_fill_start:
                      - channel: valve_clean_supply
                        cmd: set_relay
                        params:
                          state: true
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: true
                    solution_fill_stop:
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_clean_supply
                        cmd: set_relay
                        params:
                          state: false
                    solution_topup_start:
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                    solution_topup_stop:
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                    prepare_recirculation_start:
                      - channel: valve_solution_supply
                        cmd: set_relay
                        params:
                          state: true
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: true
                    prepare_recirculation_stop:
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_supply
                        cmd: set_relay
                        params:
                          state: false

  - step: validate_zone_bundle
    type: api_post
    endpoint: /api/automation-bundles/zone/${zone_id}/validate
    payload: {}

  - step: validate_cycle_bundle
    type: api_post
    endpoint: /api/automation-bundles/grow_cycle/${cycle_id}/validate
    payload: {}

  - step: reset_test_node_state
    type: hardware_reset_state
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    save: reset_state_response

  - step: wait_reset_state_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_state_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: insert_ready_workflow_state
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES (:zone_id, 'ready', 1, NOW(), '{}'::jsonb)
      ON CONFLICT (zone_id) DO UPDATE
      SET workflow_phase = 'ready',
          version = zone_workflow_state.version + 1,
          updated_at = NOW(),
          payload = '{}'::jsonb
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_ae_commands_before_topup
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id FROM ae_tasks WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_ae_tasks_before_topup
    type: database_execute
    query: |
      DELETE FROM ae_tasks WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_ae_leases_before_topup
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_intents_before_topup
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: assert_no_active_intents_before_topup
    type: db.wait
    query: |
      SELECT 1 AS ok
      WHERE NOT EXISTS (
        SELECT 1
        FROM zone_automation_intents
        WHERE zone_id = :zone_id
          AND status IN ('pending', 'claimed', 'running')
      )
    params:
      zone_id: ${zone_id}
    timeout: 5.0
    expected_rows: 1
    save: no_active_intents_row

  - step: ensure_grow_cycle_running
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET status = 'RUNNING',
          updated_at = NOW()
      WHERE id = CAST(:cycle_id AS bigint)
        AND status IN ('PLANNED', 'PAUSED', 'RUNNING')
    params:
      cycle_id: ${cycle_id}

  # Realhw: live test_node continuously overwrites telemetry_last.
  # Drive levels via hardware_set_fault_mode so DB read-model matches the edge.
  - step: clear_level_overrides_before_topup
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      level_solution_min_override: -1
      level_solution_max_override: -1
      level_clean_min_override: -1
      level_clean_max_override: -1
    save: clear_level_overrides_response

  - step: wait_clear_level_overrides_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${clear_level_overrides_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: force_solution_tank_full
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      level_solution_min_override: true
      level_solution_max_override: true
      level_clean_min_override: true
      level_clean_max_override: true
    save: force_full_tank_response

  - step: wait_force_full_tank_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${force_full_tank_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: wait_solution_tank_full_telemetry
    type: db.wait
    query: |
      SELECT COUNT(*)::int AS full_cnt
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.zone_id = :zone_id
        AND s.label IN ('level_solution_min', 'level_solution_max')
        AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
        AND COALESCE(tl.last_value, 0) >= 1
      HAVING COUNT(*) = 2
    params:
      zone_id: ${zone_id}
    timeout: 30.0
    expected_rows: 1
    save: solution_tank_full_row

  # zone_events.created_at имеет секундную точность; NOW() с микросекундами
  # отсекает edge в той же секунде (created_at=T.000000 < started_at=T.219200).
  - step: capture_topup_edge_window
    type: database_query
    query: |
      SELECT date_trunc('second', NOW()) AS started_at
    save: topup_edge_window

  - step: drop_solution_max_edge
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      level_solution_min_override: true
      level_solution_max_override: false
      level_clean_min_override: true
      level_clean_max_override: true
    save: drop_solution_max_response

  - step: wait_drop_solution_max_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${drop_solution_max_response.data.cmd_id}
    timeout: 20.0
    expected_rows: 1

  - step: wait_solution_max_dropped_telemetry
    type: db.wait
    query: |
      SELECT
        MIN(CASE WHEN s.label = 'level_solution_min' THEN tl.last_value END) AS solution_min,
        MIN(CASE WHEN s.label = 'level_solution_max' THEN tl.last_value END) AS solution_max
      FROM sensors s
      JOIN telemetry_last tl ON tl.sensor_id = s.id
      WHERE s.zone_id = :zone_id
        AND s.label IN ('level_solution_min', 'level_solution_max')
        AND COALESCE(tl.last_ts, tl.updated_at) >= NOW() - INTERVAL '30 seconds'
      HAVING
        MIN(CASE WHEN s.label = 'level_solution_min' THEN tl.last_value END) >= 1
        AND MIN(CASE WHEN s.label = 'level_solution_max' THEN tl.last_value END) < 1
    params:
      zone_id: ${zone_id}
    timeout: 30.0
    expected_rows: 1
    save: solution_max_dropped_row

  - step: wait_level_switch_zone_event
    type: db.wait
    query: |
      SELECT id, type
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'LEVEL_SWITCH_CHANGED'
        AND payload_json->>'channel' = 'level_solution_max'
        AND payload_json->>'state' IN ('false', '0')
        AND COALESCE((payload_json->>'initial')::boolean, false) = false
        AND created_at >= CAST(:started_at AS timestamptz)
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      started_at: ${topup_edge_window.0.started_at}
    timeout: 60.0
    expected_rows: 1
    save: level_switch_event_row

  - step: wait_solution_topup_task
    type: db.wait
    query: |
      SELECT id, task_type, status, current_stage
      FROM ae_tasks
      WHERE zone_id = :zone_id
        AND task_type = 'solution_topup'
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 60.0
    expected_rows: 1
    save: topup_task_row

  - step: set_topup_task_id
    type: set
    task_id: ${topup_task_row.0.id}

assertions:
  - name: level_switch_event_persisted
    type: custom_assert
    condition: "len(context.get('level_switch_event_row') or []) == 1"

  - name: solution_topup_task_created
    type: custom_assert
    condition: "str((context.get('topup_task_row') or [{}])[0].get('task_type', '')).lower() == 'solution_topup'"

  - name: solution_topup_intent_exists
    type: database_query
    query: |
      SELECT id, task_type, intent_type, payload->>'trigger' AS trigger
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND task_type = 'solution_topup'
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    expected:
      - field: task_type
        operator: equals
        value: solution_topup

cleanup:
  # Stop AE topup loop ASAP: cancel task, restore tank full, clear leases/hardware.
  - step: cancel_solution_topup_task
    type: database_execute
    condition: "bool(context.get('task_id'))"
    query: |
      UPDATE ae_tasks
      SET status = 'cancelled',
          completed_at = COALESCE(completed_at, NOW()),
          updated_at = NOW()
      WHERE id = CAST(:task_id AS bigint)
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
    params:
      task_id: ${task_id}

  - step: cancel_zone_active_ae_tasks
    type: database_execute
    query: |
      UPDATE ae_tasks
      SET status = 'cancelled',
          completed_at = COALESCE(completed_at, NOW()),
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
    params:
      zone_id: ${zone_id}

  - step: restore_solution_tank_full_after_topup
    type: hardware_set_fault_mode
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    params:
      level_solution_min_override: true
      level_solution_max_override: true
      level_clean_min_override: true
      level_clean_max_override: true
    save: restore_full_tank_response

  - step: wait_restore_solution_tank_full_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${restore_full_tank_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: reset_test_node_state_after_run
    type: hardware_reset_state
    zone_id: ${zone_id}
    node_uid: ${test_node_uid}
    channel: storage_state
    save: cleanup_reset_state_response

  - step: wait_cleanup_reset_state_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${cleanup_reset_state_response.data.cmd_id}
    timeout: 30.0
    expected_rows: 1

  - step: delete_zone_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: abort_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/abort
    payload: {}
    optional: true
    condition: ${cycle_id}

  - step: delete_test_ae_commands
    type: database_execute
    condition: "bool(context.get('task_id'))"
    query: |
      DELETE FROM ae_commands WHERE task_id = CAST(:task_id AS bigint);
    params:
      task_id: ${task_id}
    optional: true

  - step: delete_test_ae_stage_transitions
    type: database_execute
    condition: "bool(context.get('task_id'))"
    query: |
      DELETE FROM ae_stage_transitions WHERE task_id = CAST(:task_id AS bigint);
    params:
      task_id: ${task_id}
    optional: true

  - step: delete_test_ae_task
    type: database_execute
    condition: "bool(context.get('task_id'))"
    query: |
      DELETE FROM ae_tasks WHERE id = CAST(:task_id AS bigint);
    params:
      task_id: ${task_id}
    optional: true

  - step: delete_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}
    optional: true

  - step: delete_test_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}
    optional: true

  - step: soft_restore_workflow_idle
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES (:zone_id, 'idle', 1, NOW(), '{}'::jsonb)
      ON CONFLICT (zone_id) DO UPDATE
      SET workflow_phase = 'idle',
          version = zone_workflow_state.version + 1,
          updated_at = NOW(),
          payload = '{}'::jsonb
    params:
      zone_id: ${zone_id}
    optional: true

  - step: delete_test_cycle
    type: database_execute
    query: |
      DELETE FROM grow_cycles WHERE id = :cycle_id
    params:
      cycle_id: ${cycle_id}
    optional: true
    condition: ${cycle_id}

  - step: cleanup_created_logic_profile
    type: database_execute
    optional: true
    query: |
      DELETE FROM automation_config_documents
      WHERE namespace = 'zone.logic_profile'
        AND scope_type = 'zone'
        AND scope_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: restore_zone_runtime
    type: database_execute
    optional: true
    query: |
      UPDATE zones
      SET automation_runtime = COALESCE(NULLIF(:previous_runtime, ''), automation_runtime),
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}
      previous_runtime: ${previous_automation_runtime}

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true
    condition: "bool(context.get('recipe_response', {}).get('data', {}).get('id'))"

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
    condition: "bool(context.get('plant_response', {}).get('data', {}).get('id'))"
