# E111: Sensor calibration force_invalid negative path on real test_node
# DoD:
# - ae_test_hook publish_command sends calibrate to ph_sensor / ec_sensor
# - firmware/test_node rejects when params.force_invalid=true with terminal INVALID
# - no Laravel sensor_calibrations session is created

name: E111_sensor_calibration_realhw_force_invalid
description: |
  Реальный negative-path контракт calibrate на `firmware/test_node` через
  `ae_test_hook` / history-logger. Параметр `force_invalid: true` сохраняет
  terminal `INVALID` без Laravel calibration session.

tags:
  - calibration
  - realhw
  - negative

actions:
  - step: set_test_context
    type: set
    fixture_prefix: sensor-cal-force-invalid-${TIMESTAMP_MS}
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_ph_node_uid: ${TEST_PH_NODE_UID}
    test_ec_node_uid: ${TEST_EC_NODE_UID}

  - step: load_zone_context
    type: database_query
    query: |
      SELECT id AS zone_id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_ctx

  - step: set_zone_context
    type: set
    zone_id: ${zone_ctx.0.zone_id}

  - step: resolve_ph_node
    type: database_query
    query: |
      SELECT id AS node_id, uid AS node_uid
      FROM nodes
      WHERE LOWER(COALESCE(type, '')) = 'ph'
      ORDER BY
        CASE
          WHEN uid = :preferred_uid AND zone_id = :zone_id THEN 0
          WHEN uid = 'nd-test-ph-1' THEN 1
          WHEN uid = :preferred_uid THEN 2
          WHEN zone_id = :zone_id THEN 3
          ELSE 4
        END,
        id
      LIMIT 1
    params:
      preferred_uid: ${test_ph_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ph_node_row

  - step: attach_ph_node_to_zone
    type: database_execute
    query: |
      UPDATE nodes
      SET zone_id = :zone_id,
          updated_at = NOW()
      WHERE id = :node_id
        AND (zone_id IS DISTINCT FROM :zone_id)
    params:
      zone_id: ${zone_id}
      node_id: ${ph_node_row.0.node_id}

  - step: resolve_ec_node
    type: database_query
    query: |
      SELECT id AS node_id, uid AS node_uid
      FROM nodes
      WHERE LOWER(COALESCE(type, '')) = 'ec'
      ORDER BY
        CASE
          WHEN uid = :preferred_uid AND zone_id = :zone_id THEN 0
          WHEN uid = 'nd-test-ec-1' THEN 1
          WHEN uid = :preferred_uid THEN 2
          WHEN zone_id = :zone_id THEN 3
          ELSE 4
        END,
        id
      LIMIT 1
    params:
      preferred_uid: ${test_ec_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ec_node_row

  - step: attach_ec_node_to_zone
    type: database_execute
    query: |
      UPDATE nodes
      SET zone_id = :zone_id,
          updated_at = NOW()
      WHERE id = :node_id
        AND (zone_id IS DISTINCT FROM :zone_id)
    params:
      zone_id: ${zone_id}
      node_id: ${ec_node_row.0.node_id}

  - step: set_node_context
    type: set
    ph_node_id: ${ph_node_row.0.node_id}
    ec_node_id: ${ec_node_row.0.node_id}
    test_ph_node_uid: ${ph_node_row.0.node_uid}
    test_ec_node_uid: ${ec_node_row.0.node_uid}

  - step: upsert_sensor_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, metric, unit, config, created_at, updated_at)
      VALUES
        (CAST(:ph_node_id AS bigint), 'ph_sensor', 'sensor', 'PH', 'pH', '{}'::jsonb, NOW(), NOW()),
        (CAST(:ec_node_id AS bigint), 'ec_sensor', 'sensor', 'EC', 'mS/cm', '{}'::jsonb, NOW(), NOW())
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = EXCLUDED.type,
          metric = EXCLUDED.metric,
          unit = EXCLUDED.unit,
          updated_at = NOW()
    params:
      ph_node_id: ${ph_node_id}
      ec_node_id: ${ec_node_id}

  - step: publish_ph_force_invalid_calibrate
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    retries: 5
    retry_delay_seconds: 1
    command:
      node_uid: ${test_ph_node_uid}
      channel: ph_sensor
      cmd: calibrate
      params:
        stage: 1
        known_ph: 7.0
        force_invalid: true
    save: ph_force_invalid_publish

  - step: wait_ph_command_invalid
    type: db.wait
    query: |
      SELECT cmd_id, cmd, channel, status, error_code, error_message
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'INVALID'
      LIMIT 1
    params:
      cmd_id: ${ph_force_invalid_publish.data.cmd_id}
    expected_rows: 1
    timeout: 45
    save: ph_command_invalid_row

  - step: publish_ec_force_invalid_calibrate
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    retries: 5
    retry_delay_seconds: 1
    command:
      node_uid: ${test_ec_node_uid}
      channel: ec_sensor
      cmd: calibrate
      params:
        stage: 1
        tds_value: 1413
        force_invalid: true
    save: ec_force_invalid_publish

  - step: wait_ec_command_invalid
    type: db.wait
    query: |
      SELECT cmd_id, cmd, channel, status, error_code, error_message
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'INVALID'
      LIMIT 1
    params:
      cmd_id: ${ec_force_invalid_publish.data.cmd_id}
    expected_rows: 1
    timeout: 45
    save: ec_command_invalid_row

assertions:
  - name: ph_force_invalid_published
    type: custom_assert
    condition: bool((context.get('ph_force_invalid_publish', {}).get('data') or {}).get('published')) and str((context.get('ph_force_invalid_publish', {}).get('data') or {}).get('cmd_id', '')) != ''

  - name: ph_command_terminal_invalid_on_ph_sensor
    type: custom_assert
    condition: str(context.get('ph_command_invalid_row', [{}])[0].get('cmd', '')) == 'calibrate' and str(context.get('ph_command_invalid_row', [{}])[0].get('channel', '')) == 'ph_sensor' and str(context.get('ph_command_invalid_row', [{}])[0].get('status', '')) == 'INVALID'

  - name: ec_force_invalid_published
    type: custom_assert
    condition: bool((context.get('ec_force_invalid_publish', {}).get('data') or {}).get('published')) and str((context.get('ec_force_invalid_publish', {}).get('data') or {}).get('cmd_id', '')) != ''

  - name: ec_command_terminal_invalid_on_ec_sensor
    type: custom_assert
    condition: str(context.get('ec_command_invalid_row', [{}])[0].get('cmd', '')) == 'calibrate' and str(context.get('ec_command_invalid_row', [{}])[0].get('channel', '')) == 'ec_sensor' and str(context.get('ec_command_invalid_row', [{}])[0].get('status', '')) == 'INVALID'
