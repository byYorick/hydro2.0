# E117: Sensor calibration happy path on real test_node (PH only)
# DoD:
# - Laravel session point_1/point_2 enqueue calibrate through history-logger
# - real test_node returns DONE and config_report with calibration.ph
# - session reaches completed; status API shows last_calibrated for PH

name: E117_sensor_calibration_realhw_happy_path
description: |
  Реальный happy-path калибровки PH на `firmware/test_node`.
  Backend проходит полный pipeline: create session → point 1/2 → DONE →
  config_report финализация → status API без `never` для PH.

tags:
  - calibration
  - realhw
  - happy

actions:
  - step: set_test_context
    type: set
    fixture_prefix: sensor-cal-happy-${TIMESTAMP_MS}
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_ph_node_uid: ${TEST_PH_NODE_UID}

  - step: load_zone_context
    type: database_query
    query: |
      SELECT id AS zone_id, greenhouse_id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    expected_rows: 1
    save: zone_ctx

  - step: set_zone_context
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}

  - step: resolve_ph_node
    type: database_query
    query: |
      SELECT id AS node_id, uid AS node_uid
      FROM nodes
      WHERE LOWER(COALESCE(type, '')) = 'ph'
      ORDER BY
        CASE
          WHEN uid = :preferred_uid AND zone_id = :zone_id THEN 0
          WHEN uid = 'nd-test-ph-1' THEN 1
          WHEN uid = :preferred_uid THEN 2
          WHEN zone_id = :zone_id THEN 3
          ELSE 4
        END,
        id
      LIMIT 1
    params:
      preferred_uid: ${test_ph_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: ph_node_row

  - step: attach_ph_node_to_zone
    type: database_execute
    query: |
      UPDATE nodes
      SET zone_id = :zone_id,
          updated_at = NOW()
      WHERE id = :node_id
        AND (zone_id IS DISTINCT FROM :zone_id)
    params:
      zone_id: ${zone_id}
      node_id: ${ph_node_row.0.node_id}

  - step: set_ph_node_context
    type: set
    ph_node_id: ${ph_node_row.0.node_id}
    test_ph_node_uid: ${ph_node_row.0.node_uid}

  - step: upsert_ph_sensor_channel
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, metric, unit, config, created_at, updated_at)
      VALUES (CAST(:node_id AS bigint), 'ph_sensor', 'sensor', 'PH', 'pH', '{}'::jsonb, NOW(), NOW())
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = EXCLUDED.type,
          metric = EXCLUDED.metric,
          unit = EXCLUDED.unit,
          updated_at = NOW()
    params:
      node_id: ${ph_node_id}

  - step: load_ph_sensor_channel
    type: database_query
    query: |
      SELECT id AS node_channel_id, channel
      FROM node_channels
      WHERE node_id = CAST(:node_id AS bigint)
        AND channel = 'ph_sensor'
      LIMIT 1
    params:
      node_id: ${ph_node_id}
    expected_rows: 1
    save: ph_channel_row

  - step: set_ph_channel_context
    type: set
    ph_node_channel_id: ${ph_channel_row.0.node_channel_id}

  - step: cleanup_existing_sensor_calibrations
    type: database_execute
    query: |
      DELETE FROM sensor_calibrations
      WHERE zone_id = :zone_id
        AND node_channel_id = :node_channel_id
    params:
      zone_id: ${zone_id}
      node_channel_id: ${ph_node_channel_id}

  - step: create_ph_calibration
    type: api_post
    endpoint: /api/zones/${zone_id}/sensor-calibrations
    payload:
      node_channel_id: ${ph_node_channel_id}
      sensor_type: ph
    save: ph_calibration_create

  - step: set_calibration_context
    type: set
    ph_calibration_id: ${ph_calibration_create.data.calibration.id}

  - step: submit_ph_point_1
    type: api_post
    endpoint: /api/zones/${zone_id}/sensor-calibrations/${ph_calibration_id}/point
    payload:
      stage: 1
      reference_value: 4.01
    save: ph_point_1_response

  - step: set_ph_point_1_command_context
    type: set
    ph_point_1_command_id: ${ph_point_1_response.data.point_1_command_id}

  - step: wait_ph_point_1_command_done
    type: db.wait
    query: |
      SELECT cmd_id, cmd, channel, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      LIMIT 1
    params:
      cmd_id: ${ph_point_1_command_id}
    expected_rows: 1
    timeout: 45
    save: ph_point_1_command_row

  - step: wait_ph_point_1_done
    type: db.wait
    query: |
      SELECT id, status, point_1_command_id, point_1_result
      FROM sensor_calibrations
      WHERE id = :calibration_id
        AND status = 'point_1_done'
        AND point_1_result = 'DONE'
      LIMIT 1
    params:
      calibration_id: ${ph_calibration_id}
    expected_rows: 1
    timeout: 45
    save: ph_point_1_done_row

  - step: submit_ph_point_2
    type: api_post
    endpoint: /api/zones/${zone_id}/sensor-calibrations/${ph_calibration_id}/point
    payload:
      stage: 2
      reference_value: 7.0
    save: ph_point_2_response

  - step: set_ph_point_2_command_context
    type: set
    ph_point_2_command_id: ${ph_point_2_response.data.point_2_command_id}

  - step: wait_ph_point_2_command_done
    type: db.wait
    query: |
      SELECT cmd_id, cmd, channel, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      LIMIT 1
    params:
      cmd_id: ${ph_point_2_command_id}
    expected_rows: 1
    timeout: 45
    save: ph_point_2_command_row

  - step: wait_ph_point_2_awaiting_or_completed
    type: db.wait
    query: |
      SELECT id, status, point_2_result, meta
      FROM sensor_calibrations
      WHERE id = :calibration_id
        AND (
          (
            status = 'point_2_pending'
            AND point_2_result = 'DONE'
            AND COALESCE(meta->>'awaiting_config_report', 'false') = 'true'
          )
          OR status = 'completed'
        )
      LIMIT 1
    params:
      calibration_id: ${ph_calibration_id}
    expected_rows: 1
    timeout: 45
    save: ph_point_2_awaiting_or_completed_row

  - step: wait_ph_calibration_completed
    type: db.wait
    query: |
      SELECT id, status, point_1_result, point_2_result, completed_at
      FROM sensor_calibrations
      WHERE id = :calibration_id
        AND status = 'completed'
        AND completed_at IS NOT NULL
      LIMIT 1
    params:
      calibration_id: ${ph_calibration_id}
    expected_rows: 1
    timeout: 90
    save: ph_completed_row

  - step: fetch_status_after_complete
    type: api_get
    endpoint: /api/zones/${zone_id}/sensor-calibrations/status
    save: status_after_complete

assertions:
  - name: create_returns_started_calibration
    type: custom_assert
    condition: str(context.get('ph_calibration_create', {}).get('status', '')) == 'ok' and str((context.get('ph_calibration_create', {}).get('data') or {}).get('calibration', {}).get('status', '')) == 'started'

  - name: point_1_submit_marks_pending
    type: custom_assert
    condition: str((context.get('ph_point_1_response', {}).get('data') or {}).get('status', '')) == 'point_1_pending' and str((context.get('ph_point_1_response', {}).get('data') or {}).get('point_1_command_id', '')) != ''

  - name: point_1_command_done_on_ph_sensor
    type: custom_assert
    condition: str(context.get('ph_point_1_command_row', [{}])[0].get('cmd', '')) == 'calibrate' and str(context.get('ph_point_1_command_row', [{}])[0].get('channel', '')) == 'ph_sensor' and str(context.get('ph_point_1_command_row', [{}])[0].get('status', '')) == 'DONE'

  - name: point_2_submit_marks_pending
    type: custom_assert
    condition: str((context.get('ph_point_2_response', {}).get('data') or {}).get('status', '')) == 'point_2_pending' and str((context.get('ph_point_2_response', {}).get('data') or {}).get('point_2_command_id', '')) != ''

  - name: point_2_command_done_on_ph_sensor
    type: custom_assert
    condition: str(context.get('ph_point_2_command_row', [{}])[0].get('cmd', '')) == 'calibrate' and str(context.get('ph_point_2_command_row', [{}])[0].get('channel', '')) == 'ph_sensor' and str(context.get('ph_point_2_command_row', [{}])[0].get('status', '')) == 'DONE'

  - name: calibration_reaches_completed
    type: custom_assert
    condition: str(context.get('ph_completed_row', [{}])[0].get('status', '')) == 'completed' and context.get('ph_completed_row', [{}])[0].get('completed_at') is not None

  - name: status_api_shows_last_calibrated_for_ph
    type: custom_assert
    condition: any(int(item.get('node_channel_id', 0)) == int(context.get('ph_node_channel_id', 0)) and item.get('last_calibrated_at') and str(item.get('calibration_status', '')) != 'never' for item in (context.get('status_after_complete', {}).get('data') or []))

cleanup:
  - step: cancel_non_terminal_sensor_calibrations
    type: database_execute
    query: |
      UPDATE sensor_calibrations
      SET status = 'cancelled',
          completed_at = COALESCE(completed_at, NOW()),
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND node_channel_id = :node_channel_id
        AND status NOT IN ('completed', 'failed', 'cancelled')
    params:
      zone_id: ${zone_id}
      node_channel_id: ${ph_node_channel_id}
