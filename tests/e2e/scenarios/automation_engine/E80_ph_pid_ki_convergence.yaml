# E80: pH PID convergence with Ki > 0
# DoD:
# - В окне сценария появляется PH_CORRECTED
# - В pid_state для pid_type=ph интеграл становится ненулевым

name: E80_ph_pid_ki_convergence
description: |
  Проверяет, что pH PID с Ki > 0 выполняет коррекцию и накапливает интегральную часть.
  Сценарий:
  1) Берем тестовую зону и включаем ph/ec capabilities.
  2) Обеспечиваем активный grow cycle.
  3) Публикуем low pH telemetry (ниже target).
  4) Ждем событие PH_CORRECTED и ненулевой integral в pid_state.

actions:
  - step: set_test_uids
    type: set
    test_gh_uid: ${TEST_NODE_GH_UID}
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: ${TEST_NODE_UID}
    test_ph_node_uid: ${TEST_PH_NODE_UID}
    test_ec_node_uid: ${TEST_EC_NODE_UID}

  - step: get_zone_id
    type: database_query
    query: |
      SELECT id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_row
    expected_rows: 1

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}

  - step: mark_test_started
    type: database_query
    query: |
      SELECT NOW() AS started_at
    save: test_window
    expected_rows: 1

  - step: ensure_nodes_online
    type: database_execute
    query: |
      UPDATE nodes
      SET status = 'online',
          last_seen_at = COALESCE(last_seen_at, NOW()),
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND uid IN (:main_uid, :ph_uid, :ec_uid);
    params:
      zone_id: ${zone_id}
      main_uid: ${test_node_uid}
      ph_uid: ${test_ph_node_uid}
      ec_uid: ${test_ec_node_uid}

  - step: check_active_cycle
    type: database_query
    query: |
      SELECT id
      FROM grow_cycles
      WHERE zone_id = :zone_id
        AND status IN ('PLANNED', 'RUNNING', 'PAUSED')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    save: active_cycle

  - step: create_plant_if_needed
    type: api_post
    endpoint: /api/plants
    payload:
      name: test-plant-e80-${TIMESTAMP_S}
      scientific_name: Test Plant
    save: plant_response
    condition: ${active_cycle.length == 0}

  - step: create_recipe_if_needed
    type: api_post
    endpoint: /api/recipes
    payload:
      name: test-recipe-e80-${TIMESTAMP_S}
      description: Test recipe for E80
      plant_id: ${plant_response.data.id}
    save: recipe_response
    condition: ${active_cycle.length == 0}

  - step: create_revision_if_needed
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: Test revision for E80
    save: revision_response
    condition: ${active_cycle.length == 0}

  - step: add_phase_if_needed
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Test Phase E80
      duration_hours: 24
      ph_target: 5.8
      ph_min: 5.5
      ph_max: 6.1
      ec_target: 1.6
      ec_min: 1.2
      ec_max: 2.0
      temp_air_target: 22.0
      humidity_target: 60.0
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300
    condition: ${active_cycle.length == 0}

  - step: publish_revision_if_needed
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}
    condition: ${active_cycle.length == 0}

  - step: create_cycle_if_needed
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: true
    save: cycle_response
    condition: ${active_cycle.length == 0}

  - step: ensure_cycle_running
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET status = 'RUNNING',
          updated_at = NOW()
      WHERE id = (
        SELECT id
        FROM grow_cycles
        WHERE zone_id = :zone_id
        ORDER BY created_at DESC
        LIMIT 1
      );
    params:
      zone_id: ${zone_id}

  - step: enable_capabilities
    type: database_execute
    query: |
      UPDATE zones
      SET capabilities = jsonb_build_object(
        'ph_control', true,
        'ec_control', true,
        'climate_control', true,
        'light_control', true,
        'irrigation_control', true,
        'recirculation', true,
        'flow_sensor', true
      )
      WHERE id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: ensure_ph_calibrations_updated
    type: database_execute
    query: |
      UPDATE pump_calibrations pc
      SET ml_per_sec = 0.8,
          is_active = TRUE,
          source = 'e2e_e80',
          valid_from = NOW(),
          updated_at = NOW()
      FROM nodes n
      JOIN node_channels nc ON nc.node_id = n.id
      WHERE pc.node_channel_id = nc.id
        AND n.uid = :ph_uid
        AND nc.type = 'ACTUATOR';
    params:
      ph_uid: ${test_ph_node_uid}

  - step: ensure_ph_calibrations_inserted
    type: database_execute
    query: |
      INSERT INTO pump_calibrations (
        node_channel_id,
        component,
        ml_per_sec,
        is_active,
        source,
        valid_from,
        created_at,
        updated_at
      )
      SELECT
        nc.id,
        CASE
          WHEN LOWER(nc.channel) LIKE '%acid%' THEN 'ph_down'
          WHEN LOWER(nc.channel) LIKE '%base%' THEN 'ph_up'
          ELSE 'ph_down'
        END,
        0.8,
        TRUE,
        'e2e_e80',
        NOW(),
        NOW(),
        NOW()
      FROM nodes n
      JOIN node_channels nc ON nc.node_id = n.id
      WHERE n.uid = :ph_uid
        AND nc.type = 'ACTUATOR'
        AND NOT EXISTS (
          SELECT 1
          FROM pump_calibrations pc
          WHERE pc.node_channel_id = nc.id
            AND pc.is_active = TRUE
        );
    params:
      ph_uid: ${test_ph_node_uid}

  - step: compute_now_ts
    type: database_query
    query: |
      SELECT EXTRACT(EPOCH FROM NOW())::bigint AS now_ts
    save: now_ts_row
    expected_rows: 1

  - step: publish_ph_low_1
    type: mqtt_publish
    topic: hydro/${test_gh_uid}/${test_zone_uid}/${test_ph_node_uid}/ph_sensor/telemetry
    payload:
      metric_type: PH
      value: 5.50
      ts: ${now_ts_row.0.now_ts}
    qos: 1
    wait_seconds: 6

  - step: publish_ph_low_2
    type: mqtt_publish
    topic: hydro/${test_gh_uid}/${test_zone_uid}/${test_ph_node_uid}/ph_sensor/telemetry
    payload:
      metric_type: PH
      value: 5.52
      ts: ${now_ts_row.0.now_ts}
    qos: 1
    wait_seconds: 10

  - step: wait_for_ph_corrected_event
    type: db.wait
    query: |
      SELECT id
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'PH_CORRECTED'
        AND created_at >= :started_at
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      started_at: ${test_window.0.started_at}
    timeout: 180.0
    save: ph_corrected_event
    expected_rows: 1

  - step: wait_for_pid_integral_nonzero
    type: db.wait
    query: |
      SELECT integral
      FROM pid_state
      WHERE zone_id = :zone_id
        AND pid_type = 'ph'
        AND ABS(COALESCE(integral, 0.0)) > 0.0001
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 180.0
    save: pid_state_nonzero
    expected_rows: 1

assertions:
  - name: ph_corrected_event_exists
    type: database_query
    query: |
      SELECT COUNT(*)::int AS cnt
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'PH_CORRECTED'
        AND created_at >= :started_at
    params:
      zone_id: ${zone_id}
      started_at: ${test_window.0.started_at}
    expected_rows: 1
    expected:
      - field: cnt
        operator: greater_than_or_equal
        value: 1

  - name: pid_integral_nonzero
    type: database_query
    query: |
      SELECT ABS(COALESCE(integral, 0.0)) AS abs_integral
      FROM pid_state
      WHERE zone_id = :zone_id
        AND pid_type = 'ph'
      ORDER BY updated_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    expected:
      - field: abs_integral
        operator: greater_than
        value: 0.0001

cleanup:
  - step: noop_cleanup
    type: sleep
    seconds: 1
