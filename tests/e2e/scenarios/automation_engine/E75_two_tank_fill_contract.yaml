# E75: Two-Tank Fill Contract (real test_node) - command contract + level switch timing
# DoD: команды водного контура проходят через AE и уровни баков переключаются по контрактным таймингам.

name: E75_two_tank_fill_contract
description: |
  Проверяет согласованность automation-engine и firmware/test_node для 2-бакового контура:
  - команды идут через ae_test_hook publish_command (без прямого MQTT)
  - перед solution_fill AE переводится в workflow_phase=tank_filling через ae_test_hook set_state
  - команды водного контура завершаются terminal-статусом DONE (без NO_EFFECT)
  - датчики уровня переключаются по таймингу:
    - clean_min >= 10s
    - clean_max >= 30s (и остается 1)
    - solution_min >= 10s
    - solution_max >= 60s (и остается 1)

actions:
  - step: set_test_context
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    marker_clean_main: e75-clean-main-${TIMESTAMP_S}
    marker_clean_fill: e75-clean-fill-${TIMESTAMP_S}
    marker_clean_fill_off: e75-clean-fill-off-${TIMESTAMP_S}
    marker_solution_supply: e75-solution-supply-${TIMESTAMP_S}
    marker_solution_fill: e75-solution-fill-${TIMESTAMP_S}
    marker_shutdown_supply: e75-shutdown-supply-${TIMESTAMP_S}
    marker_shutdown_fill: e75-shutdown-fill-${TIMESTAMP_S}
    marker_shutdown_main: e75-shutdown-main-${TIMESTAMP_S}

  - step: get_zone_row
    type: database_query
    query: |
      SELECT id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_row
    expected_rows: 1

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}

  - step: resolve_irrigation_node
    type: database_query
    query: |
      SELECT n.id, n.uid
      FROM nodes n
      WHERE n.zone_id = :zone_id
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel = 'valve_clean_fill'
        )
        AND EXISTS (
          SELECT 1
          FROM node_channels nc
          WHERE nc.node_id = n.id
            AND nc.channel = 'level_solution_max'
        )
      ORDER BY n.id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    save: irrigation_node_row
    expected_rows: 1

  - step: set_irrigation_node_uid
    type: set
    irrigation_node_id: ${irrigation_node_row.0.id}
    irrigation_node_uid: ${irrigation_node_row.0.uid}

  - step: resolve_main_pump_channel
    type: database_query
    query: |
      SELECT nc.channel
      FROM node_channels nc
      WHERE nc.node_id = :node_id
        AND nc.channel IN ('pump_main', 'main_pump')
      ORDER BY CASE WHEN nc.channel = 'pump_main' THEN 0 ELSE 1 END, nc.id ASC
      LIMIT 1
    params:
      node_id: ${irrigation_node_id}
    save: main_pump_channel_row
    expected_rows: 1

  - step: set_main_pump_channel
    type: set
    main_pump_channel: ${main_pump_channel_row.0.channel}

  - step: ensure_water_contour_channel_config
    type: database_execute
    query: |
      UPDATE node_channels nc
      SET config = COALESCE(nc.config, '{}'::jsonb) || jsonb_build_object(
        'zone_role',
        CASE
          WHEN nc.channel IN ('main_pump', 'pump_main') THEN 'main_pump'
          WHEN nc.channel IN ('valve_clean_fill', 'valve_clean_supply') THEN 'clean_fill_path'
          WHEN nc.channel IN ('valve_solution_fill', 'valve_solution_supply') THEN 'solution_fill_path'
          WHEN nc.channel = 'valve_irrigation' THEN 'irrigation_path'
          WHEN nc.channel = 'level_clean_min' THEN 'clean_tank_level_min'
          WHEN nc.channel = 'level_clean_max' THEN 'clean_tank_level_max'
          WHEN nc.channel = 'level_solution_min' THEN 'solution_tank_level_min'
          WHEN nc.channel = 'level_solution_max' THEN 'solution_tank_level_max'
          ELSE nc.config->>'zone_role'
        END
      )
      WHERE nc.node_id = :node_id
        AND nc.channel IN (
          'main_pump',
          'pump_main',
          'valve_clean_fill',
          'valve_clean_supply',
          'valve_solution_fill',
          'valve_solution_supply',
          'valve_irrigation',
          'level_clean_min',
          'level_clean_max',
          'level_solution_min',
          'level_solution_max'
        );
    params:
      node_id: ${irrigation_node_id}

  - step: publish_irrigation_node_config
    type: api_post
    endpoint: /api/nodes/${irrigation_node_id}/config/publish
    payload: {}
    wait_seconds: 2
    optional: true

  - step: wait_irrigation_node_online_after_config_publish
    type: db.wait
    query: |
      SELECT id
      FROM nodes
      WHERE id = :node_id
        AND zone_id = :zone_id
        AND status = 'online'
      LIMIT 1
    params:
      node_id: ${irrigation_node_id}
      zone_id: ${zone_id}
    expected_rows: 1
    timeout: 30.0

  - step: reset_test_node_runtime_state
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: system
      cmd: reset_state
      params:
        marker: e75-reset-${TIMESTAMP_S}

  - step: wait_level_switches_zero_after_reset
    type: db.wait
    query: |
      SELECT s.label, tl.last_value
      FROM telemetry_last tl
      JOIN sensors s ON s.id = tl.sensor_id
      WHERE s.zone_id = :zone_id
        AND s.node_id = :node_id
        AND s.label IN (
          'level_clean_min',
          'level_clean_max',
          'level_solution_min',
          'level_solution_max'
        )
        AND tl.last_value < 0.5
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
    expected_rows: 4
    timeout: 40.0

  - step: reset_ae_state_override_to_idle_before_run
    type: ae_test_hook
    zone_id: ${zone_id}
    action: set_state
    state:
      error_streak: 0
      workflow_phase: idle

  - step: capture_clean_start_ts
    type: database_query
    query: |
      SELECT NOW() AS clean_start_ts
    save: clean_start_row
    expected_rows: 1

  - step: open_main_pump_for_clean_fill
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: ${main_pump_channel}
      cmd: set_relay
      params:
        state: 1
        marker: ${marker_clean_main}
    save: publish_main_on

  - step: open_clean_fill_valve
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: valve_clean_fill
      cmd: set_relay
      params:
        state: 1
        marker: ${marker_clean_fill}
    save: publish_clean_fill_on

  - step: wait_main_pump_done
    type: db.wait
    query: |
      SELECT id, status
      FROM commands
      WHERE zone_id = :zone_id
        AND node_id = :node_id
        AND channel = :main_pump_channel
        AND cmd = 'set_relay'
        AND params->>'marker' = :marker
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      main_pump_channel: ${main_pump_channel}
      marker: ${marker_clean_main}
    expected_rows: 1
    timeout: 30.0

  - step: wait_clean_fill_done
    type: db.wait
    query: |
      SELECT id, status
      FROM commands
      WHERE zone_id = :zone_id
        AND node_id = :node_id
        AND channel = 'valve_clean_fill'
        AND cmd = 'set_relay'
        AND params->>'marker' = :marker
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      marker: ${marker_clean_fill}
    expected_rows: 1
    timeout: 30.0

  - step: wait_clean_min_switch
    type: db.wait
    query: |
      WITH ctx AS (
        SELECT :clean_start_ts::timestamptz AS start_ts
      )
      SELECT
        ts.id,
        ts.value,
        EXTRACT(EPOCH FROM (ts.created_at - ctx.start_ts)) AS delay_sec
      FROM telemetry_samples ts
      JOIN sensors s ON s.id = ts.sensor_id
      CROSS JOIN ctx
      WHERE s.zone_id = :zone_id
        AND s.node_id = :node_id
        AND s.label = 'level_clean_min'
        AND ts.value >= 0.5
        AND ts.created_at > ctx.start_ts
      ORDER BY ts.created_at ASC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      clean_start_ts: ${clean_start_row.0.clean_start_ts}
    expected_rows: 1
    timeout: 80.0
    save: clean_min_hit

  - step: wait_clean_max_switch
    type: db.wait
    query: |
      WITH ctx AS (
        SELECT :clean_start_ts::timestamptz AS start_ts
      )
      SELECT
        ts.id,
        ts.value,
        EXTRACT(EPOCH FROM (ts.created_at - ctx.start_ts)) AS delay_sec
      FROM telemetry_samples ts
      JOIN sensors s ON s.id = ts.sensor_id
      CROSS JOIN ctx
      WHERE s.zone_id = :zone_id
        AND s.node_id = :node_id
        AND s.label = 'level_clean_max'
        AND ts.value >= 0.5
        AND ts.created_at > ctx.start_ts
      ORDER BY ts.created_at ASC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      clean_start_ts: ${clean_start_row.0.clean_start_ts}
    expected_rows: 1
    timeout: 220.0
    save: clean_max_hit

  - step: wait_clean_max_latched
    type: sleep
    seconds: 15

  - step: verify_clean_max_latched
    type: db.wait
    query: |
      SELECT tl.last_value
      FROM telemetry_last tl
      JOIN sensors s ON s.id = tl.sensor_id
      WHERE s.zone_id = :zone_id
        AND s.node_id = :node_id
        AND s.label = 'level_clean_max'
        AND tl.last_value >= 0.5
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
    expected_rows: 1
    timeout: 30.0

  - step: close_clean_fill_valve_before_solution
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: valve_clean_fill
      cmd: set_relay
      params:
        state: 0
        marker: ${marker_clean_fill_off}

  - step: capture_solution_start_ts
    type: database_query
    query: |
      SELECT NOW() AS solution_start_ts
    save: solution_start_row
    expected_rows: 1

  - step: force_workflow_phase_tank_filling_for_solution_fill
    type: ae_test_hook
    zone_id: ${zone_id}
    action: set_state
    state:
      error_streak: 0
      workflow_phase: tank_filling

  - step: open_solution_supply_valve
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: valve_clean_supply
      cmd: set_relay
      params:
        state: 1
        marker: ${marker_solution_supply}
    save: publish_solution_supply_on

  - step: open_solution_fill_valve
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: valve_solution_fill
      cmd: set_relay
      params:
        state: 1
        marker: ${marker_solution_fill}
    save: publish_solution_fill_on

  - step: wait_solution_supply_done
    type: db.wait
    query: |
      SELECT id, status
      FROM commands
      WHERE zone_id = :zone_id
        AND node_id = :node_id
        AND channel = 'valve_clean_supply'
        AND cmd = 'set_relay'
        AND params->>'marker' = :marker
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      marker: ${marker_solution_supply}
    expected_rows: 1
    timeout: 30.0

  - step: wait_solution_fill_done
    type: db.wait
    query: |
      SELECT id, status
      FROM commands
      WHERE zone_id = :zone_id
        AND node_id = :node_id
        AND channel = 'valve_solution_fill'
        AND cmd = 'set_relay'
        AND params->>'marker' = :marker
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      marker: ${marker_solution_fill}
    expected_rows: 1
    timeout: 30.0

  - step: wait_solution_min_switch
    type: db.wait
    query: |
      WITH ctx AS (
        SELECT :solution_start_ts::timestamptz AS start_ts
      )
      SELECT
        ts.id,
        ts.value,
        EXTRACT(EPOCH FROM (ts.created_at - ctx.start_ts)) AS delay_sec
      FROM telemetry_samples ts
      JOIN sensors s ON s.id = ts.sensor_id
      CROSS JOIN ctx
      WHERE s.zone_id = :zone_id
        AND s.node_id = :node_id
        AND s.label = 'level_solution_min'
        AND ts.value >= 0.5
        AND ts.created_at > ctx.start_ts
      ORDER BY ts.created_at ASC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      solution_start_ts: ${solution_start_row.0.solution_start_ts}
    expected_rows: 1
    timeout: 15.0
    save: solution_min_hit

  - step: wait_solution_max_switch
    type: db.wait
    query: |
      WITH ctx AS (
        SELECT :solution_start_ts::timestamptz AS start_ts
      )
      SELECT
        ts.id,
        ts.value,
        EXTRACT(EPOCH FROM (ts.created_at - ctx.start_ts)) AS delay_sec
      FROM telemetry_samples ts
      JOIN sensors s ON s.id = ts.sensor_id
      CROSS JOIN ctx
      WHERE s.zone_id = :zone_id
        AND s.node_id = :node_id
        AND s.label = 'level_solution_max'
        AND ts.value >= 0.5
        AND ts.created_at > ctx.start_ts
      ORDER BY ts.created_at ASC
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      solution_start_ts: ${solution_start_row.0.solution_start_ts}
    expected_rows: 1
    timeout: 420.0
    save: solution_max_hit

  - step: wait_solution_max_latched
    type: sleep
    seconds: 20

  - step: verify_solution_max_latched
    type: db.wait
    query: |
      SELECT tl.last_value
      FROM telemetry_last tl
      JOIN sensors s ON s.id = tl.sensor_id
      WHERE s.zone_id = :zone_id
        AND s.node_id = :node_id
        AND s.label = 'level_solution_max'
        AND tl.last_value >= 0.5
      LIMIT 1
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
    expected_rows: 1
    timeout: 30.0

assertions:
  - name: clean_min_delay_window
    type: custom_assert
    condition: >-
      10.0 <= float(context.get('clean_min_hit', [{}])[0].get('delay_sec', 0))
      and float(context.get('clean_min_hit', [{}])[0].get('delay_sec', 0)) <= 90.0

  - name: clean_max_delay_window
    type: custom_assert
    condition: >-
      30.0 <= float(context.get('clean_max_hit', [{}])[0].get('delay_sec', 0))
      and float(context.get('clean_max_hit', [{}])[0].get('delay_sec', 0)) <= 120.0

  - name: solution_min_delay_window
    type: custom_assert
    condition: >-
      10.0 <= float(context.get('solution_min_hit', [{}])[0].get('delay_sec', 0))
      and float(context.get('solution_min_hit', [{}])[0].get('delay_sec', 0)) <= 100.0

  - name: solution_max_delay_window
    type: custom_assert
    condition: >-
      60.0 <= float(context.get('solution_max_hit', [{}])[0].get('delay_sec', 0))
      and float(context.get('solution_max_hit', [{}])[0].get('delay_sec', 0)) <= 180.0

  - name: no_no_effect_for_water_contour_commands
    type: database_query
    query: |
      SELECT COUNT(*) AS no_effect_count
      FROM commands
      WHERE zone_id = :zone_id
        AND node_id = :node_id
        AND params->>'marker' IN (
          :marker_clean_main,
          :marker_clean_fill,
          :marker_solution_supply,
          :marker_solution_fill
        )
        AND status = 'NO_EFFECT'
    params:
      zone_id: ${zone_id}
      node_id: ${irrigation_node_id}
      marker_clean_main: ${marker_clean_main}
      marker_clean_fill: ${marker_clean_fill}
      marker_solution_supply: ${marker_solution_supply}
      marker_solution_fill: ${marker_solution_fill}
    expected:
      - field: no_effect_count
        operator: equals
        value: 0

  - name: no_missing_flags_skip_during_solution_fill_phase
    type: database_query
    query: |
      SELECT COUNT(*) AS missing_flags_count
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'CORRECTION_SKIPPED_MISSING_FLAGS'
        AND created_at >= :solution_start_ts::timestamptz
    params:
      zone_id: ${zone_id}
      solution_start_ts: ${solution_start_row.0.solution_start_ts}
    expected:
      - field: missing_flags_count
        operator: equals
        value: 0

cleanup:
  - step: reset_workflow_phase_override_to_idle
    type: ae_test_hook
    zone_id: ${zone_id}
    action: set_state
    state:
      error_streak: 0
      workflow_phase: idle
    optional: true

  - step: close_solution_supply_valve
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: valve_clean_supply
      cmd: set_relay
      params:
        state: 0
        marker: ${marker_shutdown_supply}
    optional: true

  - step: close_solution_fill_valve
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: valve_solution_fill
      cmd: set_relay
      params:
        state: 0
        marker: ${marker_shutdown_fill}
    optional: true

  - step: close_main_pump
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    command:
      node_uid: ${irrigation_node_uid}
      channel: ${main_pump_channel}
      cmd: set_relay
      params:
        state: 0
        marker: ${marker_shutdown_main}
    optional: true
