# E65: Phase Transition API - AE uses GrowCycle API for phase transitions
# DoD: AE uses GrowCycle API for phase transitions

name: E65_phase_transition_api
description: |
  Проверяет, что Automation-engine использует GrowCycle API для перехода фаз:
  - Фаза завершается по времени или условиям
  - AE вызывает GrowCycle API для advance_phase
  - Цикл переходит на следующую фазу
  - Effective-targets обновляются для новой фазы

actions:
  - step: set_test_zone_uid
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}

  - step: set_test_node_uid
    type: set
    test_node_uid: ${TEST_NODE_UID}

  - step: set_zone_id_from_uid
    type: database_query
    query: |
      SELECT id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_row
    expected_rows: 1

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}

  - step: cleanup_old_cycles
    type: database_execute
    query: |
      DELETE FROM grow_cycles
      WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_runtime_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: set_capabilities_without_ph_ec_requirements
    type: database_execute
    query: |
      UPDATE zones
      SET capabilities = jsonb_build_object(
        'ph_control', false,
        'ec_control', false,
        'climate_control', true,
        'light_control', true,
        'irrigation_control', true,
        'recirculation', true,
        'flow_sensor', true
      )
      WHERE id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: ensure_primary_node_online
    type: database_execute
    query: |
      UPDATE nodes
      SET status = 'online',
          last_seen_at = COALESCE(last_seen_at, NOW()),
          updated_at = NOW()
      WHERE zone_id = :zone_id
        AND uid = :node_uid;
    params:
      zone_id: ${zone_id}
      node_uid: ${test_node_uid}

  - step: ensure_zone_readiness_bindings
    type: database_execute
    query: |
      WITH target_node AS (
        SELECT id
        FROM nodes
        WHERE zone_id = :zone_id
          AND uid = :node_uid
        LIMIT 1
      ),
      main_candidate AS (
        SELECT nc.id AS node_channel_id
        FROM node_channels nc
        JOIN target_node tn ON tn.id = nc.node_id
        WHERE nc.type = 'ACTUATOR'
        ORDER BY
          CASE WHEN nc.channel IN ('main_pump', 'pump_main') THEN 0 ELSE 1 END,
          nc.id
        LIMIT 1
      ),
      drain_candidate AS (
        SELECT nc.id AS node_channel_id
        FROM node_channels nc
        JOIN target_node tn ON tn.id = nc.node_id
        LEFT JOIN main_candidate mc ON mc.node_channel_id = nc.id
        WHERE nc.type = 'ACTUATOR'
          AND mc.node_channel_id IS NULL
        ORDER BY
          CASE
            WHEN nc.channel IN (
              'drain_pump',
              'valve_solution_supply',
              'valve_clean_supply',
              'valve_irrigation',
              'valve_solution_fill',
              'valve_clean_fill'
            ) THEN 0
            ELSE 1
          END,
          nc.id
        LIMIT 1
      )
      UPDATE node_channels nc
      SET config = COALESCE(nc.config, '{}'::jsonb) || jsonb_build_object(
        'zone_role',
        CASE
          WHEN nc.id IN (SELECT node_channel_id FROM main_candidate) THEN 'main_pump'
          WHEN nc.id IN (SELECT node_channel_id FROM drain_candidate) THEN 'drain'
          ELSE COALESCE(nc.config->>'zone_role', '')
        END
      )
      WHERE nc.id IN (
        SELECT node_channel_id FROM main_candidate
        UNION ALL
        SELECT node_channel_id FROM drain_candidate
      );
    params:
      zone_id: ${zone_id}
      node_uid: ${test_node_uid}

  - step: ensure_main_and_drain_bindings
    type: database_execute
    query: |
      WITH zone_ctx AS (
        SELECT :zone_id::bigint AS zone_id
      ),
      target_node AS (
        SELECT n.id
        FROM nodes n
        JOIN zone_ctx zc ON zc.zone_id = n.zone_id
        WHERE n.uid = :node_uid
        LIMIT 1
      ),
      main_candidate AS (
        SELECT nc.id AS node_channel_id
        FROM node_channels nc
        JOIN target_node tn ON tn.id = nc.node_id
        WHERE nc.type = 'ACTUATOR'
        ORDER BY
          CASE WHEN nc.channel IN ('main_pump', 'pump_main') THEN 0 ELSE 1 END,
          nc.id
        LIMIT 1
      ),
      drain_candidate AS (
        SELECT nc.id AS node_channel_id
        FROM node_channels nc
        JOIN target_node tn ON tn.id = nc.node_id
        LEFT JOIN main_candidate mc ON mc.node_channel_id = nc.id
        WHERE nc.type = 'ACTUATOR'
          AND mc.node_channel_id IS NULL
        ORDER BY
          CASE
            WHEN nc.channel IN (
              'drain_pump',
              'valve_solution_supply',
              'valve_clean_supply',
              'valve_irrigation',
              'valve_solution_fill',
              'valve_clean_fill'
            ) THEN 0
            ELSE 1
          END,
          nc.id
        LIMIT 1
      ),
      selected_targets AS (
        SELECT 'main_pump'::text AS role, 'E2E Main Pump'::text AS label, mc.node_channel_id
        FROM main_candidate mc
        UNION ALL
        SELECT 'drain'::text AS role, 'E2E Drain Pump'::text AS label, dc.node_channel_id
        FROM drain_candidate dc
      ),
      ensure_instances AS (
        INSERT INTO infrastructure_instances (owner_type, owner_id, asset_type, label, required, created_at, updated_at)
        SELECT
          'zone',
          zc.zone_id,
          CASE WHEN st.role = 'main_pump' THEN 'PUMP' ELSE 'DRAIN' END,
          st.label,
          true,
          NOW(),
          NOW()
        FROM zone_ctx zc
        JOIN selected_targets st ON TRUE
        WHERE NOT EXISTS (
          SELECT 1
          FROM infrastructure_instances ii
          WHERE ii.owner_type = 'zone'
            AND ii.owner_id = zc.zone_id
            AND ii.label = st.label
        )
        RETURNING id, label
      ),
      resolved_instances AS (
        SELECT
          st.role,
          st.node_channel_id,
          ii.id AS infrastructure_instance_id
        FROM zone_ctx zc
        JOIN selected_targets st ON TRUE
        JOIN infrastructure_instances ii
          ON ii.owner_type = 'zone'
         AND ii.owner_id = zc.zone_id
         AND ii.label = st.label
        UNION ALL
        SELECT
          st.role,
          st.node_channel_id,
          ei.id AS infrastructure_instance_id
        FROM ensure_instances ei
        JOIN selected_targets st ON st.label = ei.label
      ),
      upsert_bindings AS (
        INSERT INTO channel_bindings (infrastructure_instance_id, node_channel_id, direction, role, created_at, updated_at)
        SELECT
          ri.infrastructure_instance_id,
          nc.id,
          'actuator',
          ri.role,
          NOW(),
          NOW()
        FROM resolved_instances ri
        JOIN target_node tn ON TRUE
        JOIN node_channels nc
          ON nc.id = ri.node_channel_id
         AND nc.node_id = tn.id
        ON CONFLICT (node_channel_id) DO UPDATE SET
          infrastructure_instance_id = EXCLUDED.infrastructure_instance_id,
          direction = EXCLUDED.direction,
          role = EXCLUDED.role,
          updated_at = NOW()
        RETURNING node_channel_id
      )
      SELECT 1;
    params:
      zone_id: ${zone_id}
      node_uid: ${test_node_uid}

  - step: verify_main_and_drain_bindings_online
    type: db.wait
    query: |
      SELECT cb.role
      FROM channel_bindings cb
      JOIN node_channels nc ON nc.id = cb.node_channel_id
      JOIN nodes n ON n.id = nc.node_id
      WHERE n.zone_id = :zone_id
        AND n.uid = :node_uid
        AND n.status = 'online'
        AND cb.role IN ('main_pump', 'drain')
      ORDER BY cb.role
    params:
      zone_id: ${zone_id}
      node_uid: ${test_node_uid}
    expected_rows: 2
    timeout: 15.0

  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: test-plant-e65-${TIMESTAMP_S}
      scientific_name: Test Plant
    save: plant_response

  # Создаем рецепт с несколькими фазами
  - step: create_multi_phase_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: multi-phase-recipe-${TIMESTAMP_S}
      description: Recipe with multiple phases for transition testing
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: Multi-phase revision
    save: revision_response

  # Фаза 0: короткая фаза для быстрого завершения
  - step: add_phase_0
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Phase 0 - Quick
      duration_hours: 1
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.5
      ec_min: 1.3
      ec_max: 1.7
      temp_air_target: 22.0
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300
      humidity_target: 60.0
      lighting_photoperiod_hours: 16

  # Фаза 1: следующая фаза
  - step: add_phase_1
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 1
      name: Phase 1 - Next
      duration_hours: 24
      ph_target: 6.2
      ph_min: 5.6
      ph_max: 6.6
      ec_target: 1.8
      ec_min: 1.6
      ec_max: 2.0
      temp_air_target: 23.0
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300
      humidity_target: 55.0
      lighting_photoperiod_hours: 18

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}

  # Создаем и запускаем цикл
  - step: create_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: true
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  # Проверяем начальную фазу
  - step: check_initial_phase
    type: database_query
    query: |
      SELECT p.phase_index, p.started_at
      FROM grow_cycles gc
      JOIN grow_cycle_phases p ON p.id = gc.current_phase_id
      WHERE gc.id = :cycle_id
    params:
      cycle_id: ${cycle_id}
    save: initial_phase

  - step: advance_phase
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/advance-phase
    payload: {}

  - step: wait_for_phase_completion
    type: sleep
    seconds: 2

  # Проверяем финальную фазу
  - step: check_final_phase
    type: database_query
    query: |
      SELECT p.phase_index, p.started_at
      FROM grow_cycles gc
      JOIN grow_cycle_phases p ON p.id = gc.current_phase_id
      WHERE gc.id = :cycle_id
    params:
      cycle_id: ${cycle_id}
    save: final_phase

  # Проверяем, что effective-targets обновились для новой фазы
  - step: fetch_phase_targets_updated
    type: api_get
    endpoint: /api/zones/${zone_id}/effective-targets
    save: phase_targets

assertions:
  # Проверка 1: Начальная фаза 0
  - name: initial_phase_zero
    type: json_assertion
    source: initial_phase
    path: "[0]"
    expected:
      - field: phase_index
        operator: equals
        value: 0
      - field: started_at
        operator: is_not_null

  # Проверка 2: Переход на фазу 1
  - name: transitioned_to_phase_one
    type: json_assertion
    source: final_phase
    path: "[0]"
    expected:
      - field: phase_index
        operator: equals
        value: 1
      - field: started_at
        operator: is_not_null

  # Проверка 3: Effective-targets обновились для фазы 1
  - name: targets_updated_for_phase_one
    type: json_assertion
    source: phase_targets
    path: data.targets
    expected:
      - field: ph.target
        operator: equals
        value: 6.2
      - field: ec.target
        operator: equals
        value: 1.8
      - field: climate_request.temp_air_target
        operator: equals
        value: 23

  # Проверка 4: Переход выполнен через API (проверяем логи или статус)
  - name: transition_via_api
    type: database_query
    query: |
      SELECT COUNT(*) as transition_count
      FROM grow_cycle_transitions
      WHERE grow_cycle_id = :cycle_id
      AND trigger_type = 'MANUAL'
      AND created_at > NOW() - INTERVAL '2 minutes'
    params:
      cycle_id: ${cycle_id}
    expected:
      - field: transition_count
        operator: greater_than
        value: 0

cleanup:
  - step: abort_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/abort
    payload: {}
    optional: true
    condition: ${cycle_id}

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true
    condition: ${recipe_response.data.id}

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
    condition: ${plant_response.data.id}
