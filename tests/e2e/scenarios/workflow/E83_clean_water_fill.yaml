# E83: Two-Tank Workflow — Этап 1: Наполнение чистого бака (clean_fill)
# DoD: AE обнаруживает пустой чистый бак → отправляет set_relay(valve_clean_fill=true)
#       → генерирует zone_event CLEAN_FILL_STARTED

name: E83_clean_water_fill
description: |
  Проверяет первый этап two_tank_startup workflow: наполнение чистого бака.
  - Чистый бак пуст (level_clean_max = 0.0)
  - AE запускает startup → не triggered → вызывает clean_fill_start
  - В commands создаётся set_relay(valve_clean_fill=true)
  - В zone_events появляется CLEAN_FILL_STARTED

actions:
  # ─── 1. Получаем контекст зоны ────────────────────────────────────────────
  - step: get_zone_context
    type: database_query
    query: |
      SELECT z.id AS zone_id, z.greenhouse_id
      FROM zones z
      WHERE z.uid = 'zn-test-1'
      LIMIT 1
    save: zone_ctx

  - step: set_zone_id
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}

  # ─── 2. Чистим старые grow_cycles ────────────────────────────────────────
  - step: cleanup_grow_cycles
    type: database_execute
    query: DELETE FROM grow_cycles WHERE zone_id = :zid
    params:
      zid: ${zone_id}

  # ─── 3. Upsert irrig node ─────────────────────────────────────────────────
  - step: upsert_irrig_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, name, type, status, last_seen_at, created_at, updated_at)
      VALUES (:zid, 'nd-irrig-e2e', 'E2E Irrig Node', 'irrig', 'online', NOW(), NOW(), NOW())
      ON CONFLICT (uid) DO UPDATE SET
        zone_id       = EXCLUDED.zone_id,
        type          = 'irrig',
        status        = 'online',
        last_seen_at  = NOW(),
        updated_at    = NOW()
    params:
      zid: ${zone_id}

  - step: get_irrig_node
    type: database_query
    query: SELECT id FROM nodes WHERE uid = 'nd-irrig-e2e' LIMIT 1
    save: irrig_node_row

  - step: set_irrig_node_id
    type: set
    irrig_node_id: ${irrig_node_row.0.id}

  # ─── 4. Upsert actuator channels ─────────────────────────────────────────
  - step: upsert_actuator_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT :nid, ch, 'ACTUATOR', NOW(), NOW()
      FROM (VALUES
        ('valve_clean_fill'),
        ('valve_clean_supply'),
        ('valve_solution_fill'),
        ('valve_solution_supply'),
        ('pump_main')
      ) AS t(ch)
      ON CONFLICT (node_id, channel) DO UPDATE SET type = 'ACTUATOR', updated_at = NOW()
    params:
      nid: ${irrig_node_id}

  # ─── 4.1 Сброс состояния irrig-ноды (детерминированный старт) ────────────
  # В AE2-Lite start-cycle выполняется через diagnostics.
  # Если после предыдущего прогона relay остались ON, startup может fail-closed
  # с two_tank_irr_state_mismatch. Перед тестом принудительно выставляем OFF.
  - step: publish_reset_pump_main_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: nd-irrig-e2e
      channel: pump_main
      cmd: set_relay
      params:
        state: false
    save: reset_pump_main_result

  - step: wait_reset_pump_main_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_pump_main_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_clean_fill_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: nd-irrig-e2e
      channel: valve_clean_fill
      cmd: set_relay
      params:
        state: false
    save: reset_valve_clean_fill_result

  - step: wait_reset_valve_clean_fill_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_clean_fill_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_clean_supply_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: nd-irrig-e2e
      channel: valve_clean_supply
      cmd: set_relay
      params:
        state: false
    save: reset_valve_clean_supply_result

  - step: wait_reset_valve_clean_supply_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_clean_supply_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_solution_fill_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: nd-irrig-e2e
      channel: valve_solution_fill
      cmd: set_relay
      params:
        state: false
    save: reset_valve_solution_fill_result

  - step: wait_reset_valve_solution_fill_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_solution_fill_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_solution_supply_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: nd-irrig-e2e
      channel: valve_solution_supply
      cmd: set_relay
      params:
        state: false
    save: reset_valve_solution_supply_result

  - step: wait_reset_valve_solution_supply_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status = 'DONE'
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_solution_supply_result.data.cmd_id}
    timeout: 15.0

  # ─── 5. Sensors уровня (WATER_LEVEL) ─────────────────────────────────────
  - step: delete_old_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid
        AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zid: ${zone_id}

  - step: insert_level_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      SELECT :ghid, :zid, :nid, 'inside', 'WATER_LEVEL', label, true, NOW(), NOW()
      FROM (VALUES
        ('level_clean_max'),
        ('level_clean_min'),
        ('level_solution_max'),
        ('level_solution_min')
      ) AS t(label)
    params:
      ghid: ${greenhouse_id}
      zid: ${zone_id}
      nid: ${irrig_node_id}

  # ─── 6. Telemetry: чистый бак пуст (0.0), остальные тоже 0.0 ─────────────
  - step: init_telemetry_all_empty
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT id, 0.0, NOW(), 'GOOD', NOW()
      FROM sensors
      WHERE zone_id = :zid AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value   = 0.0,
        last_ts      = NOW(),
        last_quality = 'GOOD',
        updated_at   = NOW()
    params:
      zid: ${zone_id}

  # ─── 7. Создаём рецепт → revision → phase → publish ─────────────────────
  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: test-plant-e83-${TIMESTAMP_S}
      scientific_name: Test Plant E83
    save: plant_response

  - step: create_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: test-recipe-e83-${TIMESTAMP_S}
      description: Recipe for E83 clean water fill test
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: Revision for E83
    save: revision_response

  - step: add_phase
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Growing
      duration_hours: 168
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.8
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}

  # ─── 8. Создаём и запускаем grow cycle ────────────────────────────────────
  - step: create_grow_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: false
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  # ─── 8.1 Сбрасываем in-memory dedupe в AE перед запуском цикла ───────────
  - step: restart_automation_engine_stop
    type: system_stop
    service: automation-engine

  - step: wait_after_automation_engine_stop
    type: sleep
    seconds: 2

  - step: restart_automation_engine_start
    type: system_start
    service: automation-engine

  - step: wait_after_automation_engine_start
    type: sleep
    seconds: 5

  - step: capture_run_started_at
    type: database_query
    query: SELECT NOW() AS started_at
    save: run_start_row

  - step: set_run_started_at
    type: set
    run_started_at: ${run_start_row.0.started_at}

  - step: start_grow_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/start
    payload: {}
    save: start_response

  # ─── 9. Ждём команду set_relay на valve_clean_fill ────────────────────────
  # AE видит level_clean_max = 0.0 → не triggered → запускает clean_fill
  - step: wait_for_clean_fill_command
    type: db.wait
    query: |
      SELECT id, cmd, channel, status, created_at
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel = 'valve_clean_fill'
        AND created_at > :run_started_at
      LIMIT 1
    params:
      zid: ${zone_id}
      run_started_at: ${run_started_at}
    timeout: 30.0
    save: clean_fill_cmd_row

assertions:
  # Проверка 1: Команда valve_clean_fill отправлена
  - name: clean_fill_command_exists
    type: database_query
    query: |
      SELECT id, cmd, channel, status
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel = 'valve_clean_fill'
        AND created_at > :run_started_at
      LIMIT 1
    params:
      zid: ${zone_id}
      run_started_at: ${run_started_at}
    expected_rows: 1
    expected:
      - field: cmd
        operator: equals
        value: set_relay
      - field: channel
        operator: equals
        value: valve_clean_fill

  # Проверка 2: Zone event CLEAN_FILL_STARTED создан
  - name: clean_fill_started_event
    type: database_query
    query: |
      SELECT id, type, created_at
      FROM zone_events
      WHERE zone_id = :zid
        AND type = 'CLEAN_FILL_STARTED'
        AND created_at > :run_started_at
      LIMIT 1
    params:
      zid: ${zone_id}
      run_started_at: ${run_started_at}
    expected_rows: 1
    expected:
      - field: type
        operator: equals
        value: CLEAN_FILL_STARTED

  # Проверка 3: Zone event TANK_LEVEL_CHECKED создан (startup диагностика)
  - name: tank_level_checked_event
    type: database_query
    query: |
      SELECT id, type
      FROM zone_events
      WHERE zone_id = :zid
        AND type = 'TANK_LEVEL_CHECKED'
        AND created_at > :run_started_at
      LIMIT 1
    params:
      zid: ${zone_id}
      run_started_at: ${run_started_at}
    expected_rows: 1

cleanup:
  - step: delete_grow_cycles
    type: database_execute
    query: DELETE FROM grow_cycles WHERE zone_id = :zid
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_telemetry_last
    type: database_execute
    query: |
      DELETE FROM telemetry_last
      WHERE sensor_id IN (
        SELECT id FROM sensors WHERE zone_id = :zid AND type = 'WATER_LEVEL'
      )
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_node_channels
    type: database_execute
    query: DELETE FROM node_channels WHERE node_id = :nid
    params:
      nid: ${irrig_node_id}
    optional: true

  - step: delete_irrig_node
    type: database_execute
    query: DELETE FROM nodes WHERE uid = 'nd-irrig-e2e'
    optional: true

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
