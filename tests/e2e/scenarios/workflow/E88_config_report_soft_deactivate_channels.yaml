# E88: Config report full-snapshot -> soft-deactivate missing channels
# DoD:
# - при explicit full snapshot в config_report отсутствующие каналы не удаляются,
#   а переходят в is_active=false
# - присутствующие каналы остаются active и получают last_seen_at

name: E88_config_report_soft_deactivate_channels
description: |
  Проверяет безопасный sync node_channels при config_report:
  - создаём 2 канала (pump_a, pump_b) у тестовой ноды;
  - отправляем full-snapshot только с pump_a;
  - ожидаем soft-deactivate для pump_b (is_active=false), без DELETE.

actions:
  - step: set_test_zone_uid
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}

  - step: set_test_gh_uid
    type: set
    test_gh_uid: ${TEST_NODE_GH_UID}

  - step: set_test_node_uid
    type: set
    test_node_uid: nd-e88-sync-1

  - step: get_zone_context
    type: database_query
    query: |
      SELECT z.id AS zone_id
      FROM zones z
      WHERE z.uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_ctx

  - step: set_zone_id
    type: set
    zone_id: ${zone_ctx.0.zone_id}

  - step: upsert_test_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, name, type, status, lifecycle_state, last_seen_at, created_at, updated_at)
      VALUES (:zid, :node_uid, 'E88 Sync Node', 'ec', 'online', 'ASSIGNED_TO_ZONE', NOW(), NOW(), NOW())
      ON CONFLICT (uid) DO UPDATE SET
        zone_id = EXCLUDED.zone_id,
        status = 'online',
        lifecycle_state = 'ASSIGNED_TO_ZONE',
        updated_at = NOW()
    params:
      zid: ${zone_id}
      node_uid: ${test_node_uid}

  - step: get_test_node
    type: database_query
    query: SELECT id FROM nodes WHERE uid = :node_uid LIMIT 1
    params:
      node_uid: ${test_node_uid}
    save: test_node_row

  - step: set_test_node_id
    type: set
    test_node_id: ${test_node_row.0.id}

  - step: seed_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, metric, unit, config, is_active, last_seen_at, created_at, updated_at)
      VALUES
        (:nid_a, 'pump_a', 'ACTUATOR', 'PUMP', NULL, '{}'::jsonb, TRUE, NOW(), NOW(), NOW()),
        (:nid_b, 'pump_b', 'ACTUATOR', 'PUMP', NULL, '{}'::jsonb, TRUE, NOW(), NOW(), NOW())
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = EXCLUDED.type,
          metric = EXCLUDED.metric,
          is_active = TRUE,
          updated_at = NOW()
    params:
      nid_a: ${test_node_id}
      nid_b: ${test_node_id}

  - step: node_sends_full_snapshot
    type: mqtt_publish
    topic: hydro/${test_gh_uid}/${test_zone_uid}/${test_node_uid}/config_report
    payload:
      node_id: ${test_node_uid}
      version: 3
      channels_full_snapshot: true
      channels:
        - name: pump_a
          type: ACTUATOR
          metric: PUMP
          unit: ""

  - step: assert_present_channel_active
    type: db.wait
    query: |
      SELECT id, channel, is_active, last_seen_at
      FROM node_channels
      WHERE node_id = :nid
        AND channel = 'pump_a'
        AND COALESCE(is_active, TRUE) = TRUE
        AND last_seen_at IS NOT NULL
      LIMIT 1
    params:
      nid: ${test_node_id}
    timeout: 15.0

  - step: assert_missing_channel_soft_deactivated
    type: db.wait
    query: |
      SELECT id, channel, is_active
      FROM node_channels
      WHERE node_id = :nid
        AND channel = 'pump_b'
        AND COALESCE(is_active, TRUE) = FALSE
      LIMIT 1
    params:
      nid: ${test_node_id}
    timeout: 15.0
