# E96: Реактивный solution_topup по edge level_solution_max 1→0
# Wave 3 audit gap — WATER_FLOW_ENGINE.md §19.2.1
# Запуск:
#   cd tests/e2e && python -m runner.e2e_runner scenarios/workflow/E96_reactive_solution_topup_level_switch.yaml
# DoD:
# - зона two-tank в workflow_phase=ready
# - node_sim публикует level_switch_changed на level_solution_max (state=false)
# - AE3 создаёт intent/task solution_topup (реактивный path)

name: E96_reactive_solution_topup_level_switch
description: |
  Проверяет реактивный автодолив бака раствора (этап B, §19):
  1) зона AE3 two-tank в фазе ready,
  2) read-model: solution_min triggered, solution_max был full,
  3) симулируем edge level_solution_max 1→0 через MQTT event,
  4) AE3 создаёт solution_topup task или intent с trigger=level_switch.

setup:
  node_sim:
    config:
      mqtt:
        host: ${MQTT_HOST:-localhost}
        port: ${MQTT_PORT:-1884}
      node:
        gh_uid: gh-test-1
        zone_uid: zn-test-1
        node_uid: ${TEST_NODE_UID}
        hardware_id: esp32-test-irr-topup-001
        node_type: irrigation
        mode: configured
        channels:
          - level_clean_min
          - level_clean_max
          - level_solution_min
          - level_solution_max
        actuators:
          - pump_main
          - valve_solution_fill
      telemetry:
        interval_seconds: 2.0
        heartbeat_interval_seconds: 15.0

actions:
  - step: start_node_simulator
    type: start_simulator
    config_ref: node_sim.config
    wait_seconds: 3

  - step: set_test_context
    type: set
    test_gh_uid: ${TEST_NODE_GH_UID}
    test_zone_uid: ${TEST_NODE_ZONE_UID}
    test_node_uid: ${TEST_NODE_UID}
    idempotency_key: e96-topup-${TIMESTAMP_MS}

  - step: get_zone_row
    type: database_query
    query: |
      SELECT id, greenhouse_id
      FROM zones
      WHERE uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_row
    expected_rows: 1

  - step: set_zone_id
    type: set
    zone_id: ${zone_row.0.id}
    greenhouse_id: ${zone_row.0.greenhouse_id}

  - step: resolve_irrig_node
    type: database_query
    query: |
      SELECT id AS node_id
      FROM nodes
      WHERE uid = :node_uid
        AND zone_id = :zone_id
      LIMIT 1
    params:
      node_uid: ${test_node_uid}
      zone_id: ${zone_id}
    expected_rows: 1
    save: irrig_node_row

  - step: set_irrig_node_id
    type: set
    irrig_node_id: ${irrig_node_row.0.node_id}

  - step: ensure_zone_automation_runtime_ae3
    type: database_execute
    query: |
      UPDATE zones
      SET automation_runtime = 'ae3',
          updated_at = NOW()
      WHERE id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: delete_old_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zone_id
        AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zone_id: ${zone_id}

  - step: insert_level_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      SELECT :greenhouse_id, :zone_id, :node_id, 'inside', 'WATER_LEVEL', label, TRUE, NOW(), NOW()
      FROM (VALUES
        ('level_clean_max'),
        ('level_clean_min'),
        ('level_solution_max'),
        ('level_solution_min')
      ) AS items(label)
    params:
      greenhouse_id: ${greenhouse_id}
      zone_id: ${zone_id}
      node_id: ${irrig_node_id}

  - step: cleanup_zone_ae_commands
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id);
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_stage_transitions
    type: database_execute
    query: |
      DELETE FROM ae_stage_transitions
      WHERE task_id IN (SELECT id FROM ae_tasks WHERE zone_id = :zone_id);
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_ae_tasks
    type: database_execute
    query: |
      DELETE FROM ae_tasks WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_leases
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_cycles
    type: database_execute
    query: |
      DELETE FROM grow_cycles WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: cleanup_zone_workflow_state
    type: database_execute
    query: |
      DELETE FROM zone_workflow_state WHERE zone_id = :zone_id;
    params:
      zone_id: ${zone_id}

  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: e96-plant-${TIMESTAMP_S}
      scientific_name: Solution Topup Test Plant
    save: plant_response

  - step: create_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: e96-recipe-${TIMESTAMP_S}
      description: Reactive solution_topup level switch
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: E96 topup revision
    save: revision_response

  - step: add_phase_0
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Growth
      duration_hours: 24
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.5
      ec_min: 1.3
      ec_max: 1.7
      temp_air_target: 22.0
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}

  - step: create_running_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: false
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  - step: apply_two_tank_logic_profile
    type: api_put
    endpoint: /api/automation-configs/zone/${zone_id}/zone.logic_profile
    payload:
      payload:
        active_mode: working
        profiles:
          working:
            mode: working
            is_active: true
            subsystems:
              diagnostics:
                execution:
                  workflow: cycle_start
                  topology: two_tank_drip_substrate_trays
                  required_node_types:
                    - irrig
                  startup:
                    level_poll_interval_sec: 5
                    clean_fill_timeout_sec: 120
                    solution_fill_timeout_sec: 180
                    prepare_recirculation_timeout_sec: 180
                    solution_topup_enabled: true
                    telemetry_max_age_sec: 120
                    irr_state_max_age_sec: 120
                  target_ph: 5.8
                  target_ec: 1.4
                  prepare_tolerance:
                    ph_pct: 15
                    ec_pct: 25
                  two_tank_commands:
                    clean_fill_start:
                      - channel: valve_clean_fill
                        cmd: set_relay
                        params:
                          state: true
                    clean_fill_stop:
                      - channel: valve_clean_fill
                        cmd: set_relay
                        params:
                          state: false
                    solution_fill_start:
                      - channel: valve_clean_supply
                        cmd: set_relay
                        params:
                          state: true
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: true
                    solution_fill_stop:
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_clean_supply
                        cmd: set_relay
                        params:
                          state: false
                    solution_topup_start:
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                    solution_topup_stop:
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                    prepare_recirculation_start:
                      - channel: valve_solution_supply
                        cmd: set_relay
                        params:
                          state: true
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: true
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: true
                    prepare_recirculation_stop:
                      - channel: pump_main
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_fill
                        cmd: set_relay
                        params:
                          state: false
                      - channel: valve_solution_supply
                        cmd: set_relay
                        params:
                          state: false

  - step: validate_zone_bundle
    type: api_post
    endpoint: /api/automation-bundles/zone/${zone_id}/validate
    payload: {}

  - step: validate_cycle_bundle
    type: api_post
    endpoint: /api/automation-bundles/grow_cycle/${cycle_id}/validate
    payload: {}

  - step: insert_ready_workflow_state
    type: database_execute
    query: |
      INSERT INTO zone_workflow_state (zone_id, workflow_phase, version, updated_at, payload)
      VALUES (:zone_id, 'ready', 1, NOW(), '{}'::jsonb)
      ON CONFLICT (zone_id) DO UPDATE
      SET workflow_phase = 'ready',
          version = zone_workflow_state.version + 1,
          updated_at = NOW()
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_ae_commands_before_topup
    type: database_execute
    query: |
      DELETE FROM ae_commands
      WHERE task_id IN (
        SELECT id FROM ae_tasks WHERE zone_id = :zone_id
      )
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_ae_tasks_before_topup
    type: database_execute
    query: |
      DELETE FROM ae_tasks WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_ae_leases_before_topup
    type: database_execute
    query: |
      DELETE FROM ae_zone_leases WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}

  - step: force_cleanup_intents_before_topup
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND status IN ('pending', 'claimed', 'running')
    params:
      zone_id: ${zone_id}

  - step: ensure_grow_cycle_running
    type: database_execute
    query: |
      UPDATE grow_cycles
      SET status = 'RUNNING',
          updated_at = NOW()
      WHERE id = CAST(:cycle_id AS bigint)
        AND status IN ('PLANNED', 'PAUSED', 'RUNNING')
    params:
      cycle_id: ${cycle_id}

  - step: seed_level_telemetry_full_tank
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT s.id, val.last_value, NOW(), 'GOOD', NOW()
      FROM sensors s
      JOIN (VALUES
        ('level_solution_min', 1),
        ('level_solution_max', 1)
      ) AS val(label, last_value) ON val.label = s.label
      WHERE s.zone_id = :zone_id
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value = EXCLUDED.last_value,
        last_ts = EXCLUDED.last_ts,
        last_quality = EXCLUDED.last_quality,
        updated_at = EXCLUDED.updated_at
    params:
      zone_id: ${zone_id}

  - step: seed_level_telemetry_dropped_max
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT s.id, 0, NOW(), 'GOOD', NOW()
      FROM sensors s
      WHERE s.zone_id = :zone_id
        AND s.label = 'level_solution_max'
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value = EXCLUDED.last_value,
        last_ts = EXCLUDED.last_ts,
        last_quality = EXCLUDED.last_quality,
        updated_at = EXCLUDED.updated_at
    params:
      zone_id: ${zone_id}

  - step: publish_solution_max_drop_edge
    type: mqtt_publish
    topic: hydro/${test_gh_uid}/${test_zone_uid}/${test_node_uid}/level_solution_max/event
    payload:
      event_code: level_switch_changed
      channel: level_solution_max
      state: false
      initial: false
      ts: ${TIMESTAMP_MS}
      snapshot:
        level_solution_min: 1
        level_solution_max: 0
        level_clean_min: 1
        level_clean_max: 1
    qos: 1
    wait_seconds: 2

  - step: wait_level_switch_zone_event
    type: db.wait
    query: |
      SELECT id, type
      FROM zone_events
      WHERE zone_id = :zone_id
        AND type = 'LEVEL_SWITCH_CHANGED'
        AND payload_json->>'channel' = 'level_solution_max'
        AND payload_json->>'state' IN ('false', '0')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 30.0
    expected_rows: 1
    save: level_switch_event_row

  - step: wait_solution_topup_task
    type: db.wait
    query: |
      SELECT id, task_type, status, current_stage
      FROM ae_tasks
      WHERE zone_id = :zone_id
        AND task_type = 'solution_topup'
        AND status IN ('pending', 'claimed', 'running', 'waiting_command')
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    timeout: 60.0
    expected_rows: 1
    save: topup_task_row

  - step: set_topup_task_id
    type: set
    task_id: ${topup_task_row.0.id}

assertions:
  - name: level_switch_event_persisted
    type: custom_assert
    condition: "len(context.get('level_switch_event_row') or []) == 1"

  - name: solution_topup_task_created
    type: custom_assert
    condition: "str((context.get('topup_task_row') or [{}])[0].get('task_type', '')).lower() == 'solution_topup'"

  - name: solution_topup_intent_exists
    type: database_query
    query: |
      SELECT id, task_type, intent_type, payload->>'trigger' AS trigger
      FROM zone_automation_intents
      WHERE zone_id = :zone_id
        AND task_type = 'solution_topup'
      ORDER BY id DESC
      LIMIT 1
    params:
      zone_id: ${zone_id}
    expected_rows: 1
    expected:
      - field: task_type
        operator: equals
        value: solution_topup

cleanup:
  - step: abort_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/abort
    payload: {}
    optional: true
    condition: ${cycle_id}

  - step: delete_test_ae_commands
    type: database_execute
    condition: ${task_id is not None and task_id != ''}
    query: |
      DELETE FROM ae_commands WHERE task_id = CAST(:task_id AS bigint);
    params:
      task_id: ${task_id}
    optional: true

  - step: delete_test_ae_stage_transitions
    type: database_execute
    condition: ${task_id is not None and task_id != ''}
    query: |
      DELETE FROM ae_stage_transitions WHERE task_id = CAST(:task_id AS bigint);
    params:
      task_id: ${task_id}
    optional: true

  - step: delete_test_ae_task
    type: database_execute
    condition: ${task_id is not None and task_id != ''}
    query: |
      DELETE FROM ae_tasks WHERE id = CAST(:task_id AS bigint);
    params:
      task_id: ${task_id}
    optional: true

  - step: delete_test_intents
    type: database_execute
    query: |
      DELETE FROM zone_automation_intents WHERE zone_id = :zone_id
    params:
      zone_id: ${zone_id}
    optional: true

  - step: delete_test_cycle
    type: database_execute
    query: |
      DELETE FROM grow_cycles WHERE id = :cycle_id
    params:
      cycle_id: ${cycle_id}
    optional: true
    condition: ${cycle_id}

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true
    condition: "bool(context.get('recipe_response', {}).get('data', {}).get('id'))"

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
    condition: "bool(context.get('plant_response', {}).get('data', {}).get('id'))"
