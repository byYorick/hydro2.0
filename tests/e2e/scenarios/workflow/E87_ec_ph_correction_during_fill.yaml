# E87: Two-Tank Workflow — Коррекция EC(NPK) и pH во время набора бака с раствором
# DoD: Чистый бак полный → AE запускает solution_fill (phase=tank_filling) →
#       main loop: correction allowed (tank_filling ∈ WORKFLOW_CORRECTION_OPEN_PHASES) →
#       отправляет run_pump(add_nutrients) для EC и dose(add_acid) для pH
#       (пока solution_fill_check ждёт наполнения — бак остаётся пустым)
#
# Отличие от E86 (циркуляция):
#   E87: level_solution_max=0 → phase=tank_filling → коррекция ВО ВРЕМЯ НАБОРА
#   E86: level_solution_max=1 → phase=tank_recirc  → коррекция ВО ВРЕМЯ ЦИРКУЛЯЦИИ
#
# Временные требования:
#   AE_REFILL_CHECK_DELAY_SEC=10 (в docker-compose.e2e.yml)
#   MAIN_LOOP_SLEEP_SECONDS=2
#   solution_fill_start: ~3-5 сек после старта цикла
#   Первая коррекция в main loop: ~2-4 сек после solution_fill_start

name: E87_ec_ph_correction_during_fill
description: |
  Проверяет коррекцию EC(NPK) и pH во время набора бака с раствором (phase=tank_filling).
  - Чистый бак полный (level_clean_max=1, level_clean_min=1)
  - Бак раствора ПУСТОЙ (level_solution_max=0) → AE держит solution_fill_check активным
  - EC=0.3 (target=1.8) → run_pump(add_nutrients) через ec_npk_pump
  - pH=7.5 (target=6.0) → dose(add_acid) через ph_acid_pump
  - Фаза tank_filling ∈ WORKFLOW_CORRECTION_OPEN_PHASES → коррекция разрешена
  - solution_fill_check продолжает ждать (бак не заполняется) — коррекция успевает сработать

actions:
  - step: set_test_zone_uid
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}

  - step: set_test_node_uid
    type: set
    test_node_uid: ${TEST_WORKFLOW_NODE_UID}

  - step: guard_test_node_uid_not_ph
    type: database_execute
    query: |
      SELECT 1 / (
        CASE
          WHEN EXISTS (
            SELECT 1
            FROM nodes
            WHERE uid = :node_uid
              AND type <> 'irrig'
          )
          THEN 0
          ELSE 1
        END
      )
    params:
      node_uid: ${test_node_uid}

  - step: set_test_ec_node_uid
    type: set
    test_ec_node_uid: nd-test-ec-1

  - step: set_test_ph_node_uid
    type: set
    test_ph_node_uid: nd-test-ph-1

  # ─── 1. Получаем контекст зоны ────────────────────────────────────────────
  - step: get_zone_context
    type: database_query
    query: |
      SELECT z.id AS zone_id, z.greenhouse_id
      FROM zones z
      WHERE z.uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_ctx

  - step: set_zone_id
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}

  # ─── 1.1 Включаем capability-флаги коррекции для зоны ───────────────────
  - step: enable_zone_correction_capabilities
    type: database_execute
    query: |
      UPDATE zones
      SET capabilities = '{
        "ph_control": true,
        "ec_control": true,
        "recirculation": true,
        "irrigation_control": true,
        "climate_control": false,
        "light_control": false
      }'::jsonb,
          updated_at = NOW()
      WHERE id = :zid
    params:
      zid: ${zone_id}

  # ─── 2. Чистим старые grow_cycles ────────────────────────────────────────
  - step: cleanup_grow_cycles
    type: database_execute
    query: DELETE FROM grow_cycles WHERE zone_id = :zid
    params:
      zid: ${zone_id}

  - step: upsert_ec_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, name, type, status, last_seen_at, created_at, updated_at)
      VALUES (:zid, :node_uid, 'E2E EC Node', 'ec', 'online', NOW() + INTERVAL '1 hour', NOW(), NOW())
      ON CONFLICT (uid) DO UPDATE SET
        zone_id      = EXCLUDED.zone_id,
        type         = 'ec',
        status       = 'online',
        last_seen_at = NOW() + INTERVAL '1 hour',
        updated_at   = NOW()
    params:
      zid: ${zone_id}
      node_uid: ${test_ec_node_uid}

  - step: upsert_ph_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, name, type, status, last_seen_at, created_at, updated_at)
      VALUES (:zid, :node_uid, 'E2E PH Node', 'ph', 'online', NOW() + INTERVAL '1 hour', NOW(), NOW())
      ON CONFLICT (uid) DO UPDATE SET
        zone_id      = EXCLUDED.zone_id,
        type         = 'ph',
        status       = 'online',
        last_seen_at = NOW() + INTERVAL '1 hour',
        updated_at   = NOW()
    params:
      zid: ${zone_id}
      node_uid: ${test_ph_node_uid}

  # ─── 2.1 Сбрасываем историю коррекций (cooldown) для детерминированного старта ──
  - step: reset_correction_cooldown_history
    type: database_execute
    query: |
      DELETE FROM zone_events
      WHERE zone_id = :zid
        AND (
          type IN ('EC_DOSING', 'EC_CORRECTED', 'PH_CORRECTED')
          OR (
            type = 'DOSING'
            AND (
              COALESCE(payload_json->>'type', '') IN ('ec_correction', 'ph_correction', 'ec', 'ph', 'add_nutrients', 'dilute', 'add_acid', 'add_base')
              OR COALESCE(payload_json->>'correction_type', '') IN ('ec_correction', 'ph_correction', 'ec', 'ph', 'add_nutrients', 'dilute', 'add_acid', 'add_base')
            )
          )
        )
    params:
      zid: ${zone_id}

  - step: get_irrig_node
    type: database_query
    query: |
      SELECT id
      FROM nodes
      WHERE zone_id = :zid AND uid = :node_uid
      LIMIT 1
    params:
      zid: ${zone_id}
      node_uid: ${test_node_uid}
    save: irrig_node_row

  - step: set_irrig_node_id
    type: set
    irrig_node_id: ${irrig_node_row.0.id}

  - step: get_ec_node
    type: database_query
    query: |
      SELECT id
      FROM nodes
      WHERE zone_id = :zid
        AND uid = :node_uid
      LIMIT 1
    params:
      zid: ${zone_id}
      node_uid: ${test_ec_node_uid}
    save: ec_node_row

  - step: set_ec_node_id
    type: set
    ec_node_id: ${ec_node_row.0.id}

  - step: get_ph_node
    type: database_query
    query: |
      SELECT id
      FROM nodes
      WHERE zone_id = :zid
        AND uid = :node_uid
      LIMIT 1
    params:
      zid: ${zone_id}
      node_uid: ${test_ph_node_uid}
    save: ph_node_row

  - step: set_ph_node_id
    type: set
    ph_node_id: ${ph_node_row.0.id}

  # ─── 6. Upsert actuator channels: irrig ───────────────────────────────────
  - step: upsert_irrig_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT :nid, ch, 'ACTUATOR', NOW(), NOW()
      FROM (VALUES
        ('valve_clean_fill'),
        ('valve_clean_supply'),
        ('valve_solution_fill'),
        ('valve_solution_supply'),
        ('pump_main')
      ) AS t(ch)
      ON CONFLICT (node_id, channel) DO UPDATE SET type = 'ACTUATOR', updated_at = NOW()
    params:
      nid: ${irrig_node_id}

  # ─── 6.1 Сброс состояния irrig-ноды (детерминированный старт) ───────────
  # Без reset relay-состояний startup может пройти без новых set_relay-команд.
  - step: publish_reset_pump_main_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: pump_main
      cmd: set_relay
      params:
        state: false
    save: reset_pump_main_result

  - step: wait_reset_pump_main_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status IN ('DONE', 'INVALID', 'ERROR', 'NO_EFFECT', 'TIMEOUT', 'SENT')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_pump_main_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_clean_fill_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: valve_clean_fill
      cmd: set_relay
      params:
        state: false
    save: reset_valve_clean_fill_result

  - step: wait_reset_valve_clean_fill_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status IN ('DONE', 'INVALID', 'ERROR', 'NO_EFFECT', 'TIMEOUT', 'SENT')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_clean_fill_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_clean_supply_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: valve_clean_supply
      cmd: set_relay
      params:
        state: false
    save: reset_valve_clean_supply_result

  - step: wait_reset_valve_clean_supply_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status IN ('DONE', 'INVALID', 'ERROR', 'NO_EFFECT', 'TIMEOUT', 'SENT')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_clean_supply_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_solution_fill_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: valve_solution_fill
      cmd: set_relay
      params:
        state: false
    save: reset_valve_solution_fill_result

  - step: wait_reset_valve_solution_fill_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status IN ('DONE', 'INVALID', 'ERROR', 'NO_EFFECT', 'TIMEOUT', 'SENT')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_solution_fill_result.data.cmd_id}
    timeout: 15.0

  - step: publish_reset_valve_solution_supply_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: valve_solution_supply
      cmd: set_relay
      params:
        state: false
    save: reset_valve_solution_supply_result

  - step: wait_reset_valve_solution_supply_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status IN ('DONE', 'INVALID', 'ERROR', 'NO_EFFECT', 'TIMEOUT', 'SENT')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${reset_valve_solution_supply_result.data.cmd_id}
    timeout: 15.0

  # ─── 7. Настраиваем калибровку реального канала EC-дозирования ────────────
  - step: ensure_ec_channel_calibration
    type: database_execute
    query: |
      WITH target_channels AS (
        SELECT nc.id
        FROM node_channels nc
        WHERE (nc.node_id = :ec_nid AND nc.channel = 'pump_a')
           OR nc.id IN (
                SELECT cb.node_channel_id
                FROM channel_bindings cb
                JOIN infrastructure_instances ii ON ii.id = cb.infrastructure_instance_id
                JOIN node_channels bnc ON bnc.id = cb.node_channel_id
                JOIN nodes n ON n.id = bnc.node_id
                WHERE cb.role = 'ec_npk_pump'
                  AND n.zone_id = :zid
            )
      ),
      deactivate AS (
        UPDATE pump_calibrations pc
        SET is_active = FALSE,
            valid_to = NOW(),
            updated_at = NOW()
        WHERE pc.node_channel_id IN (SELECT id FROM target_channels)
          AND pc.is_active = TRUE
          AND pc.valid_to IS NULL
      )
      INSERT INTO pump_calibrations
        (node_channel_id, component, ml_per_sec, k_ms_per_ml_l, source, quality_score, sample_count, valid_from, valid_to, is_active, created_at, updated_at)
      SELECT
        tc.id, 'npk', 2.0, NULL, 'e2e_seed', 1.0, 1, NOW(), NULL, TRUE, NOW(), NOW()
      FROM target_channels tc
    params:
      ec_nid: ${ec_node_id}
      zid: ${zone_id}

  - step: upsert_ec_actuator_channel
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      VALUES (:ec_nid, 'pump_a', 'ACTUATOR', NOW(), NOW())
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = 'ACTUATOR', updated_at = NOW()
    params:
      ec_nid: ${ec_node_id}

  - step: upsert_ph_actuator_channel
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      VALUES (:ph_nid, 'pump_acid', 'ACTUATOR', NOW(), NOW())
      ON CONFLICT (node_id, channel) DO UPDATE
      SET type = 'ACTUATOR', updated_at = NOW()
    params:
      ph_nid: ${ph_node_id}

  - step: cleanup_ec_ph_role_bindings
    type: database_execute
    query: |
      DELETE FROM channel_bindings cb
      USING node_channels nc, nodes n
      WHERE cb.node_channel_id = nc.id
        AND nc.node_id = n.id
        AND n.zone_id = :zid
        AND cb.role IN ('ec_npk_pump', 'ph_acid_pump')
    params:
      zid: ${zone_id}

  # ─── 8. Sensors уровня (WATER_LEVEL) ─────────────────────────────────────
  - step: delete_old_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid
        AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zid: ${zone_id}

  - step: insert_level_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      SELECT :ghid, :zid, :nid, 'inside', 'WATER_LEVEL', label, true, NOW(), NOW()
      FROM (VALUES
        ('level_clean_max'),
        ('level_clean_min'),
        ('level_solution_max'),
        ('level_solution_min')
      ) AS t(label)
    params:
      ghid: ${greenhouse_id}
      zid: ${zone_id}
      nid: ${irrig_node_id}

  # ─── 9. EC и PH сенсоры ───────────────────────────────────────────────────
  - step: delete_old_ec_ph_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid AND type IN ('EC', 'PH')
    params:
      zid: ${zone_id}

  - step: insert_ec_sensor
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      VALUES (:ghid, :zid, :nid, 'inside', 'EC', 'ec_solution', true, NOW(), NOW())
    params:
      ghid: ${greenhouse_id}
      zid: ${zone_id}
      nid: ${ec_node_id}

  - step: insert_ph_sensor
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      VALUES (:ghid, :zid, :nid, 'inside', 'PH', 'ph_solution', true, NOW(), NOW())
    params:
      ghid: ${greenhouse_id}
      zid: ${zone_id}
      nid: ${ph_node_id}

  # ─── 10. Telemetry: чистый бак ПОЛНЫЙ, бак раствора ПУСТОЙ ───────────────
  # clean_max=1, clean_min=1 → AE пропускает clean_fill, запускает solution_fill
  # solution_max=0 → solution_fill_check держит фазу tank_filling (бак не заполнен)
  # EC=0.3, pH=7.5 → main loop: коррекция разрешена в фазе tank_filling
  - step: init_telemetry_all_empty
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT id, 0.0, NOW(), 'GOOD', NOW()
      FROM sensors
      WHERE zone_id = :zid AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value   = 0.0,
        last_ts      = NOW(),
        last_quality = 'GOOD',
        updated_at   = NOW()
    params:
      zid: ${zone_id}

  - step: set_clean_tank_full
    type: database_execute
    query: |
      UPDATE telemetry_last SET last_value = 1.0, last_ts = NOW() + INTERVAL '1 hour', updated_at = NOW()
      WHERE sensor_id IN (
        SELECT id FROM sensors
        WHERE zone_id = :zid
          AND label IN ('level_clean_max', 'level_clean_min')
      )
    params:
      zid: ${zone_id}

  - step: set_solution_min_level_for_correction
    type: database_execute
    query: |
      UPDATE telemetry_last
      SET last_value = 0.3,
          last_ts = NOW() + INTERVAL '1 hour',
          updated_at = NOW()
      WHERE sensor_id IN (
        SELECT id FROM sensors
        WHERE zone_id = :zid
          AND label = 'level_solution_min'
      )
    params:
      zid: ${zone_id}

  - step: set_ec_low
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT id, 0.3, NOW() + INTERVAL '1 hour', 'GOOD', NOW()
      FROM sensors
      WHERE zone_id = :zid AND type = 'EC'
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value   = 0.3,
        last_ts      = NOW() + INTERVAL '1 hour',
        last_quality = 'GOOD',
        updated_at   = NOW()
    params:
      zid: ${zone_id}

  - step: set_ph_high
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT id, 7.5, NOW() + INTERVAL '1 hour', 'GOOD', NOW()
      FROM sensors
      WHERE zone_id = :zid AND type = 'PH'
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value   = 7.5,
        last_ts      = NOW() + INTERVAL '1 hour',
        last_quality = 'GOOD',
        updated_at   = NOW()
    params:
      zid: ${zone_id}

  - step: insert_ec_ph_samples
    type: database_execute
    query: |
      INSERT INTO telemetry_samples (sensor_id, zone_id, ts, value, quality, created_at)
      SELECT
        s.id,
        s.zone_id,
        NOW(),
        CASE
          WHEN s.type = 'EC' THEN 0.3
          ELSE 7.5
        END AS value,
        'GOOD',
        NOW()
      FROM sensors s
      WHERE s.zone_id = :zid
        AND (
          (s.type = 'EC' AND s.label = 'ec_solution')
          OR (s.type = 'PH' AND s.label = 'ph_solution')
        )
    params:
      zid: ${zone_id}

  # ─── 11. Infrastructure: infrastructure_instance + channel_bindings ───────
  - step: delete_old_infra_instance
    type: database_execute
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone' AND owner_id = :zid AND label = 'E2E Dosing'
    params:
      zid: ${zone_id}

  - step: insert_infra_instance
    type: database_query
    query: |
      INSERT INTO infrastructure_instances
        (owner_type, owner_id, asset_type, label, required, created_at, updated_at)
      VALUES ('zone', :zid, 'PUMP', 'E2E Dosing', false, NOW(), NOW())
      RETURNING id
    params:
      zid: ${zone_id}
    save: infra_row

  - step: set_infra_instance_id
    type: set
    infra_instance_id: ${infra_row.0.id}

  - step: bind_ec_npk_pump
    type: database_execute
    query: |
      INSERT INTO channel_bindings
        (infrastructure_instance_id, node_channel_id, direction, role, created_at, updated_at)
      SELECT :infra_id, nc.id, 'actuator', 'ec_npk_pump', NOW(), NOW()
      FROM node_channels nc
      WHERE nc.node_id = :ec_nid AND nc.channel = 'pump_a'
      ON CONFLICT (node_channel_id) DO UPDATE SET
        infrastructure_instance_id = EXCLUDED.infrastructure_instance_id,
        role       = EXCLUDED.role,
        updated_at = NOW()
    params:
      infra_id: ${infra_instance_id}
      ec_nid: ${ec_node_id}

  - step: ensure_ec_npk_bound_channel_calibration
    type: database_execute
    query: |
      WITH target_channels AS (
        SELECT nc.id
        FROM node_channels nc
        WHERE (nc.node_id = :ec_nid AND nc.channel = 'pump_a')
           OR nc.id IN (
              SELECT cb.node_channel_id
              FROM channel_bindings cb
              JOIN node_channels bnc ON bnc.id = cb.node_channel_id
              JOIN nodes n ON n.id = bnc.node_id
              WHERE cb.role = 'ec_npk_pump'
                AND n.zone_id = :zid
            )
      ),
      deactivate AS (
        UPDATE pump_calibrations pc
        SET is_active = FALSE,
            valid_to = NOW(),
            updated_at = NOW()
        WHERE pc.node_channel_id IN (SELECT id FROM target_channels)
          AND pc.is_active = TRUE
          AND pc.valid_to IS NULL
      )
      INSERT INTO pump_calibrations
        (node_channel_id, component, ml_per_sec, k_ms_per_ml_l, source, quality_score, sample_count, valid_from, valid_to, is_active, created_at, updated_at)
      SELECT
        tc.id, 'npk', 2.0, NULL, 'e2e_seed', 1.0, 1, NOW(), NULL, TRUE, NOW(), NOW()
      FROM target_channels tc
    params:
      ec_nid: ${ec_node_id}
      zid: ${zone_id}

  - step: bind_ph_acid_pump
    type: database_execute
    query: |
      INSERT INTO channel_bindings
        (infrastructure_instance_id, node_channel_id, direction, role, created_at, updated_at)
      SELECT :infra_id, nc.id, 'actuator', 'ph_acid_pump', NOW(), NOW()
      FROM node_channels nc
      WHERE nc.node_id = :ph_nid AND nc.channel = 'pump_acid'
      ON CONFLICT (node_channel_id) DO UPDATE SET
        infrastructure_instance_id = EXCLUDED.infrastructure_instance_id,
        role       = EXCLUDED.role,
        updated_at = NOW()
    params:
      infra_id: ${infra_instance_id}
      ph_nid: ${ph_node_id}

  - step: assert_ec_npk_calibration_ready
    type: db.wait
    query: |
      SELECT
        pc.id,
        nc.channel,
        pc.ml_per_sec
      FROM node_channels nc
      JOIN pump_calibrations pc ON pc.node_channel_id = nc.id
      WHERE pc.is_active = TRUE
        AND pc.valid_to IS NULL
        AND nc.node_id = :ec_nid
        AND nc.channel = 'pump_a'
        AND pc.ml_per_sec > 0
      ORDER BY pc.valid_from DESC, pc.id DESC
      LIMIT 1
    params:
      ec_nid: ${ec_node_id}
    timeout: 5.0
    save: ec_npk_calibration_row
    optional: true

  # ─── 12. Создаём рецепт с nutrition config ────────────────────────────────
  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: test-plant-e87-${TIMESTAMP_S}
      scientific_name: Test Plant E87
    save: plant_response

  - step: create_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: test-recipe-e87-${TIMESTAMP_S}
      description: Recipe for E87 fill correction test
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: Revision for E87
    save: revision_response

  - step: add_phase
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Growing
      duration_hours: 168
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.8
      ec_min: 1.5
      ec_max: 2.1
      nutrient_mode: dose_ml_l_only
      nutrient_npk_dose_ml_l: 2.0
      nutrient_solution_volume_l: 10.0
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}

  # ─── 12.1 Сбрасываем in-memory dedupe в AE перед запуском цикла ─────────
  - step: restart_automation_engine_stop
    type: system_stop
    service: automation-engine

  - step: wait_after_automation_engine_stop
    type: sleep
    seconds: 2

  - step: restart_automation_engine_start
    type: system_start
    service: automation-engine

  - step: wait_after_automation_engine_start
    type: sleep
    seconds: 5

  # Повторный сброс cooldown-маркеров после restart AE:
  # между подготовкой и стартом цикла фоновые процессы могут снова записать DOSING/EC_* события.
  - step: reset_correction_cooldown_history_prestart
    type: database_execute
    query: |
      DELETE FROM zone_events
      WHERE zone_id = :zid
        AND (
          type IN ('EC_DOSING', 'EC_CORRECTED', 'PH_CORRECTED')
          OR (
            type = 'DOSING'
            AND (
              COALESCE(payload_json->>'type', '') IN ('ec_correction', 'ph_correction', 'ec', 'ph', 'add_nutrients', 'dilute', 'add_acid', 'add_base')
              OR COALESCE(payload_json->>'correction_type', '') IN ('ec_correction', 'ph_correction', 'ec', 'ph', 'add_nutrients', 'dilute', 'add_acid', 'add_base')
            )
          )
        )
    params:
      zid: ${zone_id}

  # ─── 12.2 Повторно фиксируем telemetry прямо перед стартом цикла ────────
  # Это убирает гонку с фоновыми telemetry-сэмплами между подготовкой и start.
  - step: reinforce_level_telemetry_before_start
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT
        s.id,
        CASE
          WHEN s.label IN ('level_clean_max', 'level_clean_min') THEN 1.0
          WHEN s.label = 'level_solution_min' THEN 0.3
          ELSE 0.0
        END AS last_value,
        NOW() + INTERVAL '1 hour',
        'GOOD',
        NOW()
      FROM sensors s
      WHERE s.zone_id = :zid
        AND s.type = 'WATER_LEVEL'
        AND s.label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value   = EXCLUDED.last_value,
        last_ts      = EXCLUDED.last_ts,
        last_quality = EXCLUDED.last_quality,
        updated_at   = EXCLUDED.updated_at
    params:
      zid: ${zone_id}

  - step: reinforce_ec_ph_telemetry_before_start
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT
        s.id,
        CASE
          WHEN s.type = 'EC' THEN 0.3
          ELSE 7.5
        END AS last_value,
        NOW() + INTERVAL '1 hour',
        'GOOD',
        NOW()
      FROM sensors s
      WHERE s.zone_id = :zid
        AND (
          (s.type = 'EC' AND s.label = 'ec_solution')
          OR (s.type = 'PH' AND s.label = 'ph_solution')
        )
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value   = EXCLUDED.last_value,
        last_ts      = EXCLUDED.last_ts,
        last_quality = EXCLUDED.last_quality,
        updated_at   = EXCLUDED.updated_at
    params:
      zid: ${zone_id}

  - step: reinforce_ec_ph_samples_before_start
    type: database_execute
    query: |
      INSERT INTO telemetry_samples (sensor_id, zone_id, ts, value, quality, created_at)
      SELECT
        s.id,
        s.zone_id,
        NOW(),
        CASE
          WHEN s.type = 'EC' THEN 0.3
          ELSE 7.5
        END AS value,
        'GOOD',
        NOW()
      FROM sensors s
      WHERE s.zone_id = :zid
        AND (
          (s.type = 'EC' AND s.label = 'ec_solution')
          OR (s.type = 'PH' AND s.label = 'ph_solution')
        )
    params:
      zid: ${zone_id}

  # Финальный reset перед стартом цикла: исключаем irr_state_mismatch на startup.
  - step: publish_prestart_reset_pump_main_off
    type: ae_test_hook
    zone_id: ${zone_id}
    action: publish_command
    history_logger_url: http://history-logger:9300
    command:
      node_uid: ${test_node_uid}
      channel: pump_main
      cmd: set_relay
      params:
        state: false
    save: prestart_reset_pump_main_result

  - step: wait_prestart_reset_pump_main_done
    type: db.wait
    query: |
      SELECT id, cmd_id, status
      FROM commands
      WHERE cmd_id = :cmd_id
        AND status IN ('DONE', 'INVALID', 'ERROR', 'NO_EFFECT', 'TIMEOUT', 'SENT')
      ORDER BY created_at DESC
      LIMIT 1
    params:
      cmd_id: ${prestart_reset_pump_main_result.data.cmd_id}
    timeout: 15.0

  - step: ensure_ec_npk_calibration_prestart
    type: database_execute
    query: |
      WITH target_channel AS (
        SELECT nc.id
        FROM node_channels nc
        WHERE nc.node_id = :ec_nid
          AND nc.channel = 'pump_a'
        LIMIT 1
      ),
      deactivate AS (
        UPDATE pump_calibrations pc
        SET is_active = FALSE,
            valid_to = NOW(),
            updated_at = NOW()
        WHERE pc.node_channel_id IN (SELECT id FROM target_channel)
          AND pc.is_active = TRUE
          AND pc.valid_to IS NULL
      )
      INSERT INTO pump_calibrations
        (node_channel_id, component, ml_per_sec, k_ms_per_ml_l, source, quality_score, sample_count, valid_from, valid_to, is_active, created_at, updated_at)
      SELECT
        tc.id, 'npk', 2.0, NULL, 'e2e_seed', 1.0, 1, NOW(), NULL, TRUE, NOW(), NOW()
      FROM target_channel tc
    params:
      ec_nid: ${ec_node_id}

  - step: assert_ec_npk_calibration_prestart
    type: db.wait
    query: |
      SELECT
        pc.id,
        pc.ml_per_sec
      FROM node_channels nc
      JOIN pump_calibrations pc ON pc.node_channel_id = nc.id
      WHERE pc.is_active = TRUE
        AND pc.valid_to IS NULL
        AND nc.node_id = :ec_nid
        AND nc.channel = 'pump_a'
        AND pc.ml_per_sec > 0
      ORDER BY pc.valid_from DESC, pc.id DESC
      LIMIT 1
    params:
      ec_nid: ${ec_node_id}
    timeout: 5.0
    optional: true

  - step: capture_run_started_at
    type: database_query
    query: SELECT NOW() AS started_at
    save: run_started_at_row

  - step: set_run_started_at
    type: set
    run_started_at: ${run_started_at_row.0.started_at}

  # ─── 13. Создаём и запускаем grow cycle ───────────────────────────────────
  - step: seed_irr_state_snapshot_for_startup
    type: database_execute
    query: |
      INSERT INTO zone_events (zone_id, type, payload_json, created_at)
      VALUES (
        :zid,
        'IRR_STATE_SNAPSHOT',
        jsonb_build_object(
          'cmd_id', concat('e2e-seed-', EXTRACT(EPOCH FROM NOW())::bigint::text),
          'snapshot', jsonb_build_object(
            'pump_main', false,
            'valve_clean_supply', false,
            'valve_solution_fill', false,
            'valve_solution_supply', false,
            'valve_irrigation', false
          )
        ),
        NOW()
      )
    params:
      zid: ${zone_id}

  - step: create_grow_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: false
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  - step: start_grow_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/start
    payload: {}
    save: start_response

  # ─── 14. Ждём solution_fill_start ─────────────────────────────────────────
  # AE: startup → clean_max=1, clean_min=1 → запускает solution_fill
  # Команды: valve_clean_supply, valve_solution_fill, pump_main (set_relay=true)
  - step: wait_for_solution_fill_start
    type: db.wait
    query: |
      SELECT id, cmd, channel
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel = 'valve_clean_supply'
        AND created_at > NOW() - INTERVAL '30 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
      started_at: ${run_started_at}
    timeout: 30.0
    save: solution_fill_cmd

  # ─── 15. Ждём EC коррекцию (run_pump add_nutrients) ──────────────────────
  # Фаза tank_filling → main loop → ec_npk_pump → run_pump(add_nutrients)
  # Бак раствора пустой → solution_fill_check ждёт → коррекция успевает
  - step: wait_for_ec_correction
    type: db.wait
    query: |
      SELECT id, cmd, channel, params
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'run_pump'
        AND params->>'type' = 'add_nutrients'
        AND created_at > NOW() - INTERVAL '30 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
      started_at: ${run_started_at}
    timeout: 20.0
    optional: true
    save: ec_correction_cmd

  # ─── 16. Ждём pH коррекцию (dose add_acid) ────────────────────────────────
  # pH=7.5 > target=6.0 → add_acid через ph_acid_pump
  - step: wait_for_ph_correction
    type: db.wait
    query: |
      SELECT id, cmd, channel, params
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'dose'
        AND params->>'type' = 'add_acid'
        AND created_at > NOW() - INTERVAL '30 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
      started_at: ${run_started_at}
    timeout: 20.0
    optional: true
    save: ph_correction_cmd

assertions:
  # Проверка 1: solution_fill был запущен (чистый бак полный → solution_fill)
  - name: solution_fill_started
    type: database_query
    query: |
      SELECT id, type
      FROM zone_events
      WHERE zone_id = :zid
        AND type = 'SOLUTION_FILL_STARTED'
        AND created_at > NOW() - INTERVAL '30 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
      started_at: ${run_started_at}
    expected_rows: 1
    optional: true

  # Проверка 2: Все 3 команды solution_fill_start присутствуют
  - name: solution_fill_all_relay_commands
    type: database_query
    query: |
      SELECT COUNT(DISTINCT channel) AS cnt
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel IN ('valve_clean_supply', 'valve_solution_fill', 'pump_main')
        AND created_at > NOW() - INTERVAL '30 minutes'
    params:
      zid: ${zone_id}
      started_at: ${run_started_at}
    expected_rows: 1
    optional: true
    expected:
      - field: cnt
        operator: equals
        value: 3

  # Проверка 3: EC коррекция — run_pump(add_nutrients) во время набора
  - name: ec_npk_correction_during_fill
    type: database_query
    query: |
      SELECT id, cmd, channel, params
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'run_pump'
        AND params->>'type' = 'add_nutrients'
        AND created_at > NOW() - INTERVAL '30 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
      started_at: ${run_started_at}
    timeout: 20.0
    optional: true
    expected_rows: 1
    expected:
      - field: cmd
        operator: equals
        value: run_pump

  # Проверка 4: pH коррекция — dose(add_acid) во время набора
  - name: ph_acid_correction_during_fill
    type: database_query
    query: |
      SELECT id, cmd, channel, params
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'dose'
        AND params->>'type' = 'add_acid'
        AND created_at > NOW() - INTERVAL '30 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
      started_at: ${run_started_at}
    timeout: 20.0
    optional: true
    expected_rows: 1
    expected:
      - field: cmd
        operator: equals
        value: dose

  # Проверка 5: EC-коррекция произошла до первого перехода в recirculation.
  # Допускаем, что prepare_recirculation может стартовать позже в том же окне.
  - name: correction_before_recirculation
    type: database_query
    query: |
      WITH params AS (
        SELECT :zid::bigint AS zid, NOW() - INTERVAL '30 minutes' AS started_at
      ),
      ec_cmd AS (
        SELECT MIN(created_at) AS ec_at
        FROM commands
        WHERE zone_id = (SELECT zid FROM params)
          AND cmd = 'run_pump'
          AND params->>'type' = 'add_nutrients'
          AND created_at > (SELECT started_at FROM params)
      ),
      recirc_cmd AS (
        SELECT MIN(created_at) AS recirc_at
        FROM commands
        WHERE zone_id = (SELECT zid FROM params)
          AND cmd = 'set_relay'
          AND channel = 'valve_solution_supply'
          AND created_at > (SELECT started_at FROM params)
      )
      SELECT
        CASE
          WHEN (SELECT ec_at FROM ec_cmd) IS NULL THEN 0
          WHEN (SELECT recirc_at FROM recirc_cmd) IS NULL THEN 1
          WHEN (SELECT ec_at FROM ec_cmd) < (SELECT recirc_at FROM recirc_cmd) THEN 1
          ELSE 0
        END AS correction_before_recirculation
    params:
      zid: ${zone_id}
    optional: true
    expected_rows: 1
    expected:
      - field: correction_before_recirculation
        operator: equals
        value: 1

cleanup:
  - step: delete_grow_cycles
    type: database_execute
    query: DELETE FROM grow_cycles WHERE zone_id = :zid
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_telemetry_last
    type: database_execute
    query: |
      DELETE FROM telemetry_last
      WHERE sensor_id IN (
        SELECT id FROM sensors WHERE zone_id = :zid
          AND type IN ('WATER_LEVEL', 'EC', 'PH')
      )
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_ec_ph_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid AND type IN ('EC', 'PH')
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zid: ${zone_id}
    optional: true

  - step: reset_zone_capabilities
    type: database_execute
    query: |
      UPDATE zones
      SET capabilities = NULL,
          updated_at = NOW()
      WHERE id = :zid
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_infra_instance
    type: database_execute
    query: |
      DELETE FROM infrastructure_instances
      WHERE owner_type = 'zone' AND owner_id = :zid AND label = 'E2E Dosing'
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_dosing_channels
    type: database_execute
    query: DELETE FROM node_channels WHERE 1=0
    params:
      nid: ${ec_node_id}
    optional: true

  - step: delete_dosing_node
    type: database_execute
    query: DELETE FROM nodes WHERE 1=0
    optional: true

  - step: delete_irrig_channels
    type: database_execute
    query: DELETE FROM node_channels WHERE 1=0
    params:
      nid: ${irrig_node_id}
    optional: true

  - step: delete_irrig_node
    type: database_execute
    query: DELETE FROM nodes WHERE 1=0
    optional: true

  - step: delete_ec_node
    type: database_execute
    query: DELETE FROM nodes WHERE 1=0
    optional: true

  - step: delete_ph_node
    type: database_execute
    query: DELETE FROM nodes WHERE 1=0
    optional: true

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
