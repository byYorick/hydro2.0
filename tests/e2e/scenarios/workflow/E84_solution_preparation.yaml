# E84: Two-Tank Workflow — Этап 2: Наполнение бака рабочего раствора (solution_fill)
# DoD: Чистый бак уже полный (level_clean_max=1, level_clean_min=1) →
#       AE пропускает clean_fill → запускает solution_fill_start →
#       set_relay(valve_clean_supply, valve_solution_fill, pump_main=true) →
#       SOLUTION_FILL_STARTED zone event

name: E84_solution_preparation
description: |
  Проверяет второй этап two_tank_startup workflow: наполнение бака раствора.
  - Чистый бак уже полный (level_clean_max=1.0, level_clean_min=1.0)
  - AE запускает startup → оба уровня triggered → вызывает solution_fill_start
  - В commands создаются set_relay для valve_clean_supply, valve_solution_fill, pump_main
  - В zone_events появляется SOLUTION_FILL_STARTED

actions:
  - step: set_test_zone_uid
    type: set
    test_zone_uid: ${TEST_NODE_ZONE_UID}

  - step: set_test_node_uid
    type: set
    test_node_uid: ${TEST_NODE_UID}

  - step: guard_test_node_uid_not_ph
    type: database_execute
    query: |
      SELECT 1 / (
        CASE
          WHEN EXISTS (
            SELECT 1
            FROM nodes
            WHERE uid = :node_uid
              AND type <> 'irrig'
          )
          THEN 0
          ELSE 1
        END
      )
    params:
      node_uid: ${test_node_uid}

  # ─── 1. Получаем контекст зоны ────────────────────────────────────────────
  - step: get_zone_context
    type: database_query
    query: |
      SELECT z.id AS zone_id, z.greenhouse_id
      FROM zones z
      WHERE z.uid = :zone_uid
      LIMIT 1
    params:
      zone_uid: ${test_zone_uid}
    save: zone_ctx

  - step: set_zone_id
    type: set
    zone_id: ${zone_ctx.0.zone_id}
    greenhouse_id: ${zone_ctx.0.greenhouse_id}

  - step: set_zone_startup_capabilities
    type: database_execute
    query: |
      UPDATE zones
      SET capabilities = '{
        "irrigation_control": true,
        "recirculation": true,
        "ph_control": false,
        "ec_control": false,
        "climate_control": false,
        "light_control": false
      }'::jsonb,
          updated_at = NOW()
      WHERE id = :zid
    params:
      zid: ${zone_id}

  # ─── 2. Чистим старые grow_cycles ────────────────────────────────────────
  - step: cleanup_grow_cycles
    type: database_execute
    query: DELETE FROM grow_cycles WHERE zone_id = :zid
    params:
      zid: ${zone_id}

  # ─── 3. Upsert irrig node ─────────────────────────────────────────────────
  - step: upsert_irrig_node
    type: database_execute
    query: |
      INSERT INTO nodes (zone_id, uid, name, type, status, last_seen_at, created_at, updated_at)
      VALUES (:zid, '${test_node_uid}', 'E2E Irrig Node', 'irrig', 'online', NOW() + INTERVAL '1 hour', NOW(), NOW())
      ON CONFLICT (uid) DO UPDATE SET
        zone_id       = EXCLUDED.zone_id,
        type          = 'irrig',
        status        = 'online',
        last_seen_at  = NOW() + INTERVAL '1 hour',
        updated_at    = NOW()
    params:
      zid: ${zone_id}

  - step: get_irrig_node
    type: database_query
    query: SELECT id FROM nodes WHERE uid = '${test_node_uid}' LIMIT 1
    save: irrig_node_row

  - step: set_irrig_node_id
    type: set
    irrig_node_id: ${irrig_node_row.0.id}

  # ─── 4. Upsert actuator channels ─────────────────────────────────────────
  - step: upsert_actuator_channels
    type: database_execute
    query: |
      INSERT INTO node_channels (node_id, channel, type, created_at, updated_at)
      SELECT :nid, ch, 'ACTUATOR', NOW(), NOW()
      FROM (VALUES
        ('valve_clean_fill'),
        ('valve_clean_supply'),
        ('valve_solution_fill'),
        ('valve_solution_supply'),
        ('pump_main')
      ) AS t(ch)
      ON CONFLICT (node_id, channel) DO UPDATE SET type = 'ACTUATOR', updated_at = NOW()
    params:
      nid: ${irrig_node_id}

  # ─── 5. Sensors уровня (WATER_LEVEL) ─────────────────────────────────────
  - step: delete_old_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid
        AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zid: ${zone_id}

  - step: insert_level_sensors
    type: database_execute
    query: |
      INSERT INTO sensors (greenhouse_id, zone_id, node_id, scope, type, label, is_active, created_at, updated_at)
      SELECT :ghid, :zid, :nid, 'inside', 'WATER_LEVEL', label, true, NOW(), NOW()
      FROM (VALUES
        ('level_clean_max'),
        ('level_clean_min'),
        ('level_solution_max'),
        ('level_solution_min')
      ) AS t(label)
    params:
      ghid: ${greenhouse_id}
      zid: ${zone_id}
      nid: ${irrig_node_id}

  # ─── 6. Telemetry: ЧИСТЫЙ БАК ПОЛНЫЙ, бак раствора пуст ─────────────────
  # Инициализируем все как 0.0, затем перезаписываем чистый бак как 1.0
  - step: init_telemetry_all_empty
    type: database_execute
    query: |
      INSERT INTO telemetry_last (sensor_id, last_value, last_ts, last_quality, updated_at)
      SELECT id, 0.0, NOW(), 'GOOD', NOW()
      FROM sensors
      WHERE zone_id = :zid AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
      ON CONFLICT (sensor_id) DO UPDATE SET
        last_value   = 0.0,
        last_ts      = NOW(),
        last_quality = 'GOOD',
        updated_at   = NOW()
    params:
      zid: ${zone_id}

  # Устанавливаем оба уровня чистого бака = 1.0 (triggered)
  # AE видит clean_max triggered → проверяет clean_min → тоже triggered → переходит к solution_fill
  - step: set_clean_tank_full
    type: database_execute
    query: |
      UPDATE telemetry_last SET last_value = 1.0, last_ts = NOW(), updated_at = NOW()
      WHERE sensor_id IN (
        SELECT id FROM sensors
        WHERE zone_id = :zid
          AND label IN ('level_clean_max', 'level_clean_min')
      )
    params:
      zid: ${zone_id}

  # ─── 7. Создаём рецепт → revision → phase → publish ─────────────────────
  - step: create_plant
    type: api_post
    endpoint: /api/plants
    payload:
      name: test-plant-e84-${TIMESTAMP_S}
      scientific_name: Test Plant E84
    save: plant_response

  - step: create_recipe
    type: api_post
    endpoint: /api/recipes
    payload:
      name: test-recipe-e84-${TIMESTAMP_S}
      description: Recipe for E84 solution fill test
      plant_id: ${plant_response.data.id}
    save: recipe_response

  - step: create_revision
    type: api_post
    endpoint: /api/recipes/${recipe_response.data.id}/revisions
    payload:
      description: Revision for E84
    save: revision_response

  - step: add_phase
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/phases
    payload:
      phase_index: 0
      name: Growing
      duration_hours: 168
      ph_target: 6.0
      ph_min: 5.5
      ph_max: 6.5
      ec_target: 1.8
      irrigation_mode: SUBSTRATE
      irrigation_interval_sec: 3600
      irrigation_duration_sec: 300

  - step: publish_revision
    type: api_post
    endpoint: /api/recipe-revisions/${revision_response.data.id}/publish
    payload: {}

  # ─── 8. Создаём и запускаем grow cycle ────────────────────────────────────
  - step: seed_irr_state_snapshot_for_startup
    type: database_execute
    query: |
      INSERT INTO zone_events (zone_id, type, payload_json, created_at)
      VALUES (
        :zid,
        'IRR_STATE_SNAPSHOT',
        jsonb_build_object(
          'cmd_id', concat('e2e-seed-', EXTRACT(EPOCH FROM NOW())::bigint::text),
          'snapshot', jsonb_build_object(
            'pump_main', false,
            'valve_clean_supply', false,
            'valve_solution_fill', false,
            'valve_solution_supply', false,
            'valve_irrigation', false
          )
        ),
        NOW()
      )
    params:
      zid: ${zone_id}

  - step: create_grow_cycle
    type: api_post
    endpoint: /api/zones/${zone_id}/grow-cycles
    payload:
      recipe_revision_id: ${revision_response.data.id}
      plant_id: ${plant_response.data.id}
      start_immediately: false
    save: cycle_response

  - step: set_cycle_id
    type: set
    cycle_id: ${cycle_response.data.id}

  - step: start_grow_cycle
    type: api_post
    endpoint: /api/grow-cycles/${cycle_id}/start
    payload: {}
    save: start_response

  # ─── 9. Ждём команды solution_fill_start ─────────────────────────────────
  # AE видит clean_max=1 → clean_min=1 → оба triggered → запускает solution_fill
  # solution_fill_start = [valve_clean_supply, valve_solution_fill, pump_main]
  - step: wait_for_solution_fill_valve
    type: db.wait
    query: |
      SELECT id, cmd, channel, status, created_at
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel = 'valve_clean_supply'
        AND created_at > NOW() - INTERVAL '10 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
    timeout: 120.0
    save: solution_fill_cmd_row

assertions:
  # Проверка 1: Команда valve_clean_supply отправлена (solution_fill_start)
  - name: solution_fill_valve_clean_supply
    type: database_query
    query: |
      SELECT id, cmd, channel
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel = 'valve_clean_supply'
        AND created_at > NOW() - INTERVAL '15 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
    expected_rows: 1
    expected:
      - field: channel
        operator: equals
        value: valve_clean_supply

  # Проверка 2: Команда valve_solution_fill отправлена
  - name: solution_fill_valve_solution_fill
    type: database_query
    query: |
      SELECT id, cmd, channel
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel = 'valve_solution_fill'
        AND created_at > NOW() - INTERVAL '15 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
    expected_rows: 1

  # Проверка 3: Команда pump_main отправлена
  - name: solution_fill_pump_main
    type: database_query
    query: |
      SELECT id, cmd, channel
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel = 'pump_main'
        AND created_at > NOW() - INTERVAL '15 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
    expected_rows: 1

  # Проверка 4: Все 3 команды solution_fill_start присутствуют
  - name: solution_fill_all_commands
    type: database_query
    query: |
      SELECT COUNT(DISTINCT channel) AS cnt
      FROM commands
      WHERE zone_id = :zid
        AND cmd = 'set_relay'
        AND channel IN ('valve_clean_supply', 'valve_solution_fill', 'pump_main')
        AND created_at > NOW() - INTERVAL '15 minutes'
    params:
      zid: ${zone_id}
    expected_rows: 1
    expected:
      - field: cnt
        operator: equals
        value: 3

  # Проверка 5: Zone event SOLUTION_FILL_STARTED создан
  - name: solution_fill_started_event
    type: database_query
    query: |
      SELECT id, type
      FROM zone_events
      WHERE zone_id = :zid
        AND type = 'SOLUTION_FILL_STARTED'
        AND created_at > NOW() - INTERVAL '5 minutes'
      LIMIT 1
    params:
      zid: ${zone_id}
    expected_rows: 1
    optional: true
    expected:
      - field: type
        operator: equals
        value: SOLUTION_FILL_STARTED

cleanup:
  - step: delete_grow_cycles
    type: database_execute
    query: DELETE FROM grow_cycles WHERE zone_id = :zid
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_telemetry_last
    type: database_execute
    query: |
      DELETE FROM telemetry_last
      WHERE sensor_id IN (
        SELECT id FROM sensors WHERE zone_id = :zid AND type = 'WATER_LEVEL'
      )
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_level_sensors
    type: database_execute
    query: |
      DELETE FROM sensors
      WHERE zone_id = :zid AND type = 'WATER_LEVEL'
        AND label IN ('level_clean_max', 'level_clean_min', 'level_solution_max', 'level_solution_min')
    params:
      zid: ${zone_id}
    optional: true

  - step: delete_node_channels
    type: database_execute
    query: DELETE FROM node_channels WHERE 1=0
    params:
      nid: ${irrig_node_id}
    optional: true

  - step: delete_irrig_node
    type: database_execute
    query: DELETE FROM nodes WHERE 1=0
    optional: true

  - step: delete_recipe
    type: api_delete
    endpoint: /api/recipes/${recipe_response.data.id}
    optional: true

  - step: delete_plant
    type: api_delete
    endpoint: /api/plants/${plant_response.data.id}
    optional: true
