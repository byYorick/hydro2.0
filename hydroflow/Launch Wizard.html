<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1280"/>
<title>Hydroflow · Мастер запуска зоны</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* base palette — deep teal brand, growth green, warm amber, coral alert */
    --brand:         #0e8a8f;
    --brand-ink:     #065154;
    --brand-soft:    #d9f0ef;
    --growth:        #4f9d4a;
    --growth-soft:   #e1f1dc;
    --warn:          #c8871a;
    --warn-soft:     #faecd1;
    --alert:         #c0433b;
    --alert-soft:    #fadcd9;

    --bg:            #f4f6f7;
    --bg-panel:      #ffffff;
    --bg-sunken:     #f0f2f4;
    --line:          #e3e6e8;
    --line-strong:   #d1d6d9;

    --text:          #1b2326;
    --text-muted:    #4b575c;
    --text-faint:    #8a969c;

    --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

    --fs: 13px;
    --radius: 6px;
    --input-h: 32px;
  }
  html[data-theme="dark"] {
    --brand:         #3ab9bd;
    --brand-ink:     #a3e4e6;
    --brand-soft:    #0d3a3c;
    --growth:        #66c562;
    --growth-soft:   #113d1f;
    --warn:          #e0a341;
    --warn-soft:     #3d2e12;
    --alert:         #e06b62;
    --alert-soft:    #3d1a17;

    --bg:            #0f1416;
    --bg-panel:      #171d20;
    --bg-sunken:     #121719;
    --line:          #252d31;
    --line-strong:   #333d42;

    --text:          #e5eaec;
    --text-muted:    #a6b0b4;
    --text-faint:    #6e7a7e;
  }
  html[data-density="compact"] {
    --fs: 12px;
    --input-h: 28px;
  }
  html[data-density="comfortable"] {
    --fs: 13px;
    --input-h: 34px;
  }

  html, body, #root {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: var(--sans); font-size: var(--fs);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; color: inherit; }
  input, select, textarea { font-family: inherit; color: inherit; font-size: var(--fs); }
  .mono { font-family: var(--mono); font-feature-settings: 'tnum', 'zero'; }

  /* scrollbar polish */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* focus ring */
  button:focus-visible, select:focus-visible, input:focus-visible {
    outline: 2px solid var(--brand);
    outline-offset: 1px;
  }

  /* tighter select option look in modal */
  select { cursor: default; }
</style>

<script>
  // Persisted defaults used by useTweaks(); host rewrites this JSON on __edit_mode_set_keys.
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "density": "compact",
    "dark": false,
    "stepper": "horizontal",
    "showHints": true
  }/*EDITMODE-END*/;
</script>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel (pinned versions required by project) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tweaks host-protocol + control primitives -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Icons → UI primitives → Steps → App -->
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="steps.jsx"></script>
  <script type="text/babel" src="steps12.jsx"></script>
  <script type="text/babel" src="preset-selector.jsx"></script>
  <script type="text/babel" src="automation-hub.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
