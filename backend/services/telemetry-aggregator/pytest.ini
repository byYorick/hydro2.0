[pytest]
# Только тесты aggregator'а: common/** содержит тесты других сервисов,
# у которых свои pydantic/pytest-mock зависимости, не установленные здесь.
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = common __pycache__ .git
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
