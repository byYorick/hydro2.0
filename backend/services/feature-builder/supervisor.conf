[program:feature-builder]
process_name=%(program_name)s
command=python -u main.py
directory=/app
autostart=true
autorestart=true
startsecs=0
startretries=1000
stopasgroup=true
killasgroup=true
user=root
numprocs=1
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stdout_logfile_backups=0
stopwaitsecs=10
priority=999
