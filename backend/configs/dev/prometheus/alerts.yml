groups:
  - name: service_alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~"automation-engine|mqtt-bridge|history-logger|laravel-scheduler"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 2 minutes."

      - alert: MQTTBrokerDown
        expr: probe_success{job="mqtt-broker"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MQTT broker TCP probe failed"
          description: "Blackbox TCP probe to mqtt:1883 failed for more than 1 minute."

  - name: history_logger_alerts
    interval: 30s
    rules:
      - alert: HistoryLoggerQueueOverflow
        expr: telemetry_queue_size > 10000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger queue is overflowing"
          description: "Telemetry queue size is {{ $value }} (threshold: 10000). Messages may be dropped."

      - alert: HistoryLoggerQueueStale
        expr: telemetry_queue_age_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "History Logger queue has stale items"
          description: "Oldest item in queue is {{ $value }} seconds old (threshold: 300s). Processing may be delayed."

      - alert: HistoryLoggerDroppingMessages
        expr: rate(telemetry_dropped_total{reason="queue_push_failed"}[5m]) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger is dropping messages"
          description: "Dropping {{ $value }} messages/sec due to queue push failures. Data loss is occurring."

      - alert: HistoryLoggerDatabaseErrors
        expr: rate(database_errors_total[5m]) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger has database errors"
          description: "Database error rate is {{ $value }} errors/sec. Check database connectivity and performance."

      - alert: HistoryLoggerSlowProcessing
        expr: histogram_quantile(0.99, sum by (le) (rate(telemetry_processing_duration_seconds_bucket[5m]))) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "History Logger processing is slow"
          description: "P99 processing time is {{ $value }}s (threshold: 5s). Performance degradation detected."

      - alert: HistoryLoggerNoProgressWithIncomingTraffic
        expr: |
          (sum(rate(telemetry_received_total[5m])) or vector(0)) > 0.1
          and
          (sum(rate(telemetry_processed_total[5m])) or vector(0)) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger is not processing incoming telemetry"
          description: "Telemetry is arriving, but processed rate stayed at 0 for 5 minutes."

      - alert: HistoryLoggerUnknownNodeEventsSpike
        expr: rate(node_event_unknown_total[5m]) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "History Logger receives too many unknown node events"
          description: "Unknown node event rate is {{ $value }} events/sec for 10m. Check firmware event_code contract."

      - alert: HistoryLoggerCommandStatusRepairReplayFailed
        expr: |
          (sum(increase(pipeline_command_status_repair_total{outcome="replay_failed"}[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: error
        annotations:
          summary: "History Logger self-heal replay failed"
          description: "Self-heal repair path reported one or more replay_failed outcomes during the last 10 minutes."

      - alert: HistoryLoggerCommandStatusRepairNoCorrelation
        expr: |
          (sum(increase(pipeline_command_status_repair_total{outcome="no_correlation"}[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "History Logger found stale command statuses without correlation"
          description: "Self-heal repair path reported one or more no_correlation outcomes during the last 10 minutes."

  - name: laravel_scheduler_alerts
    interval: 30s
    rules:
      - alert: LaravelSchedulerDispatchFailureRateHigh
        expr: |
          (
            (sum(rate(laravel_scheduler_dispatches_total{result!~"success|backpressure"}[5m])) or vector(0))
            /
            clamp_min((sum(rate(laravel_scheduler_dispatches_total[5m])) or vector(0)), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Laravel scheduler dispatch failure rate is high"
          description: "Non-accepted scheduler dispatches exceed 5% for 10 minutes."

      - alert: LaravelSchedulerCycleDurationHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, dispatch_mode) (rate(laravel_scheduler_cycle_duration_seconds_bucket[5m]))
          ) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Laravel scheduler cycle duration is high"
          description: "P95 laravel scheduler cycle duration is {{ $value }}s (threshold: 5s)."

      - alert: LaravelSchedulerActiveTasksBacklogHigh
        expr: laravel_scheduler_active_tasks_count > 20
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Laravel scheduler active task backlog is high"
          description: "Active scheduler tasks are {{ $value }} (threshold: 20). Possible stuck reconciliation or automation slowdown."

      - alert: LaravelSchedulerPendingIntentsBacklog
        expr: (laravel_scheduler_pending_intents_count or vector(0)) > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Laravel scheduler has a backlog of pending intents"
          description: "Pending zone_automation_intents count is {{ $value }} (threshold: 10) for 15m. Check AE3/worker and DB NOTIFY path."

      - alert: LaravelSchedulerOldestPendingIntentStale
        expr: (laravel_scheduler_oldest_pending_intent_age_seconds or vector(0)) > 600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Oldest pending scheduler intent is stale"
          description: "Age of oldest pending intent is {{ $value }}s (threshold: 600s). Intents are not being claimed/completed."

      - alert: LaravelSchedulerDispatchCycleStructuralLag
        expr: (laravel_scheduler_dispatch_cycle_overrun_seconds or vector(0)) > 30
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Scheduler cycle p99 outruns configured dispatch tick"
          description: "p99 cycle duration exceeds dispatch_interval by {{ $value }}s (threshold: 30s). Consider wider tick, parallelism, or AE capacity."

  - name: ae3_runtime_alerts
    interval: 30s
    rules:
      - alert: AE3TaskFailureSpike
        expr: (sum(increase(ae3_task_failed_total[15m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 task failures detected"
          description: "AE3 reported one or more failed tasks during the last 15 minutes."

      - alert: AE3FlowStopFailed
        expr: (sum(increase(ae3_flow_stop_failed_total[15m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "AE3 flow-path stop not confirmed OFF"
          description: "Flow-path stop/probe failed for stage={{ $labels.stage }}; hardware may remain active."

      - alert: AE3WorkerTickErrors
        expr: rate(ae3_tick_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: error
        annotations:
          summary: "AE3 worker tick errors above threshold"
          description: "Worker tick error rate is {{ $value }} errors/sec (error_type={{ $labels.error_type }}). Check automation-engine logs."

      - alert: AE3CommandDispatchLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(ae3_command_dispatch_duration_seconds_bucket[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AE3 command dispatch latency is high"
          description: "P95 command dispatch latency is {{ $value }}s (threshold: 2s). Check history-logger connectivity."

      - alert: AE3CommandFailureRateHigh
        expr: |
          (
            (sum(rate(ae3_command_terminal_total{terminal_status!="DONE"}[10m])) or vector(0))
            /
            clamp_min((sum(rate(ae3_command_terminal_total[10m])) or vector(0)), 0.001)
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AE3 command failure rate is high"
          description: "More than 10% of terminal command outcomes are non-DONE over 10 minutes."

      - alert: AE3ZoneLeaseLost
        expr: rate(ae3_zone_lease_lost_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AE3 zone lease lost (zone {{ $labels.zone_id }})"
          description: "Zone {{ $labels.zone_id }} lease heartbeat failed to extend. Zone may be frozen or hijacked by another worker."

      - alert: AE3ZoneLeaseReleaseFailed
        expr: rate(ae3_zone_lease_release_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: error
        annotations:
          summary: "AE3 zone lease release failed (zone {{ $labels.zone_id }})"
          description: "Zone {{ $labels.zone_id }} lease could not be released after task completion. Zone may remain locked."

      - alert: AE3PendingTaskStuck
        expr: ae3_oldest_pending_task_age_seconds > 600
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "AE3 pending task stuck (age >10m)"
          description: "Самая старая pending-задача AE3 не забирается worker'ом более 10 минут (age={{ $value }}s)."

      - alert: AE3WorkerSilent
        expr: ae3_pending_tasks > 0 and rate(ae3_tick_duration_seconds_count[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "AE3 worker silent with pending tasks"
          description: "В очереди есть pending-задачи ({{ $value }}), но worker не выполняет ticks 5+ минут."

      - alert: AE3ListenerDown
        expr: ae3_listener_connected == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AE3 PostgreSQL listener down ({{ $labels.listener }})"
          description: "NOTIFY listener {{ $labels.listener }} отключён более 5 минут."

      - alert: AE3DrainCrashLoop
        expr: increase(ae3_drain_crashes_total[15m]) > 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "AE3 drain supervisor crash loop"
          description: "Более 3 crash'ей drain loop за 15 минут — проверьте логи worker."

      - alert: AE3CorrectionExhausted
        expr: rate(ae3_correction_exhausted_total[10m]) > 0
        for: 0m
        labels:
          severity: error
        annotations:
          summary: "AE3 correction exhausted all attempts (stage {{ $labels.stage }})"
          description: "Correction cycle at stage={{ $labels.stage }} topology={{ $labels.topology }} ran out of dose attempts."

      - alert: AE3StageDeadlineExceeded
        expr: rate(ae3_stage_deadline_exceeded_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 stage deadline exceeded (stage {{ $labels.stage }})"
          description: "Stage {{ $labels.stage }} (topology={{ $labels.topology }}) hit its hard deadline."

      - alert: AE3IrrProbeStreakExhausted
        expr: rate(ae3_irr_probe_streak_exhausted_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 IRR probe streak exhausted (stage {{ $labels.stage }})"
          description: "Polling stage {{ $labels.stage }} (topology={{ $labels.topology }}) escalated после streak подряд идущих deferred IRR probes — нода долго недоступна."

      - alert: AE3NodeRebootDetectedFrequent
        expr: sum by (node_uid) (increase(ae3_node_reboot_detected_total[1h])) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Частые reboot ESP32 ноды (node {{ $labels.node_uid }})"
          description: "За последний час задетекчено более 2 reboot pattern для node_uid={{ $labels.node_uid }}: проверьте питание, watchdog, brownout, целостность OTA."

      - alert: AE3IrrProbeDeferredHighRate
        expr: sum by (topology, stage) (rate(ae3_irr_probe_deferred_total[5m])) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AE3 высокая частота deferred IRR probes (stage {{ $labels.stage }})"
          description: "Stage {{ $labels.stage }} (topology={{ $labels.topology }}) отложил >0.2 probe/sec за 5 минут — нестабильная связь с IRR-нодой или firmware fail-safe срабатывает часто."

  - name: ae3_slo_alerts
    interval: 30s
    rules:
      - alert: AutomationCommandEffectConfirmRateLow
        expr: |
          (
            1 -
            (
              (sum(rate(ae3_command_terminal_total{terminal_status!="DONE"}[10m])) or vector(0))
              /
              clamp_min((sum(rate(ae3_command_terminal_total[10m])) or vector(0)), 0.001)
            )
          ) < 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Command effect confirm rate is low"
          description: "DONE share across AE3 terminal command outcomes dropped below 95% for 10 minutes."

      - alert: AutomationTaskRecoverySuccessRateLow
        expr: |
          (
            1 -
            (
              (sum(rate(ae3_startup_recovery_task_total{outcome="failed"}[30m])) or vector(0))
              /
              clamp_min((sum(rate(ae3_startup_recovery_task_total[30m])) or vector(0)), 0.001)
            )
          ) < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task recovery success rate is low"
          description: "Startup recovery non-failure share dropped below 90% over 30 minutes."

  - name: ae3_irrigation_alerts
    interval: 30s
    rules:
      - alert: AE3IrrigationSolutionMinFrequent
        expr: increase(ae3_irrigation_solution_min_total[15m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 irrigation: frequent solution-min triggers"
          description: "Solution-min triggered {{ $value }} times in last 15m. Check solution tank, supply valve, and pump."

      - alert: AE3IrrigationReplayFrequent
        expr: increase(ae3_irrigation_replay_total[30m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 irrigation: frequent setup replays"
          description: "Irrigation setup replay occurred {{ $value }} times in last 30m. Possible unstable supply or level sensor flapping."

      - alert: AE3IrrigationInlineCorrectionExcessive
        expr: increase(ae3_irrigation_correction_entered_total[30m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 irrigation: excessive inline corrections"
          description: "Inline correction entered {{ $value }} times in last 30m during irrigation. Check dosing calibration and sensor stability."

  # R2.4 / reliability observability (dev+prod parity; thresholds may differ in prod comments)
  - name: infrastructure_self_monitoring
    interval: 30s
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus self-scrape target is unreachable for more than 2 minutes."

      - alert: AlertmanagerDown
        expr: up{job="alertmanager"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Alertmanager is down"
          description: "Alertmanager metrics endpoint is unreachable for more than 2 minutes."

      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Grafana is down"
          description: "Grafana metrics endpoint is unreachable for more than 2 minutes."

      - alert: PostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Postgres exporter is down"
          description: "postgres_exporter scrape target is unreachable for more than 2 minutes."

      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis exporter is down"
          description: "redis_exporter scrape target is unreachable for more than 2 minutes."

      - alert: PostgresUnavailable
        expr: (pg_up or vector(0)) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL reported down by exporter"
          description: "postgres_exporter pg_up gauge is 0 for more than 2 minutes."

  - name: reliability_observability_alerts
    interval: 30s
    rules:
      - alert: HistoryLoggerTelemetryDeserializeFailed
        expr: (sum(increase(telemetry_deserialize_failed_total[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "History Logger telemetry deserialize failures"
          description: "Telemetry items were moved to dead list after Redis pop deserialize failure."

      - alert: HistoryLoggerPgWriteFailed
        expr: (sum(increase(telemetry_pg_write_failed_total[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "History Logger PostgreSQL write failures"
          description: "telemetry_pg_write_failed_total increased during the last 10 minutes."

      - alert: HistoryLoggerDeadListNotEmpty
        expr: (telemetry_dead_list_size or vector(0)) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "History Logger telemetry dead list is not empty"
          description: "telemetry_dead_list_size is {{ $value }} for 10 minutes."

      - alert: HistoryLoggerCommandsPublishUnconfirmed
        expr: (sum(increase(commands_published_unconfirmed_total[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "History Logger MQTT command publishes without PUBACK"
          description: "commands_published_unconfirmed_total increased during the last 10 minutes."

      - alert: HistoryLoggerCommandStatusDeliveryDropped
        expr: (sum(increase(command_status_delivery_dropped_total[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "History Logger dropped command status deliveries"
          description: "command_status_delivery_dropped_total increased during the last 10 minutes."

      - alert: HistoryLoggerCommandStatusDlqNotEmpty
        expr: (command_status_dlq_size or vector(0)) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Command status DLQ is not empty"
          description: "command_status_dlq_size is {{ $value }} for 10 minutes."

      - alert: HistoryLoggerAlertDlqNotEmpty
        expr: (alert_dlq_size or vector(0)) > 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Alert delivery DLQ is not empty"
          description: "alert_dlq_size is {{ $value }} for 10 minutes."

      - alert: HistoryLoggerRedisDisconnected
        expr: (redis_connected or vector(1)) == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "History Logger lost Redis connectivity"
          description: "redis_connected gauge is 0 for more than 2 minutes."

      - alert: HistoryLoggerQueueUtilizationHigh
        expr: (telemetry_queue_utilization or vector(0)) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger telemetry queue utilization is high"
          description: "telemetry_queue_utilization is {{ $value }} (threshold 0.95) for 5 minutes."

      - alert: HistoryLoggerMqttPublishErrorsSustained
        expr: (sum(rate(mqtt_publish_errors_total[5m])) or vector(0)) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger MQTT publish errors sustained"
          description: "mqtt_publish_errors_total rate stayed above 0 for 5 minutes."

      - alert: AE3OldestActiveTaskStale
        expr: max(ae3_oldest_active_task_age_seconds) > 900
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "AE3 active task age exceeds 15 minutes"
          description: "ae3_oldest_active_task_age_seconds max is {{ $value }}s (threshold 900s)."

      - alert: AE3IntentSyncFailed
        expr: (sum(increase(ae3_intent_sync_failed_total[15m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: error
        annotations:
          summary: "AE3 intent sync failures detected"
          description: "ae3_intent_sync_failed_total increased during the last 15 minutes."

      - alert: AE3ObservabilityWriteFailed
        expr: (sum(increase(ae3_observability_write_failed_total{kind="biz_alert"}[15m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: error
        annotations:
          summary: "AE3 biz_alert observability write failures detected"
          description: "ae3_observability_write_failed_total{kind=\"biz_alert\"} increased during the last 15 minutes."

      - alert: AE3ReconcileLoopDegraded
        expr: (ae3_reconcile_consecutive_errors or vector(0)) > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "AE3 reconcile loop degraded"
          description: "ae3_reconcile_consecutive_errors is {{ $value }} (threshold 3) for 5 minutes."

      - alert: AE3LeaseHeartbeatFailed
        expr: (sum(increase(ae3_lease_heartbeat_failed_total[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "AE3 lease heartbeat failures detected"
          description: "ae3_lease_heartbeat_failed_total increased during the last 10 minutes."

      - alert: LaravelSchedulerMissedWindows
        # sum by (zone_id): метрика уже per-zone; без by webhook получает zone_id=null.
        expr: sum by (zone_id) (increase(laravel_scheduler_missed_windows_total[15m])) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Laravel scheduler missed irrigation/light windows (zone {{ $labels.zone_id }})"
          description: "laravel_scheduler_missed_windows_total increased for zone {{ $labels.zone_id }} during the last 15 minutes."

      - alert: LaravelSchedulerLockSkipped
        # Глобальный счётчик без zone_id — оставляем cluster-level.
        expr: (sum(increase(laravel_scheduler_lock_skipped_total[15m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Laravel scheduler skipped cycles due to lock contention"
          description: "laravel_scheduler_lock_skipped_total increased during the last 15 minutes."

      - alert: LaravelZoneHangHintsActive
        expr: sum by (zone_id) (laravel_zone_hang_hints_active) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Active zone hang hints detected (zone {{ $labels.zone_id }})"
          description: "laravel_zone_hang_hints_active > 0 for zone {{ $labels.zone_id }} for at least 5 minutes."

      - alert: NodeLastSeenStale
        expr: max(node_last_seen_age_seconds) > 120
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Node last seen age exceeds offline threshold"
          description: "node_last_seen_age_seconds max is {{ $value }}s (threshold 120s) for 3 minutes."

      - alert: ZoneTelemetryLastStale
        expr: max(telemetry_last_age_seconds) > 600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Zone telemetry_last is stale"
          description: "telemetry_last_age_seconds max is {{ $value }}s (threshold 600s) for 5 minutes."

  - name: agronomy_alerts
    interval: 30s
    rules:
      - alert: SolutionTempOutOfBand
        expr: sum(solution_temp_breach_active) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Solution temperature outside recipe thresholds"
          description: "At least one zone has active biz_solution_temp_high/low alert (solution_temp_c breach)."
