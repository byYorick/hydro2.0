groups:
  - name: service_alerts
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~"automation-engine|mqtt-bridge|history-logger|laravel-scheduler"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 2 minutes."

      - alert: MQTTBrokerDown
        expr: up{job="mqtt-bridge"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MQTT broker is unreachable"
          description: "MQTT bridge service is not responding."

  - name: history_logger_alerts
    interval: 30s
    rules:
      - alert: HistoryLoggerQueueOverflow
        expr: telemetry_queue_size > 10000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger queue is overflowing"
          description: "Telemetry queue size is {{ $value }} (threshold: 10000). Messages may be dropped."

      - alert: HistoryLoggerQueueStale
        expr: telemetry_queue_age_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "History Logger queue has stale items"
          description: "Oldest item in queue is {{ $value }} seconds old (threshold: 300s). Processing may be delayed."

      - alert: HistoryLoggerDroppingMessages
        expr: rate(telemetry_dropped_total{reason="queue_push_failed"}[5m]) > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger is dropping messages"
          description: "Dropping {{ $value }} messages/sec due to queue push failures. Data loss is occurring."

      - alert: HistoryLoggerDatabaseErrors
        expr: rate(database_errors_total[5m]) > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger has database errors"
          description: "Database error rate is {{ $value }} errors/sec. Check database connectivity and performance."

      - alert: HistoryLoggerSlowProcessing
        expr: histogram_quantile(0.99, sum by (le) (rate(telemetry_processing_duration_seconds_bucket[5m]))) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "History Logger processing is slow"
          description: "P99 processing time is {{ $value }}s (threshold: 5s). Performance degradation detected."

      - alert: HistoryLoggerNoProgressWithIncomingTraffic
        expr: |
          (sum(rate(telemetry_received_total[5m])) or vector(0)) > 0.1
          and
          (sum(rate(telemetry_processed_total[5m])) or vector(0)) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "History Logger is not processing incoming telemetry"
          description: "Telemetry is arriving, but processed rate stayed at 0 for 5 minutes."

      - alert: HistoryLoggerUnknownNodeEventsSpike
        expr: rate(node_event_unknown_total[5m]) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "History Logger receives too many unknown node events"
          description: "Unknown node event rate is {{ $value }} events/sec for 10m. Check firmware event_code contract."

      - alert: HistoryLoggerCommandStatusRepairReplayFailed
        expr: |
          (sum(increase(pipeline_command_status_repair_total{outcome="replay_failed"}[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: error
        annotations:
          summary: "History Logger self-heal replay failed"
          description: "Self-heal repair path reported one or more replay_failed outcomes during the last 10 minutes."

      - alert: HistoryLoggerCommandStatusRepairNoCorrelation
        expr: |
          (sum(increase(pipeline_command_status_repair_total{outcome="no_correlation"}[10m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "History Logger found stale command statuses without correlation"
          description: "Self-heal repair path reported one or more no_correlation outcomes during the last 10 minutes."

  - name: laravel_scheduler_alerts
    interval: 30s
    rules:
      - alert: LaravelSchedulerDispatchFailureRateHigh
        expr: |
          (
            (sum(rate(laravel_scheduler_dispatches_total{result!~"success|backpressure"}[5m])) or vector(0))
            /
            clamp_min((sum(rate(laravel_scheduler_dispatches_total[5m])) or vector(0)), 0.001)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Laravel scheduler dispatch failure rate is high"
          description: "Non-accepted scheduler dispatches exceed 5% for 10 minutes."

      - alert: LaravelSchedulerCycleDurationHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, dispatch_mode) (rate(laravel_scheduler_cycle_duration_seconds_bucket[5m]))
          ) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Laravel scheduler cycle duration is high"
          description: "P95 laravel scheduler cycle duration is {{ $value }}s (threshold: 5s)."

      - alert: LaravelSchedulerActiveTasksBacklogHigh
        expr: laravel_scheduler_active_tasks_count > 20
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Laravel scheduler active task backlog is high"
          description: "Active scheduler tasks are {{ $value }} (threshold: 20). Possible stuck reconciliation or automation slowdown."

  - name: ae3_runtime_alerts
    interval: 30s
    rules:
      - alert: AE3TaskFailureSpike
        expr: (sum(increase(ae3_task_failed_total[15m])) or vector(0)) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 task failures detected"
          description: "AE3 reported one or more failed tasks during the last 15 minutes."

      - alert: AE3WorkerTickErrors
        expr: rate(ae3_tick_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: error
        annotations:
          summary: "AE3 worker tick errors above threshold"
          description: "Worker tick error rate is {{ $value }} errors/sec (error_type={{ $labels.error_type }}). Check automation-engine logs."

      - alert: AE3CommandDispatchLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(ae3_command_dispatch_duration_seconds_bucket[5m]))
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AE3 command dispatch latency is high"
          description: "P95 command dispatch latency is {{ $value }}s (threshold: 2s). Check history-logger connectivity."

      - alert: AE3CommandFailureRateHigh
        expr: |
          (
            (sum(rate(ae3_command_terminal_total{terminal_status!="DONE"}[10m])) or vector(0))
            /
            clamp_min((sum(rate(ae3_command_terminal_total[10m])) or vector(0)), 0.001)
          ) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "AE3 command failure rate is high"
          description: "More than 10% of terminal command outcomes are non-DONE over 10 minutes."

      - alert: AE3ZoneLeaseLost
        expr: rate(ae3_zone_lease_lost_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AE3 zone lease lost (zone {{ $labels.zone_id }})"
          description: "Zone {{ $labels.zone_id }} lease heartbeat failed to extend. Zone may be frozen or hijacked by another worker."

      - alert: AE3ZoneLeaseReleaseFailed
        expr: rate(ae3_zone_lease_release_failed_total[5m]) > 0
        for: 1m
        labels:
          severity: error
        annotations:
          summary: "AE3 zone lease release failed (zone {{ $labels.zone_id }})"
          description: "Zone {{ $labels.zone_id }} lease could not be released after task completion. Zone may remain locked."

      - alert: AE3StuckTask
        expr: ae3_active_tasks > 0
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "AE3 task stuck for >15 minutes (topology {{ $labels.topology }})"
          description: "{{ $value }} active task(s) with topology={{ $labels.topology }} have been running for over 15 minutes."

      - alert: AE3CorrectionExhausted
        expr: rate(ae3_correction_exhausted_total[10m]) > 0
        for: 0m
        labels:
          severity: error
        annotations:
          summary: "AE3 correction exhausted all attempts (stage {{ $labels.stage }})"
          description: "Correction cycle at stage={{ $labels.stage }} topology={{ $labels.topology }} ran out of dose attempts."

      - alert: AE3StageDeadlineExceeded
        expr: rate(ae3_stage_deadline_exceeded_total[10m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 stage deadline exceeded (stage {{ $labels.stage }})"
          description: "Stage {{ $labels.stage }} (topology={{ $labels.topology }}) hit its hard deadline."

  - name: ae3_slo_alerts
    interval: 30s
    rules:
      - alert: AutomationCommandEffectConfirmRateLow
        expr: |
          (
            1 -
            (
              (sum(rate(ae3_command_terminal_total{terminal_status!="DONE"}[10m])) or vector(0))
              /
              clamp_min((sum(rate(ae3_command_terminal_total[10m])) or vector(0)), 0.001)
            )
          ) < 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Command effect confirm rate is low"
          description: "DONE share across AE3 terminal command outcomes dropped below 95% for 10 minutes."

      - alert: AutomationTaskRecoverySuccessRateLow
        expr: |
          (
            1 -
            (
              (sum(rate(ae3_startup_recovery_task_total{outcome="failed"}[30m])) or vector(0))
              /
              clamp_min((sum(rate(ae3_startup_recovery_task_total[30m])) or vector(0)), 0.001)
            )
          ) < 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task recovery success rate is low"
          description: "Startup recovery non-failure share dropped below 90% over 30 minutes."

  - name: ae3_irrigation_alerts
    interval: 30s
    rules:
      - alert: AE3IrrigationSolutionMinFrequent
        expr: increase(ae3_irrigation_solution_min_total[15m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 irrigation: frequent solution-min triggers"
          description: "Solution-min triggered {{ $value }} times in last 15m. Check solution tank, supply valve, and pump."

      - alert: AE3IrrigationReplayFrequent
        expr: increase(ae3_irrigation_replay_total[30m]) > 2
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 irrigation: frequent setup replays"
          description: "Irrigation setup replay occurred {{ $value }} times in last 30m. Possible unstable supply or level sensor flapping."

      - alert: AE3IrrigationInlineCorrectionExcessive
        expr: increase(ae3_irrigation_correction_entered_total[30m]) > 5
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "AE3 irrigation: excessive inline corrections"
          description: "Inline correction entered {{ $value }} times in last 30m during irrigation. Check dosing calibration and sensor stability."
