global:
  resolve_timeout: 5m

# Шаблоны для уведомлений
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Маршрутизация алертов
route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'

# Получатели уведомлений
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://laravel:80/api/alerts/webhook'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://laravel:80/api/alerts/webhook'
        send_resolved: true

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://laravel:80/api/alerts/webhook'
        send_resolved: true

# Подавление дубликатов
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
