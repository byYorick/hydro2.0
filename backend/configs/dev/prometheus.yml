global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hydro-dev'
    environment: 'development'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  - job_name: 'blackbox'
    static_configs:
      - targets: ['blackbox:9115']

  - job_name: 'mqtt-broker'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - mqtt:1883
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  - job_name: 'automation-engine'
    static_configs:
      - targets: ['automation-engine:9405']
    metrics_path: '/metrics/'
    scrape_interval: 15s

  - job_name: 'mqtt-bridge'
    static_configs:
      - targets: ['mqtt-bridge:9000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'history-logger'
    static_configs:
      - targets: ['history-logger:9300']
    metrics_path: '/metrics'
    scrape_interval: 15s

  - job_name: 'laravel-scheduler'
    static_configs:
      - targets: ['laravel:80']
    metrics_path: '/api/system/scheduler/metrics'
    scrape_interval: 15s

rule_files:
  - '/etc/prometheus/alerts.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
