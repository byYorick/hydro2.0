global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hydro-dev'
    environment: 'development'

# Настройки retention для метрик
# Примечание: retention настраивается через флаги командной строки в docker-compose
# storage.tsdb.retention.time и storage.tsdb.retention.size не поддерживаются в конфигурационном файле

scrape_configs:
  # Prometheus сам себя
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Automation Engine (ae3lite — metrics embedded in main API on port 9405)
  - job_name: 'automation-engine'
    static_configs:
      - targets: ['automation-engine:9405']
    metrics_path: '/metrics/'
    scrape_interval: 15s

  # MQTT Bridge
  - job_name: 'mqtt-bridge'
    static_configs:
      - targets: ['mqtt-bridge:9000']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # History Logger
  - job_name: 'history-logger'
    static_configs:
      - targets: ['history-logger:9300']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Laravel scheduler-dispatch exporter
  - job_name: 'laravel-scheduler'
    static_configs:
      - targets: ['laravel:80']
    metrics_path: '/api/system/scheduler/metrics'
    scrape_interval: 15s

# Правила алертов
rule_files:
  - '/etc/prometheus/alerts.yml'

# Alertmanager конфигурация
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'alertmanager:9093'
