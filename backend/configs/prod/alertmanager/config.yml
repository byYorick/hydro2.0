global:
  resolve_timeout: 5m

# Доставка алертов наружу: только Laravel webhook (Bearer из /alertmanager/webhook_token).
# SMTP/Telegram receivers намеренно не используются — операторские уведомления через Laravel AlertService.

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://laravel:80/api/alerts/webhook'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /alertmanager/webhook_token

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://laravel:80/api/alerts/webhook'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /alertmanager/webhook_token

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://laravel:80/api/alerts/webhook'
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: /alertmanager/webhook_token

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
