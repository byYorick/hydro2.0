name: Protocol Contract Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Запускается на каждом PR, не только при изменении schemas/. Протокол может
# сломаться косвенно (через Python handler / Laravel validator / Vue WS
# subscriber), поэтому `paths:` filter повышает риск регрессии.

jobs:
  protocol-check:
    name: Protocol Contract Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        working-directory: backend/services
        run: |
          pip install --upgrade pip
          pip install 'jsonschema>=4.23' pytest pydantic httpx

      - name: Validate canonical JSON Schemas (schemas/*.v1.json)
        run: |
          python3 tools/validate_schemas.py schemas

      - name: Check runtime schema parity (backend source -> firmware mirror)
        run: |
          ./tools/check_runtime_schema_parity.sh
      
      - name: Run protocol contract tests
        working-directory: backend/services
        env:
          PYTHONPATH: ${{ github.workspace }}/backend/services:${{ github.workspace }}/backend/services/history-logger:${{ github.workspace }}/backend/services/common
        run: |
          cd common/schemas
          bash run_contract_tests.sh
      
      # Chaos tests перенесены в nightly.yml — они требуют running services
      # и не должны блокировать обычный PR-pipeline. Там же они blocking,
      # чтобы реальные падения не терялись в continue-on-error.

      - name: Run WebSocket events validation tests
        working-directory: backend/services
        env:
          PYTHONPATH: ${{ github.workspace }}/backend/services:${{ github.workspace }}/backend/services/history-logger:${{ github.workspace }}/backend/services/common
        run: |
          pytest common/schemas/test_websocket_events.py -v --tb=short
      
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: protocol-test-results
          path: backend/services/common/schemas/test-results.xml
          if-no-files-found: ignore
