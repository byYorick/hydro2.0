<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-label="hydro 2.0  Smart Hydroponic Greenhouse Control">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#062e24"/>
      <stop offset="55%" stop-color="#0b6148"/>
      <stop offset="100%" stop-color="#0a3d30"/>
    </linearGradient>
    <linearGradient id="leafA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="leafB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#81c784"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(236,239,241,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" fill="url(#bg)"/>
  <rect width="1280" height="420" fill="url(#grid)"/>

  <!-- soft ambience -->
  <circle cx="1080" cy="70" r="180" fill="rgba(165,214,167,0.10)"/>
  <circle cx="180" cy="360" r="160" fill="rgba(129,199,132,0.08)"/>

  <!-- signal / topology accents -->
  <g stroke="rgba(236,239,241,0.18)" stroke-width="1.5" fill="none">
    <path d="M90 300 C180 220, 260 340, 360 280 S520 180, 620 240"/>
    <path d="M720 300 C820 240, 900 320, 1000 260 S1140 180, 1210 220"/>
  </g>
  <g fill="#a5d6a7">
    <circle cx="360" cy="280" r="4"/>
    <circle cx="620" cy="240" r="4"/>
    <circle cx="1000" cy="260" r="4"/>
  </g>

  <!-- brand mark (sprout) -->
  <g transform="translate(96,118)">
    <rect width="88" height="88" rx="22" fill="rgba(236,239,241,0.08)" stroke="rgba(236,239,241,0.18)"/>
    <ellipse cx="28" cy="34" rx="14" ry="21" transform="rotate(-40 28 34)" fill="url(#leafA)"/>
    <ellipse cx="60" cy="34" rx="14" ry="21" transform="rotate(40 60 34)" fill="url(#leafB)"/>
    <rect x="40" y="42" width="8" height="30" rx="4" fill="#eceff1"/>
  </g>

  <!-- title block -->
  <text x="220" y="178" fill="#eceff1" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.5">hydro 2.0</text>
  <text x="224" y="228" fill="#c8e6c9" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="500">Smart Hydroponic Greenhouse Control</text>
  <text x="224" y="268" fill="rgba(236,239,241,0.72)" font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="18">ESP32 · MQTT · Laravel · AE3 · TimescaleDB · Android</text>

  <!-- feature chips -->
  <g font-family="Inter, Segoe UI, Helvetica, Arial, sans-serif" font-size="15" fill="#eceff1">
    <rect x="224" y="302" width="148" height="34" rx="17" fill="rgba(236,239,241,0.10)" stroke="rgba(236,239,241,0.16)"/>
    <text x="298" y="324" text-anchor="middle">Zone automation</text>

    <rect x="386" y="302" width="132" height="34" rx="17" fill="rgba(236,239,241,0.10)" stroke="rgba(236,239,241,0.16)"/>
    <text x="452" y="324" text-anchor="middle">pH / EC control</text>

    <rect x="532" y="302" width="148" height="34" rx="17" fill="rgba(236,239,241,0.10)" stroke="rgba(236,239,241,0.16)"/>
    <text x="606" y="324" text-anchor="middle">Realtime dashboard</text>

    <rect x="694" y="302" width="120" height="34" rx="17" fill="rgba(236,239,241,0.10)" stroke="rgba(236,239,241,0.16)"/>
    <text x="754" y="324" text-anchor="middle">Failsafe / E-STOP</text>
  </g>
</svg>
